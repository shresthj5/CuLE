          - generic [ref=e44]:
            - paragraph [ref=e45]: Tuning CUDA Applications for NVIDIA Ampere GPU Architecture
            - paragraph [ref=e46]: The programming guide for tuning CUDA Applications for GPUs based on the NVIDIA Ampere GPU Architecture.
            - generic [ref=e47]:
              - heading "1. NVIDIA Ampere GPU Architecture Tuning Guide " [level=1] [ref=e48]:
                - text: 1. NVIDIA Ampere GPU Architecture Tuning Guide
                - link "" [ref=e49] [cursor=pointer]:
                  - /url: "#nvidia-ampere-gpu-architecture-tuning-guide"
              - generic [ref=e50]:
                - heading "1.1. NVIDIA Ampere GPU Architecture " [level=2] [ref=e51]:
                  - text: 1.1. NVIDIA Ampere GPU Architecture
                  - link "" [ref=e52] [cursor=pointer]:
                    - /url: "#nvidia-ampere-gpu-architecture"
                - paragraph [ref=e53]:
                  - text: The NVIDIA Ampere GPU architecture is NVIDIA’s latest architecture for CUDA compute applications. The NVIDIA Ampere GPU architecture retains and extends the same CUDA programming model provided by previous NVIDIA GPU architectures such as Turing and Volta, and applications that follow the best practices for those architectures should typically see speedups on the NVIDIA A100 GPU without any code changes. This guide summarizes the ways that an application can be fine-tuned to gain additional speedups by leveraging the NVIDIA Ampere GPU architecture’s features.
                  - link "1" [ref=e54] [cursor=pointer]:
                    - /url: "#fn1"
                - paragraph [ref=e55]:
                  - text: For further details on the programming features discussed in this guide, please refer to the
                  - link "CUDA C++ Programming Guide" [ref=e56] [cursor=pointer]:
                    - /url: https://docs.nvidia.com/cuda/cuda-c-programming-guide/
                  - text: .
              - generic [ref=e57]:
                - heading "1.2. CUDA Best Practices " [level=2] [ref=e58]:
                  - text: 1.2. CUDA Best Practices
                  - link "" [ref=e59] [cursor=pointer]:
                    - /url: "#cuda-best-practices"
                - paragraph [ref=e60]:
                  - text: The performance guidelines and best practices described in the
                  - link "CUDA C++ Programming Guide" [ref=e61] [cursor=pointer]:
                    - /url: https://docs.nvidia.com/cuda/cuda-c-programming-guide/
                  - text: and the
                  - link "CUDA C++ Best Practices Guide" [ref=e62] [cursor=pointer]:
                    - /url: https://docs.nvidia.com/cuda/cuda-c-best-practices-guide/
                  - text: apply to all CUDA-capable GPU architectures. Programmers must primarily focus on following those recommendations to achieve the best performance.
                - paragraph [ref=e63]: "The high-priority recommendations from those guides are as follows:"
                - list [ref=e64]:
                  - listitem [ref=e65]:
                    - paragraph [ref=e66]: Find ways to parallelize sequential code.
                  - listitem [ref=e67]:
                    - paragraph [ref=e68]: Minimize data transfers between the host and the device.
                  - listitem [ref=e69]:
                    - paragraph [ref=e70]: Adjust kernel launch configuration to maximize device utilization.
                  - listitem [ref=e71]:
                    - paragraph [ref=e72]: Ensure global memory accesses are coalesced.
                  - listitem [ref=e73]:
                    - paragraph [ref=e74]: Minimize redundant accesses to global memory whenever possible.
                  - listitem [ref=e75]:
                    - paragraph [ref=e76]: Avoid long sequences of diverged execution by threads within the same warp.
              - generic [ref=e77]:
                - heading "1.3. Application Compatibility " [level=2] [ref=e78]:
                  - text: 1.3. Application Compatibility
                  - link "" [ref=e79] [cursor=pointer]:
                    - /url: "#application-compatibility"
                - paragraph [ref=e80]:
                  - text: Before addressing specific performance tuning issues covered in this guide, refer to the
                  - link "NVIDIA Ampere GPU Architecture Compatibility Guide for CUDA Applications" [ref=e81] [cursor=pointer]:
                    - /url: https://docs.nvidia.com/cuda/ampere-compatibility-guide/
                  - text: to ensure that your application is compiled in a way that is compatible with the NVIDIA Ampere GPU Architecture.
              - generic [ref=e82]:
                - heading "1.4. NVIDIA Ampere GPU Architecture Tuning " [level=2] [ref=e83]:
                  - text: 1.4. NVIDIA Ampere GPU Architecture Tuning
                  - link "" [ref=e84] [cursor=pointer]:
                    - /url: "#nvidia-ampere-gpu-architecture-tuning"
                - generic [ref=e85]:
                  - heading "1.4.1. Streaming Multiprocessor " [level=3] [ref=e86]:
                    - text: 1.4.1. Streaming Multiprocessor
                    - link "" [ref=e87] [cursor=pointer]:
                      - /url: "#streaming-multiprocessor"
                  - paragraph [ref=e88]: The NVIDIA Ampere GPU architecture’s Streaming Multiprocessor (SM) provides the following improvements over Volta and Turing.
                  - generic [ref=e89]:
                    - heading "1.4.1.1. Occupancy " [level=4] [ref=e90]:
                      - text: 1.4.1.1. Occupancy
                      - link "" [ref=e91] [cursor=pointer]:
                        - /url: "#occupancy"
                    - paragraph [ref=e92]:
                      - text: The maximum number of concurrent warps per SM remains the same as in Volta (i.e., 64) for compute capability 8.0, while for compute capability 8.6 it is 48. Other
                      - link "factors influencing warp occupancy" [ref=e93] [cursor=pointer]:
                        - /url: https://docs.nvidia.com/nsight-compute/NsightCompute/index.html#occupancy-calculator
                      - text: "are:"
                    - list [ref=e94]:
                      - listitem [ref=e95]:
                        - paragraph [ref=e96]: The register file size is 64K 32-bit registers per SM.
                      - listitem [ref=e97]:
                        - paragraph [ref=e98]: The maximum number of registers per thread is 255.
                      - listitem [ref=e99]:
                        - paragraph [ref=e100]: The maximum number of thread blocks per SM is 32 for devices of compute capability 8.0 (i.e., A100 GPUs) and 16 for GPUs with compute capability 8.6.
                      - listitem [ref=e101]:
                        - paragraph [ref=e102]: For devices of compute capability 8.0 (i.e., A100 GPUs) shared memory capacity per SM is 164 KB, a 71% increase compared to V100’s capacity of 96 KB. For GPUs with compute capability 8.6, shared memory capacity per SM is 100 KB.
                      - listitem [ref=e103]:
                        - paragraph [ref=e104]: For devices of compute capability 8.0 (i.e., A100 GPUs) the maximum shared memory per thread block is 163 KB. For GPUs with compute capability 8.6 maximum shared memory per thread block is 99 KB.
                    - paragraph [ref=e105]: Overall, developers can expect similar occupancy as on Volta without changes to their application.
                  - generic [ref=e106]:
                    - heading "1.4.1.2. Asynchronous Data Copy from Global Memory to Shared Memory " [level=4] [ref=e107]:
                      - text: 1.4.1.2. Asynchronous Data Copy from Global Memory to Shared Memory
                      - link "" [ref=e108] [cursor=pointer]:
                        - /url: "#asynchronous-data-copy-from-global-memory-to-shared-memory"
                    - paragraph [ref=e109]:
                      - text: The NVIDIA Ampere GPU architecture adds hardware acceleration for copying data from global memory to shared memory. These copy instructions are asynchronous, with respect to computation and allow users to explicitly control overlap of compute with data movement from global memory into the SM. These instructions also avoid using extra registers for memory copies and can also bypass the L1 cache. This new feature is exposed via the
                      - code [ref=e110]: pipeline
                      - text: API in CUDA. For more information please refer to the section on Async Copy in the
                      - link "CUDA C++ Programming Guide" [ref=e111] [cursor=pointer]:
                        - /url: https://docs.nvidia.com/cuda/cuda-c-programming-guide/index.html#async-copy
                      - text: .
                  - generic [ref=e112]:
                    - heading "1.4.1.3. Hardware Acceleration for Split Arrive/Wait Barrier " [level=4] [ref=e113]:
                      - text: 1.4.1.3. Hardware Acceleration for Split Arrive/Wait Barrier
                      - link "" [ref=e114] [cursor=pointer]:
                        - /url: "#hardware-acceleration-for-split-arrive-wait-barrier"
                    - paragraph [ref=e115]:
                      - text: The NVIDIA Ampere GPU architecture adds hardware acceleration for a split arrive/wait barrier in shared memory. These barriers can be used to implement fine grained thread controls, producer-consumer computation pipeline and divergence code patterns in CUDA. These barriers can also be used alongside the asynchronous copy. For more information on the Arrive/Wait Barriers refer to the Arrive/Wait Barrier section in the
                      - link "CUDA C++ Programming Guide" [ref=e116] [cursor=pointer]:
                        - /url: https://docs.nvidia.com/cuda/cuda-c-programming-guide/index.html#aw-barrier
                      - text: .
                  - generic [ref=e117]:
                    - heading "1.4.1.4. Warp level support for Reduction Operations " [level=4] [ref=e118]:
                      - text: 1.4.1.4. Warp level support for Reduction Operations
                      - link "" [ref=e119] [cursor=pointer]:
                        - /url: "#warp-level-support-for-reduction-operations"
                    - paragraph [ref=e120]:
                      - text: The NVIDIA Ampere GPU architecture adds native support for warp wide reduction operations for 32-bit signed and unsigned integer operands. The warp wide reduction operations support arithmetic
                      - code [ref=e121]: add
                      - text: ","
                      - code [ref=e122]: min
                      - text: ", and"
                      - code [ref=e123]: max
                      - text: operations on 32-bit signed and unsigned integers and bitwise
                      - code [ref=e124]: and
                      - text: ","
                      - code [ref=e125]: or
                      - text: and
                      - code [ref=e126]: xor
                      - text: operations on 32-bit unsigned integers.
                    - paragraph [ref=e127]:
                      - text: For more details on the new warp wide reduction operations refer to Warp Reduce Functions in the
                      - link "CUDA C++ Programming Guide" [ref=e128] [cursor=pointer]:
                        - /url: https://docs.nvidia.com/cuda/cuda-c-programming-guide/index.html#warp-reduce-functions
                      - text: .
                  - generic [ref=e129]:
                    - heading "1.4.1.5. Improved Tensor Core Operations " [level=4] [ref=e130]:
                      - text: 1.4.1.5. Improved Tensor Core Operations
                      - link "" [ref=e131] [cursor=pointer]:
                        - /url: "#improved-tensor-core-operations"
                    - paragraph [ref=e132]: "The NVIDIA Ampere GPU architecture includes new Third Generation Tensor Cores that are more powerful than the Tensor Cores used in Volta and Turing SMs. The new Tensor Cores use a larger base matrix size and add powerful new math modes including:"
                    - list [ref=e133]:
                      - listitem [ref=e134]:
                        - paragraph [ref=e135]: Support for FP64 Tensor Core, using new DMMA instructions.
                      - listitem [ref=e136]:
                        - paragraph [ref=e137]: Support for Bfloat16 Tensor Core, through HMMA instructions. BFloat16 format is especially effective for DL training scenarios. Bfloat16 provides 8-bit exponent i.e., same range as FP32, 7-bit mantissa and 1 sign-bit.
                      - listitem [ref=e138]:
                        - paragraph [ref=e139]: Support for TF32 Tensor Core, through HMMA instructions. TF32 is a new 19-bit Tensor Core format that can be easily integrated into programs for more accurate DL training than 16-bit HMMA formats. TF32 provides 8-bit exponent, 10-bit mantissa and 1 sign-bit.
                      - listitem [ref=e140]:
                        - paragraph [ref=e141]:
                          - text: Support for bitwise
                          - code [ref=e142]: AND
                          - text: along with bitwise
                          - code [ref=e143]: XOR
                          - text: which was introduced in Turing, through BMMA instructions.
                    - paragraph [ref=e144]: The following table presents the evolution of matrix instruction sizes and supported data types for Tensor Cores across different GPU architecture generations.
