                  - generic [ref=e342]:
                    - heading "1.4.1.6. Improved FP32 throughput " [level=4] [ref=e343]:
                      - text: 1.4.1.6. Improved FP32 throughput
                      - link "" [ref=e344] [cursor=pointer]:
                        - /url: "#improved-fp32-throughput"
                    - paragraph [ref=e345]: Devices of compute capability 8.6 have 2x more FP32 operations per cycle per SM than devices of compute capability 8.0. While a binary compiled for 8.0 will run as is on 8.6, it is recommended to compile explicitly for 8.6 to benefit from the increased FP32 throughput.
                - generic [ref=e346]:
                  - heading "1.4.2. Memory System " [level=3] [ref=e347]:
                    - text: 1.4.2. Memory System
                    - link "" [ref=e348] [cursor=pointer]:
                      - /url: "#memory-system"
                  - generic [ref=e349]:
                    - heading "1.4.2.1. Increased Memory Capacity and High Bandwidth Memory " [level=4] [ref=e350]:
                      - text: 1.4.2.1. Increased Memory Capacity and High Bandwidth Memory
                      - link "" [ref=e351] [cursor=pointer]:
                        - /url: "#increased-memory-capacity-and-high-bandwidth-memory"
                    - paragraph [ref=e352]: The NVIDIA A100 GPU increases the HBM2 memory capacity from 32 GB in V100 GPU to 40 GB in A100 GPU. Along with the increased memory capacity, the bandwidth is increased by 72%, from 900 GB/s on Volta V100 to 1550 GB/s on A100.
                  - generic [ref=e353]:
                    - heading "1.4.2.2. Increased L2 capacity and L2 Residency Controls " [level=4] [ref=e354]:
                      - text: 1.4.2.2. Increased L2 capacity and L2 Residency Controls
                      - link "" [ref=e355] [cursor=pointer]:
                        - /url: "#increased-l2-capacity-and-l2-residency-controls"
                    - paragraph [ref=e356]:
                      - text: The NVIDIA Ampere GPU architecture increases the capacity of the L2 cache to 40 MB in Tesla A100, which is 7x larger than Tesla V100. Along with the increased capacity, the bandwidth of the L2 cache to the SMs is also increased. The NVIDIA Ampere GPU architecture allows CUDA users to control the persistence of data in L2 cache. For more information on the persistence of data in L2 cache, refer to the section on managing L2 cache in the
                      - link "CUDA C++ Programming Guide" [ref=e357] [cursor=pointer]:
                        - /url: https://docs.nvidia.com/cuda/cuda-c-programming-guide/index.html#L2_access_intro
                      - text: .
                  - generic [ref=e358]:
                    - heading "1.4.2.3. Unified Shared Memory/L1/Texture Cache " [level=4] [ref=e359]:
                      - text: 1.4.2.3. Unified Shared Memory/L1/Texture Cache
                      - link "" [ref=e360] [cursor=pointer]:
                        - /url: "#unified-shared-memory-l1-texture-cache"
                    - paragraph [ref=e361]: The NVIDIA A100 GPU based on compute capability 8.0 increases the maximum capacity of the combined L1 cache, texture cache and shared memory to 192 KB, 50% larger than the L1 cache in NVIDIA V100 GPU. The combined L1 cache capacity for GPUs with compute capability 8.6 is 128 KB.
                    - paragraph [ref=e362]:
                      - text: In the NVIDIA Ampere GPU architecture, the portion of the L1 cache dedicated to shared memory (known as the
                      - emphasis [ref=e363]: carveout
                      - text: ) can be selected at runtime as in previous architectures such as Volta, using
                      - code [ref=e364]: cudaFuncSetAttribute()
                      - text: with the attribute
                      - code [ref=e365]: cudaFuncAttributePreferredSharedMemoryCarveout
                      - text: . The NVIDIA A100 GPU supports shared memory capacity of 0, 8, 16, 32, 64, 100, 132 or 164 KB per SM. GPUs with compute capability 8.6 support shared memory capacity of 0, 8, 16, 32, 64 or 100 KB per SM.
                    - paragraph [ref=e366]:
                      - text: CUDA reserves 1 KB of shared memory per thread block. Hence, the A100 GPU enables a single thread block to address up to 163 KB of shared memory and GPUs with compute capability 8.6 can address up to 99 KB of shared memory in a single thread block. To maintain architectural compatibility, static shared memory allocations remain limited to 48 KB, and an explicit opt-in is also required to enable dynamic allocations above this limit. See the
                      - link "CUDA C++ Programming Guide" [ref=e367] [cursor=pointer]:
                        - /url: https://docs.nvidia.com/cuda/cuda-c-programming-guide/
                      - text: for details.
                    - paragraph [ref=e368]: Like Volta, the NVIDIA Ampere GPU architecture combines the functionality of the L1 and texture caches into a unified L1/Texture cache which acts as a coalescing buffer for memory accesses, gathering up the data requested by the threads of a warp prior to delivery of that data to the warp. Another benefit of its union with shared memory, similar to Volta L1 is improvement in terms of both latency and bandwidth.
                - generic [ref=e369]:
                  - heading "1.4.3. Third Generation NVLink " [level=3] [ref=e370]:
                    - text: 1.4.3. Third Generation NVLink
                    - link "" [ref=e371] [cursor=pointer]:
                      - /url: "#third-generation-nvlink"
                  - paragraph [ref=e372]: The third generation of NVIDIA’s high-speed NVLink interconnect is implemented in A100 GPUs, which significantly enhances multi-GPU scalability, performance, and reliability with more links per GPU, much faster communication bandwidth, and improved error-detection and recovery features. The third generation NVLink has the same bi-directional data rate of 50 GB/s per link, but uses half the number of signal pairs to achieve this bandwidth. Therefore, the total number of links available is increased to twelve in A100, versus six in V100, yielding 600 GB/s bidirectional bandwidth versus 300 GB/s for V100.
                  - paragraph [ref=e373]:
                    - text: NVLink operates transparently within the existing CUDA model. Transfers between NVLink-connected endpoints are automatically routed through NVLink, rather than PCIe. The
                    - code [ref=e374]: cudaDeviceEnablePeerAccess()
                    - text: API call remains necessary to enable direct transfers (over either PCIe or NVLink) between GPUs. The
                    - code [ref=e375]: cudaDeviceCanAccessPeer()
                    - text: can be used to determine if peer access is possible between any pair of GPUs.
                  - paragraph [ref=e376]: In the NVIDIA Ampere GPU architecture remote NVLINK accesses go through a Link TLB on the remote GPU. This Link TLB has a reach of 64 GB to the remote GPU’s memory. Applications with remote random accesses may want to constrain the remotely accessed region to 64 GB for each peer GPU.
