            - code [ref=e1311]: "# CUDA 10.0 Download and install wheel from https://download.pytorch.org/whl/cu100/torch_stable.html # CUDA 9.0 Download and install wheel from https://download.pytorch.org/whl/cu90/torch_stable.html # CUDA 8.0 Download and install wheel from https://download.pytorch.org/whl/cu80/torch_stable.html # CPU only Download and install wheel from https://download.pytorch.org/whl/cpu/torch_stable.html"
            - heading "Commands for Versions < 1.0.0Anchor" [level=2] [ref=e1312]:
              - text: Commands for Versions < 1.0.0
              - link "Anchor" [ref=e1313] [cursor=pointer]:
                - /url: "#commands-for-versions--100-1"
            - heading "Via condaAnchor" [level=3] [ref=e1314]:
              - text: Via conda
              - link "Anchor" [ref=e1315] [cursor=pointer]:
                - /url: "#via-conda"
            - blockquote [ref=e1316]:
              - paragraph [ref=e1317]: This should be used for most previous macOS version installs.
            - paragraph [ref=e1318]: To install a previous version of PyTorch via Anaconda or Miniconda, replace “0.4.1” in the following commands with the desired version (i.e., “0.2.0”).
            - paragraph [ref=e1319]: Installing with CUDA 9
            - paragraph [ref=e1320]:
              - code [ref=e1321]: conda install pytorch=0.4.1 cuda90 -c pytorch
            - paragraph [ref=e1322]: or
            - paragraph [ref=e1323]:
              - code [ref=e1324]: conda install pytorch=0.4.1 cuda92 -c pytorch
            - paragraph [ref=e1325]: Installing with CUDA 8
            - paragraph [ref=e1326]:
              - code [ref=e1327]: conda install pytorch=0.4.1 cuda80 -c pytorch
            - paragraph [ref=e1328]: Installing with CUDA 7.5
            - paragraph [ref=e1329]:
              - code [ref=e1330]: conda install pytorch=0.4.1 cuda75 -c pytorch
            - paragraph [ref=e1331]: Installing without CUDA
            - paragraph [ref=e1332]:
              - code [ref=e1333]: conda install pytorch=0.4.1 -c pytorch
            - heading "From sourceAnchor" [level=3] [ref=e1334]:
              - text: From source
              - link "Anchor" [ref=e1335] [cursor=pointer]:
                - /url: "#from-source"
            - paragraph [ref=e1336]:
              - text: It is possible to checkout an older version of
              - link "PyTorch" [ref=e1337] [cursor=pointer]:
                - /url: https://github.com/pytorch/pytorch
              - text: and build it. You can list tags in PyTorch git repository with
              - code [ref=e1338]: git tag
              - text: and checkout a particular one (replace ‘0.1.9’ with the desired version) with
            - paragraph [ref=e1339]:
              - code [ref=e1340]: git checkout v0.1.9
            - paragraph [ref=e1341]: Follow the install from source instructions in the README.md of the PyTorch checkout.
            - heading "Via pipAnchor" [level=3] [ref=e1342]:
              - text: Via pip
              - link "Anchor" [ref=e1343] [cursor=pointer]:
                - /url: "#via-pip"
            - paragraph [ref=e1344]:
              - text: Download the
              - code [ref=e1345]: whl
              - text: "file with the desired version from the following html pages:"
