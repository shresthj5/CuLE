              - generic [ref=e748]:
                - heading "2.2.5. Profile Series " [level=3] [ref=e749]:
                  - text: 2.2.5. Profile Series
                  - link "" [ref=e750] [cursor=pointer]:
                    - /url: "#profile-series"
                - paragraph [ref=e751]: The performance of a kernel is highly dependent on the used launch parameters. Small changes to the launch parameters can have a significant effect on the runtime behavior of the kernel. However, identifying the best parameter set for a kernel by manually testing a lot of combinations can be a tedious process.
                - paragraph [ref=e752]: To make this workflow faster and more convenient, Profile Series provide the ability to automatically profile a single kernel multiple times with changing parameters. The parameters to be modified and values to be tested can be independently enabled and configured. For each combination of selected parameter values a unique profile result is collected. And the modified parameter values are tracked in the description of the results of a series. By comparing the results of a profile series, the kernel’s behavior on the changing parameters can be seen and the most optimal parameter set can be identified quickly.
                - figure "Profile Series action. " [ref=e753]:
                  - img "../_images/profile-series-action.png" [ref=e754]
                  - paragraph [ref=e756]:
                    - text: Profile Series action.
                    - link "" [ref=e757] [cursor=pointer]:
                      - /url: "#id21"
                - figure "Profile Series dialog. " [ref=e758]:
                  - img "../_images/profile-series-dialog.png" [ref=e759]
                  - paragraph [ref=e761]:
                    - text: Profile Series dialog.
                    - link "" [ref=e762] [cursor=pointer]:
                      - /url: "#id22"
              - generic [ref=e763]:
                - heading "2.2.6. Overhead " [level=3] [ref=e764]:
                  - text: 2.2.6. Overhead
                  - link "" [ref=e765] [cursor=pointer]:
                    - /url: "#overhead"
                - paragraph [ref=e766]: "As with most measurements, collecting performance data using NVIDIA Nsight Compute CLI incurs some runtime overhead on the application. The overhead does depend on a number of different factors:"
                - list [ref=e767]:
                  - listitem [ref=e768]:
                    - paragraph [ref=e769]:
                      - strong [ref=e770]: Number and type of collected metrics
                    - paragraph [ref=e771]: Depending on the selected metric, data is collected either through a hardware performance monitor on the GPU, through software patching of the kernel instructions or via a launch or device attribute. The overhead between these mechanisms varies greatly, with launch and device attributes being “statically” available and requiring no kernel runtime overhead.
                    - paragraph [ref=e772]:
                      - text: Furthermore, only a limited number of metrics can be collected in a single
                      - emphasis [ref=e773]: pass
                      - text: of the kernel execution. If more metrics are requested, the kernel launch is
                      - emphasis [ref=e774]: replayed
                      - text: multiple times, with its accessible memory being saved and restored between subsequent passes to guarantee deterministic execution. Therefore, collecting more metrics can significantly increase overhead by requiring more replay passes and increasing the total amount of memory that needs to be restored during replay.
                  - listitem [ref=e775]:
                    - paragraph [ref=e776]:
                      - strong [ref=e777]: The collected section set
                    - paragraph [ref=e778]:
                      - text: Since each
                      - link "set" [ref=e779] [cursor=pointer]:
                        - /url: index.html#sets-and-sections
                      - text: specifies a group of sections to be collected, choosing a less comprehensive set can reduce profiling overhead. See the
                      - code [ref=e780]: "--set"
                      - text: command in the
                      - link "NVIDIA Nsight Compute CLI" [ref=e781] [cursor=pointer]:
                        - /url: ../NsightComputeCli/index.html#command-line-options-profile
                      - text: documentation.
                  - listitem [ref=e782]:
                    - paragraph [ref=e783]:
                      - strong [ref=e784]: Number of collected sections
                    - paragraph [ref=e785]:
                      - text: Since each
                      - link "section" [ref=e786] [cursor=pointer]:
                        - /url: index.html#sets-and-sections
                      - text: specifies a number of metrics to be collected, selecting fewer sections can reduce profiling overhead. See the
                      - code [ref=e787]: "--section"
                      - text: command in the
                      - link "NVIDIA Nsight Compute CLI" [ref=e788] [cursor=pointer]:
                        - /url: ../NsightComputeCli/index.html#command-line-options-profile
                      - text: documentation.
                  - listitem [ref=e789]:
                    - paragraph [ref=e790]:
                      - strong [ref=e791]: Number of profiled kernels
                    - paragraph [ref=e792]:
                      - text: By default, all selected metrics are collected for all launched kernels. To reduce the impact on the application, you can try to limit performance data collection to as few kernel functions and instances as makes sense for your analysis. See the filtering commands in the
                      - link "NVIDIA Nsight Compute CLI" [ref=e793] [cursor=pointer]:
                        - /url: ../NsightComputeCli/index.html#command-line-options-profile
                      - text: documentation.
                    - paragraph [ref=e794]: There is a relatively high one-time overhead for the first profiled kernel in each context to generate the metric configuration. This overhead does not occur for subsequent kernels in the same context, if the list of collected metrics remains unchanged.
                  - listitem [ref=e795]:
                    - paragraph [ref=e796]:
                      - strong [ref=e797]: GPU Architecture
                    - paragraph [ref=e798]: For some metrics, the overhead can vary depending on the exact chip they are collected on, e.g. due to varying number of units on the chip. Similarly, the overhead for resetting the L2 cache in-between kernel replay passes depends on the size of that cache.
            - generic [ref=e799]:
              - heading "2.3. Metrics Guide " [level=2] [ref=e800]:
                - text: 2.3. Metrics Guide
                - link "" [ref=e801] [cursor=pointer]:
                  - /url: "#metrics-guide"
              - generic [ref=e802]:
                - heading "2.3.1. Hardware Model " [level=3] [ref=e803]:
                  - text: 2.3.1. Hardware Model
                  - link "" [ref=e804] [cursor=pointer]:
                    - /url: "#hardware-model"
                - paragraph [ref=e805]: Compute Model
                - paragraph [ref=e806]:
                  - text: All NVIDIA GPUs are designed to support a general purpose heterogeneous parallel programming model, commonly known as
                  - emphasis [ref=e807]: Compute
                  - text: . This model decouples the GPU from the traditional graphics pipeline and exposes it as a general purpose parallel multi-processor. A heterogeneous computing model implies the existence of a host and a device, which in this case are the CPU and GPU, respectively. At a high level view, the host (CPU) manages resources between itself and the device and will send work off to the device to be executed in parallel.
                - paragraph [ref=e808]: "Central to the compute model is the Grid, Block, Thread hierarchy, which defines how compute work is organized on the GPU. The hierarchy from top to bottom is as follows:"
                - list [ref=e809]:
                  - listitem [ref=e810]:
                    - paragraph [ref=e811]:
                      - text: A
                      - emphasis [ref=e812]: Grid
                      - text: is a 1D, 2D or 3D array of thread blocks.
                  - listitem [ref=e813]:
                    - paragraph [ref=e814]:
                      - text: A
                      - emphasis [ref=e815]: Block
                      - text: is a 1D, 2D or 3D array of threads, also known as a
                      - emphasis [ref=e816]: Cooperative Thread Array (CTA)
                      - text: .
                  - listitem [ref=e817]:
                    - paragraph [ref=e818]:
                      - text: A
                      - emphasis [ref=e819]: Thread
                      - text: is a single thread which runs on one of the GPU’s SM units.
                - paragraph [ref=e820]:
                  - text: The purpose of the Grid, Block, Thread hierarchy is to expose a notion of locality amongst a group of threads, i.e. a Cooperative Thread Array (CTA). In CUDA, CTAs are referred to as Thread Blocks. The architecture can exploit this locality by providing fast shared memory and barriers between the threads within a single CTA. When a Grid is launched, the architecture guarantees that all threads within a CTA will run concurrently on the same SM. Information on the grids and blocks can be found in the
                  - link "Launch Statistics" [ref=e821] [cursor=pointer]:
                    - /url: index.html#sections-and-rules
                  - text: section.
                - paragraph [ref=e822]:
                  - text: The number of CTAs that fit on each SM depends on the physical resources required by the CTA. These resource limiters include the number of threads and registers, shared memory utilization, and hardware barriers. The number CTAs per SM is referred to as the CTA
                  - emphasis [ref=e823]: occupancy
                  - text: ", and these physical resources limit this occupancy. Details on the kernel’s occupancy are collected by the"
                  - link "Occupancy" [ref=e824] [cursor=pointer]:
                    - /url: index.html#sections-and-rules
                  - text: section.
                - paragraph [ref=e825]: Each CTA can be scheduled on any of the available SMs, where there is no guarantee in the order of execution. As such, CTAs must be entirely independent, which means it is not possible for one CTA to wait on the result of another CTA. As CTAs are independent, the host (CPU) can launch a large Grid that will not fit on the hardware all at once, however any GPU will still be able to run it and produce the correct results.
                - paragraph [ref=e826]:
                  - text: CTAs are further divided into groups of 32 threads called
                  - emphasis [ref=e827]: Warps
                  - text: . If the number of threads in a CTA is not dividable by 32, the last warp will contain the remaining number of threads.
                - paragraph [ref=e828]:
                  - text: The total number of CTAs that can run concurrently on a given GPU is referred to as
                  - emphasis [ref=e829]: Wave
                  - text: . Consequently, the size of a Wave scales with the number of available SMs of a GPU, but also with the occupancy of the kernel.
                - paragraph [ref=e830]: Streaming Multiprocessor
                - paragraph [ref=e831]:
                  - text: The
                  - emphasis [ref=e832]: Streaming Multiprocessor (SM)
                  - text: is the core processing unit in the GPU. The SM is optimized for a wide diversity of workloads, including general-purpose computations, deep learning, ray tracing, as well as lighting and shading. The SM is designed to simultaneously execute multiple CTAs. CTAs can be from different grid launches.
                - paragraph [ref=e833]:
                  - text: The SM implements an execution model called Single Instruction Multiple Threads (SIMT), which allows individual threads to have unique control flow while still executing as part of a warp. The Turing SM inherits the Volta SM’s independent thread scheduling model. The SM maintains execution state per thread, including a program counter (PC) and call stack. The independent thread scheduling allows the GPU to yield execution of any thread, either to make better use of execution resources or to allow a thread to wait for data produced by another thread possibly in the same warp. Collecting the
                  - link "Source Counters" [ref=e834] [cursor=pointer]:
                    - /url: index.html#sections-and-rules
                  - text: section allows you to inspect instruction execution and predication details on the
                  - emphasis [ref=e835]: Source Page
                  - text: ", along with"
                  - link "Sampling" [ref=e836] [cursor=pointer]:
                    - /url: index.html#sampling
                  - text: information.
                - paragraph [ref=e837]:
                  - text: Each SM is partitioned into four processing blocks, called
                  - emphasis [ref=e838]: SM sub partitions
                  - text: ". The SM sub partitions are the primary processing elements on the SM. Each sub partition contains the following units:"
                - list [ref=e839]:
                  - listitem [ref=e840]:
                    - paragraph [ref=e841]: Warp Scheduler
                  - listitem [ref=e842]:
                    - paragraph [ref=e843]: Register File
                  - listitem [ref=e844]:
                    - paragraph [ref=e845]: Execution Units/Pipelines/Cores
                    - list [ref=e846]:
                      - listitem [ref=e847]:
                        - paragraph [ref=e848]: Integer Execution units
                      - listitem [ref=e849]:
                        - paragraph [ref=e850]: Floating Point Execution units
                      - listitem [ref=e851]:
                        - paragraph [ref=e852]: Memory Load/Store units
                      - listitem [ref=e853]:
                        - paragraph [ref=e854]: Special Function unit
                      - listitem [ref=e855]:
                        - paragraph [ref=e856]: Tensor Cores
                - paragraph [ref=e857]: "Shared within an SM across the four SM partitions are:"
                - list [ref=e858]:
                  - listitem [ref=e859]:
                    - paragraph [ref=e860]: Unified L1 Data Cache / Shared Memory
                  - listitem [ref=e861]:
                    - paragraph [ref=e862]: Texture units
                  - listitem [ref=e863]:
                    - paragraph [ref=e864]: RT Cores, if available
                - paragraph [ref=e865]:
                  - text: A warp is allocated to a sub partition and resides on the sub partition from launch to completion. A warp is referred to as
                  - emphasis [ref=e866]: active
                  - text: or
                  - emphasis [ref=e867]: resident
                  - text: when it is mapped to a sub partition. A sub partition manages a fixed size pool of warps. On Volta architectures, the size of the pool is 16 warps. On Turing architectures the size of the pool is 8 warps. Active warps can be in
                  - emphasis [ref=e868]: eligible
                  - text: state if the warp is ready to issue an instruction. This requires the warp to have a decoded instruction, all input dependencies resolved, and for the function unit to be available. Statistics on active, eligible and issuing warps can be collected with the
                  - link "Scheduler Statistics" [ref=e869] [cursor=pointer]:
                    - /url: index.html#sections-and-rules
                  - text: section.
                - paragraph [ref=e870]:
                  - text: A warp is
                  - emphasis [ref=e871]: stalled
                  - text: when the warp is waiting on
                - list [ref=e872]:
                  - listitem [ref=e873]:
                    - paragraph [ref=e874]: an instruction fetch,
                  - listitem [ref=e875]:
                    - paragraph [ref=e876]: a memory dependency (result of memory instruction),
                  - listitem [ref=e877]:
                    - paragraph [ref=e878]: an execution dependency (result of previous instruction), or
                  - listitem [ref=e879]:
                    - paragraph [ref=e880]: a synchronization barrier.
                - paragraph [ref=e881]:
                  - text: See
                  - link "Warp Scheduler States" [ref=e882] [cursor=pointer]:
                    - /url: index.html#statistical-sampler
                  - text: for the list of stall reasons that can be profiled and the
                  - link "Warp State Statistics" [ref=e883] [cursor=pointer]:
                    - /url: index.html#sections-and-rules
                  - text: section for a summary of warp states found in the kernel execution.
                - paragraph [ref=e884]:
                  - text: The most important resource under the compiler’s control is the number of registers used by a kernel. Each sub partition has a set of 32-bit registers, which are allocated by the HW in fixed-size chunks. The
                  - link "Launch Statistics" [ref=e885] [cursor=pointer]:
                    - /url: index.html#sections-and-rules
                  - text: section shows the kernel’s register usage.
                - paragraph [ref=e886]: Compute Preemption
                - paragraph [ref=e887]:
                  - link "Compute preemption" [ref=e888] [cursor=pointer]:
                    - /url: https://docs.nvidia.com/cuda/pascal-tuning-guide/index.html#compute-preemption
                  - text: avoids long running kernels from monopolizing the GPU, at the risk of context switch overhead. The execution context (registers, shared memory, etc.) is saved at preemption and restored later. Context switches happen at instruction-level granularity. The
                  - link "exclusive-process" [ref=e889] [cursor=pointer]:
                    - /url: https://docs.nvidia.com/cuda/cuda-c-programming-guide/index.html#compute-modes
                  - text: compute mode may be used on supported systems to avoid context switching.
                - paragraph [ref=e890]: Memory
                - paragraph [ref=e891]: Global memory is a 49-bit virtual address space that is mapped to physical memory on the device, pinned system memory, or peer memory. Global memory is visible to all threads in the GPU. Global memory is accessed through the SM L1 and GPU L2.
                - paragraph [ref=e892]: Local memory is private storage for an executing thread and is not visible outside of that thread. It is intended for thread-local data like thread stacks and register spills. Local memory addresses are translated to global virtual addresses by the AGU unit. Local memory has the same latency as global memory. One difference between global and local memory is that local memory is arranged such that consecutive 32-bit words are accessed by consecutive thread IDs. Accesses are therefore fully coalesced as long as all threads in a warp access the same relative address (e.g., same index in an array variable, same member in a structure variable, etc.).
                - paragraph [ref=e893]: Shared memory is located on chip, so it has much higher bandwidth and much lower latency than either local or global memory. Shared memory can be shared across a compute CTA. Compute CTAs attempting to share data across threads via shared memory must use synchronization operations (such as __syncthreads()) between stores and loads to ensure data written by any one thread is visible to other threads in the CTA. Similarly, threads that need to share data via global memory must use a more heavyweight global memory barrier.
                - paragraph [ref=e894]: Shared memory has 32 banks that are organized such that successive 32-bit words map to successive banks that can be accessed simultaneously. Any 32-bit memory read or write request made of 32 addresses that fall in 32 distinct memory banks can therefore be serviced simultaneously, yielding an overall bandwidth that is 32 times as high as the bandwidth of a single request. However, if two addresses of a memory request fall in the same memory bank, there is a bank conflict and the access has to be serialized.
                - paragraph [ref=e895]: A shared memory request for a warp does not generate a bank conflict between two threads that access any address within the same 32-bit word (even though the two addresses fall in the same bank). When multiple threads make the same read access, one thread receives the data and then broadcasts it to the other threads. When multiple threads write to the same location, only one thread succeeds in the write; which thread that succeeds is undefined.
                - paragraph [ref=e896]:
                  - text: Detailed memory metrics are collected by the
                  - link "Memory Workload Analysis" [ref=e897] [cursor=pointer]:
                    - /url: index.html#sections-and-rules
                  - text: section.
                - paragraph [ref=e898]: Caches
                - paragraph [ref=e899]: All GPU units communicate to main memory through the Level 2 cache, also known as the L2. The L2 cache sits between on-chip memory clients and the framebuffer. L2 works in physical-address space. In addition to providing caching functionality, L2 also includes hardware to perform compression and global atomics.
                - figure "Model of the L2 cache. " [ref=e900]:
                  - img "../_images/hw-model-lts.png" [ref=e901]
                  - paragraph [ref=e903]:
                    - text: Model of the L2 cache.
                    - link "" [ref=e904] [cursor=pointer]:
                      - /url: "#id23"
                - paragraph [ref=e905]:
                  - text: The Level 1 Data Cache, or L1, plays a key role in handling global, local, shared, texture, and surface memory reads and writes, as well as reduction and atomic operations. On Volta and Turing architectures there are , there are two L1 caches per TPC, one for each SM. For more information on how L1 fits into the texturing pipeline, see the
                  - link "TEX unit" [ref=e906] [cursor=pointer]:
                    - /url: index.html#metrics-hw-tex-surf
                  - text: description. Also note that while this section often uses the name “L1”, it should be understood that the L1 data cache, shared data, and the Texture data cache are one and the same.
                - paragraph [ref=e907]: "L1 receives requests from two units: the SM and TEX. L1 receives global and local memory requests from the SM and receives texture and surface requests from TEX. These operations access memory in the global memory space, which L1 sends through a secondary cache, the L2."
                - paragraph [ref=e908]:
                  - text: Cache hit and miss rates as well as data transfers are reported in the
                  - link "Memory Workload Analysis" [ref=e909] [cursor=pointer]:
                    - /url: index.html#sections-and-rules
                  - text: section.
                - figure "Model of Load/Store and Texture pipelines for the L1TEX cache. " [ref=e910]:
                  - img "../_images/hw-model-l1tex.png" [ref=e911]
                  - paragraph [ref=e913]:
                    - text: Model of Load/Store and Texture pipelines for the L1TEX cache.
                    - link "" [ref=e914] [cursor=pointer]:
                      - /url: "#id24"
                - paragraph [ref=e915]: Texture/Surface
                - paragraph [ref=e916]: The TEX unit performs texture fetching and filtering. Beyond plain texture memory access, TEX is responsible for the addressing, LOD, wrap, filter, and format conversion operations necessary to convert a texture read request into a result.
                - paragraph [ref=e917]: "TEX receives two general categories of requests from the SM via its input interface: texture requests and surface load/store operations. Texture and surface memory space resides in device memory and are cached in L1. Texture and surface memory are allocated as block-linear surfaces (e.g. 2D, 2D Array, 3D). Such surfaces provide a cache-friendly layout of data such that neighboring points on a 2D surface are also located close to each other in memory, which improves access locality. Surface accesses are bounds-checked by the TEX unit prior to accessing memory, which can be used for implementing different texture wrapping modes."
                - paragraph [ref=e918]: The L1 cache is optimized for 2D spatial locality, so threads of the same warp that read texture or surface addresses that are close together in 2D space will achieve optimal performance. The L1 cache is also designed for streaming fetches with constant latency; a cache hit reduces DRAM bandwidth demand but not fetch latency. Reading device memory through texture or surface memory presents some benefits that can make it an advantageous alternative to reading memory from global or constant memory.
                - paragraph [ref=e919]:
                  - text: Information on texture and surface memory can be found in the
                  - link "Memory Workload Analysis" [ref=e920] [cursor=pointer]:
                    - /url: index.html#sections-and-rules
                  - text: section.
              - generic [ref=e921]:
                - heading "2.3.2. Metrics Structure " [level=3] [ref=e922]:
                  - text: 2.3.2. Metrics Structure
                  - link "" [ref=e923] [cursor=pointer]:
                    - /url: "#metrics-structure"
                - paragraph [ref=e924]: Metrics Overview
                - paragraph [ref=e925]: NVIDIA Nsight Compute uses an advanced metrics calculation system, designed to help you determine what happened (counters and metrics), and how close the program reached to peak GPU performance (throughputs as a percentage). Every counter has associated peak rates in the database, to allow computing its throughput as a percentage.
                - paragraph [ref=e926]: Throughput metrics return the maximum percentage value of their constituent counters. These constituents have been carefully selected to represent the sections of the GPU pipeline that govern peak performance. While all counters can be converted to a %-of-peak, not all counters are suitable for peak-performance analysis; examples of unsuitable counters include qualified subsets of activity, and workload residency counters. Using throughput metrics ensures meaningful and actionable analysis.
                - paragraph [ref=e927]: "Two types of peak rates are available for every counter: burst and sustained. Burst rate is the maximum rate reportable in a single clock cycle. Sustained rate is the maximum rate achievable over an infinitely long measurement period, for “typical” operations. For many counters, burst equals sustained. Since the burst rate cannot be exceeded, percentages of burst rate will always be less than 100%. Percentages of sustained rate can occasionally exceed 100% in edge cases."
