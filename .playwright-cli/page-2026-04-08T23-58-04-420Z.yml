                  - paragraph [ref=e2389]: Warp Stall Reasons (Not Issued)
              - paragraph [ref=e2390]: Collected using warp scheduler state sampling. They are incremented only on cycles in which the warp scheduler issued no instruction. These metrics have instance values mapping from the function address (uint64) to the number of samples (uint64).
              - blockquote [ref=e2391]:
