                      - row "smsp__pcsamp_warps_issue_stalled_misc Warp was stalled for a miscellaneous hardware reason." [ref=e2335]:
                        - cell "smsp__pcsamp_warps_issue_stalled_misc" [ref=e2336]:
                          - paragraph [ref=e2337]:
                            - code [ref=e2338]: smsp__pcsamp_warps_issue_stalled_misc
                        - cell "Warp was stalled for a miscellaneous hardware reason." [ref=e2339]:
                          - paragraph [ref=e2340]: Warp was stalled for a miscellaneous hardware reason.
                      - row "smsp__pcsamp_warps_issue_stalled_no_instructions Warp was stalled waiting to be selected to fetch an instruction or waiting on an instruction cache miss. A high number of warps not having an instruction fetched is typical for very short kernels with less than one full wave of work in the grid. Excessively jumping across large blocks of assembly code can also lead to more warps stalled for this reason, if this causes misses in the instruction cache. See also the related Branch Resolving state." [ref=e2341]:
                        - cell "smsp__pcsamp_warps_issue_stalled_no_instructions" [ref=e2342]:
                          - paragraph [ref=e2343]:
                            - code [ref=e2344]: smsp__pcsamp_warps_issue_stalled_no_instructions
                        - cell "Warp was stalled waiting to be selected to fetch an instruction or waiting on an instruction cache miss. A high number of warps not having an instruction fetched is typical for very short kernels with less than one full wave of work in the grid. Excessively jumping across large blocks of assembly code can also lead to more warps stalled for this reason, if this causes misses in the instruction cache. See also the related Branch Resolving state." [ref=e2345]:
                          - paragraph [ref=e2346]: Warp was stalled waiting to be selected to fetch an instruction or waiting on an instruction cache miss. A high number of warps not having an instruction fetched is typical for very short kernels with less than one full wave of work in the grid. Excessively jumping across large blocks of assembly code can also lead to more warps stalled for this reason, if this causes misses in the instruction cache. See also the related Branch Resolving state.
                      - row "smsp__pcsamp_warps_issue_stalled_not_selected Warp was stalled waiting for the micro scheduler to select the warp to issue. Not selected warps are eligible warps that were not picked by the scheduler to issue that cycle as another warp was selected. A high number of not selected warps typically means you have sufficient warps to cover warp latencies and you may consider reducing the number of active warps to possibly increase cache coherence and data locality." [ref=e2347]:
                        - cell "smsp__pcsamp_warps_issue_stalled_not_selected" [ref=e2348]:
                          - paragraph [ref=e2349]:
                            - code [ref=e2350]: smsp__pcsamp_warps_issue_stalled_not_selected
                        - cell "Warp was stalled waiting for the micro scheduler to select the warp to issue. Not selected warps are eligible warps that were not picked by the scheduler to issue that cycle as another warp was selected. A high number of not selected warps typically means you have sufficient warps to cover warp latencies and you may consider reducing the number of active warps to possibly increase cache coherence and data locality." [ref=e2351]:
                          - paragraph [ref=e2352]: Warp was stalled waiting for the micro scheduler to select the warp to issue. Not selected warps are eligible warps that were not picked by the scheduler to issue that cycle as another warp was selected. A high number of not selected warps typically means you have sufficient warps to cover warp latencies and you may consider reducing the number of active warps to possibly increase cache coherence and data locality.
                      - row "smsp__pcsamp_warps_issue_stalled_selected Warp was selected by the micro scheduler and issued an instruction." [ref=e2353]:
                        - cell "smsp__pcsamp_warps_issue_stalled_selected" [ref=e2354]:
                          - paragraph [ref=e2355]:
                            - code [ref=e2356]: smsp__pcsamp_warps_issue_stalled_selected
                        - cell "Warp was selected by the micro scheduler and issued an instruction." [ref=e2357]:
                          - paragraph [ref=e2358]: Warp was selected by the micro scheduler and issued an instruction.
                      - row "smsp__pcsamp_warps_issue_stalled_short_scoreboard Warp was stalled waiting for a scoreboard dependency on a MIO (memory input/output) operation (not to L1TEX). The primary reason for a high number of stalls due to short scoreboards is typically memory operations to shared memory. Other reasons include frequent execution of special math instructions (e.g. MUFU) or dynamic branching (e.g. BRX, JMX). Consult the Memory Workload Analysis section to verify if there are shared memory operations and reduce bank conflicts, if reported. Assigning frequently accessed values to variables can assist the compiler in using low-latency registers instead of direct memory accesses." [ref=e2359]:
                        - cell "smsp__pcsamp_warps_issue_stalled_short_scoreboard" [ref=e2360]:
                          - paragraph [ref=e2361]:
                            - code [ref=e2362]: smsp__pcsamp_warps_issue_stalled_short_scoreboard
                        - cell "Warp was stalled waiting for a scoreboard dependency on a MIO (memory input/output) operation (not to L1TEX). The primary reason for a high number of stalls due to short scoreboards is typically memory operations to shared memory. Other reasons include frequent execution of special math instructions (e.g. MUFU) or dynamic branching (e.g. BRX, JMX). Consult the Memory Workload Analysis section to verify if there are shared memory operations and reduce bank conflicts, if reported. Assigning frequently accessed values to variables can assist the compiler in using low-latency registers instead of direct memory accesses." [ref=e2363]:
