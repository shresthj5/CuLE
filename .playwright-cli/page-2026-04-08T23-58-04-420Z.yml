                - paragraph [ref=e1239]: where
                - list [ref=e1240]:
                  - listitem [ref=e1241]:
                    - paragraph [ref=e1242]: "unit: A logical or physical unit of the GPU"
                  - listitem [ref=e1243]:
                    - paragraph [ref=e1244]: "subunit: The subunit within the unit where the counter was measured. Sometimes this is a pipeline mode instead."
                  - listitem [ref=e1245]:
                    - paragraph [ref=e1246]: "pipestage: The pipeline stage within the subunit where the counter was measured."
                  - listitem [ref=e1247]:
                    - paragraph [ref=e1248]:
                      - text: "quantity: What is being measured. Generally matches the"
                      - emphasis [ref=e1249]: dimensional units
                      - text: .
                  - listitem [ref=e1250]:
                    - paragraph [ref=e1251]: "qualifiers: Any additional predicates or filters applied to the counter. Often, an unqualified counter can be broken down into several qualified sub-components."
                  - listitem [ref=e1252]:
                    - paragraph [ref=e1253]:
                      - text: "interface: Of the form"
