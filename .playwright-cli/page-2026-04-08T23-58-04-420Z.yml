                    - strong [ref=e3820]: Metric values outside the expected logical range
                  - paragraph [ref=e3821]:
                    - text: This includes e.g. percentages exceeding 100% or metrics reporting negative values. For further details, see
                    - link "Range and Precision" [ref=e3822] [cursor=pointer]:
                      - /url: index.html#range-and-precision
                    - text: .
                - listitem [ref=e3823]:
                  - paragraph [ref=e3824]:
                    - strong [ref=e3825]: ERR_NVGPUCTRPERM - The user does not have permission to access NVIDIA GPU Performance Counters on the target device.
                  - paragraph [ref=e3826]:
                    - text: By default, NVIDIA drivers require elevated permissions to access GPU performance counters. On mobile platforms, profile as root/using sudo. On other platforms, you can either start profiling as root/using sudo, or by enabling non-admin profiling. For further details, see
                    - link "https://developer.nvidia.com/ERR_NVGPUCTRPERM" [ref=e3827] [cursor=pointer]:
                      - /url: https://developer.nvidia.com/ERR_NVGPUCTRPERM
                    - text: .
                  - paragraph [ref=e3828]: On Windows Subsystem for Linux (WSL), access to NVIDIA GPU Performance Counters must be enabled in the NVIDIA Control Panel of the Windows host.
                - listitem [ref=e3829]:
                  - paragraph [ref=e3830]:
                    - strong [ref=e3831]: Unsupported GPU
                  - paragraph [ref=e3832]:
                    - text: This indicates that the GPU, on which the current kernel is launched, is not supported. See the
                    - link "Release Notes" [ref=e3833] [cursor=pointer]:
                      - /url: ../ReleaseNotes/index.html#gpu-support
                    - text: for a list of devices supported by your version of NVIDIA Nsight Compute. It can also indicate that the current
                    - emphasis [ref=e3834]: GPU configuration
                    - text: is not supported. For example, NVIDIA Nsight Compute might not be able to profile GPUs in SLI configuration.
                - listitem [ref=e3835]:
                  - paragraph [ref=e3836]:
                    - strong [ref=e3837]: Connection error detected communicating with target application.
                  - paragraph [ref=e3838]: The inter-process connection to the profiled application unexpectedly dropped. This happens if the application is killed or signals an exception (e.g. segmentation fault).
                - listitem [ref=e3839]:
                  - paragraph [ref=e3840]:
                    - strong [ref=e3841]: Failed to connect. The target process may have exited.
                  - paragraph [ref=e3842]: This occurs if
                  - list [ref=e3843]:
                    - listitem [ref=e3844]:
                      - paragraph [ref=e3845]: the application does not call any CUDA API calls before it exits.
                    - listitem [ref=e3846]:
                      - paragraph [ref=e3847]:
                        - text: the application terminates early because it was started from the wrong working directory, or with the wrong arguments. In this case, check the details in the
                        - emphasis [ref=e3848]: Start Activity Dialog
                        - text: .
                    - listitem [ref=e3849]:
                      - paragraph [ref=e3850]: the application crashes before calling any CUDA API calls.
                    - listitem [ref=e3851]:
                      - paragraph [ref=e3852]:
                        - text: the application launches child processes which use the CUDA. In this case, launch with the
                        - code [ref=e3853]: "--target-processes all"
                        - text: option.
                - listitem [ref=e3854]:
                  - paragraph [ref=e3855]:
                    - strong [ref=e3856]: "The profiler returned an error code: (number)"
                  - paragraph [ref=e3857]:
                    - text: For the non-interactive
                    - emphasis [ref=e3858]: Profile
                    - text: activity, the NVIDIA Nsight Compute CLI is started to generate the report. If either the application exited with a non-zero return code, or the NVIDIA Nsight Compute CLI encountered an error itself, the resulting return code will be shown in this message.
                  - paragraph [ref=e3859]: For example, if the application hit a segmentation fault (SIGSEGV) on Linux, it will likely return error code 11. All non-zero return codes are considered errors, so the message is also shown if the application exits with return code 1 during regular execution.
                  - paragraph [ref=e3860]:
                    - text: To debug this issue, it can help to run the data collection directly from the command line using
                    - code [ref=e3861]: ncu
                    - text: in order to observe the application’s and the profiler’s command line output, e.g.
                    - code [ref=e3862]: ==ERROR== The application returned an error code (11)
                - listitem [ref=e3863]:
                  - paragraph [ref=e3864]:
                    - strong [ref=e3865]: Failed to open/create lock file (path). Please check that this process has write permissions on this file.
                  - paragraph [ref=e3866]:
                    - text: NVIDIA Nsight Compute failed to create or open the file
                    - code [ref=e3867]: (path)
                    - text: with write permissions. This file is used for inter-process
                    - link "serialization" [ref=e3868] [cursor=pointer]:
                      - /url: index.html#serialization
                    - text: . NVIDIA Nsight Compute does not remove this file after profiling by design. The error occurs if the file was created by a profiling process with permissions that prevent the current process from writing to this file, or if the current user can’t acquire this file for other reasons (e.g. certain Linux kernel security settings).
                  - paragraph [ref=e3869]:
                    - text: The file is in the current temporary directory, i.e.
                    - code [ref=e3870]: TMPDIR/nsight-compute-lock
                    - text: . On Windows,
                    - emphasis [ref=e3871]: TMPDIR
                    - text: is the path returned by the Windows
                    - code [ref=e3872]: GetTempPath
                    - text: API function. On other platforms, it is the path supplied by the first environment variable in the list
                    - code [ref=e3873]: TMPDIR, TMP, TEMP, TEMPDIR
                    - text: . If none of these is found, it’s
                    - code [ref=e3874]: /var/nvidia
                    - text: on QNX and
                    - code [ref=e3875]: /tmp
                    - text: otherwise.
                  - paragraph [ref=e3876]: Older versions of NVIDIA Nsight Compute did not set write permissions for all users on this file by default. As a result, running the tool on the same system with a different user might cause this error. This has been resolved since version 2020.2.1.
                  - paragraph [ref=e3877]: "The following workarounds can be used to solve this problem:"
                  - list [ref=e3878]:
                    - listitem [ref=e3879]:
                      - paragraph [ref=e3880]:
                        - text: If it is otherwise ensured that no concurrent NVIDIA Nsight Compute instances are active on the same system, set
                        - code [ref=e3881]: TMPDIR
                        - text: to a different directory for which the current user has write permissions.
                    - listitem [ref=e3882]:
                      - paragraph [ref=e3883]: Ask the user owning the file, or a system administrator, to remove it or add write permissions for all potential users.
                    - listitem [ref=e3884]:
                      - paragraph [ref=e3885]:
                        - text: On Linux systems setting
                        - code [ref=e3886]: fs.protected_regular=1
                        - text: ", root or other users may not be able to access this file, even though the owner can, if the sticky bit is set on the temporary directory. Either disable this setting using"
                        - code [ref=e3887]: sudo sysctl fs.protected_regular=0
                        - text: ", use a different temporary directory (see above), or enable access to hardware performance counters for non-root users and profile as the same user who owns the file (see"
                        - link "https://developer.nvidia.com/ERR_NVGPUCTRPERM" [ref=e3888] [cursor=pointer]:
                          - /url: https://developer.nvidia.com/ERR_NVGPUCTRPERM
                        - text: on how to change this setting).
                - listitem [ref=e3889]:
                  - paragraph [ref=e3890]:
                    - strong [ref=e3891]: Profiling failed because a driver resource was unavailable.
                  - paragraph [ref=e3892]: The error indicates that a required CUDA driver resource was unavailable during profiling. Most commonly, this means that NVIDIA Nsight Compute could not reserve the driver’s performance monitor, which is necessary for collecting most metrics.
                  - paragraph [ref=e3893]:
                    - text: This can happen if another application has a concurrent reservation on this resource. Such applications can be e.g.
                    - link "DCGM" [ref=e3894] [cursor=pointer]:
                      - /url: https://developer.nvidia.com/dcgm
                    - text: ", a client of"
                    - link "CUPTI’s Profiling API" [ref=e3895] [cursor=pointer]:
                      - /url: https://developer.nvidia.com/cupti
                    - text: ","
                    - link "Nsight Graphics" [ref=e3896] [cursor=pointer]:
                      - /url: https://developer.nvidia.com/nsight-graphics
                    - text: ", or another instance of NVIDIA Nsight Compute without access to the same file system (see"
                    - link "serialization" [ref=e3897] [cursor=pointer]:
                      - /url: index.html#serialization
                    - text: for how this is prevented within the same file system).
                  - paragraph [ref=e3898]:
                    - text: If you expect the problem to be caused by DCGM, consider using
                    - code [ref=e3899]: dcgmi profile --pause
                    - text: to stop its monitoring while profiling with NVIDIA Nsight Compute.
                - listitem [ref=e3900]:
                  - paragraph [ref=e3901]:
                    - strong [ref=e3902]: Could not deploy stock * files to *
                  - paragraph [ref=e3903]:
                    - strong [ref=e3904]: Could not determine user home directory for section deployment.
                  - paragraph [ref=e3905]:
                    - text: An error occurred while trying to deploy stock section or rule files. By default, NVIDIA Nsight Compute tries to deploy these to a versioned directory in the user’s home directory (as identified by the
                    - code [ref=e3906]: HOME
                    - text: environment variable on Linux), e.g.
                    - code [ref=e3907]: /home/user/Documents/NVIDIA Nsight Compute/<version>/Sections
                    - text: .
                  - paragraph [ref=e3908]: If the directory cannot be determined (e.g. because this environment variable is not pointing to a valid directory), or if there is an error while deploying the files (e.g. because the current process does not have write permissions on it), warning messages are shown and NVIDIA Nsight Compute falls back to using stock sections and rules from the installation directory.
                  - paragraph [ref=e3909]:
                    - text: If you are in an environment where you consistently don’t have write access to the user’s home directory, consider populating this directory upfront using
                    - code [ref=e3910]: ncu --section-folder-restore
                    - text: ", or by making"
                    - code [ref=e3911]: /home/user/Documents/NVIDIA Nsight Compute/<version>
                    - text: a symlink to a writable directory.
                - listitem [ref=e3912]:
                  - paragraph [ref=e3913]:
                    - strong [ref=e3914]: ProxyJump SSH option is not working
                  - paragraph [ref=e3915]:
                    - text: NVIDIA Nsight Compute does not manage authentication or interactive prompts with the OpenSSH client launched when using the
                    - code [ref=e3916]: ProxyJump
                    - text: option. Therefore, to connect through an intermediate host for the first time, you will not be able to accept the intermediate host’s key. A simple way to pinpoint the cause of failures in this case is to open a terminal and use the OpenSSH client to connect to the remote target. Once that connection succeeds, NVIDIA Nsight Compute should be able to connect to the target, too.
                - listitem [ref=e3917]:
                  - paragraph [ref=e3918]:
                    - strong [ref=e3919]: SSH connection fails without trying to connect
                  - paragraph [ref=e3920]:
                    - text: If the connection fails without trying to connect, there may be a problem with the settings you entered into the
                    - emphasis [ref=e3921]: Start Activity Dialog
                    - text: . Please make sure that the
                    - code [ref=e3922]: IP/Host Name
                    - text: ","
                    - code [ref=e3923]: User Name
                    - text: and
                    - code [ref=e3924]: Port
                    - text: fields are correctly set.
                - listitem [ref=e3925]:
                  - paragraph [ref=e3926]:
                    - strong [ref=e3927]: SSH connections are still not working
                  - paragraph [ref=e3928]:
                    - text: The problem might come from NVIDIA Nsight Compute’s SSH client not finding a suitable host key algorithm to use which is supported by the remote server. You can force NVIDIA Nsight Compute to use a specific set of host key algorithms by setting the
                    - code [ref=e3929]: HostKeyAlgorithms
                    - text: option for the problematic host in your SSH configuration file. To list the supported host key algorithms for a remote target, you can use the
                    - code [ref=e3930]: ssh-keyscan
                    - text: utility which comes with the OpenSSH client.
                - listitem [ref=e3931]:
                  - paragraph [ref=e3932]:
                    - strong [ref=e3933]: Removing host keys from known hosts files
                  - paragraph [ref=e3934]:
                    - text: When connecting to a target machine, NVIDIA Nsight Compute tries to verify the target’s host key against the same local database as the OpenSSH client. If NVIDIA Nsight Compute find the host key is incorrect, it will inform you through a failure dialog. If you trust the key hash shown in the dialog, you can remove the previously saved key for that host by manually editing your known hosts database or using the
                    - code [ref=e3935]: ssh-keygen -R <host>
                    - text: command.
                - listitem [ref=e3936]:
                  - paragraph [ref=e3937]:
                    - strong [ref=e3938]: Qt initialization failed
                  - paragraph [ref=e3939]:
                    - strong [ref=e3940]: Failed to load Qt platform plugin
                  - paragraph [ref=e3941]:
                    - text: See
                    - link "System Requirements" [ref=e3942] [cursor=pointer]:
                      - /url: ../ReleaseNotes/index.html#system-requirements
                    - text: for Linux.
                - listitem [ref=e3943]:
                  - paragraph [ref=e3944]:
                    - code [ref=e3945]: "ImportError: /lib64/libstdc++.so.6: version `GLIBCXX_3.4.xx' not found"
                    - strong [ref=e3946]: when importing
                    - code [ref=e3947]: ncu_report
                  - blockquote [ref=e3948]:
                    - paragraph [ref=e3950]:
                      - text: In case the system’s
                      - code [ref=e3951]: libstdc++
                      - text: is too old for
                      - code [ref=e3952]: ncu_report
                      - text: you can use the version shipped with NVIDIA Nsight Compute. To do so, add the respective directory to LD_LIBRARY_PATH, e.g.,
                      - code [ref=e3953]: export LD_LIBRARY_PATH=<ncu_install_dir>/host/<arch>/:$LD_LIBRARY_PATH
                      - text: .
