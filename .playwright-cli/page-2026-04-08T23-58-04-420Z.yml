            - generic [ref=e2895]:
              - heading "2.5. Sampling " [level=2] [ref=e2896]:
                - text: 2.5. Sampling
                - link "" [ref=e2897] [cursor=pointer]:
                  - /url: "#sampling"
              - paragraph [ref=e2898]: NVIDIA Nsight Compute can collect certain performance data via sampling at fixed intervals.
              - generic [ref=e2899]:
                - heading "2.5.1. PM Sampling " [level=3] [ref=e2900]:
                  - text: 2.5.1. PM Sampling
                  - link "" [ref=e2901] [cursor=pointer]:
                    - /url: "#pm-sampling"
                - paragraph [ref=e2902]:
                  - text: NVIDIA Nsight Compute supports collecting many metrics by sampling the GPU’s performance monitors (PM) periodically at fixed intervals. The resulting metrics are
                  - link "instanced" [ref=e2903] [cursor=pointer]:
                    - /url: index.html#instanced-metrics
                  - text: ", with each sample being composed of its value and the (GPU) timestamp when it was collected. This allows the tool to visualize the data on a"
                  - link "timeline" [ref=e2904] [cursor=pointer]:
                    - /url: ../NsightCompute/index.html#profiler-report-details-page
                  - text: that helps you understand how the behavior of the profiled workload changes during its runtime.
                - paragraph [ref=e2905]: Metrics collected with PM sampling have instance values mapping from their sample timestamp (in ns) to their sample value. When logically possible, the non-instanced value of the metric represents the aggregate across all instances. The aggregation operation (e.g. sum, average) depends on the metric structure.
                - paragraph [ref=e2906]: "A metric is collected using PM sampling in the following cases:"
                - list [ref=e2907]:
                  - listitem [ref=e2908]:
                    - paragraph [ref=e2909]:
                      - text: The metric name has the
                      - code [ref=e2910]: "pmsampling:"
                      - link "prefix" [ref=e2911] [cursor=pointer]:
                        - /url: ../NsightComputeCli/index.html#command-line-options-profile
                      - text: .
                  - listitem [ref=e2912]:
                    - paragraph [ref=e2913]:
                      - text: The metric name includes a valid
                      - code [ref=e2914]: Triage
                      - text: group.
                  - listitem [ref=e2915]:
                    - paragraph [ref=e2916]:
                      - text: The metric is requested in a section’s
                      - code [ref=e2917]: Timeline
                      - text: field. Prefixing the metric with
                      - code [ref=e2918]: "pmsampling:"
                      - text: is still recommended in this case to avoid conflicts with profiler metrics of the same name collected e.g. by other sections.
                - table "Supported Architectures for PM Sampling " [ref=e2920]:
                  - caption [ref=e2921]:
                    - text: Supported Architectures for PM Sampling
                    - link "" [ref=e2922] [cursor=pointer]:
                      - /url: "#id39"
                  - rowgroup [ref=e2927]:
                    - row "Architecture Support Sampling Intervals" [ref=e2928]:
                      - columnheader "Architecture" [ref=e2929]:
                        - paragraph [ref=e2930]: Architecture
                      - columnheader "Support" [ref=e2931]:
                        - paragraph [ref=e2932]: Support
                      - columnheader "Sampling Intervals" [ref=e2933]:
                        - paragraph [ref=e2934]: Sampling Intervals
                  - rowgroup [ref=e2935]:
                    - row "Volta and earlier Not supported n/a" [ref=e2936]:
                      - cell "Volta and earlier" [ref=e2937]:
                        - paragraph [ref=e2938]: Volta and earlier
                      - cell "Not supported" [ref=e2939]:
                        - paragraph [ref=e2940]: Not supported
                      - cell "n/a" [ref=e2941]:
                        - paragraph [ref=e2942]: n/a
                    - row "TU10x-GA100 Supported >= 20000 cycles" [ref=e2943]:
                      - cell "TU10x-GA100" [ref=e2944]:
                        - paragraph [ref=e2945]: TU10x-GA100
                      - cell "Supported" [ref=e2946]:
                        - paragraph [ref=e2947]: Supported
                      - cell ">= 20000 cycles" [ref=e2948]:
                        - paragraph [ref=e2949]: ">= 20000 cycles"
                    - row "GA10x and later Supported >= 1000 ns 3" [ref=e2950]:
                      - cell "GA10x and later" [ref=e2951]:
                        - paragraph [ref=e2952]: GA10x and later
                      - cell "Supported" [ref=e2953]:
                        - paragraph [ref=e2954]: Supported
                      - cell ">= 1000 ns 3" [ref=e2955]:
                        - paragraph [ref=e2956]:
                          - text: ">= 1000 ns"
                          - link "3" [ref=e2957] [cursor=pointer]:
                            - /url: "#fsampling1"
                - paragraph [ref=e2958]:
                  - text: PM sampling is supported on all platforms except vGPU. See below for further limitations that apply to
                  - link "context switch trace" [ref=e2959] [cursor=pointer]:
                    - /url: index.html#ctx-switch-trace
                  - text: . You can
                  - link "query" [ref=e2960] [cursor=pointer]:
                    - /url: ../NsightComputeCli/index.html#command-line-options-profile
                  - text: the list of metrics available to PM sampling using the
                  - code [ref=e2961]: "--query-metrics-collection pmsampling"
                  - text: option. Note though that while all listed metrics are available to the PM sampler, only those requiring a single pass can be collected.
                - paragraph [ref=e2962]: Context Switch Trace
                - paragraph [ref=e2963]:
                  - text: Since this data collection samples across the entire GPU device, the tool concurrently collects a
                  - emphasis [ref=e2964]: context switch trace
                  - text: . The trace is stored as a separate, instanced
                  - link "metric" [ref=e2965] [cursor=pointer]:
                    - /url: index.html#profiler-metrics
                  - text: . It tracks when the context of interest was active and can be used to filter the sampling metric to only relevant instances and to better align metrics from multiple passes on the timeline. While it’s generally preferable to have this trace collected, it can be disabled using an
                  - link "environment variable" [ref=e2966] [cursor=pointer]:
                    - /url: ../NsightComputeCli/index.html#environment-variables
                  - text: .
                - paragraph [ref=e2967]: Note that context switch trace is not supported on Windows Subsystem for Linux (WSL), Multi-Instance GPU (MIG), within containers or on mobile platforms.
                - paragraph [ref=e2968]: Counter Domains
                - paragraph [ref=e2969]:
                  - text: PM sampling metrics are composed of one or more raw counter dependencies internally. If metrics in the same pass share such a dependency, it is only collected once. Each counter is associated with a
                  - emphasis [ref=e2970]: counter domain
                  - text: ", which describes how and where in the hardware the counter is collected. There is a limited number of counters in each domain that can be collected concurrently in the same pass, and the number may vary, depending on the selected counters."
                - paragraph [ref=e2971]: Selecting counters from different domains has the possibility that more metric dependencies can be fit into the same pass. Furthermore, some counters can be collected through different domains, and the domain may be chosen by the tool or the user.
                - paragraph [ref=e2972]:
                  - text: When
                  - link "querying" [ref=e2973] [cursor=pointer]:
                    - /url: ../NsightComputeCli/index.html#command-line-options-profile
                  - text: the PM sampling metric collection, the required and optional domains for a metric’s counter dependencies are shown. E.g., for
                  - code [ref=e2974]: l1tex__throughput gpu_sm_a,[gpu_sm_b,gpu_sm_c]
                  - text: ", the domain"
                  - code [ref=e2975]: gpu_sm_a
                  - text: is required and one of the optional domains
                  - code [ref=e2976]: "[gpu_sm_b,gpu_sm_c]"
                  - text: must be chosen for this metric to be collectable. Counter domains can only be selected explicitly in
                  - link "section files" [ref=e2977] [cursor=pointer]:
                    - /url: ../CustomizationGuide/index.html#counter-domains
                  - text: ", using one or more instances of the"
                  - code [ref=e2978]: "CtrDomains: \"<domain>\""
                  - text: field for PM sampling metrics.
                - paragraph [ref=e2979]: Note that most users should be able to rely on the tool’s automatic selection of counter domains, or the pre-configured domains in section files.
                - paragraph [ref=e2980]: Footnotes
                - generic [ref=e2981]:
                  - term [ref=e2982]:
                    - generic [ref=e2983]:
                      - text: "["
                      - link "3" [ref=e2984] [cursor=pointer]:
                        - /url: "#id6"
                      - text: "]"
                    - text: ":"
                  - definition [ref=e2985]:
                    - paragraph [ref=e2986]: For some chips or configurations, the minimum sampling interval may be higher.
              - generic [ref=e2987]:
                - heading "2.5.2. Warp Sampling " [level=3] [ref=e2988]:
                  - text: 2.5.2. Warp Sampling
                  - link "" [ref=e2989] [cursor=pointer]:
                    - /url: "#warp-sampling"
                - paragraph [ref=e2990]: NVIDIA Nsight Compute supports periodic sampling of the warp program counter and warp scheduler state. At a fixed interval of cycles, the sampler in each streaming multiprocessor selects an active warp and outputs the program counter and the warp scheduler state. The tool selects the minimum interval for the device. On small devices, this can be every 32 cycles. On larger chips with more multiprocessors, this may be 2048 cycles. The sampler selects a random active warp. On the same cycle the scheduler may select a different warp to issue.
                - paragraph [ref=e2991]: The resulting metrics are correlated with the individual executed instructions but don’t have any time resolution.
                - paragraph [ref=e2992]:
                  - text: See the
                  - emphasis [ref=e2993]: Warp Stall Reasons
                  - text: tables in the
                  - link "Metrics Reference" [ref=e2994] [cursor=pointer]:
                    - /url: index.html#metrics-reference
                  - text: for a description of the individual warp scheduler states.
            - generic [ref=e2995]:
              - heading "2.6. Reproducibility " [level=2] [ref=e2996]:
                - text: 2.6. Reproducibility
                - link "" [ref=e2997] [cursor=pointer]:
                  - /url: "#reproducibility"
              - paragraph [ref=e2998]:
                - text: In order to provide actionable and deterministic results across application runs, NVIDIA Nsight Compute applies various methods to adjust how metrics are collected. This includes
                - link "serializing" [ref=e2999] [cursor=pointer]:
                  - /url: index.html#serialization
                - text: kernel launches,
                - link "purging GPU caches" [ref=e3000] [cursor=pointer]:
                  - /url: index.html#cache-control
                - text: before each kernel replay or
                - link "adjusting GPU clocks" [ref=e3001] [cursor=pointer]:
                  - /url: index.html#clock-control
                - text: .
              - generic [ref=e3002]:
                - heading "2.6.1. Serialization " [level=3] [ref=e3003]:
                  - text: 2.6.1. Serialization
                  - link "" [ref=e3004] [cursor=pointer]:
                    - /url: "#serialization"
                - paragraph [ref=e3005]: NVIDIA Nsight Compute serializes kernel launches within the profiled application, potentially across multiple processes profiled by one or more instances of the tool at the same time.
                - paragraph [ref=e3006]:
                  - text: Serialization across processes is necessary since for the collection of HW performance metrics, some GPU and driver objects can only be acquired by a single process at a time. To achieve this, the lock file
                  - code [ref=e3007]: TMPDIR/nsight-compute-lock
                  - text: is used. On Windows,
                  - emphasis [ref=e3008]: TMPDIR
                  - text: is the path returned by the Windows
                  - code [ref=e3009]: GetTempPath
                  - text: API function. On other platforms, it is the path supplied by the first environment variable in the list
                  - code [ref=e3010]: TMPDIR, TMP, TEMP, TEMPDIR
                  - text: . If none of these is found, it’s
                  - code [ref=e3011]: /var/nvidia
                  - text: on QNX and
                  - code [ref=e3012]: /tmp
                  - text: otherwise.
                - paragraph [ref=e3013]: Serialization within the process is required for most metrics to be mapped to the proper kernel. In addition, without serialization, performance metric values might vary widely if kernel execute concurrently on the same device.
                - paragraph [ref=e3014]:
                  - text: It is currently not possible to disable this tool behavior. Refer to the
                  - link "FAQ" [ref=e3015] [cursor=pointer]:
                    - /url: index.html#faq
                  - text: entry on possible workarounds.
              - generic [ref=e3016]:
                - heading "2.6.2. Clock Control " [level=3] [ref=e3017]:
                  - text: 2.6.2. Clock Control
                  - link "" [ref=e3018] [cursor=pointer]:
                    - /url: "#clock-control"
                - paragraph [ref=e3019]: For many metrics, their value is directly influenced by the current GPU SM and memory clock frequencies. For example, if a kernel instance is profiled that has prior kernel executions in the application, the GPU might already be in a higher clocked state and the measured kernel duration, along with other metrics, will be affected. Likewise, if a kernel instance is the first kernel to be launched in the application, GPU clocks will regularly be lower. In addition, due to kernel replay, the metric value might depend on which replay pass it is collected in, as later passes would result in higher clock states.
                - paragraph [ref=e3020]:
                  - text: To mitigate this non-determinism, NVIDIA Nsight Compute attempts to limit GPU clock frequencies to their
                  - emphasis [ref=e3021]: base
                  - text: value. As a result, metric values are less impacted by the location of the kernel in the application, or by the number of the specific replay pass.
                - paragraph [ref=e3022]:
                  - text: However, this behavior might be undesirable for analysis of the kernel, e.g. in cases where an external tool is used to fix clock frequencies, or where the behavior of the kernel within the application is analyzed. To solve this, users can adjust the
                  - code [ref=e3023]: "--clock-control"
                  - text: option to specify if any clock frequencies should be fixed by the tool.
                - paragraph [ref=e3024]: "Factors affecting Clock Control:"
                - list [ref=e3025]:
                  - listitem [ref=e3026]:
                    - paragraph [ref=e3027]: Note that thermal throttling directed by the driver cannot be controlled by the tool and always overrides any selected options.
                  - listitem [ref=e3028]:
                    - paragraph [ref=e3029]:
                      - text: On mobile targets, e.g. L4T or QNX, there may be variations in profiling results due the inability for the tool to lock clocks. Using Nsight Compute’s
                      - code [ref=e3030]: "--clock-control"
                      - text: to set the GPU clocks will fail or will be silently ignored when profiling on a GPU partition.
                    - list [ref=e3031]:
                      - listitem [ref=e3032]:
                        - paragraph [ref=e3033]: On L4T, you can use the jetson_clocks script to lock the clocks at their maximums during profiling.
                  - listitem [ref=e3034]:
                    - paragraph [ref=e3035]:
                      - text: See the
                      - link "Special Configurations" [ref=e3036] [cursor=pointer]:
                        - /url: index.html#special-configurations
                      - text: section for MIG and vGPU clock control.
              - generic [ref=e3037]:
                - heading "2.6.3. Cache Control " [level=3] [ref=e3038]:
                  - text: 2.6.3. Cache Control
                  - link "" [ref=e3039] [cursor=pointer]:
                    - /url: "#cache-control"
                - paragraph [ref=e3040]:
                  - text: As explained in
                  - link "Kernel Replay" [ref=e3041] [cursor=pointer]:
                    - /url: index.html#kernel-replay
                  - text: ", the kernel might need to be replayed multiple times to collect all requested metrics. While NVIDIA Nsight Compute can save and restore the contents of GPU device memory accessed by the kernel for each pass, it cannot do the same for the contents of HW caches, such as e.g. the L1 and L2 cache."
                - paragraph [ref=e3042]: This can have the effect that later replay passes might have better or worse performance than e.g. the first pass, as the caches could already be primed with the data last accessed by the kernel. Similarly, the values of HW performance counters collected by the first pass might depend on which kernels, if any, were executed prior to the measured kernel launch.
                - paragraph [ref=e3043]: In order to make HW performance counter value more deterministic, NVIDIA Nsight Compute by default flushes all GPU caches before each replay pass. As a result, in each pass, the kernel will access a clean cache and the behavior will be as if the kernel was executed in complete isolation.
                - paragraph [ref=e3044]:
                  - text: This behavior might be undesirable for performance analysis, especially if the measurement focuses on a kernel within a larger application execution, and if the collected data targets cache-centric metrics. In this case, you can use
                  - code [ref=e3045]: "--cache-control none"
                  - text: to disable flushing of any HW cache by the tool.
              - generic [ref=e3046]:
                - heading "2.6.4. Persistence Mode " [level=3] [ref=e3047]:
                  - text: 2.6.4. Persistence Mode
                  - link "" [ref=e3048] [cursor=pointer]:
                    - /url: "#persistence-mode"
                - paragraph [ref=e3049]: The NVIDIA kernel mode driver must be running and connected to a target GPU device before any user interactions with that device can take place. The driver behavior differs depending on the OS. Generally, on Linux, if the kernel mode driver is not already running or connected to a target GPU, the invocation of any program that attempts to interact with that GPU will transparently cause the driver to load and/or initialize the GPU. When all GPU clients terminate the driver will then deinitialize the GPU.
                - paragraph [ref=e3050]:
                  - text: If
                  - link "persistence mode" [ref=e3051] [cursor=pointer]:
                    - /url: https://docs.nvidia.com/deploy/driver-persistence/index.html
                  - text: is not enabled (as part of the OS, or by the user), applications triggering GPU initialization may incur a short startup cost. In addition, on some configurations, there may also be a shutdown cost when the GPU is de-initialized at the end of the application.
                - paragraph [ref=e3052]: It is recommended to enable persistence mode on applicable operating systems before profiling with NVIDIA Nsight Compute for more consistent application behavior.
            - generic [ref=e3053]:
              - heading "2.7. Special Configurations " [level=2] [ref=e3054]:
                - text: 2.7. Special Configurations
                - link "" [ref=e3055] [cursor=pointer]:
                  - /url: "#special-configurations"
              - generic [ref=e3056]:
                - heading "2.7.1. Multi Instance GPU " [level=3] [ref=e3057]:
                  - text: 2.7.1. Multi Instance GPU
                  - link "" [ref=e3058] [cursor=pointer]:
                    - /url: "#multi-instance-gpu"
                - paragraph [ref=e3059]:
                  - text: "Multi-Instance GPU (MIG) is a feature that allows a GPU to be partitioned into multiple CUDA devices. The partitioning is carried out on two levels: First, a GPU can be split into one or multiple GPU Instances. Each GPU Instance claims ownership of one or more streaming multiprocessors (SM), a subset of the overall GPU memory, and possibly other GPU resources, such as the video encoders/decoders. Second, each GPU Instance can be further partitioned into one or more Compute Instances. Each Compute Instance has exclusive ownership of its assigned SMs of the GPU Instance. However, all Compute Instances within a GPU Instance share the GPU Instance’s memory and memory bandwidth. Every Compute Instance acts and operates as a CUDA device with a unique device ID. See the driver release notes as well as the documentation for the"
                  - code [ref=e3060]: nvidia-smi
                  - text: CLI tool for more information on how to configure MIG instances.
                - paragraph [ref=e3061]:
                  - text: "For profiling, a Compute Instance can be of one of two types:"
                  - emphasis [ref=e3062]: isolated
                  - text: or
                  - emphasis [ref=e3063]: shared
                  - text: .
                - paragraph [ref=e3064]:
                  - text: An
                  - emphasis [ref=e3065]: isolated
                  - text: Compute Instance owns all of its assigned resources and does not share any GPU unit with another Compute Instance. In other words, the Compute Instance is the same size as its parent GPU Instance and consequently does not have any other sibling Compute Instances. Profiling works as usual for isolated Compute Instances.
                - paragraph [ref=e3066]:
                  - text: A
                  - emphasis [ref=e3067]: shared
                  - text: Compute Instance uses GPU resources that can potentially also be accessed by other Compute Instances in the same GPU Instance. Due to this resource sharing, collecting profiling data from those shared units is not permitted. Attempts to collect metrics from a shared unit fail with an error message of
                  - code [ref=e3068]: ==ERROR== Failed to access the following metrics. When profiling on a MIG instance, it is not possible to collect metrics from GPU units that are shared with other MIG instances
                  - text: followed by the list of failing metrics. Collecting only metrics from GPU units that are exclusively owned by a shared Compute Instance is still possible.
                - paragraph [ref=e3069]: Locking Clocks
                - paragraph [ref=e3070]:
                  - text: NVIDIA Nsight Compute is not able to set the clock frequency on any Compute Instance for profiling. You can continue analyzing kernels without fixed clock frequencies (using
                  - code [ref=e3071]: "--clock-control none"
                  - text: ; see
                  - link "here" [ref=e3072] [cursor=pointer]:
                    - /url: index.html#clock-control
                  - text: for more details). If you have sufficient permissions,
                  - code [ref=e3073]: nvidia-smi
                  - text: can be used to configure a fixed frequency for the whole GPU by calling
                  - code [ref=e3074]: nvidia-smi --lock-gpu-clocks=tdp,tdp
                  - text: . This sets the GPU clocks to the base TDP frequency until you reset the clocks by calling
                  - code [ref=e3075]: nvidia-smi --reset-gpu-clocks
                  - text: .
                - paragraph [ref=e3076]: MIG on Baremetal (non-vGPU)
                - paragraph [ref=e3077]: All Compute Instances on a GPU share the same clock frequencies.
                - paragraph [ref=e3078]: MIG on NVIDIA vGPU
                - paragraph [ref=e3079]: Enabling profiling for a VM gives the VM access to the GPU’s global performance counters, which may include activity from other VMs executing on the same GPU. Enabling profiling for a VM also allows the VM to lock clocks on the GPU, which impacts all other VMs executing on the same GPU, including MIG Compute Instances.
              - generic [ref=e3080]:
                - heading "2.7.2. CUDA Green Contexts " [level=3] [ref=e3081]:
                  - text: 2.7.2. CUDA Green Contexts
                  - link "" [ref=e3082] [cursor=pointer]:
                    - /url: "#cuda-green-contexts"
                - paragraph [ref=e3083]:
                  - link "CUDA Green Contexts" [ref=e3084] [cursor=pointer]:
                    - /url: https://docs.nvidia.com/cuda/cuda-driver-api/group__CUDA__GREEN__CONTEXTS.html#group__CUDA__GREEN__CONTEXTS
                  - text: is a feature of the CUDA driver API that allows spacial partitioning of a GPU by assigning a set of resources to a CUDA context on which the context should operate on. NVIDIA Nsight Compute supports profiling applications using CUDA Green Contexts by enabling collection of the same metrics as described in the
                  - link "Metrics Reference" [ref=e3085] [cursor=pointer]:
                    - /url: metrics-reference.html
                  - text: . In particular, any combination of
                  - emphasis [ref=e3086]: Workload Type
                  - text: and
                  - emphasis [ref=e3087]: Replay Mode
                  - text: within the
                  - link "compatibility matrix" [ref=e3088] [cursor=pointer]:
                    - /url: index.html#compatibility
                  - text: is also supported for Green Context applications. For a list of API functions supported in range-based replay modes refer to the
                  - emphasis [ref=e3089]: Green Contexts
                  - text: section in the
                  - link "supported APIs" [ref=e3090] [cursor=pointer]:
                    - /url: index.html#supported-apis
                  - text: .
                - paragraph [ref=e3091]:
                  - text: "Unlike with regular CUDA contexts, when using Green Contexts, metrics are subdivided into two categories: those that can be attributed to a Green Context directly, and those that cannot. The former comprise of metrics that are collected on hardware units that are directly assigned to the Green Context, such as SMs or the L1 cache, where the latter are composed of metrics that do not give exclusive access to a Green Context, such as the L2 cache. The former will be referred to as Green-Context"
                  - emphasis [ref=e3092]: attributable
                  - text: metrics and the latter as
                  - emphasis [ref=e3093]: non-attributable
                  - text: metrics.
                - paragraph [ref=e3094]:
                  - text: Since it is generally more insightful to analyze the performance of a Green Context application relative to the resources it was assigned, instead of the entire GPU,
                  - emphasis [ref=e3095]: attributable
                  - text: metrics are scaled to the number of SMs of the Green Context.
                  - link "4" [ref=e3096] [cursor=pointer]:
                    - /url: "#green-context-f1"
                  - text: This is not the case for
                  - emphasis [ref=e3097]: non-attributable
                  - text: metrics. Refer to the
                  - emphasis [ref=e3098]: supported driver versions
                  - text: below for more information on the minimum driver version required for this feature.
                - paragraph [ref=e3099]:
                  - text: To get an overview of how Green Contexts are supported in the UI, including ways to distinguish
                  - emphasis [ref=e3100]: attributable
                  - text: and
                  - emphasis [ref=e3101]: non-attributable
                  - text: metrics, refer to the
                  - link "Green Contexts support" [ref=e3102] [cursor=pointer]:
                    - /url: ../NsightCompute/index.html#green-contexts-support
                  - text: section. On the CLI, –print-metric-attribution may be used to display the attribution levels, see the
                  - link "Command Line Options" [ref=e3103] [cursor=pointer]:
                    - /url: ../NsightComputeCli/index.html#console-output
                  - text: .
                - paragraph [ref=e3104]: Supported driver versions
                - paragraph [ref=e3105]: Starting with NVIDIA Nsight Compute 2024.1, profiling of applications using CUDA Green Contexts is fully supported. This requires a minimum driver version of 550. Note, however, that with this version metrics were always scaled with the the number of all SMs available on the GPU.
                - paragraph [ref=e3106]:
                  - text: From NVIDIA Nsight Compute 2024.3 onwards,
                  - emphasis [ref=e3107]: attributable
                  - text: metrics are scaled to the number of SMs used by the Green Context. This requires a minimum driver version of 560.
                - paragraph [ref=e3108]: Footnotes
                - generic [ref=e3109]:
                  - term [ref=e3110]:
                    - generic [ref=e3111]:
                      - text: "["
                      - link "4" [ref=e3112] [cursor=pointer]:
                        - /url: "#id7"
                      - text: "]"
                    - text: ":"
                  - definition [ref=e3113]:
                    - paragraph [ref=e3114]:
                      - text: Although not intended as the primary use-case, different Green Contexts can be initialized with overlapping resources. When executing and profiling such Green Contexts concurrently,
                      - emphasis [ref=e3115]: attributable
                      - text: metrics may contain contributions from multiple Green Contexts, although the same metric scaling behavior as described in this section would still apply.
            - generic [ref=e3116]:
              - heading "2.8. Roofline Charts " [level=2] [ref=e3117]:
                - text: 2.8. Roofline Charts
                - link "" [ref=e3118] [cursor=pointer]:
                  - /url: "#roofline-charts"
              - paragraph [ref=e3119]: Roofline charts provide a very helpful way to visualize achieved performance on complex processing units, like GPUs. This section introduces the Roofline charts that are presented within a profile report.
              - generic [ref=e3120]:
                - heading "2.8.1. Overview " [level=3] [ref=e3121]:
                  - text: 2.8.1. Overview
                  - link "" [ref=e3122] [cursor=pointer]:
                    - /url: "#roofline-overview"
                - paragraph [ref=e3123]:
                  - text: Kernel performance is not only dependent on the operational speed of the GPU. Since a kernel requires data to work on, performance is also dependent on the rate at which the GPU can feed data to the kernel. A typical roofline chart combines the peak performance and memory bandwidth of the GPU, with a metric called
                  - emphasis [ref=e3124]: Arithmetic Intensity
                  - text: (a ratio between
                  - emphasis [ref=e3125]: Work
                  - text: and
                  - emphasis [ref=e3126]: Memory Traffic
                  - text: "), into a single chart, to more realistically represent the achieved performance of the profiled kernel. A simple roofline chart might look like the following:"
                - figure "Roofline overview. " [ref=e3127]:
                  - img "../_images/roofline-overview.png" [ref=e3128]
                  - paragraph [ref=e3130]:
                    - text: Roofline overview.
                    - link "" [ref=e3131] [cursor=pointer]:
                      - /url: "#id40"
                - paragraph [ref=e3132]: "This chart actually shows two different rooflines. However, the following components can be identified for each:"
                - list [ref=e3133]:
                  - listitem [ref=e3134]:
                    - paragraph [ref=e3135]:
                      - strong [ref=e3136]: Vertical Axis
                      - text: "- The vertical axis represents"
                      - emphasis [ref=e3137]: Floating Point Operations per Second
                      - text: (FLOPS). For GPUs this number can get quite large and so the numbers on this axis can be scaled for easier reading (as shown here). In order to better accommodate the range, this axis is rendered using a logarithmic scale.
                  - listitem [ref=e3138]:
                    - paragraph [ref=e3139]:
                      - strong [ref=e3140]: Horizontal Axis
                      - text: "- The horizontal axis represents"
                      - emphasis [ref=e3141]: Arithmetic Intensity
                      - text: ", which is the ratio between"
                      - emphasis [ref=e3142]: Work
                      - text: (expressed in floating point operations per second), and
                      - emphasis [ref=e3143]: Memory Traffic
                      - text: (expressed in bytes per second). The resulting unit is in floating point operations per byte. This axis is also shown using a logarithmic scale.
                  - listitem [ref=e3144]:
                    - paragraph [ref=e3145]:
                      - strong [ref=e3146]: Memory Bandwidth Boundary
                      - text: "- The memory bandwidth boundary is the"
                      - emphasis [ref=e3147]: sloped
                      - text: part of the roofline. By default, this slope is determined entirely by the memory transfer rate of the GPU but can be customized inside the
                      - emphasis [ref=e3148]: SpeedOfLight_RooflineChart.section
                      - text: file if desired.
                  - listitem [ref=e3149]:
                    - paragraph [ref=e3150]:
                      - strong [ref=e3151]: Peak Performance Boundary
                      - text: "- The peak performance boundary is the"
                      - emphasis [ref=e3152]: flat
                      - text: part of the roofline By default, this value is determined entirely by the peak performance of the GPU but can be customized inside the
                      - emphasis [ref=e3153]: SpeedOfLight_RooflineChart.section
                      - text: file if desired.
                  - listitem [ref=e3154]:
                    - paragraph [ref=e3155]:
                      - strong [ref=e3156]: Ridge Point
                      - text: "- The ridge point is the point at which the memory bandwidth boundary meets the peak performance boundary. This point is a useful reference when analyzing kernel performance."
                  - listitem [ref=e3157]:
                    - paragraph [ref=e3158]:
                      - strong [ref=e3159]: Achieved Value
                      - text: "- The achieved value represents the performance of the profiled kernel. If baselines are being used, the roofline chart will also contain an achieved value for each baseline. The outline color of the plotted achieved value point can be used to determine from which baseline the point came."
              - generic [ref=e3160]:
                - heading "2.8.2. Analysis " [level=3] [ref=e3161]:
                  - text: 2.8.2. Analysis
                  - link "" [ref=e3162] [cursor=pointer]:
                    - /url: "#analysis"
                - paragraph [ref=e3163]: The roofline chart can be very helpful in guiding performance optimization efforts for a particular kernel.
                - figure "Roofline anaysis. " [ref=e3164]:
                  - img "../_images/roofline-analysis.png" [ref=e3165]
                  - paragraph [ref=e3167]:
                    - text: Roofline anaysis.
                    - link "" [ref=e3168] [cursor=pointer]:
                      - /url: "#id41"
                - paragraph [ref=e3169]:
                  - text: As shown here, the
                  - emphasis [ref=e3170]: ridge point
                  - text: partitions the roofline chart into two regions. The area shaded in blue under the sloped
                  - emphasis [ref=e3171]: Memory Bandwidth Boundary
                  - text: is the
                  - emphasis [ref=e3172]: Memory Bound
                  - text: region, while the area shaded in green under the
                  - emphasis [ref=e3173]: Peak Performance Boundary
                  - text: is the
                  - emphasis [ref=e3174]: Compute Bound
                  - text: region. The region in which the
                  - emphasis [ref=e3175]: achieved value
                  - text: falls, determines the current limiting factor of kernel performance.
                - paragraph [ref=e3176]:
                  - text: The distance from the
                  - emphasis [ref=e3177]: achieved value
                  - text: to the respective roofline boundary (shown in this figure as a dotted white line), represents the opportunity for performance improvement. The closer the
                  - emphasis [ref=e3178]: achieved value
                  - text: is to the roofline boundary, the more optimal is its performance. An
                  - emphasis [ref=e3179]: achieved value
                  - text: that lies on the
                  - emphasis [ref=e3180]: Memory Bandwidth Boundary
                  - text: but is not yet at the height of the
                  - emphasis [ref=e3181]: ridge point
                  - text: would indicate that any further improvements in overall FLOP/s are only possible if the
                  - emphasis [ref=e3182]: Arithmetic Intensity
                  - text: is increased at the same time.
                - paragraph [ref=e3183]: Using the baseline feature in combination with roofline charts, is a good way to track optimization progress over a number of kernel executions.
            - generic [ref=e3184]:
              - heading "2.9. Memory Chart " [level=2] [ref=e3185]:
                - text: 2.9. Memory Chart
                - link "" [ref=e3186] [cursor=pointer]:
                  - /url: "#memory-chart"
              - paragraph [ref=e3187]:
                - text: The
                - emphasis [ref=e3188]: Memory Chart
                - text: shows a graphical, logical representation of performance data for memory subunits on and off the GPU. Performance data includes transfer sizes, hit rates, number of instructions or requests, etc.
              - generic [ref=e3189]:
                - heading "2.9.1. Overview " [level=3] [ref=e3190]:
                  - text: 2.9.1. Overview
                  - link "" [ref=e3191] [cursor=pointer]:
                    - /url: "#memory-chart-overview"
                - figure "Memory chart for an NVIDIA A100 GPU " [ref=e3192]:
                  - img "../_images/memory-chart-a100.png" [ref=e3193]
                  - paragraph [ref=e3195]:
                    - text: Memory chart for an NVIDIA A100 GPU
                    - link "" [ref=e3196] [cursor=pointer]:
                      - /url: "#id42"
                - paragraph [ref=e3197]: Logical Units (green)
                - paragraph [ref=e3198]: Logical units are shown in green (active) or grey (inactive).
                - list [ref=e3199]:
                  - listitem [ref=e3200]:
                    - paragraph [ref=e3201]: "Kernel: The CUDA kernel executing on the GPU’s Streaming Multiprocessors"
                  - listitem [ref=e3202]:
                    - paragraph [ref=e3203]:
                      - text: "Global: CUDA"
                      - link "global memory" [ref=e3204] [cursor=pointer]:
                        - /url: index.html#metrics-hw-memory
                  - listitem [ref=e3205]:
                    - paragraph [ref=e3206]:
                      - text: "Local: CUDA"
                      - link "local memory" [ref=e3207] [cursor=pointer]:
                        - /url: index.html#metrics-hw-memory
                  - listitem [ref=e3208]:
                    - paragraph [ref=e3209]:
                      - text: "Texture: CUDA"
                      - link "texture memory" [ref=e3210] [cursor=pointer]:
                        - /url: index.html#metrics-hw-tex-surf
                  - listitem [ref=e3211]:
                    - paragraph [ref=e3212]:
                      - text: "Surface: CUDA"
                      - link "surface memory" [ref=e3213] [cursor=pointer]:
                        - /url: index.html#metrics-hw-tex-surf
                  - listitem [ref=e3214]:
                    - paragraph [ref=e3215]:
                      - text: "Shared: CUDA"
                      - link "shared memory" [ref=e3216] [cursor=pointer]:
                        - /url: index.html#metrics-hw-memory
                  - listitem [ref=e3217]:
                    - paragraph [ref=e3218]: "Load Global Store Shared: Instructions loading directly from global into shared memory without intermediate register file access"
                - paragraph [ref=e3219]: Physical Units (blue)
                - paragraph [ref=e3220]: Physical units are shown in blue (active) or grey (inactive).
                - list [ref=e3221]:
                  - listitem [ref=e3222]:
                    - paragraph [ref=e3223]:
                      - text: "L1/TEX Cache: The"
                      - link "L1/Texture cache" [ref=e3224] [cursor=pointer]:
                        - /url: index.html#metrics-hw-caches
                      - text: . The underlying physical memory is split between this cache and the user-managed
                      - emphasis [ref=e3225]: Shared Memory
                      - text: .
                  - listitem [ref=e3226]:
                    - paragraph [ref=e3227]:
                      - text: "Shared Memory: CUDA’s user-managed"
                      - link "shared memory" [ref=e3228] [cursor=pointer]:
                        - /url: index.html#metrics-hw-memory
                      - text: . The underlying physical memory is split between this and the
                      - emphasis [ref=e3229]: L1/TEX Cache
                      - text: .
                  - listitem [ref=e3230]:
                    - paragraph [ref=e3231]:
                      - text: "L2 Cache: The"
                      - link "L2 cache" [ref=e3232] [cursor=pointer]:
                        - /url: index.html#metrics-hw-caches
                  - listitem [ref=e3233]:
                    - paragraph [ref=e3234]:
                      - text: "L2 Compression: The memory compression unit of the"
                      - emphasis [ref=e3235]: L2 Cache
                  - listitem [ref=e3236]:
                    - paragraph [ref=e3237]:
                      - text: "System Memory: Off-chip"
                      - link "system (CPU) memory" [ref=e3238] [cursor=pointer]:
                        - /url: index.html#metrics-hw-memory
                  - listitem [ref=e3239]:
                    - paragraph [ref=e3240]:
                      - text: "Device Memory: On-chip"
                      - link "device (GPU) memory" [ref=e3241] [cursor=pointer]:
                        - /url: index.html#metrics-hw-memory
                      - text: of the CUDA device that executes the kernel
                  - listitem [ref=e3242]:
                    - paragraph [ref=e3243]:
                      - text: "Peer Memory: On-chip"
                      - link "device (GPU) memory" [ref=e3244] [cursor=pointer]:
                        - /url: index.html#metrics-hw-memory
                      - text: of other CUDA devices
                - paragraph [ref=e3245]: Depending on the exact GPU architecture, the exact set of shown units can vary, as not all GPUs have all units.
                - paragraph [ref=e3246]: Links
                - paragraph [ref=e3247]:
                  - text: Links between
                  - emphasis [ref=e3248]: Kernel
                  - text: and other logical units represent the number of executed instructions (
                  - emphasis [ref=e3249]: Inst
                  - text: ) targeting the respective unit. For example, the link between
                  - emphasis [ref=e3250]: Kernel
                  - text: and
                  - emphasis [ref=e3251]: Global
                  - text: represents the instructions loading from or storing to the global memory space. Instructions using the NVIDIA A100’s
                  - emphasis [ref=e3252]: Load Global Store Shared
                  - text: paradigm are shown separately, as their register or cache access behavior can be different from regular global loads or shared stores.
                - paragraph [ref=e3253]:
                  - text: Links between logical units and blue, physical units represent the number of requests (
                  - emphasis [ref=e3254]: Req
                  - text: ) issued as a result of their respective instructions. For example, the link going from
                  - emphasis [ref=e3255]: L1/TEX Cache
                  - text: to
                  - emphasis [ref=e3256]: Global
                  - text: shows the number of requests generated due to global load instructions.
                - paragraph [ref=e3257]: The color of each link represents the percentage of peak utilization of the corresponding communication path. The color legend to the right of the chart shows the applied color gradient from unused (0%) to operating at peak performance (100%). If a link is inactive, it is shown in grey color. Triangle markers to the left of the legend correspond to the links in the chart. The markers offer a more accurate value estimate for the achieved peak performances than the color gradient alone.
                - paragraph [ref=e3258]: Ports
                - paragraph [ref=e3259]: A unit often shares a common data port for incoming and outgoing traffic. While the links sharing a port might operate well below their individual peak performances, the unit’s data port may have already reached its peak. Port utilization is shown in the chart by colored rectangles inside the units located at the incoming and outgoing links. Ports use the same color gradient as the data links and have also a corresponding marker to the left of the legend. Inactive ports are shown in grey color.
