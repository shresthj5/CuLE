                        - row "wavefront Unique “work package” generated at the end of the processing stage for requests. All work items of a wavefront are processed in parallel, while work items of different wavefronts are serialized and processed on different cycles. At least one wavefront is generated for each request." [ref=e1637]:
                          - cell "wavefront" [ref=e1638]:
                            - paragraph [ref=e1639]:
                              - code [ref=e1640]: wavefront
                          - cell "Unique “work package” generated at the end of the processing stage for requests. All work items of a wavefront are processed in parallel, while work items of different wavefronts are serialized and processed on different cycles. At least one wavefront is generated for each request." [ref=e1641]:
                            - paragraph [ref=e1642]: Unique “work package” generated at the end of the processing stage for requests. All work items of a wavefront are processed in parallel, while work items of different wavefronts are serialized and processed on different cycles. At least one wavefront is generated for each request.
                - paragraph [ref=e1643]:
                  - text: "A simplified model for the processing in L1TEX for Volta and newer architectures can be described as follows: When an SM executes a global or local memory instruction for a warp, a single"
                  - emphasis [ref=e1644]: request
                  - text: is sent to L1TEX. This request communicates the information for all participating threads of this warp (up to 32). For local and global memory, based on the access pattern and the participating threads, the request requires to access a number of cache lines, and
                  - emphasis [ref=e1645]: sectors
                  - text: within these cache lines. The L1TEX unit has internally multiple processing stages operating in a pipeline.
                - paragraph [ref=e1646]:
                  - text: A
                  - emphasis [ref=e1647]: wavefront
                  - text: is the maximum unit that can pass through that pipeline stage per cycle. If not all cache lines or sectors can be accessed in a single wavefront, multiple wavefronts are created and sent for processing one by one, i.e. in a serialized manner. Limitations of the work within a wavefront may include the need for a consistent memory space, a maximum number of cache lines that can be accessed, as well as various other reasons. Each wavefront then flows through the L1TEX pipeline and fetches the sectors handled in that wavefront. The given relationships of the three key values in this model are
                  - emphasis [ref=e1648]: requests:sectors is 1:N, wavefronts:sectors 1:N, and requests:wavefronts is 1:N
                  - text: .
                - paragraph [ref=e1649]:
                  - text: A wavefront is described as a (work) package that can be processed at once, i.e. there is a notion of processing one wavefront per cycle in L1TEX. Wavefronts therefore represent the number of cycles required to process the requests, while the number of sectors per request is a property of the
                  - emphasis [ref=e1650]: access pattern
                  - text: of the memory instruction for all participating threads. For example, it is possible to have a memory instruction that requires 4 sectors per request in 1 wavefront. However, you can also have a memory instruction having 4 sectors per request, but requiring 2 or more wavefronts.
              - generic [ref=e1651]:
                - heading "2.3.4. Range and Precision " [level=3] [ref=e1652]:
                  - text: 2.3.4. Range and Precision
                  - link "" [ref=e1653] [cursor=pointer]:
                    - /url: "#range-and-precision"
                - paragraph [ref=e1654]: Overview
                - paragraph [ref=e1655]: In general, measurement values that lie outside the expected logical range of a metric can be attributed to one or more of the below root-causes. If values are exceeding such range, they are not clamped by the tool to their expected value on purpose to ensure that the rest of the profiler report remains self-consistent.
                - paragraph [ref=e1656]: Asynchronous GPU activity
                - paragraph [ref=e1657]: GPU engines other than the one measured by a metric (display, copy engine, video encoder, video decoder, etc.) potentially access shared resources during profiling. Such chip-global shared resources include L2, DRAM, PCIe, and NVLINK. If the kernel launch is small, the other engine(s) can cause significant confusion in e.g. the DRAM results, since it is not possible to isolate the DRAM traffic of the SM. To reduce the impact of such asynchronous units, consider profiling on a GPU without active display and without other processes that can access the GPU at the time.
                - paragraph [ref=e1658]: Multi-pass data collection
                - paragraph [ref=e1659]:
                  - text: Out-of-range metrics often occur when the profiler
                  - link "replays" [ref=e1660] [cursor=pointer]:
                    - /url: index.html#kernel-replay
                  - text: the kernel launch to collect metrics, and work distribution is significantly different across replay passes. A metric such as hit rate (hits / queries) can have significant error if hits and queries are collected on different passes and the kernel does not saturate the GPU to reach a steady state (generally > 20 µs). Similarly, it can show unexpected values when the workload is inherently variable, as e.g. in the case of spin loops.
                - paragraph [ref=e1661]: To mitigate the issue, when applicable try to increase the measured workload to allow the GPU to reach a steady state for each launch. Reducing the number of metrics collected at the same time can also improve precision by increasing the likelihood that counters contributing to one metric are collected in a single pass.
                - paragraph [ref=e1662]: Tool issue
                - paragraph [ref=e1663]:
                  - text: If you still observe metric issues after following the guidelines above, please
                  - link "reach out to us" [ref=e1664] [cursor=pointer]:
                    - /url: https://forums.developer.nvidia.com/c/development-tools/nsight-compute
                  - text: and describe your issue.
