                        - paragraph [ref=e242]: WarpStateStats (Warp State Statistics)
                      - cell "Analysis of the states in which all warps spent cycles during the kernel execution. The warp states describe a warp’s readiness or inability to issue its next instruction. The warp cycles per instruction define the latency between two consecutive instructions. The higher the value, the more warp parallelism is required to hide this latency. For each warp state, the chart shows the average number of cycles spent in that state per issued instruction. Stalls are not always impacting the overall performance nor are they completely avoidable. Only focus on stall reasons if the schedulers fail to issue every cycle." [ref=e243]:
                        - paragraph [ref=e244]: Analysis of the states in which all warps spent cycles during the kernel execution. The warp states describe a warp’s readiness or inability to issue its next instruction. The warp cycles per instruction define the latency between two consecutive instructions. The higher the value, the more warp parallelism is required to hide this latency. For each warp state, the chart shows the average number of cycles spent in that state per issued instruction. Stalls are not always impacting the overall performance nor are they completely avoidable. Only focus on stall reasons if the schedulers fail to issue every cycle.
              - generic [ref=e245]:
                - heading "2.2.3. Replay " [level=3] [ref=e246]:
                  - text: 2.2.3. Replay
                  - link "" [ref=e247] [cursor=pointer]:
                    - /url: "#replay"
                - paragraph [ref=e248]:
                  - text: Depending on which metrics are to be collected, kernels might need to be
                  - emphasis [ref=e249]: replayed
                  - text: one or more times, since not all metrics can be collected in a single
                  - emphasis [ref=e250]: pass
                  - text: . For example, the number of metrics originating from hardware (HW) performance counters that the GPU can collect at the same time is limited. In addition, patch-based software (SW) performance counters can have a high impact on kernel runtime and would skew results for HW counters.
                - generic [ref=e251]:
                  - heading "Kernel Replay " [level=4] [ref=e252]:
                    - text: Kernel Replay
                    - link "" [ref=e253] [cursor=pointer]:
                      - /url: "#kernel-replay"
                  - paragraph [ref=e254]:
                    - text: In
                    - emphasis [ref=e255]: Kernel Replay
                    - text: ", all metrics requested for a specific kernel instance in NVIDIA Nsight Compute are grouped into one or more passes. For the first pass, all GPU memory that can be accessed by the kernel is saved. After the first pass, the subset of memory that is written by the kernel is determined. Before each pass (except the first one), this subset is restored in its original location to have the kernel access the same memory contents in each replay pass."
                  - paragraph [ref=e256]: NVIDIA Nsight Compute attempts to use the fastest available storage location for this save-and-restore strategy. For example, if data is allocated in device memory, and there is still enough device memory available, it is stored there directly. If it runs out of device memory, the data is transferred to the CPU host memory. Likewise, if an allocation originates from CPU host memory, the tool first attempts to save it into the same memory location, if possible.
                  - paragraph [ref=e257]:
                    - text: As explained in
                    - link "Overhead" [ref=e258] [cursor=pointer]:
                      - /url: index.html#overhead
                    - text: ", the time needed for this increases the more memory is accessed, especially written, by a kernel. If NVIDIA Nsight Compute determines that only a single replay pass is necessary to collect the requested metrics, no save-and-restore is performed at all to reduce overhead."
                  - figure "Regular Application Execution " [ref=e259]:
                    - img "../_images/replay-regular-execution.png" [ref=e260]
                    - paragraph [ref=e262]:
                      - text: Regular Application Execution
                      - link "" [ref=e263] [cursor=pointer]:
                        - /url: "#id13"
                  - figure "Execution with Kernel Replay. All memory is saved, and memory written by the kernel is restored in-between replay passes. " [ref=e264]:
                    - img "../_images/replay-kernel.png" [ref=e265]
                    - paragraph [ref=e267]:
                      - text: Execution with Kernel Replay. All memory is saved, and memory written by the kernel is restored in-between replay passes.
                      - link "" [ref=e268] [cursor=pointer]:
                        - /url: "#id14"
                - generic [ref=e269]:
                  - heading "Application Replay " [level=4] [ref=e270]:
                    - text: Application Replay
                    - link "" [ref=e271] [cursor=pointer]:
                      - /url: "#application-replay"
                  - paragraph [ref=e272]:
                    - text: In
                    - emphasis [ref=e273]: Application Replay
                    - text: ", all metrics requested for a specific kernel launch in NVIDIA Nsight Compute are grouped into one or more passes. In contrast to"
                    - link "Kernel Replay" [ref=e274] [cursor=pointer]:
                      - /url: index.html#kernel-replay
                    - text: ", the complete application is run multiple times, so that in each run one of those passes can be collected per kernel."
                  - paragraph [ref=e275]: For correctly identifying and combining performance counters collected from multiple application replay passes of a single kernel launch into one result, the application needs to be deterministic with respect to its kernel activities and their assignment to GPUs, contexts, streams, and potentially NVTX ranges. Normally, this also implies that the application needs to be deterministic with respect to its overall execution.
                  - paragraph [ref=e276]:
                    - text: Application replay has the benefit that memory accessed by the kernel does not need to be saved and restored via the tool, as each kernel launch executes only once during the lifetime of the application process. Besides avoiding memory save-and-restore overhead, application replay also allows to disable
                    - link "Cache Control" [ref=e277] [cursor=pointer]:
                      - /url: index.html#cache-control
                    - text: . This is especially useful if other GPU activities preceding a specific kernel launch are used by the application to set caches to some expected state.
                  - paragraph [ref=e278]: In addition, application replay can support profiling kernels that have interdependencies to the host during execution. With kernel replay, this class of kernels typically hangs when being profiled, because the necessary responses from the host are missing in all but the first pass. In contrast, application replay ensures the correct behavior of the program execution in each pass.
                  - paragraph [ref=e279]: In contrast to kernel replay, multiple passes collected via application replay imply that all host-side activities of the application are duplicated, too. If the application requires significant time for e.g. setup or file-system access, the overhead will increase accordingly.
                  - figure "Regular Application Execution " [ref=e280]:
                    - img "../_images/replay-regular-execution.png" [ref=e281]
                    - paragraph [ref=e283]:
                      - text: Regular Application Execution
                      - link "" [ref=e284] [cursor=pointer]:
                        - /url: "#id15"
                  - figure "Execution with Application Replay. No memory is saved or restored, but the cost of running the application itself is duplicated. " [ref=e285]:
                    - img "../_images/replay-application.png" [ref=e286]
                    - paragraph [ref=e288]:
                      - text: Execution with Application Replay. No memory is saved or restored, but the cost of running the application itself is duplicated.
                      - link "" [ref=e289] [cursor=pointer]:
                        - /url: "#id16"
                  - paragraph [ref=e290]:
                    - text: Across application replay passes, NVIDIA Nsight Compute matches metric data for the individual, selected kernel launches. The matching strategy can be selected using the
                    - code [ref=e291]: "--app-replay-match"
                    - text: option. For matching, only kernels within the same process and running on the same device are considered. By default, the
                    - emphasis [ref=e292]: grid
                    - text: strategy is used, which matches launches according to their kernel name and grid size. When multiple launches have the same attributes (e.g. name and grid size), they are matched in execution order.
                  - figure "Kernel matching during application replay using the grid strategy. " [ref=e293]:
                    - img "../_images/replay-application-kernel-matching.png" [ref=e294]
                    - paragraph [ref=e296]:
                      - generic [ref=e297]:
                        - text: Kernel matching during application replay using the
                        - emphasis [ref=e298]: grid
                        - text: strategy.
                      - link "" [ref=e299] [cursor=pointer]:
                        - /url: "#id17"
                - generic [ref=e300]:
                  - heading "Range Replay " [level=4] [ref=e301]:
                    - text: Range Replay
                    - link "" [ref=e302] [cursor=pointer]:
                      - /url: "#range-replay"
                  - paragraph [ref=e303]:
                    - text: In
                    - emphasis [ref=e304]: Range Replay
                    - text: ", all requested metrics in NVIDIA Nsight Compute are grouped into one or more passes. In contrast to"
                    - link "Kernel Replay" [ref=e305] [cursor=pointer]:
                      - /url: index.html#kernel-replay
                    - text: and
                    - link "Application Replay" [ref=e306] [cursor=pointer]:
                      - /url: index.html#application-replay
                    - text: ","
                    - emphasis [ref=e307]: Range Replay
                    - text: captures and replays complete ranges of CUDA API calls and kernel launches within the profiled application. Metrics are then not associated with individual kernels but with the entire range. This allows the tool to execute kernels without serialization and thereby supports profiling kernels that should be run concurrently for correctness or performance reasons.
                  - figure "Execution with Range Replay. An entire range of API calls and kernel launches is captured and replayed. Host and device memory is saved and restored as necessary. " [ref=e308]:
                    - img "../_images/replay-range.png" [ref=e309]
                    - paragraph [ref=e311]:
                      - text: Execution with Range Replay. An entire range of API calls and kernel launches is captured and replayed. Host and device memory is saved and restored as necessary.
                      - link "" [ref=e312] [cursor=pointer]:
                        - /url: "#id18"
                  - generic [ref=e313]:
                    - heading "Defining Ranges " [level=5] [ref=e314]:
                      - text: Defining Ranges
                      - link "" [ref=e315] [cursor=pointer]:
                        - /url: "#defining-ranges"
                    - paragraph [ref=e316]: "Range replay requires you to specify the range for profiling in the application. A range is defined by a start and an end marker and includes all CUDA API calls and kernels launched between these markers from any CPU thread. The application is responsible for inserting appropriate synchronization between threads to ensure that the anticipated set of API calls is captured. Range markers can be set using one of the following options:"
                    - list [ref=e317]:
                      - listitem [ref=e318]:
                        - paragraph [ref=e319]:
                          - strong [ref=e320]: Profiler Start/Stop API
                        - paragraph [ref=e321]:
                          - text: Set the start marker using
                          - code [ref=e322]: cu(da)ProfilerStart
                          - text: and the end marker using
                          - code [ref=e323]: cu(da)ProfilerStop
                          - text: ". Note: The CUDA driver API variants of this API require to include"
                          - code [ref=e324]: cudaProfiler.h
                          - text: . The CUDA runtime variants require to include
                          - code [ref=e325]: cuda_profiler_api.h
                          - text: .
                        - paragraph [ref=e326]: This is the default for NVIDIA Nsight Compute.
                      - listitem [ref=e327]:
                        - paragraph [ref=e328]:
                          - strong [ref=e329]: NVTX Ranges
                        - paragraph [ref=e330]:
                          - text: Define the range using an
                          - link "NVTX Include" [ref=e331] [cursor=pointer]:
                            - /url: ../NsightComputeCli/index.html#nvtx-filtering
                          - text: expression. The range capture starts with the first CUDA API call and ends at the last API call for which the expression is matched, respectively. If multiple expressions are specified, a range is defined as soon as any of them matches. Hence, multiple expressions can be used to conveniently capture and profile multiple ranges for the same application execution.
                        - paragraph [ref=e332]: The application must have been instrumented with the NVTX API for any expressions to match.
                        - paragraph [ref=e333]:
                          - text: This mode is enabled by passing
                          - code [ref=e334]: "--nvtx --nvtx-include <expression> [--nvtx-include <expression>]"
                          - text: to the NVIDIA Nsight Compute CLI.
                    - paragraph [ref=e335]: "Ranges must fulfill several requirements:"
                    - list [ref=e336]:
                      - listitem [ref=e337]:
                        - paragraph [ref=e338]: It must be possible to synchronize all active CUDA contexts at the start of the range.
                      - listitem [ref=e339]:
                        - paragraph [ref=e340]:
                          - text: Ranges must not include unsupported CUDA API calls. See
                          - link "Supported APIs" [ref=e341] [cursor=pointer]:
                            - /url: index.html#range-replay-supported-apis
                          - text: for the list of currently supported APIs.
                    - paragraph [ref=e342]: "In addition, there are several recommendations that ranges should comply with to guarantee a correct capture and replay:"
                    - list [ref=e343]:
                      - listitem [ref=e344]:
                        - paragraph [ref=e345]: Set ranges as narrow as possible for capturing a specific set of CUDA launches. The more API calls are included, the higher the potentially created overhead from capturing and replaying these API calls.
                      - listitem [ref=e346]:
                        - paragraph [ref=e347]:
                          - text: Avoid freeing host allocations written by device memory during the range. This includes both heap as well as stack allocations. NVIDIA Nsight Compute does not intercept creation or destruction of generic host (CPU)-based allocations. However, to guarantee correct program execution after any replay of the range, the tool attempts to restore host allocations that were written from device memory during the capture. If these host addresses are invalid or re-assigned, the program behavior is undefined and potentially unstable. In cases where avoiding freeing such allocations is not possible, you should limit profiling to one range using
                          - code [ref=e348]: "--launch-count 1"
                          - text: ", set the"
                          - emphasis [ref=e349]: disable-host-restore
                          - text: range replay option and optionally use
                          - code [ref=e350]: "--kill yes"
                          - text: to terminate the process after this range.
                      - listitem [ref=e351]:
                        - paragraph [ref=e352]: Defining narrow ranges at local scope helps with avoiding destruction of stack allocations during the range, too.
                      - listitem [ref=e353]:
                        - paragraph [ref=e354]:
                          - text: When defining the range markers using
                          - code [ref=e355]: cu(da)ProfilerStart/Stop
                          - text: ", prefer the CUDA driver API calls"
                          - code [ref=e356]: cuProfilerStart/Stop
                          - text: . Internally, NVIDIA Nsight Compute only intercepts the CUDA driver API variants and the CUDA runtime API may not trigger these if no CUDA context is active on the calling thread.
                  - generic [ref=e357]:
                    - heading "Supported APIs " [level=5] [ref=e358]:
                      - text: Supported APIs
                      - link "" [ref=e359] [cursor=pointer]:
                        - /url: "#supported-apis"
                    - paragraph [ref=e360]:
                      - text: Range replay supports a subset of the CUDA API for capture and replay. This page lists the supported functions as well as any further, API-specific limitations that may apply. If an unsupported API call is detected in the captured range, an error is reported and the range cannot be profiled. The groups listed below match the ones found in the
                      - link "CUDA Driver API documentation" [ref=e361] [cursor=pointer]:
                        - /url: https://docs.nvidia.com/cuda/cuda-driver-api/index.html
                      - text: .
                    - paragraph [ref=e362]:
                      - text: Generally, range replay only captures and replay CUDA
                      - emphasis [ref=e363]: Driver
                      - text: API calls. CUDA
                      - emphasis [ref=e364]: Runtime
                      - text: APIs calls can be captured when they generate only supported CUDA Driver API calls internally. Deprecated APIs are not supported.
