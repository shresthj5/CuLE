                - listitem [ref=e3809]:
                  - paragraph [ref=e3810]:
                    - strong [ref=e3811]: n/a metric values
                  - paragraph [ref=e3812]:
                    - text: n/a means that the metric value is “not available”. The most common reason is that the requested metric does not exist. This can either be the result of a typo, or a missing
                    - link "suffix" [ref=e3813] [cursor=pointer]:
                      - /url: index.html#metrics-structure__metrics-examples
                    - text: . Verify the metric name against the output of of the
                    - code [ref=e3814]: "--query-metrics"
                    - text: NVIDIA Nsight Compute CLI option.
                  - paragraph [ref=e3815]: If the metric name was copied (e.g. from an old version of this documentation), make sure that it does not contain zero-width unicode characters.
                  - paragraph [ref=e3816]:
                    - text: Finally, the metric might simply not exist for the targeted GPU architecture. For example, the IMMA pipeline metric
                    - code [ref=e3817]: sm__inst_executed_pipe_tensor_op_imma.avg.pct_of_peak_sustained_active
                    - text: is not available on GV100 chips.
