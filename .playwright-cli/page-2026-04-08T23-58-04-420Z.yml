          - generic [ref=e86]:
            - heading "2. Kernel Profiling Guide " [level=1] [ref=e87]:
              - text: 2. Kernel Profiling Guide
              - link "" [ref=e88] [cursor=pointer]:
                - /url: "#kernel-profiling-guide"
            - paragraph [ref=e89]: Nsight Compute profiling guide.
            - paragraph [ref=e90]: Kernel Profiling Guide with metric types and meaning, data collection modes and FAQ for common problems.
            - generic [ref=e91]:
              - heading "2.1. Introduction " [level=2] [ref=e92]:
                - text: 2.1. Introduction
                - link "" [ref=e93] [cursor=pointer]:
                  - /url: "#introduction"
              - paragraph [ref=e94]: This guide describes various profiling topics related to NVIDIA Nsight Compute and NVIDIA Nsight Compute CLI. Most of these apply to both the UI and the CLI version of the tool.
              - paragraph [ref=e95]:
                - text: To use the tools effectively, it is recommended to read this guide, as well as at least the following chapters of the
                - emphasis [ref=e96]: CUDA Programming Guide
                - text: ":"
              - list [ref=e97]:
                - listitem [ref=e98]:
                  - paragraph [ref=e99]:
                    - link "Programming Model" [ref=e100] [cursor=pointer]:
                      - /url: https://docs.nvidia.com/cuda/cuda-c-programming-guide/index.html#programming-model
                - listitem [ref=e101]:
                  - paragraph [ref=e102]:
                    - link "Hardware Implementation" [ref=e103] [cursor=pointer]:
                      - /url: https://docs.nvidia.com/cuda/cuda-c-programming-guide/index.html#hardware-implementation
                - listitem [ref=e104]:
                  - paragraph [ref=e105]:
                    - link "Performance Guidelines" [ref=e106] [cursor=pointer]:
                      - /url: https://docs.nvidia.com/cuda/cuda-c-programming-guide/index.html#performance-guidelines
              - paragraph [ref=e107]:
                - text: Afterwards, it should be enough to read the
                - emphasis [ref=e108]: Quickstart
                - text: chapter of the NVIDIA Nsight Compute or NVIDIA Nsight Compute CLI documentation, respectively, to start using the tools.
              - generic [ref=e109]:
                - heading "2.1.1. Profiling Applications " [level=3] [ref=e110]:
                  - text: 2.1.1. Profiling Applications
                  - link "" [ref=e111] [cursor=pointer]:
                    - /url: "#profiling-applications"
                - paragraph [ref=e112]: During regular execution, a CUDA application process will be launched by the user. It communicates directly with the CUDA user-mode driver, and potentially with the CUDA runtime library.
                - figure "Regular Application Execution " [ref=e113]:
                  - img "../_images/regular-application-process.png" [ref=e114]
                  - paragraph [ref=e116]:
                    - text: Regular Application Execution
                    - link "" [ref=e117] [cursor=pointer]:
                      - /url: "#id10"
                - paragraph [ref=e118]: When profiling an application with NVIDIA Nsight Compute, the behavior is different. The user launches the NVIDIA Nsight Compute frontend (either the UI or the CLI) on the host system, which in turn starts the actual application as a new process on the target system. While host and target are often the same machine, the target can also be a remote system with a potentially different operating system.
                - paragraph [ref=e119]: The tool inserts its measurement libraries into the application process, which allow the profiler to intercept communication with the CUDA user-mode driver. In addition, when a kernel launch is detected, the libraries can collect the requested performance metrics from the GPU. The results are then transferred back to the frontend.
                - figure "Profiled Application Execution " [ref=e120]:
                  - img "../_images/profiled-process.png" [ref=e121]
                  - paragraph [ref=e123]:
                    - text: Profiled Application Execution
                    - link "" [ref=e124] [cursor=pointer]:
                      - /url: "#id11"
            - generic [ref=e125]:
              - heading "2.2. Metric Collection " [level=2] [ref=e126]:
                - text: 2.2. Metric Collection
                - link "" [ref=e127] [cursor=pointer]:
                  - /url: "#metric-collection"
              - paragraph [ref=e128]:
                - text: Collection of performance metrics is the key feature of NVIDIA Nsight Compute. Since there is a huge list of metrics available, it is often easier to use some of the tool’s pre-defined
                - link "sets or sections" [ref=e129] [cursor=pointer]:
                  - /url: index.html#sets-and-sections
                - text: to collect a commonly used subset. Users are free to adjust which metrics are collected for which kernels as needed, but it is important to keep in mind the
                - link "Overhead" [ref=e130] [cursor=pointer]:
                  - /url: index.html#overhead
                - text: associated with data collection.
              - generic [ref=e131]:
                - heading "2.2.1. Sets and Sections " [level=3] [ref=e132]:
                  - text: 2.2.1. Sets and Sections
                  - link "" [ref=e133] [cursor=pointer]:
                    - /url: "#sets-and-sections"
                - paragraph [ref=e134]:
                  - text: NVIDIA Nsight Compute uses
                  - emphasis [ref=e135]: Section Sets
                  - text: (short
                  - emphasis [ref=e136]: sets
                  - text: ) to decide, on a very high level, the number of metrics to be collected. Each set includes one or more
                  - emphasis [ref=e137]: Sections
                  - text: ", with each section specifying several logically associated metrics. For example, one section might include only high-level SM and memory utilization metrics, while another could include metrics associated with the memory units, or the HW scheduler."
                - paragraph [ref=e138]:
                  - text: The number and type of metrics specified by a section has significant impact on the overhead during profiling. To allow you to quickly choose between a fast, less detailed profile and a slower, more comprehensive analysis, you can select the respective section set. See
                  - link "Overhead" [ref=e139] [cursor=pointer]:
                    - /url: index.html#overhead
                  - text: for more information on profiling overhead.
                - paragraph [ref=e140]:
                  - text: By default, a relatively small number of metrics is collected. Those mostly include high-level utilization information as well as static launch and occupancy data. The latter two are regularly available without replaying the kernel launch. The
                  - code [ref=e141]: basic
                  - text: set is collected when no
                  - code [ref=e142]: "--set"
                  - text: ","
                  - code [ref=e143]: "--section"
                  - text: and no
                  - code [ref=e144]: "--metrics"
                  - text: options are passed on the command line. The full set of sections can be collected with
                  - code [ref=e145]: "--set full"
                  - text: .
                - paragraph [ref=e146]:
                  - text: Use
                  - code [ref=e147]: "--list-sets"
                  - text: to see the list of currently available sets. Use
                  - code [ref=e148]: "--list-sections"
                  - text: to see the list of currently available sections. The default search directory and the location of pre-defined section files are also called
                  - code [ref=e149]: sections/
                  - text: . All related command line options can be found in the NVIDIA Nsight Compute CLI documentation.
                - paragraph [ref=e150]:
                  - text: A file named
                  - code [ref=e151]: .ncu-ignore
                  - text: may be placed in any directory to have its contents ignored when the tool looks for section (and rule) files. When adding section directories
                  - link "recursively" [ref=e152] [cursor=pointer]:
                    - /url: ../NsightComputeCli/index.html#command-line-options-profile
                  - text: ", even if the file is present, sub-directories are still searched."
              - generic [ref=e153]:
