                - generic [ref=e566]:
                  - heading "Application Range Replay " [level=4] [ref=e567]:
                    - text: Application Range Replay
                    - link "" [ref=e568] [cursor=pointer]:
                      - /url: "#application-range-replay"
                  - paragraph [ref=e569]:
                    - text: In
                    - emphasis [ref=e570]: Application Range Replay
                    - text: ", all requested metrics in NVIDIA Nsight Compute are grouped into one or more passes. Similar to"
                    - link "Range Replay" [ref=e571] [cursor=pointer]:
                      - /url: index.html#range-replay
                    - text: ", metrics are not associated with individual kernels but with the entire selected range. This allows the tool to execute workloads (kernels, CUDA graphs, …) without serialization and thereby supports profiling workloads that must be run concurrently for correctness or performance reasons."
                  - paragraph [ref=e572]: In contrast to Range Replay, the range is not explicitly captured and executed directly for each pass, but instead the entire application is re-run multiple times, with one pass collected for each range in every application execution. This has the benefit that no application state must be observed and captured for each range and API calls within the range do not need to be supported explicitly, as correct execution of the range is handled by the application itself.
                  - paragraph [ref=e573]:
                    - text: Defining ranges to profile is identical to
                    - link "Range Replay" [ref=e574] [cursor=pointer]:
                      - /url: index.html#range-replay-define-range
                    - text: . The CUDA context for which the range should be profiled must be current to the thread defining the start of the range and must be active for the entire range.
                  - figure "Execution with Application Range Replay. A range of workloads is replayed by re-running the entire application without modifying interactions or saving and restoring memory. " [ref=e575]:
                    - img "../_images/replay-application-range.png" [ref=e576]
                    - paragraph [ref=e578]:
                      - text: Execution with Application Range Replay. A range of workloads is replayed by re-running the entire application without modifying interactions or saving and restoring memory.
                      - link "" [ref=e579] [cursor=pointer]:
                        - /url: "#id19"
                - generic [ref=e580]:
                  - heading "Graph Profiling " [level=4] [ref=e581]:
                    - text: Graph Profiling
                    - link "" [ref=e582] [cursor=pointer]:
                      - /url: "#graph-profiling"
                  - paragraph [ref=e583]:
                    - text: In multiple replay modes, NVIDIA Nsight Compute can profile CUDA graphs as single workload entities, rather than profile individual kernel nodes. The behavior can be toggled in the respective
                    - link "command line" [ref=e584] [cursor=pointer]:
                      - /url: ../NsightComputeCli/index.html#command-line-options-profile
                    - text: or
                    - link "UI" [ref=e585] [cursor=pointer]:
                      - /url: ../NsightCompute/index.html#connection-activity-interactive
                    - text: options.
                  - paragraph [ref=e586]: "The primary use cases for enabling this mode are:"
                  - list [ref=e587]:
                    - listitem [ref=e588]:
                      - paragraph [ref=e589]: Profile graphs that include mandatory concurrent kernel nodes.
                    - listitem [ref=e590]:
                      - paragraph [ref=e591]: Profile graphs that include device-sided graph launches.
                    - listitem [ref=e592]:
                      - paragraph [ref=e593]: Profile graph behavior more accurately across multiple kernel node launches, as caches are not purged in between nodes.
                  - paragraph [ref=e594]: Note that when graph profiling is enabled, certain metrics such as instruction-level source metrics are not available. This then also applies to kernels profiled outside of graphs.
