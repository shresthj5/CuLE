                - paragraph [ref=e1262]: Components are not always present. Most top-level counters have no qualifiers. Subunit and pipestage may be absent where irrelevant, or there may be many subunit specifiers for detailed counters.
                - paragraph [ref=e1263]: Cycle Metrics
                - paragraph [ref=e1264]:
                  - text: Counters using the term
                  - code [ref=e1265]: cycles
                  - text: "in the name report the number of cycles in the unit’s clock domain. Unit-level cycle metrics include:"
                - list [ref=e1266]:
                  - listitem [ref=e1267]:
                    - paragraph [ref=e1268]:
                      - code [ref=e1269]: unit__cycles_elapsed
                      - text: ": The number of cycles within a range. The cycles’ DimUnits are specific to the unit’s clock domain."
                  - listitem [ref=e1270]:
                    - paragraph [ref=e1271]:
                      - code [ref=e1272]: unit__cycles_active
                      - text: ": The number of cycles where the unit was processing data."
                  - listitem [ref=e1273]:
                    - paragraph [ref=e1274]:
                      - code [ref=e1275]: unit__cycles_stalled
                      - text: ": The number of cycles where the unit was unable to process new data because its output interface was blocked."
                  - listitem [ref=e1276]:
                    - paragraph [ref=e1277]:
                      - code [ref=e1278]: unit__cycles_idle
                      - text: ": The number of cycles where the unit was idle."
                - paragraph [ref=e1279]: "Interface-level cycle counters are often (not always) available in the following variations:"
                - list [ref=e1280]:
                  - listitem [ref=e1281]:
                    - paragraph [ref=e1282]:
                      - code [ref=e1283]: unit__(interface)_active
                      - text: ": Cycles where data was transferred from source-unit to destination-unit."
                  - listitem [ref=e1284]:
                    - paragraph [ref=e1285]:
                      - code [ref=e1286]: unit__(interface)_stalled
                      - text: ": Cycles where the source-unit had data, but the destination-unit was unable to accept data."
                - paragraph [ref=e1287]: Instanced Metrics
                - paragraph [ref=e1288]: Metrics collected with NVIDIA Nsight Compute can have a single (aggregate) value, multiple instance values, or both. Instances allow the metric to have multiple sub-values, e.g. representing the value of a source metric at each instruction offset. If a metric has instance values, it often also has a correlation ID for each instance. Correlation IDs and values form a mapping that allows the tool to correlate the values within a context. For source metrics, that context is commonly the address ranges of the functions executed as part of the workload.
                - paragraph [ref=e1289]:
                  - text: You can find which metrics have instance values in the
                  - link "Metrics Reference" [ref=e1290] [cursor=pointer]:
                    - /url: index.html#metrics-reference__metrics-ref-source
                  - text: . In the UI, the
                  - link "Metric Details" [ref=e1291] [cursor=pointer]:
                    - /url: ../NsightCompute/index.html#tool-window-metric-details
                  - text: tool window can be used to conveniently view correlation IDs and instance values for each metric. Also, both the UI and the command line interface provide options to show instance values in addition to a metric aggregate where applicable.
