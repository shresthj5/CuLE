              - paragraph [ref=e2827]: In this case, no warp diverges because the controlling condition is perfectly aligned with the warps.
              - paragraph [ref=e2828]: For branches including just a few instructions, warp divergence generally results in marginal performance losses. For example, the compiler may use predication to avoid an actual branch. Instead, all instructions are scheduled, but a per-thread condition code or predicate controls which threads execute the instructions. Threads with a false predicate do not write results, and also do not evaluate addresses or read operands.
              - paragraph [ref=e2829]:
                - text: Starting with the Volta architecture, Independent Thread Scheduling allows a warp to remain diverged outside of the data-dependent conditional block. An explicit
