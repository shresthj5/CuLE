                - paragraph [ref=e2253]:
                  - strong [ref=e2254]: Single-Precision Floating-Point Square Root
                - paragraph [ref=e2255]: Single-precision floating-point square root is implemented as a reciprocal square root followed by a reciprocal instead of a reciprocal square root followed by a multiplication so that it gives correct results for 0 and infinity.
                - paragraph [ref=e2256]:
                  - strong [ref=e2257]: Sine and Cosine
                - paragraph [ref=e2258]:
                  - code [ref=e2259]: sinf(x)
                  - text: ","
                  - code [ref=e2260]: cosf(x)
                  - text: ","
                  - code [ref=e2261]: tanf(x)
                  - text: ","
                  - code [ref=e2262]: sincosf(x)
                  - text: ", and corresponding double-precision instructions are much more expensive and even more so if the argument x is large in magnitude."
                - paragraph [ref=e2263]:
                  - text: More precisely, the argument reduction code (see the
                  - link "CUDA C++ Programming Guide" [ref=e2264] [cursor=pointer]:
                    - /url: https://docs.nvidia.com/cuda/cuda-c-programming-guide/index.html#mathematical-functions-appendix
                  - text: for implementation) comprises two code paths referred to as the fast path and the slow path, respectively.
                - paragraph [ref=e2265]: The fast path is used for arguments sufficiently small in magnitude and essentially consists of a few multiply-add operations. The slow path is used for arguments large in magnitude and consists of lengthy computations required to achieve correct results over the entire argument range.
                - paragraph [ref=e2266]:
                  - text: At present, the argument reduction code for the trigonometric functions selects the fast path for arguments whose magnitude is less than
                  - code [ref=e2267]: 105615.0f
                  - text: for the single-precision functions, and less than
                  - code [ref=e2268]: "2147483648.0"
                  - text: for the double-precision functions.
                - paragraph [ref=e2269]:
                  - text: As the slow path requires more registers than the fast path, an attempt has been made to reduce register pressure in the slow path by storing some intermediate variables in local memory, which may affect performance because of local memory high latency and bandwidth (see the
                  - link "CUDA C++ Programming Guide" [ref=e2270] [cursor=pointer]:
                    - /url: https://docs.nvidia.com/cuda/cuda-c-programming-guide/index.html#device-memory-accesses
                  - text: ). At present, 28 bytes of local memory are used by single-precision functions, and 44 bytes are used by double-precision functions. However, the exact amount is subject to change.
                - paragraph [ref=e2271]: Due to the lengthy computations and use of local memory in the slow path, the throughput of these trigonometric functions is lower by one order of magnitude when the slow path reduction is required as opposed to the fast path reduction.
                - paragraph [ref=e2272]:
                  - strong [ref=e2273]: Integer Arithmetic
                - paragraph [ref=e2274]:
                  - text: "Integer division and modulo operation are costly as they compile to up to 20 instructions. They can be replaced with bitwise operations in some cases: If"
