                  - link "CUDA C++ Programming Guide" [ref=e2244] [cursor=pointer]:
                    - /url: https://docs.nvidia.com/cuda/cuda-c-programming-guide/index.html#mathematical-functions-appendix-intrinsic-functions
                  - text: ) provides faster single-precision floating-point division than the division operator.
                - paragraph [ref=e2245]:
                  - strong [ref=e2246]: Single-Precision Floating-Point Reciprocal Square Root
                - paragraph [ref=e2247]:
                  - text: To preserve IEEE-754 semantics the compiler can optimize
                  - code [ref=e2248]: 1.0/sqrtf()
                  - text: into
                  - code [ref=e2249]: rsqrtf()
                  - text: only when both reciprocal and square root are approximate, (i.e., with
                  - code [ref=e2250]: "-prec-div=false"
                  - text: and
