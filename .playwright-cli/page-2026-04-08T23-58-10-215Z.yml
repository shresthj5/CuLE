            - generic [ref=e3473]:
              - heading "18.4. Compiler JIT Cache Management Tools " [level=2] [ref=e3474]:
                - text: 18.4. Compiler JIT Cache Management Tools
                - link "" [ref=e3475] [cursor=pointer]:
                  - /url: "#compiler-jit-cache-management-tools"
              - paragraph [ref=e3476]:
                - text: Any PTX device code loaded by an application at runtime is compiled further to binary code by the device driver. This is called
                - emphasis [ref=e3477]: just-in-time compilation
                - text: (
                - emphasis [ref=e3478]: JIT
                - text: ). Just-in-time compilation increases application load time but allows applications to benefit from latest compiler improvements. It is also the only way for applications to run on devices that did not exist at the time the application was compiled.
              - paragraph [ref=e3479]: When JIT compilation of PTX device code is used, the NVIDIA driver caches the resulting binary code on disk. Some aspects of this behavior such as cache location and maximum cache size can be controlled via the use of environment variables; see Just in Time Compilation of the CUDA C++ Programming Guide.
            - generic [ref=e3480]:
              - heading "18.5. CUDA_VISIBLE_DEVICES " [level=2] [ref=e3481]:
                - text: 18.5. CUDA_VISIBLE_DEVICES
                - link "" [ref=e3482] [cursor=pointer]:
                  - /url: "#cuda-visible-devices"
              - paragraph [ref=e3483]:
                - text: It is possible to rearrange the collection of installed CUDA devices that will be visible to and enumerated by a CUDA application prior to the start of that application by way of the
                - code [ref=e3484]: CUDA_VISIBLE_DEVICES
                - text: environment variable.
              - paragraph [ref=e3485]:
                - text: Devices to be made visible to the application should be included as a comma-separated list in terms of the system-wide list of enumerable devices. For example, to use only devices 0 and 2 from the system-wide list of devices, set
                - code [ref=e3486]: CUDA_VISIBLE_DEVICES=0,2
                - text: before launching the application. The application will then enumerate these devices as device 0 and device 1, respectively.
