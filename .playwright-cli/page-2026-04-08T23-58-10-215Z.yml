                      - text: "Figure 5 : Performance of offsetCopy kernel"
                      - link "" [ref=e1241] [cursor=pointer]:
                        - /url: "#performance-offsetcopy-kernel-figure"
                  - paragraph [ref=e1242]:
                    - text: For the NVIDIA Tesla V100, global memory accesses with no offset or with offsets that are multiples of 8 words result in four 32-byte transactions. The achieved bandwidth is approximately 790 GB/s. Otherwise, five 32-byte segments are loaded per warp, and we would expect approximately 4/5
                    - superscript [ref=e1243]: th
                    - text: of the memory throughput achieved with no offsets.
                  - paragraph [ref=e1244]:
                    - text: In this particular example, the offset memory throughput achieved is, however, approximately 9/10
                    - superscript [ref=e1245]: th
                    - text: ", because adjacent warps reuse the cache lines their neighbors fetched. So while the impact is still evident it is not as large as we might have expected. It would have been more so if adjacent warps had not exhibited such a high degree of reuse of the over-fetched cache lines."
                - generic [ref=e1246]:
                  - heading "10.2.1.4. Strided Accesses " [level=4] [ref=e1247]:
                    - text: 10.2.1.4. Strided Accesses
                    - link "" [ref=e1248] [cursor=pointer]:
                      - /url: "#strided-accesses"
                  - paragraph [ref=e1249]: As seen above, in the case of misaligned sequential accesses, caches help to alleviate the performance impact. It may be different with non-unit-strided accesses, however, and this is a pattern that occurs frequently when dealing with multidimensional data or matrices. For this reason, ensuring that as much as possible of the data in each cache line fetched is actually used is an important part of performance optimization of memory accesses on these devices.
                  - paragraph [ref=e1250]:
                    - text: To illustrate the effect of strided access on effective bandwidth, see the kernel
                    - code [ref=e1251]: strideCopy()
                    - text: in
                    - link "A kernel to illustrate non-unit stride data copy" [ref=e1252] [cursor=pointer]:
                      - /url: "#a-kernel-to-illustrate-non-unit-stride-data-copy"
                    - text: ", which copies data with a stride of stride elements between threads from"
                    - code [ref=e1253]: idata
                    - text: to
                    - code [ref=e1254]: odata
                    - text: .
                  - paragraph [ref=e1255]: A kernel to illustrate non-unit stride data copy
                  - generic [ref=e1257]:
                    - generic [ref=e1258]:
                      - text: __global__ void strideCopy(float *odata, float* idata, int stride)
                      - text: "{"
                      - text: int xid = (blockIdx.x*blockDim.x + threadIdx.x)*stride;
                      - text: odata[xid] = idata[xid];
                      - text: "}"
                    - button "Copy to clipboard" [ref=e1259] [cursor=pointer]:
                      - img "Copy to clipboard" [ref=e1260]
                  - paragraph [ref=e1264]:
                    - link "Figure 6" [ref=e1265] [cursor=pointer]:
                      - /url: "#adjacent-threads-accessing-memory-with-stride-of-2-figure"
                    - text: illustrates such a situation; in this case, threads within a warp access words in memory with a stride of 2. This action leads to a load of eight L2 cache segments per warp on the Tesla V100 (compute capability 7.0).
                  - 'figure "Figure 6 : Adjacent threads accessing memory with a stride of 2 " [ref=e1266]':
                    - img "Adjacent threads accessing memory with a stride of 2" [ref=e1267]
                    - paragraph [ref=e1269]:
                      - text: "Figure 6 : Adjacent threads accessing memory with a stride of 2"
                      - link "" [ref=e1270] [cursor=pointer]:
                        - /url: "#adjacent-threads-accessing-memory-with-stride-of-2-figure"
                  - paragraph [ref=e1271]:
                    - text: A stride of 2 results in a 50% of load/store efficiency since half the elements in the transaction are not used and represent wasted bandwidth. As the stride increases, the effective bandwidth decreases until the point where 32 32-byte segments are loaded for the 32 threads in a warp, as indicated in
                    - link "Figure 7" [ref=e1272] [cursor=pointer]:
                      - /url: "#performance-of-stridecopy-kernel-figure"
                    - text: .
                  - 'figure "Figure 7 : Performance of strideCopy kernel " [ref=e1273]':
                    - img "Performance of strideCopy kernel" [ref=e1274]
                    - paragraph [ref=e1276]:
                      - text: "Figure 7 : Performance of strideCopy kernel"
                      - link "" [ref=e1277] [cursor=pointer]:
                        - /url: "#performance-of-stridecopy-kernel-figure"
                  - paragraph [ref=e1278]:
                    - text: As illustrated in
                    - link "Figure 7" [ref=e1279] [cursor=pointer]:
                      - /url: "#performance-of-stridecopy-kernel-figure"
                    - text: ", non-unit-stride global memory accesses should be avoided whenever possible. One method for doing so utilizes shared memory, which is discussed in the next section."
              - generic [ref=e1280]:
                - heading "10.2.2. L2 Cache " [level=3] [ref=e1281]:
                  - text: 10.2.2. L2 Cache
                  - link "" [ref=e1282] [cursor=pointer]:
                    - /url: "#l2-cache"
                - paragraph [ref=e1283]: Starting with CUDA 11.0, devices of compute capability 8.0 and above have the capability to influence persistence of data in the L2 cache. Because L2 cache is on-chip, it potentially provides higher bandwidth and lower latency accesses to global memory.
                - paragraph [ref=e1284]:
                  - text: For more details refer to the L2 Access Management section in the
                  - link "CUDA C++ Programming Guide" [ref=e1285] [cursor=pointer]:
                    - /url: https://docs.nvidia.com/cuda/cuda-c-programming-guide/index.html#L2_access_intro
                  - text: .
                - generic [ref=e1286]:
                  - heading "10.2.2.1. L2 Cache Access Window " [level=4] [ref=e1287]:
                    - text: 10.2.2.1. L2 Cache Access Window
                    - link "" [ref=e1288] [cursor=pointer]:
                      - /url: "#l2-cache-access-window"
                  - paragraph [ref=e1289]:
                    - text: When a CUDA kernel accesses a data region in the global memory repeatedly, such data accesses can be considered to be
                    - emphasis [ref=e1290]: persisting
                    - text: . On the other hand, if the data is only accessed once, such data accesses can be considered to be
                    - emphasis [ref=e1291]: streaming
                    - text: . A portion of the L2 cache can be set aside for persistent accesses to a data region in global memory. If this set-aside portion is not used by persistent accesses, then streaming or normal data accesses can use it.
                  - paragraph [ref=e1292]: "The L2 cache set-aside size for persisting accesses may be adjusted, within limits:"
                  - generic [ref=e1294]:
                    - generic [ref=e1295]:
                      - text: cudaGetDeviceProperties(&prop, device_id);
                      - text: cudaDeviceSetLimit(cudaLimitPersistingL2CacheSize, prop.persistingL2CacheMaxSize); /* Set aside max possible size of L2 cache for persisting accesses */
                    - button "Copy to clipboard" [ref=e1296] [cursor=pointer]:
                      - img "Copy to clipboard" [ref=e1297]
                  - paragraph [ref=e1301]: Mapping of user data to L2 set-aside portion can be controlled using an access policy window on a CUDA stream or CUDA graph kernel node. The example below shows how to use the access policy window on a CUDA stream.
                  - generic [ref=e1303]:
                    - generic [ref=e1304]: cudaStreamAttrValue stream_attribute; // Stream level attributes data structure stream_attribute.accessPolicyWindow.base_ptr = reinterpret_cast<void*>(ptr); // Global Memory data pointer stream_attribute.accessPolicyWindow.num_bytes = num_bytes; // Number of bytes for persisting accesses. // (Must be less than cudaDeviceProp::accessPolicyMaxWindowSize) stream_attribute.accessPolicyWindow.hitRatio = 1.0; // Hint for L2 cache hit ratio for persisting accesses in the num_bytes region stream_attribute.accessPolicyWindow.hitProp = cudaAccessPropertyPersisting; // Type of access property on cache hit stream_attribute.accessPolicyWindow.missProp = cudaAccessPropertyStreaming; // Type of access property on cache miss. //Set the attributes to a CUDA stream of type cudaStream_t cudaStreamSetAttribute(stream, cudaStreamAttributeAccessPolicyWindow, &stream_attribute);
                    - button "Copy to clipboard" [ref=e1305] [cursor=pointer]:
                      - img "Copy to clipboard" [ref=e1306]
                  - paragraph [ref=e1310]:
                    - text: The access policy window requires a value for
                    - code [ref=e1311]: hitRatio
                    - text: and
                    - code [ref=e1312]: num_bytes
                    - text: . Depending on the value of the
                    - code [ref=e1313]: num_bytes
                    - text: parameter and the size of L2 cache, one may need to tune the value of
                    - code [ref=e1314]: hitRatio
                    - text: to avoid thrashing of L2 cache lines.
                - generic [ref=e1315]:
                  - heading "10.2.2.2. Tuning the Access Window Hit-Ratio " [level=4] [ref=e1316]:
                    - text: 10.2.2.2. Tuning the Access Window Hit-Ratio
                    - link "" [ref=e1317] [cursor=pointer]:
                      - /url: "#tuning-the-access-window-hit-ratio"
                  - paragraph [ref=e1318]:
                    - text: The
                    - code [ref=e1319]: hitRatio
                    - text: parameter can be used to specify the fraction of accesses that receive the
                    - code [ref=e1320]: hitProp
                    - text: property. For example, if the
                    - code [ref=e1321]: hitRatio
                    - text: value is 0.6, 60% of the memory accesses in the global memory region [ptr..ptr+num_bytes) have the persisting property and 40% of the memory accesses have the streaming property. To understand the effect of
                    - code [ref=e1322]: hitRatio
                    - text: and
                    - code [ref=e1323]: num_bytes
                    - text: ", we use a sliding window micro benchmark."
                  - paragraph [ref=e1324]:
                    - text: This microbenchmark uses a 1024 MB region in GPU global memory. First, we set aside 30 MB of the L2 cache for persisting accesses using
                    - code [ref=e1325]: cudaDeviceSetLimit()
                    - text: ", as discussed above. Then, as shown in the figure below, we specify that the accesses to the first"
                    - code [ref=e1326]: freqSize * sizeof(int)
                    - text: bytes of the memory region are persistent. This data will thus use the L2 set-aside portion. In our experiment, we vary the size of this persistent data region from 10 MB to 60 MB to model various scenarios where data fits in or exceeds the available L2 set-aside portion of 30 MB. Note that the NVIDIA Tesla A100 GPU has 40 MB of total L2 cache capacity. Accesses to the remaining data of the memory region (i.e., streaming data) are considered normal or streaming accesses and will thus use the remaining 10 MB of the non set-aside L2 portion (unless part of the L2 set-aside portion is unused).
                  - 'figure "Figure 8 : Mapping Persistent data accesses to set-aside L2 in sliding window experiment " [ref=e1327]':
                    - link "Mapping Persistent data accesses to set-aside L2 in sliding window experiment" [ref=e1328] [cursor=pointer]:
                      - /url: _images/sliding-window-l2.png
                      - img "Mapping Persistent data accesses to set-aside L2 in sliding window experiment" [ref=e1329]
                    - paragraph [ref=e1331]:
                      - text: "Figure 8 : Mapping Persistent data accesses to set-aside L2 in sliding window experiment"
                      - link "" [ref=e1332] [cursor=pointer]:
                        - /url: "#l2-cache-hit-ratio-sliding-window-l2"
                  - paragraph [ref=e1333]: Consider the following kernel code and access window parameters, as the implementation of the sliding window experiment.
                  - generic [ref=e1335]:
                    - generic [ref=e1336]:
                      - text: "__global__ void kernel(int *data_persistent, int *data_streaming, int dataSize, int freqSize) {"
                      - text: int tid = blockIdx.x * blockDim.x + threadIdx.x;
                      - text: /*Each CUDA thread accesses one element in the persistent data section and one element in the streaming data section. Because the size of the persistent memory region (freqSize * sizeof(int) bytes) is much smaller than the size of the streaming memory region (dataSize * sizeof(int) bytes), data in the persistent region is accessed more frequently*/
                      - text: data_persistent[tid % freqSize] = 2 * data_persistent[tid % freqSize];
                      - text: data_streaming[tid % dataSize] = 2 * data_streaming[tid % dataSize];
                      - text: "}"
                      - text: stream_attribute.accessPolicyWindow.base_ptr = reinterpret_cast<void*>(data_persistent);
                      - text: stream_attribute.accessPolicyWindow.num_bytes = freqSize * sizeof(int); //Number of bytes for persisting accesses in range 10-60 MB stream_attribute.accessPolicyWindow.hitRatio = 1.0; //Hint for cache hit ratio. Fixed value 1.0
                    - button "Copy to clipboard" [ref=e1337] [cursor=pointer]:
                      - img "Copy to clipboard" [ref=e1338]
                  - paragraph [ref=e1342]: The performance of the above kernel is shown in the chart below. When the persistent data region fits well into the 30 MB set-aside portion of the L2 cache, a performance increase of as much as 50% is observed. However, once the size of this persistent data region exceeds the size of the L2 set-aside cache portion, approximately 10% performance drop is observed due to thrashing of L2 cache lines.
                  - 'figure "Figure 9 : The performance of the sliding-window benchmark with fixed hit-ratio of 1.0 " [ref=e1343]':
                    - link "The performance of the sliding-window benchmark with fixed hit-ratio of 1.0" [ref=e1344] [cursor=pointer]:
