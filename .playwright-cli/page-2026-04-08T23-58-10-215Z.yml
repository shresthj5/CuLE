                  - text: is simply a sequence of operations that are performed in order on the device. Operations in different streams can be interleaved and in some cases overlapped - a property that can be used to hide data transfers between the host and the device.
                - paragraph [ref=e898]:
                  - text: Asynchronous transfers enable overlap of data transfers with computation in two different ways. On all CUDA-enabled devices, it is possible to overlap host computation with asynchronous data transfers and with device computations. For example,
                  - link "Asynchronous and Overlapping Transfers with Computation" [ref=e899] [cursor=pointer]:
