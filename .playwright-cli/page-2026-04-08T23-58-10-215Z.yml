                - paragraph [ref=e1825]:
                  - strong [ref=e1826]: "Medium Priority:"
                  - text: To hide latency arising from register dependencies, maintain sufficient numbers of active threads per multiprocessor (i.e., sufficient occupancy).
              - paragraph [ref=e1827]:
                - text: Register dependencies arise when an instruction uses a result stored in a register written by an instruction before it. The latency of most arithmetic instructions is typically 4 cycles on devices of compute capability 7.0. So threads must wait approximatly 4 cycles before using an arithmetic result. However, this latency can be completely hidden by the execution of threads in other warps. See
                - link "Registers" [ref=e1828] [cursor=pointer]:
