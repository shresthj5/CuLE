                  - /url: "#nvcc"
              - paragraph [ref=e3512]:
                - text: The NVIDIA
                - code [ref=e3513]: nvcc
                - text: compiler driver converts
                - code [ref=e3514]: .cu
                - text: "files into C++ for the host system and CUDA assembly or binary instructions for the device. It supports a number of command-line parameters, of which the following are especially useful for optimization and related best practices:"
              - list [ref=e3515]:
                - listitem [ref=e3516]:
                  - paragraph [ref=e3517]:
                    - code [ref=e3518]: "-maxrregcount=N"
                    - text: specifies the maximum number of registers kernels can use at a per-file level. See
                    - link "Register Pressure" [ref=e3519] [cursor=pointer]:
                      - /url: "#register-pressure"
                    - text: . (See also the
                    - code [ref=e3520]: __launch_bounds__
                    - text: qualifier discussed in Execution Configuration of the CUDA C++ Programming Guide to control the number of registers used on a per-kernel basis.)
                - listitem [ref=e3521]:
                  - paragraph [ref=e3522]:
                    - code [ref=e3523]: "--ptxas-options=-v"
                    - text: or
                    - code [ref=e3524]: "-Xptxas=-v"
                    - text: lists per-kernel register, shared, and constant memory usage.
                - listitem [ref=e3525]:
                  - paragraph [ref=e3526]:
                    - code [ref=e3527]: "-ftz=true"
                    - text: (denormalized numbers are flushed to zero)
                - listitem [ref=e3528]:
                  - paragraph [ref=e3529]:
                    - code [ref=e3530]: "-prec-div=false"
                    - text: (less precise division)
                - listitem [ref=e3531]:
                  - paragraph [ref=e3532]:
                    - code [ref=e3533]: "-prec-sqrt=false"
                    - text: (less precise square root)
                - listitem [ref=e3534]:
                  - paragraph [ref=e3535]:
                    - code [ref=e3536]: "-use_fast_math"
                    - text: compiler option of
                    - code [ref=e3537]: nvcc
                    - text: coerces every
                    - code [ref=e3538]: functionName()
                    - text: call to the equivalent
                    - code [ref=e3539]: __functionName()
                    - text: call. This makes the code run faster at the cost of diminished precision and accuracy. See
                    - link "Math Libraries" [ref=e3540] [cursor=pointer]:
                      - /url: "#math-libraries"
                    - text: .
