      - main [ref=e84]:
        - generic [ref=e85]:
          - paragraph [ref=e86]: CUDA C++ Best Practices Guide
          - generic [ref=e87]:
            - heading "1. Overview " [level=1] [ref=e88]:
              - text: 1. Overview
              - link "" [ref=e89] [cursor=pointer]:
                - /url: "#overview"
            - paragraph [ref=e90]: The CUDA C++ Best Practices Guide provides practical guidelines for writing high-performance CUDA applications. It covers optimization strategies across memory usage, parallel execution, and instruction-level efficiency. The guide helps developers identify performance bottlenecks, leverage GPU architecture effectively, and apply profiling tools to fine-tune applications. It’s an essential resource for maximizing throughput and achieving scalable, efficient CUDA programs.
          - generic [ref=e91]:
            - heading "2. Preface " [level=1] [ref=e92]:
              - text: 2. Preface
              - link "" [ref=e93] [cursor=pointer]:
                - /url: "#preface"
            - paragraph [ref=e94]:
              - text: This Best Practices Guide is a manual to help developers obtain the best performance from NVIDIA
              - superscript [ref=e95]: ®
              - text: CUDA
              - superscript [ref=e96]: ®
              - text: GPUs. It presents established parallelization and optimization techniques and explains coding metaphors and idioms that can greatly simplify programming for CUDA-capable GPU architectures.
            - paragraph [ref=e97]: While the contents can be used as a reference manual, you should be aware that some topics are revisited in different contexts as various programming and configuration topics are explored. As a result, it is recommended that first-time readers proceed through the guide sequentially. This approach will greatly improve your understanding of effective programming practices and enable you to better use the guide for reference later.
            - generic [ref=e98]:
              - heading "2.1. Who Should Read This Guide? " [level=2] [ref=e99]:
                - text: 2.1. Who Should Read This Guide?
                - link "" [ref=e100] [cursor=pointer]:
                  - /url: "#who-should-read-this-guide"
              - paragraph [ref=e101]: The discussions in this guide all use the C++ programming language, so you should be comfortable reading C++ code.
              - paragraph [ref=e102]:
                - text: This guide refers to and relies on several other documents that you should have at your disposal for reference, all of which are available at no cost from the CUDA website
                - link "https://docs.nvidia.com/cuda/" [ref=e103] [cursor=pointer]:
                  - /url: https://docs.nvidia.com/cuda/
                - text: ". The following documents are especially important resources:"
              - list [ref=e104]:
                - listitem [ref=e105]:
                  - paragraph [ref=e106]: CUDA Installation Guide
                - listitem [ref=e107]:
                  - paragraph [ref=e108]: CUDA C++ Programming Guide
                - listitem [ref=e109]:
                  - paragraph [ref=e110]: CUDA Toolkit Reference Manual
              - paragraph [ref=e111]: In particular, the optimization section of this guide assumes that you have already successfully downloaded and installed the CUDA Toolkit (if not, please refer to the relevant CUDA Installation Guide for your platform) and that you have a basic familiarity with the CUDA C++ programming language and environment (if not, please refer to the CUDA C++ Programming Guide).
            - generic [ref=e112]:
              - heading "2.2. Assess, Parallelize, Optimize, Deploy " [level=2] [ref=e113]:
                - text: 2.2. Assess, Parallelize, Optimize, Deploy
                - link "" [ref=e114] [cursor=pointer]:
                  - /url: "#assess-parallelize-optimize-deploy"
              - paragraph [ref=e115]:
                - text: This guide introduces the
                - emphasis [ref=e116]: Assess, Parallelize, Optimize, Deploy(APOD)
                - text: design cycle for applications with the goal of helping application developers to rapidly identify the portions of their code that would most readily benefit from GPU acceleration, rapidly realize that benefit, and begin leveraging the resulting speedups in production as early as possible.
              - paragraph [ref=e117]: "APOD is a cyclical process: initial speedups can be achieved, tested, and deployed with only minimal initial investment of time, at which point the cycle can begin again by identifying further optimization opportunities, seeing additional speedups, and then deploying the even faster versions of the application into production."
              - figure [ref=e118]:
                - img "_images/apod-cycle.png" [ref=e119]
              - generic [ref=e120]:
                - heading "2.2.1. Assess " [level=3] [ref=e121]:
                  - text: 2.2.1. Assess
                  - link "" [ref=e122] [cursor=pointer]:
                    - /url: "#assess"
                - paragraph [ref=e123]: For an existing project, the first step is to assess the application to locate the parts of the code that are responsible for the bulk of the execution time. Armed with this knowledge, the developer can evaluate these bottlenecks for parallelization and start to investigate GPU acceleration.
                - paragraph [ref=e124]: By understanding the end-user’s requirements and constraints and by applying Amdahl’s and Gustafson’s laws, the developer can determine the upper bound of performance improvement from acceleration of the identified portions of the application.
              - generic [ref=e125]:
                - heading "2.2.2. Parallelize " [level=3] [ref=e126]:
                  - text: 2.2.2. Parallelize
                  - link "" [ref=e127] [cursor=pointer]:
                    - /url: "#parallelize"
                - paragraph [ref=e128]:
                  - text: Having identified the hotspots and having done the basic exercises to set goals and expectations, the developer needs to parallelize the code. Depending on the original code, this can be as simple as calling into an existing GPU-optimized library such as
                  - code [ref=e129]: cuBLAS
                  - text: ","
                  - code [ref=e130]: cuFFT
                  - text: ", or"
                  - code [ref=e131]: Thrust
                  - text: ", or it could be as simple as adding a few preprocessor directives as hints to a parallelizing compiler."
                - paragraph [ref=e132]: On the other hand, some applications’ designs will require some amount of refactoring to expose their inherent parallelism. As even CPU architectures will require exposing parallelism in order to improve or simply maintain the performance of sequential applications, the CUDA family of parallel programming languages (CUDA C++, CUDA Fortran, etc.) aims to make the expression of this parallelism as simple as possible, while simultaneously enabling operation on CUDA-capable GPUs designed for maximum parallel throughput.
              - generic [ref=e133]:
                - heading "2.2.3. Optimize " [level=3] [ref=e134]:
                  - text: 2.2.3. Optimize
                  - link "" [ref=e135] [cursor=pointer]:
                    - /url: "#optimize"
                - paragraph [ref=e136]: After each round of application parallelization is complete, the developer can move to optimizing the implementation to improve performance. Since there are many possible optimizations that can be considered, having a good understanding of the needs of the application can help to make the process as smooth as possible. However, as with APOD as a whole, program optimization is an iterative process (identify an opportunity for optimization, apply and test the optimization, verify the speedup achieved, and repeat), meaning that it is not necessary for a programmer to spend large amounts of time memorizing the bulk of all possible optimization strategies prior to seeing good speedups. Instead, strategies can be applied incrementally as they are learned.
                - paragraph [ref=e137]: Optimizations can be applied at various levels, from overlapping data transfers with computation all the way down to fine-tuning floating-point operation sequences. The available profiling tools are invaluable for guiding this process, as they can help suggest a next-best course of action for the developer’s optimization efforts and provide references into the relevant portions of the optimization section of this guide.
              - generic [ref=e138]:
                - heading "2.2.4. Deploy " [level=3] [ref=e139]:
                  - text: 2.2.4. Deploy
                  - link "" [ref=e140] [cursor=pointer]:
                    - /url: "#deploy"
                - paragraph [ref=e141]:
                  - text: Having completed the GPU acceleration of one or more components of the application it is possible to compare the outcome with the original expectation. Recall that the initial
                  - emphasis [ref=e142]: assess
                  - text: step allowed the developer to determine an upper bound for the potential speedup attainable by accelerating given hotspots.
                - paragraph [ref=e143]: Before tackling other hotspots to improve the total speedup, the developer should consider taking the partially parallelized implementation and carry it through to production. This is important for a number of reasons; for example, it allows the user to profit from their investment as early as possible (the speedup may be partial but is still valuable), and it minimizes risk for the developer and the user by providing an evolutionary rather than revolutionary set of changes to the application.
            - generic [ref=e144]:
              - heading "2.3. Recommendations and Best Practices " [level=2] [ref=e145]:
                - text: 2.3. Recommendations and Best Practices
                - link "" [ref=e146] [cursor=pointer]:
                  - /url: "#recommendations-and-best-practices"
              - paragraph [ref=e147]: Throughout this guide, specific recommendations are made regarding the design and implementation of CUDA C++ code. These recommendations are categorized by priority, which is a blend of the effect of the recommendation and its scope. Actions that present substantial improvements for most CUDA applications have the highest priority, while small optimizations that affect only very specific situations are given a lower priority.
              - paragraph [ref=e148]: Before implementing lower priority recommendations, it is good practice to make sure all higher priority recommendations that are relevant have already been applied. This approach will tend to provide the best results for the time invested and will avoid the trap of premature optimization.
              - paragraph [ref=e149]: The criteria of benefit and scope for establishing priority will vary depending on the nature of the program. In this guide, they represent a typical case. Your code might reflect different priority factors. Regardless of this possibility, it is good practice to verify that no higher-priority recommendations have been overlooked before undertaking lower-priority items.
              - generic [ref=e150]:
                - paragraph [ref=e151]:  Note
                - paragraph [ref=e152]:
                  - text: Code samples throughout the guide omit error checking for conciseness. Production code should, however, systematically check the error code returned by each API call and check for failures in kernel launches by calling
                  - code [ref=e153]: cudaGetLastError()
                  - text: .
            - generic [ref=e154]:
              - heading "2.4. Assessing Your Application " [level=2] [ref=e155]:
                - text: 2.4. Assessing Your Application
                - link "" [ref=e156] [cursor=pointer]:
                  - /url: "#assessing-your-application"
              - paragraph [ref=e157]: From supercomputers to mobile phones, modern processors increasingly rely on parallelism to provide performance. The core computational unit, which includes control, arithmetic, registers and typically some cache, is replicated some number of times and connected to memory via a network. As a result, all modern processors require parallel code in order to achieve good utilization of their computational power.
              - paragraph [ref=e158]: While processors are evolving to expose more fine-grained parallelism to the programmer, many existing applications have evolved either as serial codes or as coarse-grained parallel codes (for example, where the data is decomposed into regions processed in parallel, with sub-regions shared using MPI). In order to profit from any modern processor architecture, GPUs included, the first steps are to assess the application to identify the hotspots, determine whether they can be parallelized, and understand the relevant workloads both now and in the future.
          - generic [ref=e159]:
            - heading "3. Heterogeneous Computing " [level=1] [ref=e160]:
              - text: 3. Heterogeneous Computing
              - link "" [ref=e161] [cursor=pointer]:
                - /url: "#heterogeneous-computing"
            - paragraph [ref=e162]:
              - text: "CUDA programming involves running code on two different platforms concurrently: a"
              - emphasis [ref=e163]: host
              - text: system with one or more CPUs and one or more CUDA-enabled NVIDIA GPU
              - emphasis [ref=e164]: devices
              - text: .
            - paragraph [ref=e165]: While NVIDIA GPUs are frequently associated with graphics, they are also powerful arithmetic engines capable of running thousands of lightweight threads in parallel. This capability makes them well suited to computations that can leverage parallel execution.
            - paragraph [ref=e166]: However, the device is based on a distinctly different design from the host system, and it’s important to understand those differences and how they determine the performance of CUDA applications in order to use CUDA effectively.
            - generic [ref=e167]:
              - heading "3.1. Differences between Host and Device " [level=2] [ref=e168]:
                - text: 3.1. Differences between Host and Device
                - link "" [ref=e169] [cursor=pointer]:
                  - /url: "#differences-between-host-and-device"
              - paragraph [ref=e170]: "The primary differences are in threading model and in separate physical memories:"
              - generic [ref=e171]:
                - term [ref=e172]: Threading resources
                - definition [ref=e173]:
                  - paragraph [ref=e174]:
                    - text: Execution pipelines on host systems can support a limited number of concurrent threads. For example, servers that have two 32 core processors can run only 64 threads concurrently (or small multiple of that if the CPUs support simultaneous multithreading). By comparison, the
                    - emphasis [ref=e175]: smallest
                    - text: executable unit of parallelism on a CUDA device comprises 32 threads (termed a
                    - emphasis [ref=e176]: warp
                    - text: of threads). Modern NVIDIA GPUs can support up to 2048 active threads concurrently per multiprocessor (see Features and Specifications of the CUDA C++ Programming Guide) On GPUs with 80 multiprocessors, this leads to more than 160,000 concurrently active threads.
                - term [ref=e177]: Threads
                - definition [ref=e178]:
                  - paragraph [ref=e179]:
                    - text: Threads on a CPU are generally heavyweight entities. The operating system must swap threads on and off CPU execution channels to provide multithreading capability. Context switches (when two threads are swapped) are therefore slow and expensive. By comparison, threads on GPUs are extremely lightweight. In a typical system, thousands of threads are queued up for work (in warps of 32 threads each). If the GPU must wait on one warp of threads, it simply begins executing work on another. Because separate registers are allocated to all active threads, no swapping of registers or other state need occur when switching among GPU threads. Resources stay allocated to each thread until it completes its execution. In short, CPU cores are designed to
                    - emphasis [ref=e180]: minimize latency
                    - text: for a small number of threads at a time each, whereas GPUs are designed to handle a large number of concurrent, lightweight threads in order to
                    - emphasis [ref=e181]: maximize throughput
                    - text: .
                - term [ref=e182]: RAM
                - definition [ref=e183]:
                  - paragraph [ref=e184]:
                    - text: The host system and the device each have their own distinct attached physical memories
                    - link "1" [ref=e185] [cursor=pointer]:
                      - /url: "#fn1"
                    - text: . As the host and device memories are separated, items in the host memory must occasionally be communicated between device memory and host memory as described in
                    - link "What Runs on a CUDA-Enabled Device?" [ref=e186] [cursor=pointer]:
                      - /url: "#what-runs-on-cuda-enabled-device"
                    - text: .
              - paragraph [ref=e187]: "These are the primary hardware differences between CPU hosts and GPU devices with respect to parallel programming. Other differences are discussed as they arise elsewhere in this document. Applications composed with these differences in mind can treat the host and device together as a cohesive heterogeneous system wherein each processing unit is leveraged to do the kind of work it does best: sequential work on the host and parallel work on the device."
            - generic [ref=e188]:
              - heading "3.2. What Runs on a CUDA-Enabled Device? " [level=2] [ref=e189]:
                - text: 3.2. What Runs on a CUDA-Enabled Device?
                - link "" [ref=e190] [cursor=pointer]:
                  - /url: "#what-runs-on-a-cuda-enabled-device"
              - paragraph [ref=e191]: "The following issues should be considered when determining what parts of an application to run on the device:"
              - list [ref=e192]:
                - listitem [ref=e193]:
                  - paragraph [ref=e194]: "The device is ideally suited for computations that can be run on numerous data elements simultaneously in parallel. This typically involves arithmetic on large data sets (such as matrices) where the same operation can be performed across thousands, if not millions, of elements at the same time. This is a requirement for good performance on CUDA: the software must use a large number (generally thousands or tens of thousands) of concurrent threads. The support for running numerous threads in parallel derives from CUDA’s use of a lightweight threading model described above."
                - listitem [ref=e195]:
                  - paragraph [ref=e196]:
                    - text: To use CUDA, data values must be transferred from the host to the device. These transfers are costly in terms of performance and should be minimized. (See
                    - link "Data Transfer Between Host and Device" [ref=e197] [cursor=pointer]:
                      - /url: "#data-transfer-between-host-and-device"
                    - text: ".) This cost has several ramifications:"
                  - list [ref=e198]:
                    - listitem [ref=e199]:
                      - paragraph [ref=e200]: The complexity of operations should justify the cost of moving data to and from the device. Code that transfers data for brief use by a small number of threads will see little or no performance benefit. The ideal scenario is one in which many threads perform a substantial amount of work.
                      - paragraph [ref=e201]:
                        - text: For example, transferring two matrices to the device to perform a matrix addition and then transferring the results back to the host will not realize much performance benefit. The issue here is the number of operations performed per data element transferred. For the preceding procedure, assuming matrices of size NxN, there are N
                        - superscript [ref=e202]: "2"
                        - text: operations (additions) and 3N
                        - superscript [ref=e203]: "2"
                        - text: elements transferred, so the ratio of operations to elements transferred is 1:3 or O(1). Performance benefits can be more readily achieved when this ratio is higher. For example, a matrix multiplication of the same matrices requires N
                        - superscript [ref=e204]: "3"
                        - text: operations (multiply-add), so the ratio of operations to elements transferred is O(N), in which case the larger the matrix the greater the performance benefit. The types of operations are an additional factor, as additions have different complexity profiles than, for example, trigonometric functions. It is important to include the overhead of transferring data to and from the device in determining whether operations should be performed on the host or on the device.
                    - listitem [ref=e205]:
                      - paragraph [ref=e206]:
                        - text: Data should be kept on the device as long as possible. Because transfers should be minimized, programs that run multiple kernels on the same data should favor leaving the data on the device between kernel calls, rather than transferring intermediate results to the host and then sending them back to the device for subsequent calculations. So, in the previous example, had the two matrices to be added already been on the device as a result of some previous calculation, or if the results of the addition would be used in some subsequent calculation, the matrix addition should be performed locally on the device. This approach should be used even if one of the steps in a sequence of calculations could be performed faster on the host. Even a relatively slow kernel may be advantageous if it avoids one or more transfers between host and device memory.
                        - link "Data Transfer Between Host and Device" [ref=e207] [cursor=pointer]:
                          - /url: "#data-transfer-between-host-and-device"
                        - text: provides further details, including the measurements of bandwidth between the host and the device versus within the device proper.
                - listitem [ref=e208]:
                  - paragraph [ref=e209]:
                    - text: For best performance, there should be some coherence in memory access by adjacent threads running on the device. Certain memory access patterns enable the hardware to coalesce groups of reads or writes of multiple data items into one operation. Data that cannot be laid out so as to enable
                    - emphasis [ref=e210]: coalescing
                    - text: ", or that doesn’t have enough locality to use the L1 or texture caches effectively, will tend to see lesser speedups when used in computations on GPUs. A noteworthy exception to this are completely random memory access patterns. In general, they should be avoided, because compared to peak capabilities any architecture processes these memory access patterns at a low efficiency. However, compared to cache based architectures, like CPUs, latency hiding architectures, like GPUs, tend to cope better with completely random memory access patterns."
              - generic [ref=e211]:
                - term [ref=e212]:
                  - generic [ref=e213]:
                    - text: "["
                    - link "1" [ref=e214] [cursor=pointer]:
                      - /url: "#id3"
                    - text: "]"
                  - text: ":"
                - definition [ref=e215]:
                  - paragraph [ref=e216]:
                    - text: On Systems on a Chip with integrated GPUs, such as NVIDIA® Tegra®, host and device memory are physically the same, but there is still a logical distinction between host and device memory. See the
                    - link "Application Note on CUDA for Tegra" [ref=e217] [cursor=pointer]:
                      - /url: https://docs.nvidia.com/cuda/cuda-for-tegra-appnote
                    - text: for details.
          - generic [ref=e218]:
            - heading "4. Application Profiling " [level=1] [ref=e219]:
              - text: 4. Application Profiling
              - link "" [ref=e220] [cursor=pointer]:
                - /url: "#application-profiling"
            - generic [ref=e221]:
              - heading "4.1. Profile " [level=2] [ref=e222]:
                - text: 4.1. Profile
                - link "" [ref=e223] [cursor=pointer]:
                  - /url: "#profile"
              - paragraph [ref=e224]: Many codes accomplish a significant portion of the work with a relatively small amount of code. Using a profiler, the developer can identify such hotspots and start to compile a list of candidates for parallelization.
              - generic [ref=e225]:
                - heading "4.1.1. Creating the Profile " [level=3] [ref=e226]:
                  - text: 4.1.1. Creating the Profile
                  - link "" [ref=e227] [cursor=pointer]:
                    - /url: "#creating-the-profile"
                - paragraph [ref=e228]: "There are many possible approaches to profiling the code, but in all cases the objective is the same: to identify the function or functions in which the application is spending most of its execution time."
                - generic [ref=e229]:
                  - paragraph [ref=e230]:  Note
