              - paragraph [ref=e1171]: In the case of texture access, if a texture reference is bound to a linear array in global memory, then the device code can write to the underlying array. Texture references that are bound to CUDA arrays can be written to via surface-write operations by binding a surface to the same underlying CUDA array storage). Reading from a texture while writing to its underlying global memory array in the same kernel launch should be avoided because the texture caches are read-only and are not invalidated when the associated global memory is modified.
              - generic [ref=e1172]:
                - heading "10.2.1. Coalesced Access to Global Memory " [level=3] [ref=e1173]:
                  - text: 10.2.1. Coalesced Access to Global Memory
                  - link "" [ref=e1174] [cursor=pointer]:
                    - /url: "#coalesced-access-to-global-memory"
                - paragraph [ref=e1175]: A very important performance consideration in programming for CUDA-capable GPU architectures is the coalescing of global memory accesses. Global memory loads and stores by threads of a warp are coalesced by the device into as few as possible transactions.
                - generic [ref=e1176]:
                  - paragraph [ref=e1177]:  Note
                  - paragraph [ref=e1178]:
                    - strong [ref=e1179]: "High Priority:"
                    - text: Ensure global memory accesses are coalesced whenever possible.
                - paragraph [ref=e1180]: The access requirements for coalescing depend on the compute capability of the device and are documented in the CUDA C++ Programming Guide.
                - paragraph [ref=e1181]: "For devices of compute capability 6.0 or higher, the requirements can be summarized quite easily: the concurrent accesses of the threads of a warp will coalesce into a number of transactions equal to the number of 32-byte transactions necessary to service all of the threads of the warp."
                - paragraph [ref=e1182]: For certain devices of compute capability 5.2, L1-caching of accesses to global memory can be optionally enabled. If L1-caching is enabled on these devices, the number of required transactions is equal to the number of required 128-byte aligned segments.
                - generic [ref=e1183]:
                  - paragraph [ref=e1184]:  Note
                  - paragraph [ref=e1185]: On devices of compute capability 6.0 or higher, L1-caching is the default, however the data access unit is 32-byte regardless of whether global loads are cached in L1 or not.
                - paragraph [ref=e1186]: On devices with GDDR memory, accessing memory in a coalesced way is even more important when ECC is turned on. Scattered accesses increase ECC memory transfer overhead, especially when writing data to global memory.
                - paragraph [ref=e1187]: Coalescing concepts are illustrated in the following simple examples. These examples assume compute capability 6.0 or higher and that accesses are for 4-byte words, unless otherwise noted.
                - generic [ref=e1188]:
                  - heading "10.2.1.1. A Simple Access Pattern " [level=4] [ref=e1189]:
                    - text: 10.2.1.1. A Simple Access Pattern
                    - link "" [ref=e1190] [cursor=pointer]:
                      - /url: "#a-simple-access-pattern"
                  - paragraph [ref=e1191]:
                    - text: "The first and simplest case of coalescing can be achieved by any CUDA-enabled device of compute capability 6.0 or higher: the"
                    - emphasis [ref=e1192]: k
                    - text: "-th thread accesses the"
                    - emphasis [ref=e1193]: k
                    - text: "-th word in a 32-byte aligned array. Not all threads need to participate."
                  - paragraph [ref=e1194]:
                    - text: For example, if the threads of a warp access adjacent 4-byte words (e.g., adjacent
                    - code [ref=e1195]: float
                    - text: values), four coalesced 32-byte transactions will service that memory access. Such a pattern is shown in Figure 3 <coalesced-access-figure>.
                  - 'figure "Figure 3 : Coalesced access " [ref=e1196]':
                    - img "Coalesced access" [ref=e1197]
                    - paragraph [ref=e1199]:
                      - text: "Figure 3 : Coalesced access"
                      - link "" [ref=e1200] [cursor=pointer]:
                        - /url: "#coalesced-access-figure"
                  - paragraph [ref=e1201]: This access pattern results in four 32-byte transactions, indicated by the red rectangles.
                  - paragraph [ref=e1202]:
                    - text: If from any of the four 32-byte segments only a subset of the words are requested (e.g. if several threads had accessed the same word or if some threads did not participate in the access), the full segment is fetched anyway. Furthermore, if accesses by the threads of the warp had been permuted within or accross the four segments, still only four 32-byte transactions would have been performed by a device with
                    - link "compute capability" [ref=e1203] [cursor=pointer]:
                      - /url: "#cuda-compute-capability"
                    - text: 6.0 or higher.
                - generic [ref=e1204]:
                  - heading "10.2.1.2. A Sequential but Misaligned Access Pattern " [level=4] [ref=e1205]:
                    - text: 10.2.1.2. A Sequential but Misaligned Access Pattern
                    - link "" [ref=e1206] [cursor=pointer]:
                      - /url: "#a-sequential-but-misaligned-access-pattern"
                  - paragraph [ref=e1207]:
                    - text: If sequential threads in a warp access memory that is sequential but not aligned with a 32-byte segment, five 32-byte segments will be requested, as shown in
                    - link "Figure 4" [ref=e1208] [cursor=pointer]:
                      - /url: "#misaligned-sequential-addresses-fall-5-32-byte-l2-cache-seqments"
                    - text: .
                  - 'figure "Figure 4 : Misaligned sequential addresses that fall within five 32-byte segments " [ref=e1209]':
                    - img "Misaligned sequential addresses that fall within five 32-byte segments" [ref=e1210]
                    - paragraph [ref=e1212]:
                      - text: "Figure 4 : Misaligned sequential addresses that fall within five 32-byte segments"
                      - link "" [ref=e1213] [cursor=pointer]:
                        - /url: "#misaligned-sequential-addresses-fall-5-32-byte-l2-cache-seqments"
                  - paragraph [ref=e1214]:
                    - text: Memory allocated through the CUDA Runtime API, such as via
                    - code [ref=e1215]: cudaMalloc()
                    - text: ", is guaranteed to be aligned to at least 256 bytes. Therefore, choosing sensible thread block sizes, such as multiples of the warp size (i.e., 32 on current GPUs), facilitates memory accesses by warps that are properly aligned. (Consider what would happen to the memory addresses accessed by the second, third, and subsequent thread blocks if the thread block size was not a multiple of warp size, for example.)"
                - generic [ref=e1216]:
                  - heading "10.2.1.3. Effects of Misaligned Accesses " [level=4] [ref=e1217]:
                    - text: 10.2.1.3. Effects of Misaligned Accesses
                    - link "" [ref=e1218] [cursor=pointer]:
                      - /url: "#effects-of-misaligned-accesses"
                  - paragraph [ref=e1219]:
                    - text: It is easy and informative to explore the ramifications of misaligned accesses using a simple copy kernel, such as the one in
                    - link "A copy kernel that illustrates misaligned accesses" [ref=e1220] [cursor=pointer]:
                      - /url: "#a-copy-kernel-that-illustrates-misaligned-accesses"
                    - text: .
                  - paragraph [ref=e1221]: A copy kernel that illustrates misaligned accesses
                  - generic [ref=e1223]:
                    - generic [ref=e1224]:
                      - text: __global__ void offsetCopy(float *odata, float* idata, int offset)
                      - text: "{"
                      - text: int xid = blockIdx.x * blockDim.x + threadIdx.x + offset;
                      - text: odata[xid] = idata[xid];
                      - text: "}"
                    - button "Copy to clipboard" [ref=e1225] [cursor=pointer]:
                      - img "Copy to clipboard" [ref=e1226]
                  - paragraph [ref=e1230]:
                    - text: In
                    - link "A copy kernel that illustrates misaligned accesses" [ref=e1231] [cursor=pointer]:
                      - /url: "#a-copy-kernel-that-illustrates-misaligned-accesses"
                    - text: ", data is copied from the input array"
                    - code [ref=e1232]: idata
                    - text: to the output array, both of which exist in global memory. The kernel is executed within a loop in host code that varies the parameter
                    - code [ref=e1233]: offset
                    - text: from 0 to 32 (for example,
                    - link "Figure 4" [ref=e1234] [cursor=pointer]:
                      - /url: "#misaligned-sequential-addresses-fall-5-32-byte-l2-cache-seqments"
                    - text: corresponds to this misalignments). The effective bandwidth for the copy with various offsets on an NVIDIA Tesla V100 (
                    - link "compute capability" [ref=e1235] [cursor=pointer]:
                      - /url: "#cuda-compute-capability"
                    - text: 7.0) is shown in
                    - link "Figure 5" [ref=e1236] [cursor=pointer]:
