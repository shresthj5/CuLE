                    - text: such that a random 20 MB of the total persistent data is resident in the L2 set-aside cache portion. The remaining portion of this persistent data will be accessed using the streaming property. This helps in reducing cache thrashing. The results are shown in the chart below, where we see good performance regardless of whether the persistent data fits in the L2 set-aside or not.
                  - 'figure "Figure 10 : The performance of the sliding-window benchmark with tuned hit-ratio " [ref=e1363]':
                    - link "The performance of the sliding-window benchmark with tuned hit-ratio" [ref=e1364] [cursor=pointer]:
