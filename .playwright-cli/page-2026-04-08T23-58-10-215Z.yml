            - generic [ref=e2900]:
              - heading "15.4. CUDA Runtime " [level=2] [ref=e2901]:
                - text: 15.4. CUDA Runtime
                - link "" [ref=e2902] [cursor=pointer]:
                  - /url: "#cuda-runtime"
              - paragraph [ref=e2903]: "The host runtime component of the CUDA software environment can be used only by host functions. It provides functions to handle the following:"
              - list [ref=e2904]:
                - listitem [ref=e2905]:
                  - paragraph [ref=e2906]: Device management
                - listitem [ref=e2907]:
                  - paragraph [ref=e2908]: Context management
                - listitem [ref=e2909]:
                  - paragraph [ref=e2910]: Memory management
                - listitem [ref=e2911]:
                  - paragraph [ref=e2912]: Code module management
                - listitem [ref=e2913]:
                  - paragraph [ref=e2914]: Execution control
                - listitem [ref=e2915]:
                  - paragraph [ref=e2916]: Texture reference management
                - listitem [ref=e2917]:
                  - paragraph [ref=e2918]: Interoperability with OpenGL and Direct3D
              - paragraph [ref=e2919]:
                - text: As compared to the lower-level CUDA Driver API, the CUDA Runtime greatly eases device management by providing implicit initialization, context management, and device code module management. The C++ host code generated by
                - code [ref=e2920]: nvcc
                - text: utilizes the CUDA Runtime, so applications that link to this code will depend on the CUDA Runtime; similarly, any code that uses the
                - code [ref=e2921]: cuBLAS
                - text: ","
                - code [ref=e2922]: cuFFT
                - text: ", and other CUDA Toolkit libraries will also depend on the CUDA Runtime, which is used internally by these libraries."
              - paragraph [ref=e2923]: The functions that make up the CUDA Runtime API are explained in the CUDA Toolkit Reference Manual.
              - paragraph [ref=e2924]: The CUDA Runtime handles kernel loading and setting up kernel parameters and launch configuration before the kernel is launched. The implicit driver version checking, code initialization, CUDA context management, CUDA module management (cubin to function mapping), kernel configuration, and parameter passing are all performed by the CUDA Runtime.
              - paragraph [ref=e2925]: "It comprises two principal parts:"
              - list [ref=e2926]:
                - listitem [ref=e2927]:
                  - paragraph [ref=e2928]:
                    - text: A C-style function interface (
                    - code [ref=e2929]: cuda_runtime_api.h
                    - text: ).
                - listitem [ref=e2930]:
                  - paragraph [ref=e2931]:
                    - text: C++-style convenience wrappers (
                    - code [ref=e2932]: cuda_runtime.h
                    - text: ) built on top of the C-style functions.
              - paragraph [ref=e2933]: For more information on the Runtime API, refer to CUDA Runtime of the CUDA C++ Programming Guide.
          - generic [ref=e2934]:
            - heading "16. CUDA Compatibility Developer’s Guide " [level=1] [ref=e2935]:
              - text: 16. CUDA Compatibility Developer’s Guide
              - link "" [ref=e2936] [cursor=pointer]:
                - /url: "#cuda-compatibility-developer-s-guide"
            - paragraph [ref=e2937]: CUDA Toolkit is released on a monthly release cadence to deliver new features, performance improvements, and critical bug fixes. CUDA compatibility allows users to update the latest CUDA Toolkit software (including the compiler, libraries, and tools) without requiring update to the entire driver stack.
            - paragraph [ref=e2938]: "The CUDA software environment consists of three parts:"
            - list [ref=e2939]:
              - listitem [ref=e2940]:
                - paragraph [ref=e2941]: CUDA Toolkit (libraries, CUDA runtime and developer tools) - SDK for developers to build CUDA applications.
              - listitem [ref=e2942]:
                - paragraph [ref=e2943]: CUDA driver - User-mode driver component used to run CUDA applications (e.g. libcuda.so on Linux systems).
              - listitem [ref=e2944]:
                - paragraph [ref=e2945]: NVIDIA GPU device driver - Kernel-mode driver component for NVIDIA GPUs.
            - paragraph [ref=e2946]: On Linux systems, the CUDA driver and kernel mode components are delivered together in the NVIDIA display driver package. This is shown in Figure 1.
            - 'figure "Figure 17 : Components of CUDA " [ref=e2947]':
              - img "Components of CUDA" [ref=e2948]
              - paragraph [ref=e2950]:
                - text: "Figure 17 : Components of CUDA"
                - link "" [ref=e2951] [cursor=pointer]:
                  - /url: "#id100"
            - paragraph [ref=e2952]:
              - text: The CUDA compiler (nvcc), provides a way to handle CUDA and non-CUDA code (by splitting and steering compilation), along with the CUDA runtime, is part of the CUDA compiler toolchain. The CUDA Runtime API provides developers with high-level C++ interface for simplified management of devices, kernel executions etc., While the CUDA driver API provides (
              - link "CUDA Driver API" [ref=e2953] [cursor=pointer]:
                - /url: https://docs.nvidia.com/cuda/cuda-driver-api/index.html
              - text: ) a low-level programming interface for applications to target NVIDIA hardware.
            - paragraph [ref=e2954]: Built on top of these technologies are CUDA libraries, some of which are included in the CUDA Toolkit, while others such as cuDNN may be released independently of the CUDA Toolkit.
            - generic [ref=e2955]:
              - heading "16.1. CUDA Toolkit Versioning " [level=2] [ref=e2956]:
                - text: 16.1. CUDA Toolkit Versioning
                - link "" [ref=e2957] [cursor=pointer]:
                  - /url: "#cuda-toolkit-versioning"
              - paragraph [ref=e2958]: "Starting with CUDA 11, the toolkit versions are based on an industry-standard semantic versioning scheme: .X.Y.Z, where:"
              - list [ref=e2959]:
                - listitem [ref=e2960]:
                  - paragraph [ref=e2961]: .X stands for the major version - APIs have changed and binary compatibility is broken.
                - listitem [ref=e2962]:
                  - paragraph [ref=e2963]: .Y stands for the minor version - Introduction of new APIs, deprecation of old APIs, and source compatibility might be broken but binary compatibility is maintained.
                - listitem [ref=e2964]:
                  - paragraph [ref=e2965]: .Z stands for the release/patch version - new updates and patches will increment this.
              - paragraph [ref=e2966]:
                - text: Each component in the toolkit is recommended to be semantically versioned. From CUDA 11.3 NVRTC is also semantically versioned. We will note some of them later on in the document. The versions of the components in the toolkit are available in this
                - link "table" [ref=e2967] [cursor=pointer]:
                  - /url: https://docs.nvidia.com/cuda/cuda-toolkit-release-notes/index.html#cuda-major-component-versions
                - text: .
              - paragraph [ref=e2968]: "Compatibility of the CUDA platform is thus intended to address a few scenarios:"
              - list [ref=e2969]:
                - listitem [ref=e2970]:
                  - paragraph [ref=e2971]: NVIDIA driver upgrades to systems with GPUs running in production for enterprises or datacenters can be complex and may need advance planning. Delays in rolling out new NVIDIA drivers could mean that users of such systems may not have access to new features available in CUDA releases. Not requiring driver updates for new CUDA releases can mean that new versions of the software can be made available faster to users.
                - listitem [ref=e2972]:
                  - paragraph [ref=e2973]: Many software libraries and applications built on top of CUDA (e.g. math libraries or deep learning frameworks) do not have a direct dependency on the CUDA runtime, compiler or driver. In such cases, users or developers can still benefit from not having to upgrade the entire CUDA Toolkit or driver to use these libraries or frameworks.
                - listitem [ref=e2974]:
                  - paragraph [ref=e2975]: Upgrading dependencies is error-prone and time consuming, and in some corner cases, can even change the semantics of a program. Constantly recompiling with the latest CUDA Toolkit means forcing upgrades on the end-customers of an application product. Package managers facilitate this process but unexpected issues can still arise and if a bug is found, it necessitates a repeat of the above upgrade process.
              - paragraph [ref=e2976]: "CUDA supports several compatibility choices:"
              - list [ref=e2977]:
                - listitem [ref=e2978]:
                  - paragraph [ref=e2979]:
                    - text: First introduced in CUDA 10, the
                    - strong [ref=e2980]: CUDA Forward Compatible Upgrade
                    - text: is designed to allow users to get access to new CUDA features and run applications built with new CUDA releases on systems with older installations of the NVIDIA datacenter driver.
                - listitem [ref=e2981]:
                  - paragraph [ref=e2982]:
                    - text: First introduced in CUDA 11.1,
                    - strong [ref=e2983]: CUDA Enhanced Compatibility
                    - text: "provides two benefits:"
                  - list [ref=e2984]:
                    - listitem [ref=e2985]:
                      - paragraph [ref=e2986]: By leveraging semantic versioning across components in the CUDA Toolkit, an application can be built for one CUDA minor release (for example 11.1) and work across all future minor releases within the major family (i.e. 11.x).
                    - listitem [ref=e2987]:
                      - paragraph [ref=e2988]: The CUDA runtime has relaxed the minimum driver version check and thus no longer requires a driver upgrade when moving to a new minor release.
                - listitem [ref=e2989]:
                  - paragraph [ref=e2990]: The CUDA driver ensures backward Binary Compatibility is maintained for compiled CUDA applications. Applications compiled with CUDA toolkit versions as old as 3.2 will run on newer drivers.
            - generic [ref=e2991]:
              - heading "16.2. Source Compatibility " [level=2] [ref=e2992]:
                - text: 16.2. Source Compatibility
                - link "" [ref=e2993] [cursor=pointer]:
                  - /url: "#source-compatibility"
              - paragraph [ref=e2994]: We define source compatibility as a set of guarantees provided by the library, where a well-formed application built against a specific version of the library (using the SDK) will continue to build and run without errors when a newer version of the SDK is installed.
              - paragraph [ref=e2995]: Both the CUDA driver and the CUDA runtime are not source compatible across the different SDK releases. APIs can be deprecated and removed. Therefore, an application that compiled successfully on an older version of the toolkit may require changes in order to compile against a newer version of the toolkit.
              - paragraph [ref=e2996]: Developers are notified through deprecation and documentation mechanisms of any current or upcoming changes. This does not mean that application binaries compiled using an older toolkit will not be supported anymore. Application binaries rely on CUDA Driver API interface and even though the CUDA Driver API itself may also have changed across toolkit versions, CUDA guarantees Binary Compatibility of the CUDA Driver API interface.
            - generic [ref=e2997]:
              - heading "16.3. Binary Compatibility " [level=2] [ref=e2998]:
                - text: 16.3. Binary Compatibility
                - link "" [ref=e2999] [cursor=pointer]:
                  - /url: "#binary-compatibility"
              - paragraph [ref=e3000]: We define binary compatibility as a set of guarantees provided by the library, where an application targeting the said library will continue to work when dynamically linked against a different version of the library.
              - paragraph [ref=e3001]: The CUDA Driver API has a versioned C-style ABI, which guarantees that applications that were running against an older driver (for example CUDA 3.2) will still run and function correctly against a modern driver (for example one shipped with CUDA 11.0). This means that even though an application source might need to be changed if it has to be recompiled against a newer CUDA Toolkit in order to use the newer features, replacing the driver components installed in a system with a newer version will always support existing applications and its functions.
              - paragraph [ref=e3002]: The CUDA Driver API thus is binary-compatible (the OS loader can pick up a newer version and the application continues to work) but not source-compatible (rebuilding your application against a newer SDK might require source changes).
              - 'figure "Figure 18 : CUDA Toolkit and Minimum Driver Versions " [ref=e3003]':
                - img "CUDA Toolkit and Minimum Driver Versions" [ref=e3004]
