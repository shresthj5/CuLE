                  - paragraph [ref=e1740]: Within a kernel call, the texture cache is not kept coherent with respect to global memory writes, so texture fetches from addresses that have been written via global stores in the same kernel call return undefined data. That is, a thread can safely read a memory location via texture if the location has been updated by a previous kernel call or memory copy, but not if it has been previously updated by the same thread or another thread within the same kernel call.
              - generic [ref=e1741]:
                - heading "10.2.6. Constant Memory " [level=3] [ref=e1742]:
                  - text: 10.2.6. Constant Memory
                  - link "" [ref=e1743] [cursor=pointer]:
                    - /url: "#constant-memory"
                - paragraph [ref=e1744]: There is a total of 64 KB constant memory on a device. The constant memory space is cached. As a result, a read from constant memory costs one memory read from device memory only on a cache miss; otherwise, it just costs one read from the constant cache. Accesses to different addresses by threads within a warp are serialized, thus the cost scales linearly with the number of unique addresses read by all threads within a warp. As such, the constant cache is best when threads in the same warp accesses only a few distinct locations. If all threads of a warp access the same location, then constant memory can be as fast as a register access.
              - generic [ref=e1745]:
                - heading "10.2.7. Registers " [level=3] [ref=e1746]:
                  - text: 10.2.7. Registers
                  - link "" [ref=e1747] [cursor=pointer]:
                    - /url: "#registers"
                - paragraph [ref=e1748]: Generally, accessing a register consumes zero extra clock cycles per instruction, but delays may occur due to register read-after-write dependencies and register memory bank conflicts.
                - paragraph [ref=e1749]:
                  - text: The compiler and hardware thread scheduler will schedule instructions as optimally as possible to avoid register memory bank conflicts. An application has no direct control over these bank conflicts. In particular, there is no register-related reason to pack data into vector data types such as
                  - code [ref=e1750]: float4
                  - text: or
                  - code [ref=e1751]: int4
                  - text: types.
                - generic [ref=e1752]:
                  - heading "10.2.7.1. Register Pressure " [level=4] [ref=e1753]:
                    - text: 10.2.7.1. Register Pressure
                    - link "" [ref=e1754] [cursor=pointer]:
                      - /url: "#register-pressure"
                  - paragraph [ref=e1755]:
                    - text: Register pressure occurs when there are not enough registers available for a given task. Even though each multiprocessor contains thousands of 32-bit registers (see Features and Technical Specifications of the CUDA C++ Programming Guide), these are partitioned among concurrent threads. To prevent the compiler from allocating too many registers, use the
                    - code [ref=e1756]: "-maxrregcount=N"
                    - text: compiler command-line option or the launch bounds kernel definition qualifier (see Execution Configuration of the CUDA C++ Programming Guide) to control the maximum number of registers to allocated per thread.
            - generic [ref=e1757]:
