              - generic [ref=e986]:
                - heading "10.1.3. Zero Copy " [level=3] [ref=e987]:
                  - text: 10.1.3. Zero Copy
                  - link "" [ref=e988] [cursor=pointer]:
                    - /url: "#zero-copy"
                - paragraph [ref=e989]:
                  - emphasis [ref=e990]: Zero copy
                  - text: is a feature that was added in version 2.2 of the CUDA Toolkit. It enables GPU threads to directly access host memory. For this purpose, it requires mapped pinned (non-pageable) memory. On integrated GPUs (i.e., GPUs with the integrated field of the CUDA device properties structure set to 1), mapped pinned memory is always a performance gain because it avoids superfluous copies as integrated GPU and CPU memory are physically the same. On discrete GPUs, mapped pinned memory is advantageous only in certain cases. Because the data is not cached on the GPU, mapped pinned memory should be read or written only once, and the global loads and stores that read and write the memory should be coalesced. Zero copy can be used in place of streams because kernel-originated data transfers automatically overlap kernel execution without the overhead of setting up and determining the optimal number of streams.
                - generic [ref=e991]:
                  - paragraph [ref=e992]:  Note
                  - paragraph [ref=e993]:
