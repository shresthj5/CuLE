                  - heading "4.1.3.3. Applying Strong and Weak Scaling " [level=4] [ref=e401]:
                    - text: 4.1.3.3. Applying Strong and Weak Scaling
                    - link "" [ref=e402] [cursor=pointer]:
                      - /url: "#applying-strong-and-weak-scaling"
                  - paragraph [ref=e403]: Understanding which type of scaling is most applicable to an application is an important part of estimating speedup. For some applications the problem size will remain constant and hence only strong scaling is applicable. An example would be modeling how two molecules interact with each other, where the molecule sizes are fixed.
                  - paragraph [ref=e404]: For other applications, the problem size will grow to fill the available processors. Examples include modeling fluids or structures as meshes or grids and some Monte Carlo simulations, where increasing the problem size provides increased accuracy.
                  - paragraph [ref=e405]: Having understood the application profile, the developer should understand how the problem size would change if the computational performance changes and then apply either Amdahl’s or Gustafson’s Law to determine an upper bound for the speedup.
          - generic [ref=e406]:
            - heading "5. Parallelizing Your Application " [level=1] [ref=e407]:
              - text: 5. Parallelizing Your Application
              - link "" [ref=e408] [cursor=pointer]:
                - /url: "#parallelizing-your-application"
            - paragraph [ref=e409]:
              - text: Having identified the hotspots and having done the basic exercises to set goals and expectations, the developer needs to parallelize the code. Depending on the original code, this can be as simple as calling into an existing GPU-optimized library such as
              - code [ref=e410]: cuBLAS
              - text: ","
              - code [ref=e411]: cuFFT
              - text: ", or"
              - code [ref=e412]: Thrust
              - text: ", or it could be as simple as adding a few preprocessor directives as hints to a parallelizing compiler."
            - paragraph [ref=e413]: On the other hand, some applications’ designs will require some amount of refactoring to expose their inherent parallelism. As even CPU architectures require exposing this parallelism in order to improve or simply maintain the performance of sequential applications, the CUDA family of parallel programming languages (CUDA C++, CUDA Fortran, etc.) aims to make the expression of this parallelism as simple as possible, while simultaneously enabling operation on CUDA-capable GPUs designed for maximum parallel throughput.
          - generic [ref=e414]:
            - heading "6. Getting Started " [level=1] [ref=e415]:
              - text: 6. Getting Started
              - link "" [ref=e416] [cursor=pointer]:
                - /url: "#getting-started"
            - paragraph [ref=e417]: There are several key strategies for parallelizing sequential code. While the details of how to apply these strategies to a particular application is a complex and problem-specific topic, the general themes listed here apply regardless of whether we are parallelizing code to run on for multicore CPUs or for use on CUDA GPUs.
            - generic [ref=e418]:
              - heading "6.1. Parallel Libraries " [level=2] [ref=e419]:
                - text: 6.1. Parallel Libraries
                - link "" [ref=e420] [cursor=pointer]:
                  - /url: "#parallel-libraries"
              - paragraph [ref=e421]:
                - text: The most straightforward approach to parallelizing an application is to leverage existing libraries that take advantage of parallel architectures on our behalf. The CUDA Toolkit includes a number of such libraries that have been fine-tuned for NVIDIA CUDA GPUs, such as
                - code [ref=e422]: cuBLAS
                - text: ","
                - code [ref=e423]: cuFFT
                - text: ", and so on."
              - paragraph [ref=e424]:
                - text: The key here is that libraries are most useful when they match well with the needs of the application. Applications already using other BLAS libraries can often quite easily switch to
                - code [ref=e425]: cuBLAS
                - text: ", for example, whereas applications that do little to no linear algebra will have little use for"
                - code [ref=e426]: cuBLAS
                - text: ". The same goes for other CUDA Toolkit libraries:"
                - code [ref=e427]: cuFFT
                - text: has an interface similar to that of
                - code [ref=e428]: FFTW
                - text: ", etc."
              - paragraph [ref=e429]: Also of note is the Thrust library, which is a parallel C++ template library similar to the C++ Standard Template Library. Thrust provides a rich collection of data parallel primitives such as scan, sort, and reduce, which can be composed together to implement complex algorithms with concise, readable source code. By describing your computation in terms of these high-level abstractions you provide Thrust with the freedom to select the most efficient implementation automatically. As a result, Thrust can be utilized in rapid prototyping of CUDA applications, where programmer productivity matters most, as well as in production, where robustness and absolute performance are crucial.
            - generic [ref=e430]:
              - heading "6.2. Parallelizing Compilers " [level=2] [ref=e431]:
                - text: 6.2. Parallelizing Compilers
                - link "" [ref=e432] [cursor=pointer]:
                  - /url: "#parallelizing-compilers"
              - paragraph [ref=e433]: Another common approach to parallelization of sequential codes is to make use of parallelizing compilers. Often this means the use of directives-based approaches, where the programmer uses a pragma or other similar notation to provide hints to the compiler about where parallelism can be found without needing to modify or adapt the underlying code itself. By exposing parallelism to the compiler, directives allow the compiler to do the detailed work of mapping the computation onto the parallel architecture.
              - paragraph [ref=e434]: The OpenACC standard provides a set of compiler directives to specify loops and regions of code in standard C, C++ and Fortran that should be offloaded from a host CPU to an attached accelerator such as a CUDA GPU. The details of managing the accelerator device are handled implicitly by an OpenACC-enabled compiler and runtime.
              - paragraph [ref=e435]:
                - text: See
                - link "http://www.openacc.org/" [ref=e436] [cursor=pointer]:
                  - /url: http://www.openacc.org/
                - text: for details.
            - generic [ref=e437]:
              - heading "6.3. Coding to Expose Parallelism " [level=2] [ref=e438]:
                - text: 6.3. Coding to Expose Parallelism
                - link "" [ref=e439] [cursor=pointer]:
                  - /url: "#coding-to-expose-parallelism"
              - paragraph [ref=e440]: For applications that need additional functionality or performance beyond what existing parallel libraries or parallelizing compilers can provide, parallel programming languages such as CUDA C++ that integrate seamlessly with existing sequential code are essential.
              - paragraph [ref=e441]: Once we have located a hotspot in our application’s profile assessment and determined that custom code is the best approach, we can use CUDA C++ to expose the parallelism in that portion of our code as a CUDA kernel. We can then launch this kernel onto the GPU and retrieve the results without requiring major rewrites to the rest of our application.
              - paragraph [ref=e442]: This approach is most straightforward when the majority of the total running time of our application is spent in a few relatively isolated portions of the code. More difficult to parallelize are applications with a very flat profile - i.e., applications where the time spent is spread out relatively evenly across a wide portion of the code base. For the latter variety of application, some degree of code refactoring to expose the inherent parallelism in the application might be necessary, but keep in mind that this refactoring work will tend to benefit all future architectures, CPU and GPU alike, so it is well worth the effort should it become necessary.
          - generic [ref=e443]:
            - heading "7. Getting the Right Answer " [level=1] [ref=e444]:
              - text: 7. Getting the Right Answer
              - link "" [ref=e445] [cursor=pointer]:
                - /url: "#getting-the-right-answer"
            - paragraph [ref=e446]: Obtaining the right answer is clearly the principal goal of all computation. On parallel systems, it is possible to run into difficulties not typically found in traditional serial-oriented programming. These include threading issues, unexpected values due to the way floating-point values are computed, and challenges arising from differences in the way CPU and GPU processors operate. This chapter examines issues that can affect the correctness of returned data and points to appropriate solutions.
            - generic [ref=e447]:
              - heading "7.1. Verification " [level=2] [ref=e448]:
                - text: 7.1. Verification
                - link "" [ref=e449] [cursor=pointer]:
                  - /url: "#verification"
              - generic [ref=e450]:
                - heading "7.1.1. Reference Comparison " [level=3] [ref=e451]:
                  - text: 7.1.1. Reference Comparison
                  - link "" [ref=e452] [cursor=pointer]:
                    - /url: "#reference-comparison"
                - paragraph [ref=e453]:
                  - text: A key aspect of correctness verification for modifications to any existing program is to establish some mechanism whereby previous known-good reference outputs from representative inputs can be compared to new results. After each change is made, ensure that the results match using whatever criteria apply to the particular algorithm. Some will expect bitwise identical results, which is not always possible, especially where floating-point arithmetic is concerned; see
                  - link "Numerical Accuracy and Precision" [ref=e454] [cursor=pointer]:
                    - /url: "#numerical-accuracy-and-precision"
                  - text: regarding numerical accuracy. For other algorithms, implementations may be considered correct if they match the reference within some small epsilon.
                - paragraph [ref=e455]:
                  - text: Note that the process used for validating numerical results can easily be extended to validate performance results as well. We want to ensure that each change we make is correct
                  - emphasis [ref=e456]: and
                  - text: that it improves performance (and by how much). Checking these things frequently as an integral part of our cyclical APOD process will help ensure that we achieve the desired results as rapidly as possible.
              - generic [ref=e457]:
                - heading "7.1.2. Unit Testing " [level=3] [ref=e458]:
