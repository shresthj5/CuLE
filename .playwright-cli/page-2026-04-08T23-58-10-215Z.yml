                  - link "" [ref=e459] [cursor=pointer]:
                    - /url: "#unit-testing"
                - paragraph [ref=e460]:
                  - text: A useful counterpart to the reference comparisons described above is to structure the code itself in such a way that is readily verifiable at the unit level. For example, we can write our CUDA kernels as a collection of many short
                  - code [ref=e461]: __device__
                  - text: functions rather than one large monolithic
                  - code [ref=e462]: __global__
                  - text: function; each device function can be tested independently before hooking them all together.
                - paragraph [ref=e463]:
                  - text: For example, many kernels have complex addressing logic for accessing memory in addition to their actual computation. If we validate our addressing logic separately prior to introducing the bulk of the computation, then this will simplify any later debugging efforts. (Note that the CUDA compiler considers any device code that does not contribute to a write to global memory as dead code subject to elimination, so we must at least write
                  - emphasis [ref=e464]: something
                  - text: out to global memory as a result of our addressing logic in order to successfully apply this strategy.)
                - paragraph [ref=e465]:
                  - text: Going a step further, if most functions are defined as
                  - code [ref=e466]: __host__ __device__
                  - text: rather than just
                  - code [ref=e467]: __device__
                  - text: functions, then these functions can be tested on both the CPU and the GPU, thereby increasing our confidence that the function is correct and that there will not be any unexpected differences in the results. If there
                  - emphasis [ref=e468]: are
                  - text: differences, then those differences will be seen early and can be understood in the context of a simple function.
                - paragraph [ref=e469]:
                  - text: "As a useful side effect, this strategy will allow us a means to reduce code duplication should we wish to include both CPU and GPU execution paths in our application: if the bulk of the work of our CUDA kernels is done in"
                  - code [ref=e470]: __host__ __device__
