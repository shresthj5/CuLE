            - generic [ref=e3457]:
              - heading "18.2. NVML " [level=2] [ref=e3458]:
                - text: 18.2. NVML
                - link "" [ref=e3459] [cursor=pointer]:
                  - /url: "#nvml"
              - paragraph [ref=e3460]:
                - text: The NVIDIA Management Library (NVML) is a C-based interface that provides direct access to the queries and commands exposed via
                - code [ref=e3461]: nvidia-smi
                - text: intended as a platform for building 3rd-party system management applications. The NVML API is shipped with the CUDA Toolkit (since version 8.0) and is also available standalone on the NVIDIA developer website as part of the GPU Deployment Kit through a single header file accompanied by PDF documentation, stub libraries, and sample applications; see
                - link "https://developer.nvidia.com/gpu-deployment-kit" [ref=e3462] [cursor=pointer]:
                  - /url: https://developer.nvidia.com/gpu-deployment-kit
                - text: . Each new version of NVML is backward-compatible.
              - paragraph [ref=e3463]: An additional set of Perl and Python bindings are provided for the NVML API. These bindings expose the same features as the C-based interface and also provide backwards compatibility. The Perl bindings are provided via CPAN and the Python bindings via PyPI.
              - paragraph [ref=e3464]:
                - text: All of these products (
                - code [ref=e3465]: nvidia-smi
                - text: ", NVML, and the NVML language bindings) are updated with each new CUDA release and provide roughly the same functionality."
              - paragraph [ref=e3466]:
                - text: See
                - link "https://developer.nvidia.com/nvidia-management-library-nvml" [ref=e3467] [cursor=pointer]:
                  - /url: https://developer.nvidia.com/nvidia-management-library-nvml
                - text: for additional information.
