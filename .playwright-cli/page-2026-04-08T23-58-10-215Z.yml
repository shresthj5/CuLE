          - generic [ref=e3401]:
            - heading "18. Deployment Infrastructure Tools " [level=1] [ref=e3402]:
              - text: 18. Deployment Infrastructure Tools
              - link "" [ref=e3403] [cursor=pointer]:
                - /url: "#deployment-infrastructure-tools"
            - generic [ref=e3404]:
              - heading "18.1. Nvidia-SMI " [level=2] [ref=e3405]:
                - text: 18.1. Nvidia-SMI
                - link "" [ref=e3406] [cursor=pointer]:
                  - /url: "#nvidia-smi"
              - paragraph [ref=e3407]:
                - text: The NVIDIA System Management Interface (
                - code [ref=e3408]: nvidia-smi
                - text: ) is a command line utility that aids in the management and monitoring of NVIDIA GPU devices. This utility allows administrators to query GPU device state and, with the appropriate privileges, permits administrators to modify GPU device state.
                - code [ref=e3409]: nvidia-smi
                - text: is targeted at Tesla and certain Quadro GPUs, though limited support is also available on other NVIDIA GPUs.
                - code [ref=e3410]: nvidia-smi
                - text: ships with NVIDIA GPU display drivers on Linux, and with 64-bit Windows Server 2008 R2 and Windows 7.
                - code [ref=e3411]: nvidia-smi
                - text: can output queried information as XML or as human-readable plain text either to standard output or to a file. See the nvidia-smi documenation for details. Please note that new versions of nvidia-smi are not guaranteed to be backward-compatible with previous versions.
              - generic [ref=e3412]:
                - heading "18.1.1. Queryable state " [level=3] [ref=e3413]:
                  - text: 18.1.1. Queryable state
                  - link "" [ref=e3414] [cursor=pointer]:
                    - /url: "#queryable-state"
                - generic [ref=e3415]:
                  - term [ref=e3416]: ECC error counts
                  - definition [ref=e3417]:
                    - paragraph [ref=e3418]: Both correctable single-bit and detectable double-bit errors are reported. Error counts are provided for both the current boot cycle and the lifetime of the GPU.
                  - term [ref=e3419]: GPU utilization
                  - definition [ref=e3420]:
                    - paragraph [ref=e3421]: Current utilization rates are reported for both the compute resources of the GPU and the memory interface.
                  - term [ref=e3422]: Active compute process
                  - definition [ref=e3423]:
                    - paragraph [ref=e3424]: The list of active processes running on the GPU is reported, along with the corresponding process name/ID and allocated GPU memory.
                  - term [ref=e3425]: Clocks and performance state
                  - definition [ref=e3426]:
                    - paragraph [ref=e3427]:
                      - text: Max and current clock rates are reported for several important clock domains, as well as the current GPU performance state (
                      - emphasis [ref=e3428]: pstate
                      - text: ).
                  - term [ref=e3429]: Temperature and fan speed
                  - definition [ref=e3430]:
                    - paragraph [ref=e3431]: The current GPU core temperature is reported, along with fan speeds for products with active cooling.
                  - term [ref=e3432]: Power management
                  - definition [ref=e3433]:
                    - paragraph [ref=e3434]: The current board power draw and power limits are reported for products that report these measurements.
                  - term [ref=e3435]: Identification
                  - definition [ref=e3436]:
                    - paragraph [ref=e3437]: Various dynamic and static information is reported, including board serial numbers, PCI device IDs, VBIOS/Inforom version numbers and product names.
              - generic [ref=e3438]:
