              - generic [ref=e2673]:
                - heading "12.1.9. Math Libraries " [level=3] [ref=e2674]:
                  - text: 12.1.9. Math Libraries
                  - link "" [ref=e2675] [cursor=pointer]:
                    - /url: "#math-libraries"
                - generic [ref=e2676]:
                  - paragraph [ref=e2677]:  Note
                  - paragraph [ref=e2678]:
                    - strong [ref=e2679]: "Medium Priority:"
                    - text: Use the fast math library whenever speed trumps precision.
                - paragraph [ref=e2680]:
                  - text: "Two types of runtime math operations are supported. They can be distinguished by their names: some have names with prepended underscores, whereas others do not (e.g.,"
                  - code [ref=e2681]: __functionName()
                  - text: versus
                  - code [ref=e2682]: functionName()
                  - text: ). Functions following the
                  - code [ref=e2683]: __functionName()
                  - text: naming convention map directly to the hardware level. They are faster but provide somewhat lower accuracy (e.g.,
                  - code [ref=e2684]: __sinf(x)
                  - text: and
                  - code [ref=e2685]: __expf(x)
                  - text: ). Functions following
                  - code [ref=e2686]: functionName()
                  - text: naming convention are slower but have higher accuracy (e.g.,
                  - code [ref=e2687]: sinf(x)
                  - text: and
                  - code [ref=e2688]: expf(x)
                  - text: ). The throughput of
                  - code [ref=e2689]: __sinf(x)
                  - text: ","
                  - code [ref=e2690]: __cosf(x)
                  - text: ", and"
                  - code [ref=e2691]: __expf(x)
                  - text: is much greater than that of
                  - code [ref=e2692]: sinf(x)
                  - text: ","
                  - code [ref=e2693]: cosf(x)
                  - text: ", and"
                  - code [ref=e2694]: expf(x)
                  - text: . The latter become even more expensive (about an order of magnitude slower) if the magnitude of the argument
                  - code [ref=e2695]: x
                  - text: needs to be reduced. Moreover, in such cases, the argument-reduction code uses local memory, which can affect performance even more because of the high latency of local memory. More details are available in the
                  - emphasis [ref=e2696]: CUDA C++ Programming Guide
                  - text: .
                - paragraph [ref=e2697]:
                  - text: Note also that whenever sine and cosine of the same argument are computed, the
                  - code [ref=e2698]: sincos
                  - text: "family of instructions should be used to optimize performance:"
                - list [ref=e2699]:
                  - listitem [ref=e2700]:
                    - paragraph [ref=e2701]:
                      - code [ref=e2702]: __sincosf()
                      - text: for single-precision fast math (see next paragraph)
                  - listitem [ref=e2703]:
                    - paragraph [ref=e2704]:
                      - code [ref=e2705]: sincosf()
                      - text: for regular single-precision
                  - listitem [ref=e2706]:
                    - paragraph [ref=e2707]:
                      - code [ref=e2708]: sincos()
                      - text: for double precision
                - paragraph [ref=e2709]:
                  - text: The
                  - code [ref=e2710]: "-use_fast_math"
                  - text: compiler option of
                  - code [ref=e2711]: nvcc
                  - text: coerces every
                  - code [ref=e2712]: functionName()
                  - text: call to the equivalent
                  - code [ref=e2713]: __functionName()
                  - text: call. It also disables single-precision denormal support and lowers the precision of single-precision division in general. This is an aggressive optimization that can both reduce numerical accuracy and alter special case handling. A more robust approach is to selectively introduce calls to fast intrinsic functions only if merited by performance gains and where altered behavior can be tolerated. Note this switch is effective only on single-precision floating point.
                - generic [ref=e2714]:
                  - paragraph [ref=e2715]:  Note
                  - paragraph [ref=e2716]:
                    - strong [ref=e2717]: "Medium Priority:"
                    - text: Prefer faster, more specialized math functions over slower, more general ones when possible.
                - paragraph [ref=e2718]:
                  - text: For small integer powers (e.g.,
                  - emphasis [ref=e2719]: x2
                  - text: or
                  - emphasis [ref=e2720]: x3
                  - text: ), explicit multiplication is almost certainly faster than the use of general exponentiation routines such as
                  - code [ref=e2721]: pow()
                  - text: . While compiler optimization improvements continually seek to narrow this gap, explicit multiplication (or the use of an equivalent purpose-built inline function or macro) can have a significant advantage. This advantage is increased when several powers of the same base are needed (e.g., where both
                  - emphasis [ref=e2722]: x2
                  - text: and
                  - emphasis [ref=e2723]: x5
                  - text: are calculated in close proximity), as this aids the compiler in its common sub-expression elimination (CSE) optimization.
                - paragraph [ref=e2724]:
                  - text: For exponentiation using base 2 or 10, use the functions
                  - code [ref=e2725]: exp2()
                  - text: or
                  - code [ref=e2726]: expf2()
                  - text: and
                  - code [ref=e2727]: exp10()
                  - text: or
                  - code [ref=e2728]: expf10()
                  - text: rather than the functions
                  - code [ref=e2729]: pow()
                  - text: or
                  - code [ref=e2730]: powf()
                  - text: . Both
                  - code [ref=e2731]: pow()
                  - text: and
                  - code [ref=e2732]: powf()
                  - text: are heavy-weight functions in terms of register pressure and instruction count due to the numerous special cases arising in general exponentiation and the difficulty of achieving good accuracy across the entire ranges of the base and the exponent. The functions
                  - code [ref=e2733]: exp2()
                  - text: ","
                  - code [ref=e2734]: exp2f()
                  - text: ","
                  - code [ref=e2735]: exp10()
                  - text: ", and"
                  - code [ref=e2736]: exp10f()
                  - text: ", on the other hand, are similar to"
                  - code [ref=e2737]: exp()
                  - text: and
                  - code [ref=e2738]: expf()
                  - text: in terms of performance, and can be as much as ten times faster than their
                  - code [ref=e2739]: pow()
                  - text: /
                  - code [ref=e2740]: powf()
                  - text: equivalents.
                - paragraph [ref=e2741]:
                  - text: For exponentiation with an exponent of 1/3, use the
                  - code [ref=e2742]: cbrt()
                  - text: or
                  - code [ref=e2743]: cbrtf()
                  - text: function rather than the generic exponentiation functions
                  - code [ref=e2744]: pow()
                  - text: or
                  - code [ref=e2745]: powf()
                  - text: ", as the former are significantly faster than the latter. Likewise, for exponentation with an exponent of -1/3, use"
                  - code [ref=e2746]: rcbrt()
                  - text: or
                  - code [ref=e2747]: rcbrtf()
                  - text: .
                - paragraph [ref=e2748]:
                  - text: Replace
                  - code [ref=e2749]: sin(π*<expr>)
                  - text: with
                  - code [ref=e2750]: sinpi(<expr>)
                  - text: ","
                  - code [ref=e2751]: cos(π*<expr>)
                  - text: with
                  - code [ref=e2752]: cospi(<expr>)
                  - text: ", and"
                  - code [ref=e2753]: sincos(π*<expr>)
                  - text: with
                  - code [ref=e2754]: sincospi(<expr>)
                  - text: . This is advantageous with regard to both accuracy and performance. As a particular example, to evaluate the sine function in degrees instead of radians, use
                  - code [ref=e2755]: sinpi(x/180.0)
                  - text: . Similarly, the single-precision functions
                  - code [ref=e2756]: sinpif()
                  - text: ","
                  - code [ref=e2757]: cospif()
                  - text: ", and"
                  - code [ref=e2758]: sincospif()
                  - text: should replace calls to
                  - code [ref=e2759]: sinf()
                  - text: ","
                  - code [ref=e2760]: cosf()
                  - text: ", and"
                  - code [ref=e2761]: sincosf()
                  - text: when the function argument is of the form
                  - code [ref=e2762]: π*<expr>
                  - text: . (The performance advantage
                  - code [ref=e2763]: sinpi()
                  - text: has over
                  - code [ref=e2764]: sin()
                  - text: is due to simplified argument reduction; the accuracy advantage is because
                  - code [ref=e2765]: sinpi()
                  - text: multiplies by
                  - code [ref=e2766]: π
                  - text: only implicitly, effectively using an infinitely precise mathematical
                  - code [ref=e2767]: π
                  - text: rather than a single- or double-precision approximation thereof.)
              - generic [ref=e2768]:
                - heading "12.1.10. Precision-related Compiler Flags " [level=3] [ref=e2769]:
                  - text: 12.1.10. Precision-related Compiler Flags
                  - link "" [ref=e2770] [cursor=pointer]:
                    - /url: "#precision-related-compiler-flags"
                - paragraph [ref=e2771]:
                  - text: By default, the
                  - code [ref=e2772]: nvcc
                  - text: "compiler generates IEEE-compliant code, but it also provides options to generate code that somewhat less accurate but faster:"
                - list [ref=e2773]:
                  - listitem [ref=e2774]:
                    - paragraph [ref=e2775]:
                      - code [ref=e2776]: "-ftz=true"
                      - text: (denormalized numbers are flushed to zero)
                  - listitem [ref=e2777]:
                    - paragraph [ref=e2778]:
                      - code [ref=e2779]: "-prec-div=false"
                      - text: (less precise division)
                  - listitem [ref=e2780]:
                    - paragraph [ref=e2781]:
                      - code [ref=e2782]: "-prec-sqrt=false"
                      - text: (less precise square root)
                - paragraph [ref=e2783]:
                  - text: Another, more aggressive, option is
                  - code [ref=e2784]: "-use_fast_math"
                  - text: ", which coerces every"
                  - code [ref=e2785]: functionName()
                  - text: call to the equivalent
                  - code [ref=e2786]: __functionName()
                  - text: call. This makes the code run faster at the cost of diminished precision and accuracy. See
                  - link "Math Libraries" [ref=e2787] [cursor=pointer]:
                    - /url: "#math-libraries"
                  - text: .
            - generic [ref=e2788]:
              - heading "12.2. Memory Instructions " [level=2] [ref=e2789]:
                - text: 12.2. Memory Instructions
                - link "" [ref=e2790] [cursor=pointer]:
                  - /url: "#memory-instructions"
              - generic [ref=e2791]:
                - paragraph [ref=e2792]:  Note
                - paragraph [ref=e2793]:
                  - strong [ref=e2794]: "High Priority:"
                  - text: Minimize the use of global memory. Prefer shared memory access where possible.
              - paragraph [ref=e2795]: Memory instructions include any instruction that reads from or writes to shared, local, or global memory. When accessing uncached local or global memory, there are hundreds of clock cycles of memory latency.
              - paragraph [ref=e2796]: "As an example, the assignment operator in the following sample code has a high throughput, but, crucially, there is a latency of hundreds of clock cycles to read data from global memory:"
              - generic [ref=e2798]:
                - generic [ref=e2799]:
                  - text: __shared__ float shared[32];
                  - text: __device__ float device[32];
                  - text: shared[threadIdx.x] = device[threadIdx.x];
                - button "Copy to clipboard" [ref=e2800] [cursor=pointer]:
                  - img "Copy to clipboard" [ref=e2801]
              - paragraph [ref=e2805]: Much of this global memory latency can be hidden by the thread scheduler if there are sufficient independent arithmetic instructions that can be issued while waiting for the global memory access to complete. However, it is best to avoid accessing global memory whenever possible.
          - generic [ref=e2806]:
            - heading "13. Control Flow " [level=1] [ref=e2807]:
              - text: 13. Control Flow
              - link "" [ref=e2808] [cursor=pointer]:
                - /url: "#control-flow"
            - generic [ref=e2809]:
              - heading "13.1. Branching and Divergence " [level=2] [ref=e2810]:
                - text: 13.1. Branching and Divergence
                - link "" [ref=e2811] [cursor=pointer]:
                  - /url: "#branching-and-divergence"
              - generic [ref=e2812]:
                - paragraph [ref=e2813]:  Note
                - paragraph [ref=e2814]:
                  - strong [ref=e2815]: "High Priority:"
                  - text: Avoid different execution paths within the same warp.
              - paragraph [ref=e2816]:
                - text: Flow control instructions (
                - code [ref=e2817]: if
                - text: ","
                - code [ref=e2818]: switch
                - text: ","
                - code [ref=e2819]: do
                - text: ","
                - code [ref=e2820]: for
                - text: ","
                - code [ref=e2821]: while
                - text: ) can significantly affect the instruction throughput by causing threads of the same warp to diverge; that is, to follow different execution paths. If this happens, the different execution paths must be executed separately; this increases the total number of instructions executed for this warp.
              - paragraph [ref=e2822]: To obtain best performance in cases where the control flow depends on the thread ID, the controlling condition should be written so as to minimize the number of divergent warps.
              - paragraph [ref=e2823]:
