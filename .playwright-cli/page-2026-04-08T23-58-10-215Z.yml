                - paragraph [ref=e503]:
                  - text: x86 processors can use an 80-bit
                  - emphasis [ref=e504]: double extended precision
                  - text: math when performing floating-point calculations. The results of these calculations can frequently differ from pure 64-bit operations performed on the CUDA device. To get a closer match between values, set the x86 host processor to use regular double or single precision (64 bits and 32 bits, respectively). This is done with the
                  - code [ref=e505]: FLDCW
