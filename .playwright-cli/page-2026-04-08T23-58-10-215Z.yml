                  - text: CUDA Sample shows how to use these functions as well as how to measure memory transfer performance.
                - paragraph [ref=e884]:
                  - text: For regions of system memory that have already been pre-allocated,
                  - code [ref=e885]: cudaHostRegister()
                  - text: can be used to pin the memory on-the-fly without the need to allocate a separate buffer and copy the data into it.
                - paragraph [ref=e886]: Pinned memory should not be overused. Excessive use can reduce overall system performance because pinned memory is a scarce resource, but how much is too much is difficult to know in advance. Furthermore, the pinning of system memory is a heavyweight operation compared to most normal system memory allocations, so as with all optimizations, test the application and the systems it runs on for optimal performance parameters.
