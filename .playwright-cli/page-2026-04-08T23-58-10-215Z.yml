                - paragraph [ref=e2227]:
                  - text: Other instructions and functions are implemented on top of the native instructions. The implementation may be different for devices of different compute capabilities, and the number of native instructions after compilation may fluctuate with every compiler version. For complicated functions, there can be multiple code paths depending on input.
                  - code [ref=e2228]: cuobjdump
                  - text: can be used to inspect a particular implementation in a
                  - code [ref=e2229]: cubin
                  - text: object.
                - paragraph [ref=e2230]:
                  - text: The implementation of some functions are readily available on the CUDA header files (
                  - code [ref=e2231]: math_functions.h
                  - text: ","
                  - code [ref=e2232]: device_functions.h
                  - text: ", …)."
                - paragraph [ref=e2233]:
                  - text: In general, code compiled with
                  - code [ref=e2234]: "-ftz=true"
                  - text: (denormalized numbers are flushed to zero) tends to have higher performance than code compiled with
                  - code [ref=e2235]: "-ftz=false"
                  - text: . Similarly, code compiled with
                  - code [ref=e2236]: "-prec-div=false"
                  - text: (less precise division) tends to have higher performance code than code compiled with
                  - code [ref=e2237]: "-prec-div=true"
                  - text: ", and code compiled with"
                  - code [ref=e2238]: "-prec-sqrt=false"
                  - text: (less precise square root) tends to have higher performance than code compiled with
                  - code [ref=e2239]: "-prec-sqrt=true"
                  - text: . The nvcc user manual describes these compilation flags in more details.
                - paragraph [ref=e2240]:
                  - strong [ref=e2241]: Single-Precision Floating-Point Division
                - paragraph [ref=e2242]:
                  - code [ref=e2243]: __fdividef(x, y)
