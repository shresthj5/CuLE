                    - generic [ref=e1354]:
                      - text: stream_attribute.accessPolicyWindow.base_ptr = reinterpret_cast<void*>(data_persistent);
                      - text: stream_attribute.accessPolicyWindow.num_bytes = 20*1024*1024; //20 MB stream_attribute.accessPolicyWindow.hitRatio = (20*1024*1024)/((float)freqSize*sizeof(int)); //Such that up to 20MB of data is resident.
                    - button "Copy to clipboard" [ref=e1355] [cursor=pointer]:
                      - img "Copy to clipboard" [ref=e1356]
                  - paragraph [ref=e1360]:
                    - text: We fix the
                    - code [ref=e1361]: num_bytes
                    - text: in the access window to 20 MB and tune the
