            - generic [ref=e3232]:
              - heading "17.4. Distributing the CUDA Runtime and Libraries " [level=2] [ref=e3233]:
                - text: 17.4. Distributing the CUDA Runtime and Libraries
                - link "" [ref=e3234] [cursor=pointer]:
                  - /url: "#distributing-the-cuda-runtime-and-libraries"
              - paragraph [ref=e3235]:
                - text: CUDA applications are built against the CUDA Runtime library, which handles device, memory, and kernel management. Unlike the CUDA Driver, the CUDA Runtime guarantees neither forward nor backward binary compatibility across versions. It is therefore best to
                - link "redistribute" [ref=e3236] [cursor=pointer]:
                  - /url: "#redistribution"
                - text: the CUDA Runtime library with the application when using dynamic linking or else to statically link against the CUDA Runtime. This will ensure that the executable will be able to run even if the user does not have the same CUDA Toolkit installed that the application was built against.
              - generic [ref=e3237]:
                - paragraph [ref=e3238]:  Note
                - paragraph [ref=e3239]: When statically linking to the CUDA Runtime, multiple versions of the runtime can peacably coexist in the same application process simultaneously; for example, if an application uses one version of the CUDA Runtime, and a plugin to that application is statically linked to a different version, that is perfectly acceptable, as long as the installed NVIDIA Driver is sufficient for both.
              - paragraph [ref=e3240]: Statically-linked CUDA Runtime
              - paragraph [ref=e3241]:
                - text: The easiest option is to statically link against the CUDA Runtime. This is the default if using
                - code [ref=e3242]: nvcc
                - text: to link in CUDA 5.5 and later. Static linking makes the executable slightly larger, but it ensures that the correct version of runtime library functions are included in the application binary without requiring separate redistribution of the CUDA Runtime library.
              - paragraph [ref=e3243]: Dynamically-linked CUDA Runtime
              - paragraph [ref=e3244]: If static linking against the CUDA Runtime is impractical for some reason, then a dynamically-linked version of the CUDA Runtime library is also available. (This was the default and only option provided in CUDA versions 5.0 and earlier.)
              - paragraph [ref=e3245]:
                - text: To use dynamic linking with the CUDA Runtime when using the
                - code [ref=e3246]: nvcc
                - text: from CUDA 5.5 or later to link the application, add the
                - code [ref=e3247]: "--cudart=shared"
                - text: flag to the link command line; otherwise the
                - link "statically-linked CUDA Runtime library" [ref=e3248] [cursor=pointer]:
                  - /url: "#statically-linked-cuda-runtime"
                - text: is used by default.
              - paragraph [ref=e3249]:
                - text: After the application is dynamically linked against the CUDA Runtime, this version of the runtime library should be
                - link "bundled with" [ref=e3250] [cursor=pointer]:
                  - /url: "#redistribution"
                - text: the application. It can be copied into the same directory as the application executable or into a subdirectory of that installation path.
              - paragraph [ref=e3251]: Other CUDA Libraries
              - paragraph [ref=e3252]:
                - text: Although the CUDA Runtime provides the option of static linking, some libraries included in the CUDA Toolkit are available only in dynamically-linked form. As with the
                - link "dynamically-linked version of the CUDA Runtime library" [ref=e3253] [cursor=pointer]:
                  - /url: "#dynamically-linked-cuda-runtime"
                - text: ", these libraries should be"
                - link "bundled with" [ref=e3254] [cursor=pointer]:
                  - /url: "#redistribution"
                - text: the application executable when distributing that application.
              - generic [ref=e3255]:
                - heading "17.4.1. CUDA Toolkit Library Redistribution " [level=3] [ref=e3256]:
                  - text: 17.4.1. CUDA Toolkit Library Redistribution
                  - link "" [ref=e3257] [cursor=pointer]:
                    - /url: "#cuda-toolkit-library-redistribution"
                - paragraph [ref=e3258]:
                  - text: The CUDA Toolkit’s End-User License Agreement (EULA) allows for redistribution of many of the CUDA libraries under certain terms and conditions. This allows applications that depend on these libraries
                  - link "to redistribute the exact versions" [ref=e3259] [cursor=pointer]:
                    - /url: "#redistribution-which-files"
                  - text: of the libraries against which they were built and tested, thereby avoiding any trouble for end users who might have a different version of the CUDA Toolkit (or perhaps none at all) installed on their machines. Please refer to the EULA for details.
                - generic [ref=e3260]:
                  - paragraph [ref=e3261]:  Note
                  - paragraph [ref=e3262]:
                    - text: This does
                    - emphasis [ref=e3263]: not
                    - text: apply to the NVIDIA Driver; the end user must still download and install an NVIDIA Driver appropriate to their GPU(s) and operating system.
                - generic [ref=e3264]:
                  - heading "17.4.1.1. Which Files to Redistribute " [level=4] [ref=e3265]:
                    - text: 17.4.1.1. Which Files to Redistribute
                    - link "" [ref=e3266] [cursor=pointer]:
                      - /url: "#which-files-to-redistribute"
                  - paragraph [ref=e3267]: "When redistributing the dynamically-linked versions of one or more CUDA libraries, it is important to identify the exact files that need to be redistributed. The following examples use the cuBLAS library from CUDA Toolkit 5.5 as an illustration:"
                  - paragraph [ref=e3268]:
                    - strong [ref=e3269]: Linux
                  - paragraph [ref=e3270]:
                    - text: In a shared library on Linux, there is a string field called the
                    - code [ref=e3271]: SONAME
                    - text: that indicates the binary compatibility level of the library. The
                    - code [ref=e3272]: SONAME
                    - text: of the library against which the application was built must match the filename of the library that is redistributed with the application.
                  - paragraph [ref=e3273]:
                    - text: For example, in the standard CUDA Toolkit installation, the files
                    - code [ref=e3274]: libcublas.so
                    - text: and
                    - code [ref=e3275]: libcublas.so.5.5
                    - text: are both symlinks pointing to a specific build of cuBLAS, which is named like
                    - code [ref=e3276]: libcublas.so.5.5.x
                    - text: ", where"
                    - emphasis [ref=e3277]: x
                    - text: is the build number (e.g.,
                    - code [ref=e3278]: libcublas.so.5.5.17
                    - text: ). However, the
                    - code [ref=e3279]: SONAME
                    - text: of this library is given as “
                    - code [ref=e3280]: libcublas.so.5.5
                    - text: "”:"
                  - generic [ref=e3282]:
                    - generic [ref=e3283]: $ objdump -p /usr/local/cuda/lib64/libcublas.so | grep SONAME SONAME libcublas.so.5.5
                    - button "Copy to clipboard" [ref=e3284] [cursor=pointer]:
                      - img "Copy to clipboard" [ref=e3285]
                  - paragraph [ref=e3289]:
                    - text: Because of this, even if
                    - code [ref=e3290]: "-lcublas"
                    - text: (with no version number specified) is used when linking the application, the
                    - code [ref=e3291]: SONAME
                    - text: found at link time implies that “
                    - code [ref=e3292]: libcublas.so.5.5
                    - text: ” is the name of the file that the dynamic loader will look for when loading the application and therefore must be the name of the file (or a symlink to the same) that is redistributed with the application.
                  - paragraph [ref=e3293]:
                    - text: The
                    - code [ref=e3294]: ldd
                    - text: "tool is useful for identifying the exact filenames of the libraries that the application expects to find at runtime as well as the path, if any, of the copy of that library that the dynamic loader would select when loading the application given the current library search path:"
                  - generic [ref=e3296]:
                    - generic [ref=e3297]: $ ldd a.out | grep libcublas libcublas.so.5.5 => /usr/local/cuda/lib64/libcublas.so.5.5
                    - button "Copy to clipboard" [ref=e3298] [cursor=pointer]:
                      - img "Copy to clipboard" [ref=e3299]
                  - paragraph [ref=e3303]:
                    - strong [ref=e3304]: Mac
                  - paragraph [ref=e3305]:
                    - text: In a shared library on Mac OS X, there is a field called the
                    - code [ref=e3306]: install name
                    - text: that indicates the expected installation path and filename the library; the CUDA libraries also use this filename to indicate binary compatibility. The value of this field is propagated into an application built against the library and is used to locate the library of the correct version at runtime.
                  - paragraph [ref=e3307]:
                    - text: For example, if the install name of the cuBLAS library is given as
                    - code [ref=e3308]: "@rpath/libcublas.5.5.dylib"
                    - text: ", then the library is version 5.5 and the copy of this library redistributed with the application must be named"
                    - code [ref=e3309]: libcublas.5.5.dylib
                    - text: ", even though only"
                    - code [ref=e3310]: "-lcublas"
                    - text: (with no version number specified) is used at link time. Furthermore, this file should be installed into the
                    - code [ref=e3311]: "@rpath"
                    - text: of the application; see
                    - link "Where to Install Redistributed CUDA Libraries" [ref=e3312] [cursor=pointer]:
                      - /url: "#redistribution-where-to-install"
                    - text: .
                  - paragraph [ref=e3313]:
                    - text: To view a library’s install name, use the
                    - code [ref=e3314]: otool -L
                    - text: "command:"
                  - generic [ref=e3316]:
                    - generic [ref=e3317]: "$ otool -L a.out a.out: @rpath/libcublas.5.5.dylib (...)"
                    - button "Copy to clipboard" [ref=e3318] [cursor=pointer]:
                      - img "Copy to clipboard" [ref=e3319]
                  - paragraph [ref=e3323]:
                    - strong [ref=e3324]: Windows
                  - paragraph [ref=e3325]: The binary compatibility version of the CUDA libraries on Windows is indicated as part of the filename.
                  - paragraph [ref=e3326]:
                    - text: For example, a 64-bit application linked to cuBLAS 5.5 will look for
                    - code [ref=e3327]: cublas64_55.dll
                    - text: at runtime, so this is the file that should be redistributed with that application, even though
                    - code [ref=e3328]: cublas.lib
                    - text: is the file that the application is linked against. For 32-bit applications, the file would be
                    - code [ref=e3329]: cublas32_55.dll
                    - text: .
                  - paragraph [ref=e3330]:
                    - text: To verify the exact DLL filename that the application expects to find at runtime, use the
                    - code [ref=e3331]: dumpbin
                    - text: "tool from the Visual Studio command prompt:"
                  - generic [ref=e3333]:
                    - generic [ref=e3334]: "$ dumpbin /IMPORTS a.exe Microsoft (R) COFF/PE Dumper Version 10.00.40219.01 Copyright (C) Microsoft Corporation. All rights reserved. Dump of file a.exe File Type: EXECUTABLE IMAGE Section contains the following imports: ... cublas64_55.dll ..."
                    - button "Copy to clipboard" [ref=e3335] [cursor=pointer]:
                      - img "Copy to clipboard" [ref=e3336]
                - generic [ref=e3340]:
                  - heading "17.4.1.2. Where to Install Redistributed CUDA Libraries " [level=4] [ref=e3341]:
                    - text: 17.4.1.2. Where to Install Redistributed CUDA Libraries
                    - link "" [ref=e3342] [cursor=pointer]:
                      - /url: "#where-to-install-redistributed-cuda-libraries"
                  - paragraph [ref=e3343]: Once the correct library files are identified for redistribution, they must be configured for installation into a location where the application will be able to find them.
                  - paragraph [ref=e3344]:
                    - text: On Windows, if the CUDA Runtime or other dynamically-linked CUDA Toolkit library is placed in the same directory as the executable, Windows will locate it automatically. On Linux and Mac, the
                    - code [ref=e3345]: "-rpath"
