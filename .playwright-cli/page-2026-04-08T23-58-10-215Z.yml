                - paragraph [ref=e1833]:  Note
                - paragraph [ref=e1834]:
                  - strong [ref=e1835]: "Medium Priority:"
                  - text: The number of threads per block should be a multiple of 32 threads, because this provides optimal computing efficiency and facilitates coalescing.
              - paragraph [ref=e1836]: The dimension and size of blocks per grid and the dimension and size of threads per block are both important factors. The multidimensional aspect of these parameters allows easier mapping of multidimensional problems to CUDA and does not play a role in performance. As a result, this section discusses size but not dimension.
              - paragraph [ref=e1837]: Latency hiding and occupancy depend on the number of active warps per multiprocessor, which is implicitly determined by the execution parameters along with resource (register and shared memory) constraints. Choosing execution parameters is a matter of striking a balance between latency hiding (occupancy) and resource utilization.
              - paragraph [ref=e1838]:
                - text: Choosing the execution configuration parameters should be done in tandem; however, there are certain heuristics that apply to each parameter individually. When choosing the first execution configuration parameter-the number of blocks per grid, or
                - emphasis [ref=e1839]: grid size
                - text: "- the primary concern is keeping the entire GPU busy. The number of blocks in a grid should be larger than the number of multiprocessors so that all multiprocessors have at least one block to execute. Furthermore, there should be multiple active blocks per multiprocessor so that blocks that aren’t waiting for a"
                - code [ref=e1840]: __syncthreads()
                - text: can keep the hardware busy. This recommendation is subject to resource availability; therefore, it should be determined in the context of the second execution parameter - the number of threads per block, or
                - emphasis [ref=e1841]: block size
                - text: "- as well as shared memory usage. To scale to future devices, the number of blocks per kernel launch should be in the thousands."
              - paragraph [ref=e1842]: When choosing the block size, it is important to remember that multiple concurrent blocks can reside on a multiprocessor, so occupancy is not determined by block size alone. In particular, a larger block size does not imply a higher occupancy.
              - paragraph [ref=e1843]:
                - text: As mentioned in
                - link "Occupancy" [ref=e1844] [cursor=pointer]:
                  - /url: index.html#occupancy
                - text: ", higher occupancy does not always equate to better performance. For example, improving occupancy from 66 percent to 100 percent generally does not translate to a similar increase in performance. A lower occupancy kernel will have more registers available per thread than a higher occupancy kernel, which may result in less register spilling to local memory; in particular, with a high degree of exposed instruction-level parallelism (ILP) it is, in some cases, possible to fully cover latency with a low occupancy."
              - paragraph [ref=e1845]: "There are many such factors involved in selecting block size, and inevitably some experimentation is required. However, a few rules of thumb should be followed:"
              - list [ref=e1846]:
                - listitem [ref=e1847]:
                  - paragraph [ref=e1848]: Threads per block should be a multiple of warp size to avoid wasting computation on under-populated warps and to facilitate coalescing.
                - listitem [ref=e1849]:
                  - paragraph [ref=e1850]: A minimum of 64 threads per block should be used, and only if there are multiple concurrent blocks per multiprocessor.
                - listitem [ref=e1851]:
                  - paragraph [ref=e1852]: Between 128 and 256 threads per block is a good initial range for experimentation with different block sizes.
                - listitem [ref=e1853]:
                  - paragraph [ref=e1854]:
                    - text: Use several smaller thread blocks rather than one large thread block per multiprocessor if latency affects performance. This is particularly beneficial to kernels that frequently call
                    - code [ref=e1855]: __syncthreads()
                    - text: .
              - paragraph [ref=e1856]: Note that when a thread block allocates more registers than are available on a multiprocessor, the kernel launch fails, as it will when too much shared memory or too many threads are requested.
            - generic [ref=e1857]:
              - heading "11.4. Effects of Shared Memory " [level=2] [ref=e1858]:
                - text: 11.4. Effects of Shared Memory
                - link "" [ref=e1859] [cursor=pointer]:
                  - /url: "#effects-of-shared-memory"
              - paragraph [ref=e1860]: Shared memory can be helpful in several situations, such as helping to coalesce or eliminate redundant access to global memory. However, it also can act as a constraint on occupancy. In many cases, the amount of shared memory required by a kernel is related to the block size that was chosen, but the mapping of threads to shared memory elements does not need to be one-to-one. For example, it may be desirable to use a 64x64 element shared memory array in a kernel, but because the maximum number of threads per block is 1024, it is not possible to launch a kernel with 64x64 threads per block. In such cases, kernels with 32x32 or 64x16 threads can be launched with each thread processing four elements of the shared memory array. The approach of using a single thread to process multiple elements of a shared memory array can be beneficial even if limits such as threads per block are not an issue. This is because some operations common to each element can be performed by the thread once, amortizing the cost over the number of shared memory elements processed by the thread.
              - paragraph [ref=e1861]: A useful technique to determine the sensitivity of performance to occupancy is through experimentation with the amount of dynamically allocated shared memory, as specified in the third parameter of the execution configuration. By simply increasing this parameter (without modifying the kernel), it is possible to effectively reduce the occupancy of the kernel and measure its effect on performance.
            - generic [ref=e1862]:
              - heading "11.5. Concurrent Kernel Execution " [level=2] [ref=e1863]:
                - text: 11.5. Concurrent Kernel Execution
                - link "" [ref=e1864] [cursor=pointer]:
                  - /url: "#concurrent-kernel-execution"
              - paragraph [ref=e1865]:
                - text: As described in
                - link "Asynchronous and Overlapping Transfers with Computation" [ref=e1866] [cursor=pointer]:
                  - /url: index.html#asynchronous-transfers-and-overlapping-transfers-with-computation
                - text: ", CUDA streams can be used to overlap kernel execution with data transfers. On devices that are capable of concurrent kernel execution, streams can also be used to execute multiple kernels simultaneously to more fully take advantage of the device’s multiprocessors. Whether a device has this capability is indicated by the"
                - code [ref=e1867]: concurrentKernels
                - text: field of the
                - code [ref=e1868]: cudaDeviceProp
                - text: structure (or listed in the output of the
                - code [ref=e1869]: deviceQuery
                - text: CUDA Sample). Non-default streams (streams other than stream 0) are required for concurrent execution because kernel calls that use the default stream begin only after all preceding calls on the device (in any stream) have completed, and no operation on the device (in any stream) commences until they are finished.
              - paragraph [ref=e1870]:
                - text: The following example illustrates the basic technique. Because
                - code [ref=e1871]: kernel1
                - text: and
                - code [ref=e1872]: kernel2
                - text: are executed in different, non-default streams, a capable device can execute the kernels at the same time.
              - generic [ref=e1874]:
                - generic [ref=e1875]:
                  - text: cudaStreamCreate(&stream1);
                  - text: cudaStreamCreate(&stream2);
                  - text: kernel1<<<grid, block, 0, stream1>>>(data_1);
                  - text: kernel2<<<grid, block, 0, stream2>>>(data_2);
                - button "Copy to clipboard" [ref=e1876] [cursor=pointer]:
                  - img "Copy to clipboard" [ref=e1877]
            - generic [ref=e1881]:
              - heading "11.6. Multiple contexts " [level=2] [ref=e1882]:
                - text: 11.6. Multiple contexts
                - link "" [ref=e1883] [cursor=pointer]:
                  - /url: "#multiple-contexts"
              - paragraph [ref=e1884]:
                - text: CUDA work occurs within a process space for a particular GPU known as a
                - emphasis [ref=e1885]: context
                - text: . The context encapsulates kernel launches and memory allocations for that GPU as well as supporting constructs such as the page tables. The context is explicit in the CUDA Driver API but is entirely implicit in the CUDA Runtime API, which creates and manages contexts automatically.
              - paragraph [ref=e1886]:
                - text: With the CUDA Driver API, a CUDA application process can potentially create more than one context for a given GPU. If multiple CUDA application processes access the same GPU concurrently, this almost always implies multiple contexts, since a context is tied to a particular host process unless
                - link "Multi-Process Service" [ref=e1887] [cursor=pointer]:
                  - /url: https://docs.nvidia.com/deploy/mps/index.html
                - text: is in use.
              - paragraph [ref=e1888]:
                - text: While multiple contexts (and their associated resources such as global memory allocations) can be allocated concurrently on a given GPU, only one of these contexts can execute work at any given moment on that GPU; contexts sharing the same GPU are time-sliced. Creating additional contexts incurs memory overhead for per-context data and time overhead for context switching. Furthermore, the need for context switching can reduce utilization when work from several contexts could otherwise execute concurrently (see also
                - link "Concurrent Kernel Execution" [ref=e1889] [cursor=pointer]:
                  - /url: index.html#concurrent-kernel-execution
                - text: ).
              - paragraph [ref=e1890]:
                - text: Therefore, it is best to avoid multiple contexts per GPU within the same CUDA application. To assist with this, the CUDA Driver API provides methods to access and manage a special context on each GPU called the
                - emphasis [ref=e1891]: primary context
                - text: . These are the same contexts used implicitly by the CUDA Runtime when there is not already a current context for a thread.
              - generic [ref=e1893]:
                - generic [ref=e1894]:
                  - text: // When initializing the program/library CUcontext ctx;
                  - text: cuDevicePrimaryCtxRetain(&ctx, dev);
                  - text: // When the program/library launches work cuCtxPushCurrent(ctx);
                  - text: kernel<<<...>>>(...);
                  - text: cuCtxPopCurrent(&ctx);
                  - text: // When the program/library is finished with the context cuDevicePrimaryCtxRelease(dev);
                - button "Copy to clipboard" [ref=e1895] [cursor=pointer]:
                  - img "Copy to clipboard" [ref=e1896]
              - generic [ref=e1900]:
                - paragraph [ref=e1901]:  Note
                - paragraph [ref=e1902]:
                  - text: NVIDIA-SMI can be used to configure a GPU for
                  - link "exclusive process mode" [ref=e1903] [cursor=pointer]:
                    - /url: https://docs.nvidia.com/cuda/cuda-c-programming-guide/index.html#compute-modes
                  - text: ", which limits the number of contexts per GPU to one. This context can be current to as many threads as desired within the creating process, and"
                  - code [ref=e1904]: cuDevicePrimaryCtxRetain
                  - text: will fail if a non-primary context that was created with the CUDA driver API already exists on the device.
          - generic [ref=e1905]:
            - heading "12. Instruction Optimization " [level=1] [ref=e1906]:
              - text: 12. Instruction Optimization
              - link "" [ref=e1907] [cursor=pointer]:
                - /url: "#instruction-optimization"
            - paragraph [ref=e1908]: Awareness of how instructions are executed often permits low-level optimizations that can be useful, especially in code that is run frequently (the so-called hot spot in a program). Best practices suggest that this optimization be performed after all higher-level optimizations have been completed.
            - generic [ref=e1909]:
              - heading "12.1. Arithmetic Instructions " [level=2] [ref=e1910]:
                - text: 12.1. Arithmetic Instructions
                - link "" [ref=e1911] [cursor=pointer]:
                  - /url: "#arithmetic-instructions"
              - paragraph [ref=e1912]: "To maximize instruction throughput the application should:"
              - list [ref=e1913]:
                - listitem [ref=e1914]:
                  - paragraph [ref=e1915]:
                    - text: Minimize the use of arithmetic instructions with low throughput; this includes trading precision for speed when it does not affect the end result, such as using intrinsic instead of regular functions (intrinsic functions are listed in the
                    - link "CUDA C++ Programming Guide" [ref=e1916] [cursor=pointer]:
                      - /url: https://docs.nvidia.com/cuda/cuda-c-programming-guide/index.html#mathematical-functions-appendix-intrinsic-functions
                    - text: ), single-precision instead of double-precision, or flushing denormalized numbers to zero;
                - listitem [ref=e1917]:
                  - paragraph [ref=e1918]:
                    - text: Minimize divergent warps caused by control flow instructions as detailed in
                    - link "Control Flow Instructions" [ref=e1919] [cursor=pointer]:
                      - /url: "#control-flow-instructions"
                - listitem [ref=e1920]:
                  - paragraph [ref=e1921]:
                    - text: Reduce the number of instructions, for example, by optimizing out synchronization points whenever possible as described in
                    - link "Synchronization Instruction" [ref=e1922] [cursor=pointer]:
                      - /url: "#synchronization-instruction"
                    - text: or by using restricted pointers as described in the
                    - link "CUDA C++ Programming Guide" [ref=e1923] [cursor=pointer]:
                      - /url: https://docs.nvidia.com/cuda/cuda-c-programming-guide/index.html#restrict
                    - text: .
              - paragraph [ref=e1924]: In this section, throughputs are given in number of operations per clock cycle per multiprocessor. For a warp size of 32, one instruction corresponds to 32 operations, so if N is the number of operations per clock cycle, the instruction throughput is N/32 instructions per clock cycle.
              - paragraph [ref=e1925]: All throughputs are for one multiprocessor. They must be multiplied by the number of multiprocessors in the device to get throughput for the whole device.
              - generic [ref=e1926]:
                - heading "12.1.1. Throughput of Native Arithmetic Instructions " [level=3] [ref=e1927]:
                  - text: 12.1.1. Throughput of Native Arithmetic Instructions
                  - link "" [ref=e1928] [cursor=pointer]:
                    - /url: "#throughput-of-native-arithmetic-instructions"
                - paragraph [ref=e1929]: The following table gives the throughputs of the arithmetic instructions that are natively supported in hardware for devices of various compute capabilities.
                - generic [ref=e1930]:
