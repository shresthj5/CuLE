                  - text: function is the stream ID, which in this case uses the default stream, stream 0. The kernel also uses the default stream, and it will not begin execution until the memory copy completes; therefore, no explicit synchronization is needed. Because the memory copy and the kernel both return control to the host immediately, the host function
                  - code [ref=e912]: cpuFunction()
                  - text: overlaps their execution.
                - paragraph [ref=e913]:
                  - text: In
                  - link "Asynchronous and Overlapping Transfers with Computation" [ref=e914] [cursor=pointer]:
                    - /url: "#asynchronous-transfers-and-overlapping-transfers-with-computation"
                  - text: ", the memory copy and kernel execution occur sequentially. On devices that are capable of concurrent copy and compute, it is possible to overlap kernel execution on the device with data transfers between the host and the device. Whether a device has this capability is indicated by the"
                  - code [ref=e915]: asyncEngineCount
                  - text: field of the
                  - code [ref=e916]: cudaDeviceProp
                  - text: structure (or listed in the output of the
                  - code [ref=e917]: deviceQuery
                  - text: CUDA Sample). On devices that have this capability, the overlap once again requires pinned host memory, and, in addition, the data transfer and kernel must use different, non-default streams (streams with non-zero stream IDs). Non-default streams are required for this overlap because memory copy, memory set functions, and kernel calls that use the default stream begin only after all preceding calls on the device (in any stream) have completed, and no operation on the device (in any stream) commences until they are finished.
