              - generic [ref=e1369]:
                - heading "10.2.3. Shared Memory " [level=3] [ref=e1370]:
                  - text: 10.2.3. Shared Memory
                  - link "" [ref=e1371] [cursor=pointer]:
                    - /url: "#shared-memory"
                - paragraph [ref=e1372]: Because it is on-chip, shared memory has much higher bandwidth and lower latency than local and global memory - provided there are no bank conflicts between the threads, as detailed in the following section.
                - generic [ref=e1373]:
                  - heading "10.2.3.1. Shared Memory and Memory Banks " [level=4] [ref=e1374]:
                    - text: 10.2.3.1. Shared Memory and Memory Banks
                    - link "" [ref=e1375] [cursor=pointer]:
                      - /url: "#shared-memory-and-memory-banks"
                  - paragraph [ref=e1376]:
                    - text: To achieve high memory bandwidth for concurrent accesses, shared memory is divided into equally sized memory modules (
                    - emphasis [ref=e1377]: banks
                    - text: ) that can be accessed simultaneously. Therefore, any memory load or store of
                    - emphasis [ref=e1378]: "n"
                    - text: addresses that spans
                    - emphasis [ref=e1379]: "n"
                    - text: distinct memory banks can be serviced simultaneously, yielding an effective bandwidth that is
                    - emphasis [ref=e1380]: "n"
                    - text: times as high as the bandwidth of a single bank.
                  - paragraph [ref=e1381]: However, if multiple addresses of a memory request map to the same memory bank, the accesses are serialized. The hardware splits a memory request that has bank conflicts into as many separate conflict-free requests as necessary, decreasing the effective bandwidth by a factor equal to the number of separate memory requests. The one exception here is when multiple threads in a warp address the same shared memory location, resulting in a broadcast. In this case, multiple broadcasts from different banks are coalesced into a single multicast from the requested shared memory locations to the threads.
                  - paragraph [ref=e1382]: To minimize bank conflicts, it is important to understand how memory addresses map to memory banks and how to optimally schedule memory requests.
                  - paragraph [ref=e1383]:
                    - text: On devices of compute capability 5.x or newer, each bank has a bandwidth of 32 bits every clock cycle, and successive 32-bit words are assigned to successive banks. The warp size is 32 threads and the number of banks is also 32, so bank conflicts can occur between any threads in the warp. See
                    - link "Compute Capability 5.x" [ref=e1384] [cursor=pointer]:
                      - /url: https://docs.nvidia.com/cuda/cuda-c-programming-guide/index.html#compute-capability-5-x
                    - text: for further details.
                - generic [ref=e1385]:
                  - heading "10.2.3.2. Shared Memory in Matrix Multiplication (C=AB) " [level=4] [ref=e1386]:
                    - text: 10.2.3.2. Shared Memory in Matrix Multiplication (C=AB)
                    - link "" [ref=e1387] [cursor=pointer]:
                      - /url: "#shared-memory-in-matrix-multiplication-c-ab"
                  - paragraph [ref=e1388]: Shared memory enables cooperation between threads in a block. When multiple threads in a block use the same data from global memory, shared memory can be used to access the data from global memory only once. Shared memory can also be used to avoid uncoalesced memory accesses by loading and storing data in a coalesced pattern from global memory and then reordering it in shared memory. Aside from memory bank conflicts, there is no penalty for non-sequential or unaligned accesses by a warp in shared memory.
                  - paragraph [ref=e1389]: The use of shared memory is illustrated via the simple example of a matrix multiplication C = AB for the case with A of dimension Mxw, B of dimension wxN, and C of dimension MxN. To keep the kernels simple, M and N are multiples of 32, since the warp size (w) is 32 for current devices.
                  - paragraph [ref=e1390]:
                    - text: A natural decomposition of the problem is to use a block and tile size of wxw threads. Therefore, in terms of wxw tiles, A is a column matrix, B is a row matrix, and C is their outer product; see
                    - link "Figure 11" [ref=e1391] [cursor=pointer]:
                      - /url: "#shared-memory-in-matrix-multiplication-c-ab-block-column-matrix-a-multiplied-block-row-matrix-b-product-matrix-c"
                    - text: . A grid of N/w by M/w blocks is launched, where each thread block calculates the elements of a different tile in C from a single tile of A and a single tile of B.
                  - 'figure "Figure 11 : Block-column matrix multiplied by block-row matrix. Block-column matrix (A) multiplied by block-row matrix (B) with resulting product matrix (C). " [ref=e1392]':
                    - img "Block-column matrix multiplied by block-row matrix. Block-column matrix (A) multiplied by block-row matrix (B) with resulting product matrix (C)." [ref=e1393]
                    - paragraph [ref=e1395]:
                      - text: "Figure 11 : Block-column matrix multiplied by block-row matrix. Block-column matrix (A) multiplied by block-row matrix (B) with resulting product matrix (C)."
                      - link "" [ref=e1396] [cursor=pointer]:
                        - /url: "#shared-memory-in-matrix-multiplication-c-ab-block-column-matrix-a-multiplied-block-row-matrix-b-product-matrix-c"
                  - paragraph [ref=e1397]:
                    - text: To do this, the
                    - code [ref=e1398]: simpleMultiply
                    - text: kernel (
                    - link "Unoptimized matrix multiplication" [ref=e1399] [cursor=pointer]:
                      - /url: "#unoptimized-matrix-multiplication-example"
                    - text: ) calculates the output elements of a tile of matrix C.
                  - paragraph [ref=e1400]: Unoptimized matrix multiplication
                  - generic [ref=e1402]:
                    - generic [ref=e1403]:
