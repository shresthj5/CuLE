                - paragraph [ref=e2336]:
                  - text: To obtain best performance in cases where the control flow depends on the thread ID, the controlling condition should be written so as to minimize the number of divergent warps. This is possible because the distribution of the warps across the block is deterministic as mentioned in the
                  - link "CUDA C++ Programming Guide" [ref=e2337] [cursor=pointer]:
                    - /url: https://docs.nvidia.com/cuda/cuda-c-programming-guide/index.html#simt-architecture
                  - text: . A trivial example is when the controlling condition only depends on (
                  - code [ref=e2338]: threadIdx / warpSize
                  - text: ) where
                  - code [ref=e2339]: warpSize
                  - text: is the warp size. In this case, no warp diverges since the controlling condition is perfectly aligned with the warps.
                - paragraph [ref=e2340]:
                  - text: Sometimes, the compiler may unroll loops or it may optimize out short
                  - code [ref=e2341]: if
                  - text: or
                  - code [ref=e2342]: switch
                  - text: blocks by using branch predication instead, as detailed below. In these cases, no warp can ever diverge. The programmer can also control loop unrolling using the
                  - code [ref=e2343]: "#pragma unroll"
                  - text: directive (see the
                  - link "CUDA C++ Programming Guide" [ref=e2344] [cursor=pointer]:
                    - /url: https://docs.nvidia.com/cuda/cuda-c-programming-guide/index.html#pragma-unroll
                  - text: ).
                - paragraph [ref=e2345]: When using branch predication none of the instructions whose execution depends on the controlling condition gets skipped. Instead, each of them is associated with a per-thread condition code or predicate that is set to true or false based on the controlling condition and although each of these instructions gets scheduled for execution, only the instructions with a true predicate are actually executed. Instructions with a false predicate do not write results, and also do not evaluate addresses or read operands.
