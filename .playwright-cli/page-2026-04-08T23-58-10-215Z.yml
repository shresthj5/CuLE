                    - /url: "#cuda-compute-capability"
                  - text: 2.0 and later support a special addressing mode called
                  - emphasis [ref=e1025]: Unified Virtual Addressing
                  - text: (UVA) on 64-bit Linux and Windows. With UVA, the host memory and the device memories of all installed supported devices share a single virtual address space.
                - paragraph [ref=e1026]:
                  - text: Prior to UVA, an application had to keep track of which pointers referred to device memory (and for which device) and which referred to host memory as a separate bit of metadata (or as hard-coded information in the program) for each pointer. Using UVA, on the other hand, the physical memory space to which a pointer points can be determined simply by inspecting the value of the pointer using
                  - code [ref=e1027]: cudaPointerGetAttributes()
                  - text: .
                - paragraph [ref=e1028]:
                  - text: Under UVA, pinned host memory allocated with
                  - code [ref=e1029]: cudaHostAlloc()
                  - text: will have identical host and device pointers, so it is not necessary to call
                  - code [ref=e1030]: cudaHostGetDevicePointer()
                  - text: for such allocations. Host memory allocations pinned after-the-fact via
                  - code [ref=e1031]: cudaHostRegister()
                  - text: ", however, will continue to have different device pointers than their host pointers, so"
                  - code [ref=e1032]: cudaHostGetDevicePointer()
                  - text: remains necessary in that case.
                - paragraph [ref=e1033]: UVA is also a necessary precondition for enabling peer-to-peer (P2P) transfer of data directly across the PCIe bus or NVLink for supported GPUs in supported configurations, bypassing host memory.
