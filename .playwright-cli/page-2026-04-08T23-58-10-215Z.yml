              - generic [ref=e3022]:
                - heading "16.3.1. CUDA Binary (cubin) Compatibility " [level=3] [ref=e3023]:
                  - text: 16.3.1. CUDA Binary (cubin) Compatibility
                  - link "" [ref=e3024] [cursor=pointer]:
                    - /url: "#cuda-binary-cubin-compatibility"
                - paragraph [ref=e3025]: A slightly related but important topic is one of application binary compatibility across GPU architectures in CUDA.
                - paragraph [ref=e3026]: CUDA C++ provides a simple path for users familiar with the C++ programming language to easily write programs for execution by the device. Kernels can be written using the CUDA instruction set architecture, called PTX, which is described in the PTX reference manual. It is however usually more effective to use a high-level programming language such as C++. In both cases, kernels must be compiled into binary code by nvcc (called cubins) to execute on the device.
                - paragraph [ref=e3027]:
                  - text: The cubins are architecture-specific. Binary compatibility for cubins is guaranteed from one compute capability minor revision to the next one, but not from one compute capability minor revision to the previous one or across major compute capability revisions. In other words, a cubin object generated for compute capability
                  - emphasis [ref=e3028]: X.y
                  - text: will only execute on devices of compute capability
                  - emphasis [ref=e3029]: X.z
                  - text: where
                  - emphasis [ref=e3030]: z≥y
                  - text: .
                - paragraph [ref=e3031]: To execute code on devices of specific compute capability, an application must load binary or PTX code that is compatible with this compute capability. For portability, that is, to be able to execute code on future GPU architectures with higher compute capability (for which no binary code can be generated yet), an application must load PTX code that will be just-in-time compiled by the NVIDIA driver for these future devices.
                - paragraph [ref=e3032]:
                  - text: More information on cubins, PTX and application compatibility can be found in the
                  - link "CUDA C++ Programming Guide" [ref=e3033] [cursor=pointer]:
                    - /url: https://docs.nvidia.com/cuda/cuda-c-programming-guide/index.html#binary-compatibility
                  - text: .
            - generic [ref=e3034]:
              - heading "16.4. CUDA Compatibility Across Minor Releases " [level=2] [ref=e3035]:
                - text: 16.4. CUDA Compatibility Across Minor Releases
                - link "" [ref=e3036] [cursor=pointer]:
