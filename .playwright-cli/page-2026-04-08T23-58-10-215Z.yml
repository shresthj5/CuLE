                  - heading "10.2.3.4. Asynchronous Copy from Global Memory to Shared Memory " [level=4] [ref=e1600]:
                    - text: 10.2.3.4. Asynchronous Copy from Global Memory to Shared Memory
                    - link "" [ref=e1601] [cursor=pointer]:
                      - /url: "#asynchronous-copy-from-global-memory-to-shared-memory"
                  - paragraph [ref=e1602]:
                    - text: CUDA 11.0 introduces an
                    - emphasis [ref=e1603]: async-copy
                    - text: feature that can be used within device code to explicitly manage the asynchronous copying of data from global memory to shared memory. This feature enables CUDA kernels to overlap copying data from global to shared memory with computation. It also avoids an intermediary register file access traditionally present between the global memory read and the shared memory write.
                  - paragraph [ref=e1604]:
                    - text: For more details refer to the
                    - code [ref=e1605]: memcpy_async
                    - text: section in the
                    - link "CUDA C++ Programming Guide" [ref=e1606] [cursor=pointer]:
                      - /url: https://docs.nvidia.com/cuda/cuda-c-programming-guide/index.html#async_data_operations
                    - text: .
                  - paragraph [ref=e1607]: To understand the performance difference between synchronous copy and asynchronous copy of data from global memory to shared memory, consider the following micro benchmark CUDA kernels for demonstrating the synchronous and asynchronous approaches. Asynchronous copies are hardware accelerated for NVIDIA A100 GPU.
                  - generic [ref=e1609]:
                    - generic [ref=e1610]:
                      - text: template <typename T>
                      - text: "__global__ void pipeline_kernel_sync(T *global, uint64_t *clock, size_t copy_count) {"
                      - text: extern __shared__ char s[];
                      - text: T *shared = reinterpret_cast<T *>(s);
                      - text: uint64_t clock_start = clock64();
                      - text: "for (size_t i = 0; i < copy_count; ++i) {"
                      - text: shared[blockDim.x * i + threadIdx.x] = global[blockDim.x * i + threadIdx.x];
                      - text: "}"
                      - text: uint64_t clock_end = clock64();
                      - text: atomicAdd(reinterpret_cast<unsigned long long *>(clock),
                      - text: clock_end - clock_start);
                      - text: "}"
                      - text: template <typename T>
                      - text: "__global__ void pipeline_kernel_async(T *global, uint64_t *clock, size_t copy_count) {"
                      - text: extern __shared__ char s[];
                      - text: T *shared = reinterpret_cast<T *>(s);
                      - text: uint64_t clock_start = clock64();
                      - text: "//pipeline pipe; for (size_t i = 0; i < copy_count; ++i) {"
                      - text: __pipeline_memcpy_async(&shared[blockDim.x * i + threadIdx.x],
                      - text: "&global[blockDim.x * i + threadIdx.x], sizeof(T));"
                      - text: "}"
                      - text: __pipeline_commit();
                      - text: __pipeline_wait_prior(0);
                      - text: uint64_t clock_end = clock64();
                      - text: atomicAdd(reinterpret_cast<unsigned long long *>(clock),
                      - text: clock_end - clock_start);
                      - text: "}"
                    - button "Copy to clipboard" [ref=e1611] [cursor=pointer]:
                      - img "Copy to clipboard" [ref=e1612]
                  - paragraph [ref=e1616]:
                    - text: The synchronous version for the kernel loads an element from global memory to an intermediate register and then stores the intermediate register value to shared memory. In the asynchronous version of the kernel, instructions to load from global memory and store directly into shared memory are issued as soon as
                    - code [ref=e1617]: __pipeline_memcpy_async()
                    - text: function is called. The
                    - code [ref=e1618]: __pipeline_wait_prior(0)
                    - text: will wait until all the instructions in the pipe object have been executed. Using asynchronous copies does not use any intermediate register. Not using intermediate registers can help reduce register pressure and can increase kernel occupancy. Data copied from global memory to shared memory using asynchronous copy instructions can be cached in the L1 cache or the L1 cache can be optionally bypassed. If individual CUDA threads are copying elements of 16 bytes, the L1 cache can be bypassed. This difference is illustrated in
                    - link "Figure 13" [ref=e1619] [cursor=pointer]:
                      - /url: "#async-copy-sync-vs-async-figure"
                    - text: .
                  - 'figure "Figure 13 : Comparing Synchronous vs Asynchronous Copy from Global Memory to Shared Memory " [ref=e1620]':
                    - link "Comparing Synchronous vs Asynchronous Copy from Global Memory to Shared Memory" [ref=e1621] [cursor=pointer]:
                      - /url: _images/sync-vs-async.png
                      - img "Comparing Synchronous vs Asynchronous Copy from Global Memory to Shared Memory" [ref=e1622]
                    - paragraph [ref=e1624]:
                      - text: "Figure 13 : Comparing Synchronous vs Asynchronous Copy from Global Memory to Shared Memory"
                      - link "" [ref=e1625] [cursor=pointer]:
                        - /url: "#async-copy-sync-vs-async-figure"
                  - paragraph [ref=e1626]:
                    - text: We evaluate the performance of both kernels using elements of size 4B, 8B and 16B per thread i.e., using
                    - code [ref=e1627]: int
                    - text: ","
                    - code [ref=e1628]: int2
                    - text: and
                    - code [ref=e1629]: int4
                    - text: for the template parameter. We adjust the
