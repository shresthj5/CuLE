            - heading "10. Memory Optimizations " [level=1] [ref=e860]:
              - text: 10. Memory Optimizations
              - link "" [ref=e861] [cursor=pointer]:
                - /url: "#memory-optimizations"
            - paragraph [ref=e862]: Memory optimizations are the most important area for performance. The goal is to maximize the use of the hardware by maximizing bandwidth. Bandwidth is best served by using as much fast memory and as little slow-access memory as possible. This chapter discusses the various kinds of memory on the host and device and how best to set up data items to use the memory effectively.
            - generic [ref=e863]:
              - heading "10.1. Data Transfer Between Host and Device " [level=2] [ref=e864]:
                - text: 10.1. Data Transfer Between Host and Device
                - link "" [ref=e865] [cursor=pointer]:
                  - /url: "#data-transfer-between-host-and-device"
              - paragraph [ref=e866]: The peak theoretical bandwidth between the device memory and the GPU is much higher (898 GB/s on the NVIDIA Tesla V100, for example) than the peak theoretical bandwidth between host memory and device memory (16 GB/s on the PCIe x16 Gen3). Hence, for best overall application performance, it is important to minimize data transfer between the host and the device, even if that means running kernels on the GPU that do not demonstrate any speedup compared with running them on the host CPU.
              - generic [ref=e867]:
                - paragraph [ref=e868]:  Note
                - paragraph [ref=e869]:
                  - strong [ref=e870]: "High Priority:"
                  - text: Minimize data transfer between the host and the device, even if it means running some kernels on the device that do not show performance gains when compared with running them on the host CPU.
              - paragraph [ref=e871]: Intermediate data structures should be created in device memory, operated on by the device, and destroyed without ever being mapped by the host or copied to host memory.
              - paragraph [ref=e872]: Also, because of the overhead associated with each transfer, batching many small transfers into one larger transfer performs significantly better than making each transfer separately, even if doing so requires packing non-contiguous regions of memory into a contiguous buffer and then unpacking after the transfer.
              - paragraph [ref=e873]:
                - text: Finally, higher bandwidth between the host and the device is achieved when using
                - emphasis [ref=e874]: page-locked
                - text: (or
                - emphasis [ref=e875]: pinned
                - text: ) memory, as discussed in the CUDA C++ Programming Guide and the
                - link "Pinned Memory" [ref=e876] [cursor=pointer]:
