                - paragraph [ref=e522]: Any CPU timer can be used to measure the elapsed time of a CUDA call or kernel execution. The details of various CPU timing approaches are outside the scope of this document, but developers should always be aware of the resolution their timing calls provide.
                - paragraph [ref=e523]:
                  - text: When using CPU timers, it is critical to remember that many CUDA API functions are asynchronous; that is, they return control back to the calling CPU thread prior to completing their work. All kernel launches are asynchronous, as are memory-copy functions with the
                  - code [ref=e524]: Async
                  - text: suffix on their names. Therefore, to accurately measure the elapsed time for a particular call or sequence of CUDA calls, it is necessary to synchronize the CPU thread with the GPU by calling
                  - code [ref=e525]: cudaDeviceSynchronize()
                  - text: immediately before starting and stopping the CPU timer.
                  - code [ref=e526]: cudaDeviceSynchronize()
                  - text: blocks the calling CPU thread until all CUDA calls previously issued by the thread are completed.
                - paragraph [ref=e527]:
                  - text: Although it is also possible to synchronize the CPU thread with a particular stream or event on the GPU, these synchronization functions are not suitable for timing code in streams other than the default stream.
                  - code [ref=e528]: cudaStreamSynchronize()
                  - text: blocks the CPU thread until all CUDA calls previously issued into the given stream have completed.
                  - code [ref=e529]: cudaEventSynchronize()
                  - text: blocks until a given event in a particular stream has been recorded by the GPU. Because the driver may interleave execution of CUDA calls from other non-default streams, calls in other streams may be included in the timing.
                - paragraph [ref=e530]: Because the default stream, stream 0, exhibits serializing behavior for work on the device (an operation in the default stream can begin only after all preceding calls in any stream have completed; and no subsequent operation in any stream can begin until it finishes), these functions can be used reliably for timing in the default stream.
                - paragraph [ref=e531]: Be aware that CPU-to-GPU synchronization points such as those mentioned in this section imply a stall in the GPU’s processing pipeline and should thus be used sparingly to minimize their performance impact.
