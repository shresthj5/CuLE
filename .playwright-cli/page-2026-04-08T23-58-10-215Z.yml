                  - generic [ref=e3384]:
                    - generic [ref=e3385]: nvcc.exe -ccbin "C:\vs2008\VC\bin" -Xcompiler "/EHsc /W3 /nologo /O2 /Zi /MT /DELAY" --cudart=shared -o "Release\myprogram.exe" "myprogram.cu"
