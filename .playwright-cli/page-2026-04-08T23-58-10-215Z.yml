                  - text: precision. Vector intrinsics (for example,
                  - code [ref=e2295]: __hadd2
                  - text: ","
                  - code [ref=e2296]: __hsub2
                  - text: ","
                  - code [ref=e2297]: __hmul2
                  - text: ","
                  - code [ref=e2298]: __hfma2
                  - text: ) can then be used to do two operations in a single instruction. Using
                  - code [ref=e2299]: half2
                  - text: or
                  - code [ref=e2300]: __nv_bfloat162
                  - text: in place of two calls using
