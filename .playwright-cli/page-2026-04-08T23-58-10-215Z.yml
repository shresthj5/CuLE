                - paragraph [ref=e489]:
                  - text: Devices of
                  - link "CUDA Compute Capability" [ref=e490] [cursor=pointer]:
                    - /url: "#cuda-compute-capability"
                  - text: 1.3 and higher provide native support for double-precision floating-point values (that is, values 64 bits wide). Results obtained using double-precision arithmetic will frequently differ from the same operation performed via single-precision arithmetic due to the greater precision of the former and due to rounding issues. Therefore, it is important to be sure to compare values of like precision and to express the results within a certain tolerance rather than expecting them to be exact.
              - generic [ref=e491]:
                - heading "7.3.2. Floating Point Math Is Not Associative " [level=3] [ref=e492]:
                  - text: 7.3.2. Floating Point Math Is Not Associative
                  - link "" [ref=e493] [cursor=pointer]:
                    - /url: "#floating-point-math-is-not-associative"
                - paragraph [ref=e494]: Each floating-point arithmetic operation involves a certain amount of rounding. Consequently, the order in which arithmetic operations are performed is important. If A, B, and C are floating-point values, (A+B)+C is not guaranteed to equal A+(B+C) as it is in symbolic math. When you parallelize computations, you potentially change the order of operations and therefore the parallel results might not match sequential results. This limitation is not specific to CUDA, but an inherent part of parallel computation on floating-point values.
              - generic [ref=e495]:
                - heading "7.3.3. IEEE 754 Compliance " [level=3] [ref=e496]:
                  - text: 7.3.3. IEEE 754 Compliance
                  - link "" [ref=e497] [cursor=pointer]:
                    - /url: "#ieee-754-compliance"
                - paragraph [ref=e498]: All CUDA compute devices follow the IEEE 754 standard for binary floating-point representation, with some small exceptions. These exceptions, which are detailed in Features and Technical Specifications of the CUDA C++ Programming Guide, can lead to results that differ from IEEE 754 values computed on the host system.
                - paragraph [ref=e499]: One of the key differences is the fused multiply-add (FMA) instruction, which combines multiply-add operations into a single instruction execution. Its result will often differ slightly from results obtained by doing the two operations separately.
              - generic [ref=e500]:
