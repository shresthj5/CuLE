          - generic [ref=e1780]:
            - heading "11. Execution Configuration Optimizations " [level=1] [ref=e1781]:
              - text: 11. Execution Configuration Optimizations
              - link "" [ref=e1782] [cursor=pointer]:
                - /url: "#execution-configuration-optimizations"
            - paragraph [ref=e1783]: One of the keys to good performance is to keep the multiprocessors on the device as busy as possible. A device in which work is poorly balanced across the multiprocessors will deliver suboptimal performance. Hence, it’s important to design your application to use threads and blocks in a way that maximizes hardware utilization and to limit practices that impede the free distribution of work. A key concept in this effort is occupancy, which is explained in the following sections.
            - paragraph [ref=e1784]: Hardware utilization can also be improved in some cases by designing your application so that multiple, independent kernels can execute at the same time. Multiple kernels executing at the same time is known as concurrent kernel execution. Concurrent kernel execution is described below.
            - paragraph [ref=e1785]: Another important concept is the management of system resources allocated for a particular task. How to manage this resource utilization is discussed in the final sections of this chapter.
            - generic [ref=e1786]:
              - heading "11.1. Occupancy " [level=2] [ref=e1787]:
                - text: 11.1. Occupancy
                - link "" [ref=e1788] [cursor=pointer]:
                  - /url: "#occupancy"
              - paragraph [ref=e1789]:
                - text: Thread instructions are executed sequentially in CUDA, and, as a result, executing other warps when one warp is paused or stalled is the only way to hide latencies and keep the hardware busy. Some metric related to the number of active warps on a multiprocessor is therefore important in determining how effectively the hardware is kept busy. This metric is
                - emphasis [ref=e1790]: occupancy
                - text: .
              - paragraph [ref=e1791]:
                - text: Occupancy is the ratio of the number of active warps per multiprocessor to the maximum number of possible active warps. (To determine the latter number, see the
                - code [ref=e1792]: deviceQuery
                - text: CUDA Sample or refer to
                - link "Compute Capabilities" [ref=e1793] [cursor=pointer]:
                  - /url: https://docs.nvidia.com/cuda/cuda-c-programming-guide/index.html#compute-capabilities
                - text: .) Another way to view occupancy is the percentage of the hardware’s ability to process warps that is actively in use.
              - paragraph [ref=e1794]: Higher occupancy does not always equate to higher performance-there is a point above which additional occupancy does not improve performance. However, low occupancy always interferes with the ability to hide memory latency, resulting in performance degradation.
              - paragraph [ref=e1795]:
                - text: Per thread resources required by a CUDA kernel might limit the maximum block size in an unwanted way. In order to maintain forward compatibility to future hardware and toolkits and to ensure that at least one thread block can run on an SM, developers should include the single argument
                - code [ref=e1796]: __launch_bounds__(maxThreadsPerBlock)
                - text: which specifies the largest block size that the kernel will be launched with. Failure to do so could lead to “too many resources requested for launch” errors. Providing the two argument version of
                - code [ref=e1797]: __launch_bounds__(maxThreadsPerBlock,minBlocksPerMultiprocessor)
                - text: can improve performance in some cases. The right value for
                - code [ref=e1798]: minBlocksPerMultiprocessor
                - text: should be determined using a detailed per kernel analysis.
              - generic [ref=e1799]:
                - heading "11.1.1. Calculating Occupancy " [level=3] [ref=e1800]:
                  - text: 11.1.1. Calculating Occupancy
                  - link "" [ref=e1801] [cursor=pointer]:
                    - /url: "#calculating-occupancy"
                - paragraph [ref=e1802]:
                  - text: One of several factors that determine occupancy is register availability. Register storage enables threads to keep local variables nearby for low-latency access. However, the set of registers (known as the
                  - emphasis [ref=e1803]: register file
                  - text: ) is a limited commodity that all threads resident on a multiprocessor must share. Registers are allocated to an entire block all at once. So, if each thread block uses many registers, the number of thread blocks that can be resident on a multiprocessor is reduced, thereby lowering the occupancy of the multiprocessor. The maximum number of registers per thread can be set manually at compilation time per-file using the
                  - code [ref=e1804]: "-maxrregcount"
                  - text: option or per-kernel using the
                  - code [ref=e1805]: __launch_bounds__
                  - text: qualifier (see
                  - link "Register Pressure" [ref=e1806] [cursor=pointer]:
                    - /url: "#register-pressure"
                  - text: ).
                - paragraph [ref=e1807]:
                  - text: For purposes of calculating occupancy, the number of registers used by each thread is one of the key factors. For example, on devices of
                  - link "CUDA Compute Capability" [ref=e1808] [cursor=pointer]:
                    - /url: "#cuda-compute-capability"
                  - text: 7.0 each multiprocessor has 65,536 32-bit registers and can have a maximum of 2048 simultaneous threads resident (64 warps x 32 threads per warp). This means that in one of these devices, for a multiprocessor to have 100% occupancy, each thread can use at most 32 registers. However, this approach of determining how register count affects occupancy does not take into account the register allocation granularity. For example, on a device of compute capability 7.0, a kernel with 128-thread blocks using 37 registers per thread results in an occupancy of 75% with 12 active 128-thread blocks per multi-processor, whereas a kernel with 320-thread blocks using the same 37 registers per thread results in an occupancy of 63% because only four 320-thread blocks can reside on a multiprocessor. Furthermore, register allocations are rounded up to the nearest 256 registers per warp.
                - paragraph [ref=e1809]:
                  - text: The number of registers available, the maximum number of simultaneous threads resident on each multiprocessor, and the register allocation granularity vary over different compute capabilities. Because of these nuances in register allocation and the fact that a multiprocessor’s shared memory is also partitioned between resident thread blocks, the exact relationship between register usage and occupancy can be difficult to determine. The
                  - code [ref=e1810]: "--ptxas options=v"
                  - text: option of
                  - code [ref=e1811]: nvcc
                  - text: details the number of registers used per thread for each kernel. See Hardware Multithreading of the CUDA C++ Programming Guide for the register allocation formulas for devices of various compute capabilities and Features and Technical Specifications of the CUDA C++ Programming Guide for the total number of registers available on those devices. Alternatively, NVIDIA provides an occupancy calculator as part of Nsight Compute; refer to
                  - link "https://docs.nvidia.com/nsight-compute/NsightCompute/index.html#occupancy-calculator" [ref=e1812] [cursor=pointer]:
                    - /url: https://docs.nvidia.com/nsight-compute/NsightCompute/index.html#occupancy-calculator
                  - text: .
                - 'figure "Figure 15 : Using the CUDA Occupancy Calculator to project GPU multiprocessor occupancy " [ref=e1813]':
                  - img "Using the CUDA Occupancy Calculator to project GPU multiprocessor occupancy" [ref=e1814]
                  - paragraph [ref=e1816]:
                    - text: "Figure 15 : Using the CUDA Occupancy Calculator to project GPU multiprocessor occupancy"
                    - link "" [ref=e1817] [cursor=pointer]:
                      - /url: "#cuda-occupancy-calculator-usage-project-gpu-multi-occupancy-figure"
                - paragraph [ref=e1818]:
                  - text: An application can also use the Occupancy API from the CUDA Runtime, e.g.
                  - code [ref=e1819]: cudaOccupancyMaxActiveBlocksPerMultiprocessor
                  - text: ", to dynamically select launch configurations based on runtime parameters."
            - generic [ref=e1820]:
              - heading "11.2. Hiding Register Dependencies " [level=2] [ref=e1821]:
                - text: 11.2. Hiding Register Dependencies
                - link "" [ref=e1822] [cursor=pointer]:
