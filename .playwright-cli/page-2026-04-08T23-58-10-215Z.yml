            - heading "19. Recommendations and Best Practices " [level=1] [ref=e3488]:
              - text: 19. Recommendations and Best Practices
              - link "" [ref=e3489] [cursor=pointer]:
                - /url: "#id98"
            - paragraph [ref=e3490]: This chapter contains a summary of the recommendations for optimization that are explained in this document.
            - generic [ref=e3491]:
              - heading "19.1. Overall Performance Optimization Strategies " [level=2] [ref=e3492]:
                - text: 19.1. Overall Performance Optimization Strategies
                - link "" [ref=e3493] [cursor=pointer]:
                  - /url: "#overall-performance-optimization-strategies"
              - paragraph [ref=e3494]: "Performance optimization revolves around three basic strategies:"
              - list [ref=e3495]:
                - listitem [ref=e3496]:
                  - paragraph [ref=e3497]: Maximizing parallel execution
                - listitem [ref=e3498]:
                  - paragraph [ref=e3499]: Optimizing memory usage to achieve maximum memory bandwidth
                - listitem [ref=e3500]:
                  - paragraph [ref=e3501]: Optimizing instruction usage to achieve maximum instruction throughput
              - paragraph [ref=e3502]: Maximizing parallel execution starts with structuring the algorithm in a way that exposes as much parallelism as possible. Once the parallelism of the algorithm has been exposed, it needs to be mapped to the hardware as efficiently as possible. This is done by carefully choosing the execution configuration of each kernel launch. The application should also maximize parallel execution at a higher level by explicitly exposing concurrent execution on the device through streams, as well as maximizing concurrent execution between the host and the device.
              - paragraph [ref=e3503]: Optimizing memory usage starts with minimizing data transfers between the host and the device because those transfers have much lower bandwidth than internal device data transfers. Kernel access to global memory also should be minimized by maximizing the use of shared memory on the device. Sometimes, the best optimization might even be to avoid any data transfer in the first place by simply recomputing the data whenever it is needed.
              - paragraph [ref=e3504]: The effective bandwidth can vary by an order of magnitude depending on the access pattern for each type of memory. The next step in optimizing memory usage is therefore to organize memory accesses according to the optimal memory access patterns. This optimization is especially important for global memory accesses, because latency of access costs hundreds of clock cycles. Shared memory accesses, in counterpoint, are usually worth optimizing only when there exists a high degree of bank conflicts.
              - paragraph [ref=e3505]: As for optimizing instruction usage, the use of arithmetic instructions that have low throughput should be avoided. This suggests trading precision for speed when it does not affect the end result, such as using intrinsics instead of regular functions or single precision instead of double precision. Finally, particular attention must be paid to control flow instructions due to the SIMT (single instruction multiple thread) nature of the device.
          - generic [ref=e3506]:
