        - generic [ref=e181]:
          - heading "1. Introduction" [level=2] [ref=e182]:
            - link "1. Introduction" [ref=e183] [cursor=pointer]:
              - /url: "#introduction"
          - generic [ref=e184]:
            - paragraph [ref=e185]: This guide describes various profiling topics related to NVIDIA Nsight Compute and NVIDIA Nsight Compute CLI. Most of these apply to both the UI and the CLI version of the tool.
            - generic [ref=e186]:
              - text: To use the tools effectively, it is recommended to read this guide, as well as at least the following chapters of the
              - term [ref=e187]: CUDA Programming Guide
              - text: ":"
              - list [ref=e188]:
                - listitem [ref=e189]:
                  - link "Programming Model" [ref=e190] [cursor=pointer]:
                    - /url: https://docs.nvidia.com/cuda/cuda-c-programming-guide/index.html#programming-model
                - listitem [ref=e191]:
                  - link "Hardware Implementation" [ref=e192] [cursor=pointer]:
                    - /url: https://docs.nvidia.com/cuda/cuda-c-programming-guide/index.html#hardware-implementation
                - listitem [ref=e193]:
                  - link "Performance Guidelines" [ref=e194] [cursor=pointer]:
                    - /url: https://docs.nvidia.com/cuda/cuda-c-programming-guide/index.html#performance-guidelines
              - text: Afterwards, it should be enough to read the
              - term [ref=e195]: Quickstart
              - text: chapter of the NVIDIA Nsight Compute or NVIDIA Nsight Compute CLI documentation, respectively, to start using the tools.
          - generic [ref=e196]:
            - heading "1.1. Profiling Applications" [level=3] [ref=e197]:
              - link "1.1. Profiling Applications" [ref=e198] [cursor=pointer]:
                - /url: "#profiling-applications"
            - generic [ref=e199]:
              - paragraph [ref=e200]: During regular execution, a CUDA application process will be launched by the user. It communicates directly with the CUDA user-mode driver, and potentially with the CUDA runtime library.
              - generic [ref=e201]:
                - text: Regular Application Execution
                - img [ref=e203]
              - paragraph [ref=e204]: When profiling an application with NVIDIA Nsight Compute, the behavior is different. The user launches the NVIDIA Nsight Compute frontend (either the UI or the CLI) on the host system, which in turn starts the actual application as a new process on the target system. While host and target are often the same machine, the target can also be a remote system with a potentially different operating system.
              - paragraph [ref=e205]: The tool inserts its measurement libraries into the application process, which allow the profiler to intercept communication with the CUDA user-mode driver. In addition, when a kernel launch is detected, the libraries can collect the requested performance metrics from the GPU. The results are then transferred back to the frontend.
              - generic [ref=e206]:
                - text: Profiled Application Execution
                - img [ref=e208]
        - generic [ref=e209]:
          - heading "2. Metric Collection" [level=2] [ref=e210]:
            - link "2. Metric Collection" [ref=e211] [cursor=pointer]:
              - /url: "#metric-collection"
          - paragraph [ref=e213]:
            - text: Collection of performance metrics is the key feature of NVIDIA Nsight Compute. Since there is a huge list of metrics available, it is often easier to use some of the tool's pre-defined
            - link "sets or sections" [ref=e214] [cursor=pointer]:
              - /url: index.html#sets-and-sections
            - text: to collect a commonly used subset. Users are free to adjust which metrics are collected for which kernels as needed, but it is important to keep in mind the
            - link "Overhead" [ref=e215] [cursor=pointer]:
              - /url: index.html#overhead
            - text: associated with data collection.
          - generic [ref=e216]:
            - heading "2.1. Sets and Sections" [level=3] [ref=e217]:
              - link "2.1. Sets and Sections" [ref=e218] [cursor=pointer]:
                - /url: "#sets-and-sections"
            - generic [ref=e219]:
              - paragraph [ref=e220]:
                - text: NVIDIA Nsight Compute uses
                - term [ref=e221]: Section Sets
                - text: (short
                - term [ref=e222]: sets
                - text: ) to decide, on a very high level, the amount of metrics to be collected. Each set includes one or more
                - term [ref=e223]: Sections
                - text: ", with each section specifying several logically associated metrics. For example, one section might include only high-level SM and memory utilization metrics, while another could include metrics associated with the memory units, or the HW scheduler."
              - paragraph [ref=e224]:
                - text: The number and type of metrics specified by a section has significant impact on the overhead during profiling. To allow you to quickly choose between a fast, less detailed profile and a slower, more comprehensive analysis, you can select the respective section set. See
                - link "Overhead" [ref=e225] [cursor=pointer]:
                  - /url: index.html#overhead
                - text: for more information on profiling overhead.
              - paragraph [ref=e226]: By default, a relatively small number of metrics is collected. Those mostly include high-level utilization information as well as static launch and occupancy data. The latter two are regularly available without replaying the kernel launch. The default set is collected when no --set, --section and no --metrics options are passed on the command line. The full set of sections can be collected with --set full.
              - paragraph [ref=e227]: Use --list-sets to see the list of currently available sets. Use --list-sections to see the list of currently available sections. The default search directory and the location of pre-defined section files are also called sections/. All related command line options can be found in the NVIDIA Nsight Compute CLI documentation.
          - generic [ref=e228]:
            - heading "2.2. Sections and Rules" [level=3] [ref=e229]:
              - link "2.2. Sections and Rules" [ref=e230] [cursor=pointer]:
                - /url: "#sections-and-rules"
            - table "Table 1. Available Sections" [ref=e234]:
              - caption [ref=e235]: Table 1. Available Sections
