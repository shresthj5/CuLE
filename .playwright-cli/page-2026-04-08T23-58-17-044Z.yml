            - generic [ref=e1126]:
              - generic [ref=e1127]:
                - heading "Overview" [level=3] [ref=e1128]
                - paragraph [ref=e1129]: In general, measurement values that lie outside the expected logical range of a metric can be attributed to one or more of the below root-causes. If values are exceeding such range, they are not clamped by the tool to their expected value on purpose to ensure that the rest of the profiler report remains self-consistent.
              - generic [ref=e1130]:
                - heading "Asynchronous GPU activity" [level=3] [ref=e1131]
                - paragraph [ref=e1132]: GPU engines other than the one measured by a metric (display, copy engine, video encoder, video decoder, etc.) potentially access shared resources during profiling. Such chip-global shared resources include L2, DRAM, PCIe, and NVLINK. If the kernel launch is small, the other engine(s) can cause significant confusion in e.g. the DRAM results, since it is not possible to isolate the DRAM traffic of the SM. To reduce the impact of such asynchronous units, consider profiling on a GPU without active display and without other processes that can access the GPU at the time.
              - generic [ref=e1133]:
