              - generic [ref=e519]:
                - paragraph [ref=e520]:
                  - text: In
                  - term [ref=e521]: Application Range Replay
                  - text: ", all requested metrics in NVIDIA Nsight Compute are grouped into one or more passes. Similar to"
                  - link "Range Replay" [ref=e522] [cursor=pointer]:
                    - /url: index.html#range-replay
                  - text: ", metrics are not associated with individual kernels but with the entire selected range. This allows the tool to execute workloads (kernels, CUDA graphs, ...) without serialization and thereby supports profiling workloads that must be run concurrently for correctness or performance reasons."
                - paragraph [ref=e523]: In contrast to Range Replay, the range is not explicitly captured and executed directly for each pass, but instead the entire application is re-run multiple times, with one pass collected for each range in every application execution. This has the benefit that no application state must be observed and captured for each range and API calls within the range do not need to be supported explicitly, as correct execution of the range is handled by the application itself.
                - paragraph [ref=e524]:
                  - text: Defining ranges to profile is identical to
                  - link "Range Replay" [ref=e525] [cursor=pointer]:
                    - /url: index.html#range-replay-define-range
                  - text: . The CUDA context for which the range should be profiled must be current to the thread defining the start of the range and must be active for the entire range.
                - generic [ref=e526]:
                  - text: Execution with Application Range Replay. An range of workloads is replayed by re-running the entire application without modifying interactions or saving and restoring memory.
                  - img [ref=e528]
