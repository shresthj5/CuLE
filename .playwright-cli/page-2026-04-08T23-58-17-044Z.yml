                - generic [ref=e854]:
                  - strong [ref=e855]: Throughputs
                  - text: "indicate how close a portion of the GPU reached to peak rate. Every throughput has the following sub-metrics:"
                  - table [ref=e856]:
                    - rowgroup [ref=e857]:
                      - row ".pct_of_peak_sustained_active % of peak sustained rate achieved during unit active cycles" [ref=e858]:
                        - cell ".pct_of_peak_sustained_active" [ref=e859]
                        - cell "% of peak sustained rate achieved during unit active cycles" [ref=e860]
                      - row ".pct_of_peak_sustained_elapsed % of peak sustained rate achieved during unit elapsed cycles" [ref=e861]:
                        - cell ".pct_of_peak_sustained_elapsed" [ref=e862]
                        - cell "% of peak sustained rate achieved during unit elapsed cycles" [ref=e863]
                      - row ".pct_of_peak_sustained_region % of peak sustained rate achieved over a user-specified \"range\" time" [ref=e864]:
                        - cell ".pct_of_peak_sustained_region" [ref=e865]
                        - cell "% of peak sustained rate achieved over a user-specified \"range\" time" [ref=e866]
                      - row ".pct_of_peak_sustained_frame % of peak sustained rate achieved over a user-specified \"frame\" time" [ref=e867]:
                        - cell ".pct_of_peak_sustained_frame" [ref=e868]
                        - cell "% of peak sustained rate achieved over a user-specified \"frame\" time" [ref=e869]
                - paragraph [ref=e870]:
                  - text: "Example:"
                  - generic [ref=e871]: ncu --query-metrics-mode suffix --metrics sm__throughput --chip ga100
                - paragraph [ref=e872]: Throughputs have a breakdown of underlying metrics from which the throughput value is computed. You can collect breakdown:<throughput-metric> to collect a throughput's breakdown metrics.
                - generic [ref=e873]:
                  - strong [ref=e874]: "Deprecated counter sub-metrics:"
                  - text: "The following sub-metrics were removed in NVIDIA Nsight Compute 2022.2.0, due to not being useful for performance optimization:"
                  - table [ref=e875]:
