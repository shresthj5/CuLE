                - row "Identifier and Filename Description" [ref=e237]:
                  - columnheader "Identifier and Filename" [ref=e238]
                  - columnheader "Description" [ref=e239]
              - rowgroup [ref=e240]:
                - row "ComputeWorkloadAnalysis (Compute Workload Analysis) Detailed analysis of the compute resources of the streaming multiprocessors (SM), including the achieved instructions per clock (IPC) and the utilization of each available pipeline. Pipelines with very high utilization might limit the overall performance." [ref=e241]:
                  - cell "ComputeWorkloadAnalysis (Compute Workload Analysis)" [ref=e242]
                  - cell "Detailed analysis of the compute resources of the streaming multiprocessors (SM), including the achieved instructions per clock (IPC) and the utilization of each available pipeline. Pipelines with very high utilization might limit the overall performance." [ref=e243]
                - row "InstructionStats (Instruction Statistics) Statistics of the executed low-level assembly instructions (SASS). The instruction mix provides insight into the types and frequency of the executed instructions. A narrow mix of instruction types implies a dependency on few instruction pipelines, while others remain unused. Using multiple pipelines allows hiding latencies and enables parallel execution." [ref=e244]:
                  - cell "InstructionStats (Instruction Statistics)" [ref=e245]
                  - cell "Statistics of the executed low-level assembly instructions (SASS). The instruction mix provides insight into the types and frequency of the executed instructions. A narrow mix of instruction types implies a dependency on few instruction pipelines, while others remain unused. Using multiple pipelines allows hiding latencies and enables parallel execution." [ref=e246]
                - row "LaunchStats (Launch Statistics) Summary of the configuration used to launch the kernel. The launch configuration defines the size of the kernel grid, the division of the grid into blocks, and the GPU resources needed to execute the kernel. Choosing an efficient launch configuration maximizes device utilization." [ref=e247]:
                  - cell "LaunchStats (Launch Statistics)" [ref=e248]
                  - cell "Summary of the configuration used to launch the kernel. The launch configuration defines the size of the kernel grid, the division of the grid into blocks, and the GPU resources needed to execute the kernel. Choosing an efficient launch configuration maximizes device utilization." [ref=e249]
                - row "MemoryWorkloadAnalysis (Memory Workload Analysis) Detailed analysis of the memory resources of the GPU. Memory can become a limiting factor for the overall kernel performance when fully utilizing the involved hardware units (Mem Busy), exhausting the available communication bandwidth between those units (Max Bandwidth), or by reaching the maximum throughput of issuing memory instructions (Mem Pipes Busy). Depending on the limiting factor, the memory chart and tables allow to identify the exact bottleneck in the memory system." [ref=e250]:
                  - cell "MemoryWorkloadAnalysis (Memory Workload Analysis)" [ref=e251]
                  - cell "Detailed analysis of the memory resources of the GPU. Memory can become a limiting factor for the overall kernel performance when fully utilizing the involved hardware units (Mem Busy), exhausting the available communication bandwidth between those units (Max Bandwidth), or by reaching the maximum throughput of issuing memory instructions (Mem Pipes Busy). Depending on the limiting factor, the memory chart and tables allow to identify the exact bottleneck in the memory system." [ref=e252]
                - row "NUMA Affinity (NumaAffinity) Non-uniform memory access (NUMA) affinities based on compute and memory distances for all GPUs." [ref=e253]:
                  - cell "NUMA Affinity (NumaAffinity)" [ref=e254]
                  - cell "Non-uniform memory access (NUMA) affinities based on compute and memory distances for all GPUs." [ref=e255]
                - row "Nvlink (Nvlink) High-level summary of NVLink utilization. It shows the total received and transmitted (sent) memory, as well as the overall link peak utilization." [ref=e256]:
                  - cell "Nvlink (Nvlink)" [ref=e257]
                  - cell "High-level summary of NVLink utilization. It shows the total received and transmitted (sent) memory, as well as the overall link peak utilization." [ref=e258]
                - row "Nvlink_Tables (Nvlink_Tables) Detailed tables with properties for each NVLink." [ref=e259]:
                  - cell "Nvlink_Tables (Nvlink_Tables)" [ref=e260]
                  - cell "Detailed tables with properties for each NVLink." [ref=e261]
                - row "Nvlink_Topology (Nvlink_Topology) NVLink Topology diagram shows logical NVLink connections with transmit/receive throughput." [ref=e262]:
                  - cell "Nvlink_Topology (Nvlink_Topology)" [ref=e263]
                  - cell "NVLink Topology diagram shows logical NVLink connections with transmit/receive throughput." [ref=e264]
                - row "Occupancy (Occupancy) Occupancy is the ratio of the number of active warps per multiprocessor to the maximum number of possible active warps. Another way to view occupancy is the percentage of the hardware's ability to process warps that is actively in use. Higher occupancy does not always result in higher performance, however, low occupancy always reduces the ability to hide latencies, resulting in overall performance degradation. Large discrepancies between the theoretical and the achieved occupancy during execution typically indicates highly imbalanced workloads." [ref=e265]:
                  - cell "Occupancy (Occupancy)" [ref=e266]
                  - cell "Occupancy is the ratio of the number of active warps per multiprocessor to the maximum number of possible active warps. Another way to view occupancy is the percentage of the hardware's ability to process warps that is actively in use. Higher occupancy does not always result in higher performance, however, low occupancy always reduces the ability to hide latencies, resulting in overall performance degradation. Large discrepancies between the theoretical and the achieved occupancy during execution typically indicates highly imbalanced workloads." [ref=e267]
                - row "SchedulerStats (Scheduler Statistics) Summary of the activity of the schedulers issuing instructions. Each scheduler maintains a pool of warps that it can issue instructions for. The upper bound of warps in the pool (Theoretical Warps) is limited by the launch configuration. On every cycle each scheduler checks the state of the allocated warps in the pool (Active Warps). Active warps that are not stalled (Eligible Warps) are ready to issue their next instruction. From the set of eligible warps, the scheduler selects a single warp from which to issue one or more instructions (Issued Warp). On cycles with no eligible warps, the issue slot is skipped and no instruction is issued. Having many skipped issue slots indicates poor latency hiding." [ref=e268]:
                  - cell "SchedulerStats (Scheduler Statistics)" [ref=e269]
                  - cell "Summary of the activity of the schedulers issuing instructions. Each scheduler maintains a pool of warps that it can issue instructions for. The upper bound of warps in the pool (Theoretical Warps) is limited by the launch configuration. On every cycle each scheduler checks the state of the allocated warps in the pool (Active Warps). Active warps that are not stalled (Eligible Warps) are ready to issue their next instruction. From the set of eligible warps, the scheduler selects a single warp from which to issue one or more instructions (Issued Warp). On cycles with no eligible warps, the issue slot is skipped and no instruction is issued. Having many skipped issue slots indicates poor latency hiding." [ref=e270]
                - row "SourceCounters (Source Counters) Source metrics, including branch efficiency and sampled warp stall reasons. Warp Stall Sampling metrics are periodically sampled over the kernel runtime. They indicate when warps were stalled and couldn't be scheduled. See the documentation for a description of all stall reasons. Only focus on stalls if the schedulers fail to issue every cycle." [ref=e271]:
                  - cell "SourceCounters (Source Counters)" [ref=e272]
                  - cell "Source metrics, including branch efficiency and sampled warp stall reasons. Warp Stall Sampling metrics are periodically sampled over the kernel runtime. They indicate when warps were stalled and couldn't be scheduled. See the documentation for a description of all stall reasons. Only focus on stalls if the schedulers fail to issue every cycle." [ref=e273]
                - row "SpeedOfLight (GPU Speed Of Light Throughput) High-level overview of the throughput for compute and memory resources of the GPU. For each unit, the throughput reports the achieved percentage of utilization with respect to the theoretical maximum. Breakdowns show the throughput for each individual sub-metric of Compute and Memory to clearly identify the highest contributor." [ref=e274]:
                  - cell "SpeedOfLight (GPU Speed Of Light Throughput)" [ref=e275]
                  - cell "High-level overview of the throughput for compute and memory resources of the GPU. For each unit, the throughput reports the achieved percentage of utilization with respect to the theoretical maximum. Breakdowns show the throughput for each individual sub-metric of Compute and Memory to clearly identify the highest contributor." [ref=e276]
                - row "WarpStateStats (Warp State Statistics) Analysis of the states in which all warps spent cycles during the kernel execution. The warp states describe a warp's readiness or inability to issue its next instruction. The warp cycles per instruction define the latency between two consecutive instructions. The higher the value, the more warp parallelism is required to hide this latency. For each warp state, the chart shows the average number of cycles spent in that state per issued instruction. Stalls are not always impacting the overall performance nor are they completely avoidable. Only focus on stall reasons if the schedulers fail to issue every cycle." [ref=e277]:
