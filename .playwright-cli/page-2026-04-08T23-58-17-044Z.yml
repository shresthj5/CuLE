        - generic [ref=e1678]:
          - heading "5. Sampling" [level=2] [ref=e1679]:
            - link "5. Sampling" [ref=e1680] [cursor=pointer]:
              - /url: "#sampling"
          - generic [ref=e1681]:
            - paragraph [ref=e1682]: NVIDIA Nsight Compute supports periodic sampling of the warp program counter and warp scheduler state on desktop devices of compute capability 6.1 and above.
            - paragraph [ref=e1683]: At a fixed interval of cycles, the sampler in each streaming multiprocessor selects an active warp and outputs the program counter and the warp scheduler state. The tool selects the minimum interval for the device. On small devices, this can be every 32 cycles. On larger chips with more multiprocessors, this may be 2048 cycles. The sampler selects a random active warp. On the same cycle the scheduler may select a different warp to issue.
          - generic [ref=e1684]:
            - heading "5.1. Warp Scheduler States" [level=3] [ref=e1685]:
              - link "5.1. Warp Scheduler States" [ref=e1686] [cursor=pointer]:
                - /url: "#statistical-sampler"
            - paragraph [ref=e1688]:
              - text: See the Warp Stall Reasons tables in the
              - link "Metrics Reference" [ref=e1689] [cursor=pointer]:
                - /url: index.html#metrics-reference
              - text: for a description of the individual warp scheduler states.
        - generic [ref=e1690]:
          - heading "6. Reproducibility" [level=2] [ref=e1691]:
            - link "6. Reproducibility" [ref=e1692] [cursor=pointer]:
              - /url: "#reproducibility"
          - paragraph [ref=e1694]:
            - text: In order to provide actionable and deterministic results across application runs, NVIDIA Nsight Compute applies various methods to adjust how metrics are collected. This includes
            - link "serializing" [ref=e1695] [cursor=pointer]:
              - /url: index.html#serialization
            - text: kernel launches,
            - link "purging GPU caches" [ref=e1696] [cursor=pointer]:
              - /url: index.html#cache-control
            - text: before each kernel replay or
            - link "adjusting GPU clocks" [ref=e1697] [cursor=pointer]:
              - /url: index.html#clock-control
            - text: .
          - generic [ref=e1698]:
            - heading "6.1. Serialization" [level=3] [ref=e1699]:
              - link "6.1. Serialization" [ref=e1700] [cursor=pointer]:
                - /url: "#serialization"
            - generic [ref=e1701]:
              - paragraph [ref=e1702]: NVIDIA Nsight Compute serializes kernel launches within the profiled application, potentially across multiple processes profiled by one or more instances of the tool at the same time.
              - paragraph [ref=e1703]:
                - text: Serialization across processes is necessary since for the collection of HW performance metrics, some GPU and driver objects can only be acquired by a single process at a time. To achieve this, the lock file TMPDIR/nsight-compute-lock is used. On Windows,
                - term [ref=e1704]: TMPDIR
                - text: is the path returned by the Windows GetTempPath API function. On other platforms, it is the path supplied by the first environment variable in the list TMPDIR, TMP, TEMP, TEMPDIR. If none of these is found, it's /var/nvidia on QNX and /tmp otherwise.
              - paragraph [ref=e1705]: Serialization within the process is required for most metrics to be mapped to the proper kernel. In addition, without serialization, performance metric values might vary widely if kernel execute concurrently on the same device.
              - paragraph [ref=e1706]:
                - text: It is currently not possible to disable this tool behavior. Refer to the
                - link "FAQ" [ref=e1707] [cursor=pointer]:
                  - /url: index.html#faq
                - text: entry on possible workarounds.
          - generic [ref=e1708]:
            - heading "6.2. Clock Control" [level=3] [ref=e1709]:
              - link "6.2. Clock Control" [ref=e1710] [cursor=pointer]:
                - /url: "#clock-control"
            - generic [ref=e1711]:
              - paragraph [ref=e1712]: For many metrics, their value is directly influenced by the current GPU SM and memory clock frequencies. For example, if a kernel instance is profiled that has prior kernel executions in the application, the GPU might already be in a higher clocked state and the measured kernel duration, along with other metrics, will be affected. Likewise, if a kernel instance is the first kernel to be launched in the application, GPU clocks will regularly be lower. In addition, due to kernel replay, the metric value might depend on which replay pass it is collected in, as later passes would result in higher clock states.
              - paragraph [ref=e1713]:
                - text: To mitigate this non-determinism, NVIDIA Nsight Compute attempts to limit GPU clock frequencies to their
                - term [ref=e1714]: base
                - text: value. As a result, metric values are less impacted by the location of the kernel in the application, or by the number of the specific replay pass.
              - paragraph [ref=e1715]: However, this behavior might be undesirable for analysis of the kernel, e.g. in cases where an external tool is used to fix clock frequencies, or where the behavior of the kernel within the application is analyzed. To solve this, users can adjust the --clock-control option to specify if any clock frequencies should be fixed by the tool.
              - generic [ref=e1716]:
                - text: "Factors affecting Clock Control:"
                - list [ref=e1717]:
                  - listitem [ref=e1718]: Note that thermal throttling directed by the driver cannot be controlled by the tool and always overrides any selected options.
                  - listitem [ref=e1719]:
                    - text: On mobile targets, e.g. L4T or QNX, there may be variations in profiling results due the inability for the tool to lock clocks. Using Nsight Compute’s --clock-control to set the GPU clocks will fail or will be silently ignored when profiling on a GPU partition.
                    - list [ref=e1720]:
                      - listitem [ref=e1721]: On L4T, you can use the jetson_clocks script to lock the clocks at their maximums during profiling.
                  - listitem [ref=e1722]:
                    - text: See the
                    - link "Special Configurations" [ref=e1723] [cursor=pointer]:
                      - /url: index.html#special-configurations
                    - text: section for MIG and vGPU clock control.
          - generic [ref=e1724]:
            - heading "6.3. Cache Control" [level=3] [ref=e1725]:
              - link "6.3. Cache Control" [ref=e1726] [cursor=pointer]:
                - /url: "#cache-control"
            - generic [ref=e1727]:
              - paragraph [ref=e1728]:
                - text: As explained in
                - link "Kernel Replay" [ref=e1729] [cursor=pointer]:
                  - /url: index.html#kernel-replay
                - text: ", the kernel might need to be replayed multiple times to collect all requested metrics. While NVIDIA Nsight Compute can save and restore the contents of GPU device memory accessed by the kernel for each pass, it cannot do the same for the contents of HW caches, such as e.g. the L1 and L2 cache."
              - paragraph [ref=e1730]: This can have the effect that later replay passes might have better or worse performance than e.g. the first pass, as the caches could already be primed with the data last accessed by the kernel. Similarly, the values of HW performance counters collected by the first pass might depend on which kernels, if any, were executed prior to the measured kernel launch.
              - paragraph [ref=e1731]: In order to make HW performance counter value more deterministic, NVIDIA Nsight Compute by default flushes all GPU caches before each replay pass. As a result, in each pass, the kernel will access a clean cache and the behavior will be as if the kernel was executed in complete isolation.
              - paragraph [ref=e1732]: This behavior might be undesirable for performance analysis, especially if the measurement focuses on a kernel within a larger application execution, and if the collected data targets cache-centric metrics. In this case, you can use --cache-control none to disable flushing of any HW cache by the tool.
          - generic [ref=e1733]:
            - heading "6.4. Persistence Mode" [level=3] [ref=e1734]:
              - link "6.4. Persistence Mode" [ref=e1735] [cursor=pointer]:
                - /url: "#persistence-mode"
            - generic [ref=e1736]:
              - paragraph [ref=e1737]: The NVIDIA kernel mode driver must be running and connected to a target GPU device before any user interactions with that device can take place. The driver behavior differs depending on the OS. Generally, on Linux, if the kernel mode driver is not already running or connected to a target GPU, the invocation of any program that attempts to interact with that GPU will transparently cause the driver to load and/or initialize the GPU. When all GPU clients terminate the driver will then deinitialize the GPU.
              - paragraph [ref=e1738]:
                - text: If
                - link "persistence mode" [ref=e1739] [cursor=pointer]:
                  - /url: https://docs.nvidia.com/deploy/driver-persistence/index.html
                - text: is not enabled (as part of the OS, or by the user), applications triggering GPU initialization may incur a short startup cost. In addition, on some configurations, there may also be a shutdown cost when the GPU is de-initialized at the end of the application.
              - paragraph [ref=e1740]: It is recommended to enable persistence mode on applicable operating systems before profiling with NVIDIA Nsight Compute for more consistent application behavior.
        - generic [ref=e1741]:
          - heading "7. Special Configurations" [level=2] [ref=e1742]:
            - link "7. Special Configurations" [ref=e1743] [cursor=pointer]:
              - /url: "#special-configurations"
          - generic:
            - paragraph
          - generic [ref=e1744]:
            - heading "7.1. Multi Instance GPU" [level=3] [ref=e1745]:
              - link "7.1. Multi Instance GPU" [ref=e1746] [cursor=pointer]:
                - /url: "#special-configurations-mig"
            - generic [ref=e1747]:
              - paragraph [ref=e1748]: "Multi-Instance GPU (MIG) is a feature that allows a GPU to be partitioned into multiple CUDA devices. The partitioning is carried out on two levels: First, a GPU can be split into one or multiple GPU Instances. Each GPU Instance claims ownership of one or more streaming multiprocessors (SM), a subset of the overall GPU memory, and possibly other GPU resources, such as the video encoders/decoders. Second, each GPU Instance can be further partitioned into one or more Compute Instances. Each Compute Instance has exclusive ownership of its assigned SMs of the GPU Instance. However, all Compute Instances within a GPU Instance share the GPU Instance's memory and memory bandwidth. Every Compute Instance acts and operates as a CUDA device with a unique device ID. See the driver release notes as well as the documentation for the nvidia-smi CLI tool for more information on how to configure MIG instances."
              - paragraph [ref=e1749]:
                - text: "For profiling, a Compute Instance can be of one of two types:"
                - term [ref=e1750]: isolated
                - text: or
                - term [ref=e1751]: shared
                - text: .
              - paragraph [ref=e1752]:
                - text: An
                - term [ref=e1753]: isolated
                - text: Compute Instance owns all of its assigned resources and does not share any GPU unit with another Compute Instance. In other words, the Compute Instance is the same size as its parent GPU Instance and consequently does not have any other sibling Compute Instances. Profiling works as usual for isolated Compute Instances.
              - paragraph [ref=e1754]:
                - text: A
                - term [ref=e1755]: shared
                - text: Compute Instance uses GPU resources that can potentially also be accessed by other Compute Instances in the same GPU Instance. Due to this resource sharing, collecting profiling data from those shared units is not permitted. Attempts to collect metrics from a shared unit fail with an error message of ==ERROR== Failed to access the following metrics. When profiling on a MIG instance, it is not possible to collect metrics from GPU units that are shared with other MIG instances followed by the list of failing metrics. Collecting only metrics from GPU units that are exclusively owned by a shared Compute Instance is still possible.
              - generic [ref=e1756]:
                - heading "Locking Clocks" [level=3] [ref=e1757]
                - paragraph [ref=e1758]:
                  - text: NVIDIA Nsight Compute is not able to set the clock frequency on any Compute Instance for profiling. You can continue analyzing kernels without fixed clock frequencies (using --clock-control none; see
                  - link "here" [ref=e1759] [cursor=pointer]:
                    - /url: index.html#clock-control
                  - text: for more details). If you have sufficient permissions, nvidia-smi can be used to configure a fixed frequency for the whole GPU by calling nvidia-smi --lock-gpu-clocks=tdp,tdp. This sets the GPU clocks to the base TDP frequency until you reset the clocks by calling nvidia-smi --reset-gpu-clocks.
              - generic [ref=e1760]:
                - heading "MIG on Baremetal (non-vGPU)" [level=3] [ref=e1761]
                - paragraph [ref=e1762]: All Compute Instances on a GPU share the same clock frequencies.
              - generic [ref=e1763]:
                - heading "MIG on NVIDIA vGPU" [level=3] [ref=e1764]
                - paragraph [ref=e1765]: Enabling profiling for a VM gives the VM access to the GPU's global performance counters, which may include activity from other VMs executing on the same GPU. Enabling profiling for a VM also allows the VM to lock clocks on the GPU, which impacts all other VMs executing on the same GPU, including MIG Compute Instances.
        - generic [ref=e1766]:
          - heading "8. Roofline Charts" [level=2] [ref=e1767]:
            - link "8. Roofline Charts" [ref=e1768] [cursor=pointer]:
              - /url: "#roofline"
          - paragraph [ref=e1770]: Roofline charts provide a very helpful way to visualize achieved performance on complex processing units, like GPUs. This section introduces the Roofline charts that are presented within a profile report.
          - generic [ref=e1771]:
            - heading "8.1. Overview" [level=3] [ref=e1772]:
              - link "8.1. Overview" [ref=e1773] [cursor=pointer]:
                - /url: "#roofline-overview"
            - generic [ref=e1774]:
              - paragraph [ref=e1775]:
                - text: Kernel performance is not only dependent on the operational speed of the GPU. Since a kernel requires data to work on, performance is also dependent on the rate at which the GPU can feed data to the kernel. A typical roofline chart combines the peak performance and memory bandwidth of the GPU, with a metric called
                - term [ref=e1776]: Arithmetic Intensity
                - text: (a ratio between
                - term [ref=e1777]: Work
                - text: and
                - term [ref=e1778]: Memory Traffic
                - text: "), into a single chart, to more realistically represent the achieved performance of the profiled kernel. A simple roofline chart might look like the following:"
              - generic [ref=e1779]:
                - text: Roofline overview.
                - img [ref=e1781]
              - generic [ref=e1782]:
                - text: "This chart actually shows two different rooflines. However, the following components can be identified for each:"
                - list [ref=e1783]:
                  - listitem [ref=e1784]:
                    - strong [ref=e1785]:
                      - term [ref=e1786]: Vertical Axis
                    - text: "- The vertical axis represents"
                    - term [ref=e1787]: Floating Point Operations per Second
                    - text: (FLOPS). For GPUs this number can get quite large and so the numbers on this axis can be scaled for easier reading (as shown here). In order to better accommodate the range, this axis is rendered using a logarithmic scale.
                  - listitem [ref=e1788]:
                    - strong [ref=e1789]:
                      - term [ref=e1790]: Horizontal Axis
                    - text: "- The horizontal axis represents"
                    - term [ref=e1791]: Arithmetic Intensity
                    - text: ", which is the ratio between"
                    - term [ref=e1792]: Work
                    - text: (expressed in floating point operations per second), and
                    - term [ref=e1793]: Memory Traffic
                    - text: (expressed in bytes per second). The resulting unit is in floating point operations per byte. This axis is also shown using a logarithmic scale.
                  - listitem [ref=e1794]:
                    - strong [ref=e1795]:
                      - term [ref=e1796]: Memory Bandwidth Boundary
                    - text: "- The memory bandwidth boundary is the"
                    - emphasis [ref=e1797]: sloped
                    - text: part of the roofline. By default, this slope is determined entirely by the memory transfer rate of the GPU but can be customized inside the
                    - term [ref=e1798]: SpeedOfLight_RooflineChart.section
                    - text: file if desired.
                  - listitem [ref=e1799]:
                    - strong [ref=e1800]:
                      - term [ref=e1801]: Peak Performance Boundary
                    - text: "- The peak performance boundary is the"
                    - emphasis [ref=e1802]: flat
                    - text: part of the roofline By default, this value is determined entirely by the peak performance of the GPU but can be customized inside the
                    - term [ref=e1803]: SpeedOfLight_RooflineChart.section
                    - text: file if desired.
                  - listitem [ref=e1804]:
                    - strong [ref=e1805]:
                      - term [ref=e1806]: Ridge Point
                    - text: "- The ridge point is the point at which the memory bandwidth boundary meets the peak performance boundary. This point is a useful reference when analyzing kernel performance."
                  - listitem [ref=e1807]:
                    - strong [ref=e1808]:
                      - term [ref=e1809]: Achieved Value
                    - text: "- The achieved value represents the performance of the profiled kernel. If baselines are being used, the roofline chart will also contain an achieved value for each baseline. The outline color of the plotted achieved value point can be used to determine from which baseline the point came."
          - generic [ref=e1810]:
            - heading "8.2. Analysis" [level=3] [ref=e1811]:
              - link "8.2. Analysis" [ref=e1812] [cursor=pointer]:
                - /url: "#roofline-analysis"
            - generic [ref=e1813]:
              - paragraph [ref=e1814]: The roofline chart can be very helpful in guiding performance optimization efforts for a particular kernel.
              - generic [ref=e1815]:
                - text: Roofline anaysis.
                - img [ref=e1817]
              - paragraph [ref=e1818]:
                - text: As shown here, the
                - term [ref=e1819]: ridge point
                - text: partitions the roofline chart into two regions. The area shaded in blue under the sloped
                - term [ref=e1820]: Memory Bandwidth Boundary
                - text: is the
                - term [ref=e1821]: Memory Bound
                - text: region, while the area shaded in green under the
                - term [ref=e1822]: Peak Performance Boundary
                - text: is the
                - term [ref=e1823]: Compute Bound
                - text: region. The region in which the
                - term [ref=e1824]: achieved value
                - text: falls, determines the current limiting factor of kernel performance.
              - paragraph [ref=e1825]:
                - text: The distance from the
                - term [ref=e1826]: achieved value
                - text: to the respective roofline boundary (shown in this figure as a dotted white line), represents the opportunity for performance improvement. The closer the
                - term [ref=e1827]: achieved value
                - text: is to the roofline boundary, the more optimal is its performance. An
                - term [ref=e1828]: achieved value
                - text: that lies on the
                - term [ref=e1829]: Memory Bandwidth Boundary
                - text: but is not yet at the height of the
                - term [ref=e1830]: ridge point
                - text: would indicate that any further improvements in overall FLOP/s are only possible if the
                - term [ref=e1831]: Arithmetic Intensity
                - text: is increased at the same time.
              - paragraph [ref=e1832]: Using the baseline feature in combination with roofline charts, is a good way to track optimization progress over a number of kernel executions.
