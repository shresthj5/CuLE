            - paragraph
          - generic [ref=e650]:
            - heading "3.1. Hardware Model" [level=3] [ref=e651]:
              - link "3.1. Hardware Model" [ref=e652] [cursor=pointer]:
                - /url: "#metrics-hw-model"
            - generic [ref=e653]:
              - generic [ref=e654]:
                - heading "Compute Model" [level=3] [ref=e655]
                - paragraph [ref=e656]:
                  - text: All NVIDIA GPUs are designed to support a general purpose heterogeneous parallel programming model, commonly known as
                  - term [ref=e657]: Compute
                  - text: . This model decouples the GPU from the traditional graphics pipeline and exposes it as a general purpose parallel multi-processor. A heterogeneous computing model implies the existence of a host and a device, which in this case are the CPU and GPU, respectively. At a high level view, the host (CPU) manages resources between itself and the device and will send work off to the device to be executed in parallel.
                - generic [ref=e658]:
                  - text: "Central to the compute model is the Grid, Block, Thread hierarchy, which defines how compute work is organized on the GPU. The hierarchy from top to bottom is as follows:"
                  - list [ref=e659]:
                    - listitem [ref=e660]:
                      - text: A
                      - term [ref=e661]: Grid
                      - text: is a 1D, 2D or 3D array of thread blocks.
                    - listitem [ref=e662]:
                      - text: A
                      - term [ref=e663]: Block
                      - text: is a 1D, 2D or 3D array of threads, also known as a
                      - term [ref=e664]: Cooperative Thread Array (CTA)
                      - text: .
                    - listitem [ref=e665]:
                      - text: A
                      - term [ref=e666]: Thread
                      - text: is a single thread which runs on one of the GPU's SM units.
                - paragraph [ref=e667]:
                  - text: The purpose of the Grid, Block, Thread hierarchy is to expose a notion of locality amongst a group of threads, i.e. a Cooperative Thread Array (CTA). In CUDA, CTAs are referred to as Thread Blocks. The architecture can exploit this locality by providing fast shared memory and barriers between the threads within a single CTA. When a Grid is launched, the architecture guarantees that all threads within a CTA will run concurrently on the same SM. Information on the grids and blocks can be found in the
                  - link "Launch Statistics" [ref=e668] [cursor=pointer]:
                    - /url: index.html#sections-and-rules
                  - text: section.
                - paragraph [ref=e669]:
                  - text: The number of CTAs that fit on each SM depends on the physical resources required by the CTA. These resource limiters include the number of threads and registers, shared memory utilization, and hardware barriers. The number CTAs per SM is referred to as the CTA
                  - term [ref=e670]: occupancy
                  - text: ", and these physical resources limit this occupancy. Details on the kernel's occupancy are collected by the"
                  - link "Occupancy" [ref=e671] [cursor=pointer]:
                    - /url: index.html#sections-and-rules
                  - text: section.
                - paragraph [ref=e672]: Each CTA can be scheduled on any of the available SMs, where there is no guarantee in the order of execution. As such, CTAs must be entirely independent, which means it is not possible for one CTA to wait on the result of another CTA. As CTAs are independent, the host (CPU) can launch a large Grid that will not fit on the hardware all at once, however any GPU will still be able to run it and produce the correct results.
                - paragraph [ref=e673]:
                  - text: CTAs are further divided into groups of 32 threads called
                  - term [ref=e674]: Warps
                  - text: . If the number of threads in a CTA is not dividable by 32, the last warp will contain the remaining number of threads.
                - paragraph [ref=e675]:
                  - text: The total number of CTAs that can run concurrently on a given GPU is referred to as
                  - term [ref=e676]: Wave
                  - text: . Consequently, the size of a Wave scales with the number of available SMs of a GPU, but also with the occupancy of the kernel.
              - generic [ref=e677]:
                - heading "Streaming Multiprocessor" [level=3] [ref=e678]
                - paragraph [ref=e679]:
                  - text: The
                  - term [ref=e680]: Streaming Multiprocessor (SM)
                  - text: is the core processing unit in the GPU. The SM is optimized for a wide diversity of workloads, including general-purpose computations, deep learning, ray tracing, as well as lighting and shading. The SM is designed to simultaneously execute multiple CTAs. CTAs can be from different grid launches.
                - paragraph [ref=e681]:
                  - text: The SM implements an execution model called Single Instruction Multiple Threads (SIMT), which allows individual threads to have unique control flow while still executing as part of a warp. The Turing SM inherits the Volta SM's independent thread scheduling model. The SM maintains execution state per thread, including a program counter (PC) and call stack. The independent thread scheduling allows the GPU to yield execution of any thread, either to make better use of execution resources or to allow a thread to wait for data produced by another thread possibly in the same warp. Collecting the
                  - link "Source Counters" [ref=e682] [cursor=pointer]:
                    - /url: index.html#sections-and-rules
                  - text: section allows you to inspect instruction execution and predication details on the
                  - term [ref=e683]: Source Page
                  - text: ", along with"
                  - link "Sampling" [ref=e684] [cursor=pointer]:
                    - /url: index.html#sampling
                  - text: information.
                - generic [ref=e685]:
                  - text: Each SM is partitioned into four processing blocks, called
                  - term [ref=e686]: SM sub partitions
                  - text: ". The SM sub partitions are the primary processing elements on the SM. Each sub partition contains the following units:"
                  - list [ref=e687]:
                    - listitem [ref=e688]: Warp Scheduler
                    - listitem [ref=e689]: Register File
                    - listitem [ref=e690]:
                      - text: Execution Units/Pipelines/Cores
                      - list [ref=e691]:
                        - listitem [ref=e692]: Integer Execution units
                        - listitem [ref=e693]: Floating Point Execution units
                        - listitem [ref=e694]: Memory Load/Store units
                        - listitem [ref=e695]: Special Function unit
                        - listitem [ref=e696]: Tensor Cores
                  - text: "Shared within an SM across the four SM partitions are:"
                  - list [ref=e697]:
                    - listitem [ref=e698]: Unified L1 Data Cache / Shared Memory
                    - listitem [ref=e699]: Texture units
                    - listitem [ref=e700]: RT Cores, if available
                - paragraph [ref=e701]:
                  - text: A warp is allocated to a sub partition and resides on the sub partition from launch to completion. A warp is referred to as
                  - term [ref=e702]: active
                  - text: or
                  - term [ref=e703]: resident
                  - text: when it is mapped to a sub partition. A sub partition manages a fixed size pool of warps. On Volta architectures, the size of the pool is 16 warps. On Turing architectures the size of the pool is 8 warps. Active warps can be in
                  - term [ref=e704]: eligible
                  - text: state if the warp is ready to issue an instruction. This requires the warp to have a decoded instruction, all input dependencies resolved, and for the function unit to be available. Statistics on active, eligible and issuing warps can be collected with the
                  - link "Scheduler Statistics" [ref=e705] [cursor=pointer]:
                    - /url: index.html#sections-and-rules
                  - text: section.
                - generic [ref=e706]:
                  - text: A warp is
                  - term [ref=e707]: stalled
                  - text: when the warp is waiting on
                  - list [ref=e708]:
                    - listitem [ref=e709]: an instruction fetch,
                    - listitem [ref=e710]: a memory dependency (result of memory instruction),
                    - listitem [ref=e711]: an execution dependency (result of previous instruction), or
                    - listitem [ref=e712]: a synchronization barrier.
                  - text: See
                  - link "Warp Scheduler States" [ref=e713] [cursor=pointer]:
                    - /url: index.html#statistical-sampler
                  - text: for the list of stall reasons that can be profiled and the
                  - link "Warp State Statistics" [ref=e714] [cursor=pointer]:
                    - /url: index.html#sections-and-rules
                  - text: section for a summary of warp states found in the kernel execution.
                - paragraph [ref=e715]:
                  - text: The most important resource under the compiler's control is the number of registers used by a kernel. Each sub partition has a set of 32-bit registers, which are allocated by the HW in fixed-size chunks. The
                  - link "Launch Statistics" [ref=e716] [cursor=pointer]:
                    - /url: index.html#sections-and-rules
                  - text: section shows the kernel's register usage.
              - generic [ref=e717]:
                - heading "Memory" [level=3] [ref=e718]
                - paragraph [ref=e719]: Global memory is a 49-bit virtual address space that is mapped to physical memory on the device, pinned system memory, or peer memory. Global memory is visible to all threads in the GPU. Global memory is accessed through the SM L1 and GPU L2.
                - paragraph [ref=e720]: Local memory is private storage for an executing thread and is not visible outside of that thread. It is intended for thread-local data like thread stacks and register spills. Local memory addresses are translated to global virtual addresses by the the AGU unit. Local memory has the same latency as global memory. One difference between global and local memory is that local memory is arranged such that consecutive 32-bit words are accessed by consecutive thread IDs. Accesses are therefore fully coalesced as long as all threads in a warp access the same relative address (e.g., same index in an array variable, same member in a structure variable, etc.).
                - paragraph [ref=e721]: Shared memory is located on chip, so it has much higher bandwidth and much lower latency than either local or global memory. Shared memory can be shared across a compute CTA. Compute CTAs attempting to share data across threads via shared memory must use synchronization operations (such as __syncthreads()) between stores and loads to ensure data written by any one thread is visible to other threads in the CTA. Similarly, threads that need to share data via global memory must use a more heavyweight global memory barrier.
                - paragraph [ref=e722]: Shared memory has 32 banks that are organized such that successive 32-bit words map to successive banks that can be accessed simultaneously. Any 32-bit memory read or write request made of 32 addresses that fall in 32 distinct memory banks can therefore be serviced simultaneously, yielding an overall bandwidth that is 32 times as high as the bandwidth of a single request. However, if two addresses of a memory request fall in the same memory bank, there is a bank conflict and the access has to be serialized.
                - paragraph [ref=e723]: A shared memory request for a warp does not generate a bank conflict between two threads that access any address within the same 32-bit word (even though the two addresses fall in the same bank). When multiple threads make the same read access, one thread receives the data and then broadcasts it to the other threads. When multiple threads write to the same location, only one thread succeeds in the write; which thread that succeeds is undefined.
                - paragraph [ref=e724]:
                  - text: Detailed memory metrics are collected by the
                  - link "Memory Workload Analysis" [ref=e725] [cursor=pointer]:
                    - /url: index.html#sections-and-rules
                  - text: section.
              - generic [ref=e726]:
                - heading "Caches" [level=3] [ref=e727]
                - paragraph [ref=e728]: All GPU units communicate to main memory through the Level 2 cache, also known as the L2. The L2 cache sits between on-chip memory clients and the framebuffer. L2 works in physical-address space. In addition to providing caching functionality, L2 also includes hardware to perform compression and global atomics.
                - generic [ref=e730]:
                  - text: Model of the L2 cache.
                  - img [ref=e732]
                - paragraph [ref=e733]:
                  - text: The Level 1 Data Cache, or L1, plays a key role in handling global, local, shared, texture, and surface memory reads and writes, as well as reduction and atomic operations. On Volta and Turing architectures there are , there are two L1 caches per TPC, one for each SM. For more information on how L1 fits into the texturing pipeline, see the
                  - link "TEX unit" [ref=e734] [cursor=pointer]:
                    - /url: index.html#metrics-hw-model__metrics-hw-tex-surf
                  - text: description. Also note that while this section often uses the name "L1", it should be understood that the L1 data cache, shared data, and the Texture data cache are one and the same.
                - paragraph [ref=e735]: "L1 receives requests from two units: the SM and TEX. L1 receives global and local memory requests from the SM and receives texture and surface requests from TEX. These operations access memory in the global memory space, which L1 sends through a secondary cache, the L2."
                - paragraph [ref=e736]:
                  - text: Cache hit and miss rates as well as data transfers are reported in the
                  - link "Memory Workload Analysis" [ref=e737] [cursor=pointer]:
                    - /url: index.html#sections-and-rules
                  - text: section.
                - generic [ref=e739]:
                  - text: Model of Load/Store and Texture pipelines for the L1TEX cache.
                  - img [ref=e741]
              - generic [ref=e742]:
                - heading "Texture/Surface" [level=3] [ref=e743]
                - paragraph [ref=e744]: The TEX unit performs texture fetching and filtering. Beyond plain texture memory access, TEX is responsible for the addressing, LOD, wrap, filter, and format conversion operations necessary to convert a texture read request into a result.
                - paragraph [ref=e745]: "TEX receives two general categories of requests from the SM via its input interface: texture requests and surface load/store operations. Texture and surface memory space resides in device memory and are cached in L1. Texture and surface memory are allocated as block-linear surfaces (e.g. 2D, 2D Array, 3D). Such surfaces provide a cache-friendly layout of data such that neighboring points on a 2D surface are also located close to each other in memory, which improves access locality. Surface accesses are bounds-checked by the TEX unit prior to accessing memory, which can be used for implementing different texture wrapping modes."
                - paragraph [ref=e746]: The L1 cache is optimized for 2D spatial locality, so threads of the same warp that read texture or surface addresses that are close together in 2D space will achieve optimal performance. The L1 cache is also designed for streaming fetches with constant latency; a cache hit reduces DRAM bandwidth demand but not fetch latency. Reading device memory through texture or surface memory presents some benefits that can make it an advantageous alternative to reading memory from global or constant memory.
                - paragraph [ref=e747]:
                  - text: Information on texture and surface memory can be found in the
                  - link "Memory Workload Analysis" [ref=e748] [cursor=pointer]:
                    - /url: index.html#sections-and-rules
                  - text: section.
          - generic [ref=e749]:
            - heading "3.2. Metrics Structure" [level=3] [ref=e750]:
              - link "3.2. Metrics Structure" [ref=e751] [cursor=pointer]:
                - /url: "#metrics-structure"
            - generic [ref=e752]:
              - generic [ref=e753]:
                - heading "Metrics Overview" [level=3] [ref=e754]
                - paragraph [ref=e755]: NVIDIA Nsight Compute uses an advanced metrics calculation system, designed to help you determine what happened (counters and metrics), and how close the program reached to peak GPU performance (throughputs as a percentage). Every counter has associated peak rates in the database, to allow computing its throughput as a percentage.
                - paragraph [ref=e756]: Throughput metrics return the maximum percentage value of their constituent counters. These constituents have been carefully selected to represent the sections of the GPU pipeline that govern peak performance. While all counters can be converted to a %-of-peak, not all counters are suitable for peak-performance analysis; examples of unsuitable counters include qualified subsets of activity, and workload residency counters. Using throughput metrics ensures meaningful and actionable analysis.
                - paragraph [ref=e757]: "Two types of peak rates are available for every counter: burst and sustained. Burst rate is the maximum rate reportable in a single clock cycle. Sustained rate is the maximum rate achievable over an infinitely long measurement period, for \"typical\" operations. For many counters, burst equals sustained. Since the burst rate cannot be exceeded, percentages of burst rate will always be less than 100%. Percentages of sustained rate can occasionally exceed 100% in edge cases."
              - generic [ref=e758]:
                - heading "Metrics Entities" [level=3] [ref=e759]
                - paragraph [ref=e760]:
                  - text: While in NVIDIA Nsight Compute, all performance counters are named
                  - term [ref=e761]: metrics
                  - text: ", they can be split further into groups with specific properties. For metrics collected via the"
                  - term [ref=e762]: PerfWorks
                  - text: "measurement library, the following entities exist:"
                - generic [ref=e763]:
                  - strong [ref=e764]: Counters
                  - text: may be either a raw counter from the GPU, or a calculated counter value. Every counter has four sub-metrics under it, which are also called
                  - term [ref=e765]: roll-ups
                  - text: ":"
                  - table [ref=e766]:
                    - rowgroup [ref=e767]:
                      - row ".sum The sum of counter values across all unit instances." [ref=e768]:
                        - cell ".sum" [ref=e769]
                        - cell "The sum of counter values across all unit instances." [ref=e770]
                      - row ".avg The average counter value across all unit instances." [ref=e771]:
                        - cell ".avg" [ref=e772]
                        - cell "The average counter value across all unit instances." [ref=e773]
                      - row ".min The minimum counter value across all unit instances." [ref=e774]:
                        - cell ".min" [ref=e775]
                        - cell "The minimum counter value across all unit instances." [ref=e776]
                      - row ".max The maximum counter value across all unit instances." [ref=e777]:
                        - cell ".max" [ref=e778]
                        - cell "The maximum counter value across all unit instances." [ref=e779]
                - generic [ref=e780]:
                  - text: "Counter roll-ups have the following calculated quantities as built-in sub-metrics:"
                  - table [ref=e781]:
                    - rowgroup [ref=e782]:
                      - row ".peak_sustained the peak sustained rate" [ref=e783]:
                        - cell ".peak_sustained" [ref=e784]
                        - cell "the peak sustained rate" [ref=e785]
                      - row ".peak_sustained_active the peak sustained rate during unit active cycles" [ref=e786]:
                        - cell ".peak_sustained_active" [ref=e787]
                        - cell "the peak sustained rate during unit active cycles" [ref=e788]
                      - row ".peak_sustained_active.per_second the peak sustained rate during unit active cycles, per second *" [ref=e789]:
                        - cell ".peak_sustained_active.per_second" [ref=e790]
                        - cell "the peak sustained rate during unit active cycles, per second *" [ref=e791]
                      - row ".peak_sustained_elapsed the peak sustained rate during unit elapsed cycles" [ref=e792]:
                        - cell ".peak_sustained_elapsed" [ref=e793]
                        - cell "the peak sustained rate during unit elapsed cycles" [ref=e794]
                      - row ".peak_sustained_elapsed.per_second the peak sustained rate during unit elapsed cycles, per second *" [ref=e795]:
                        - cell ".peak_sustained_elapsed.per_second" [ref=e796]
                        - cell "the peak sustained rate during unit elapsed cycles, per second *" [ref=e797]
                      - row ".peak_sustained_region the peak sustained rate over a user-specified \"range\"" [ref=e798]:
                        - cell ".peak_sustained_region" [ref=e799]
                        - cell "the peak sustained rate over a user-specified \"range\"" [ref=e800]
                      - row ".peak_sustained_region.per_second the peak sustained rate over a user-specified \"range\", per second *" [ref=e801]:
                        - cell ".peak_sustained_region.per_second" [ref=e802]
                        - cell "the peak sustained rate over a user-specified \"range\", per second *" [ref=e803]
                      - row ".peak_sustained_frame the peak sustained rate over a user-specified \"frame\"" [ref=e804]:
                        - cell ".peak_sustained_frame" [ref=e805]
                        - cell "the peak sustained rate over a user-specified \"frame\"" [ref=e806]
                      - row ".peak_sustained_frame.per_second the peak sustained rate over a user-specified \"frame\", per second *" [ref=e807]:
                        - cell ".peak_sustained_frame.per_second" [ref=e808]
                        - cell "the peak sustained rate over a user-specified \"frame\", per second *" [ref=e809]
                      - row ".per_second the number of operations per second" [ref=e810]:
                        - cell ".per_second" [ref=e811]
                        - cell "the number of operations per second" [ref=e812]
                      - row ".per_cycle_active the number of operations per unit active cycle" [ref=e813]:
                        - cell ".per_cycle_active" [ref=e814]
                        - cell "the number of operations per unit active cycle" [ref=e815]
                      - row ".per_cycle_elapsed the number of operations per unit elapsed cycle" [ref=e816]:
