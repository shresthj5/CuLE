                      - row ".per_cycle_in_frame the number of operations per user-specified \"frame\" cycle" [ref=e822]:
                        - cell ".per_cycle_in_frame" [ref=e823]
                        - cell "the number of operations per user-specified \"frame\" cycle" [ref=e824]
                      - row ".pct_of_peak_sustained_active % of peak sustained rate achieved during unit active cycles" [ref=e825]:
                        - cell ".pct_of_peak_sustained_active" [ref=e826]
                        - cell "% of peak sustained rate achieved during unit active cycles" [ref=e827]
                      - row ".pct_of_peak_sustained_elapsed % of peak sustained rate achieved during unit elapsed cycles" [ref=e828]:
                        - cell ".pct_of_peak_sustained_elapsed" [ref=e829]
                        - cell "% of peak sustained rate achieved during unit elapsed cycles" [ref=e830]
                      - row ".pct_of_peak_sustained_region % of peak sustained rate achieved over a user-specified \"range\"" [ref=e831]:
                        - cell ".pct_of_peak_sustained_region" [ref=e832]
                        - cell "% of peak sustained rate achieved over a user-specified \"range\"" [ref=e833]
                      - row ".pct_of_peak_sustained_frame % of peak sustained rate achieved over a user-specified \"frame\"" [ref=e834]:
                        - cell ".pct_of_peak_sustained_frame" [ref=e835]
                        - cell "% of peak sustained rate achieved over a user-specified \"frame\"" [ref=e836]
                  - text: "* sub-metrics added in NVIDIA Nsight Compute 2022.2.0."
                - paragraph [ref=e837]:
                  - text: "Example:"
                  - generic [ref=e838]: ncu --query-metrics-mode suffix --metrics sm__inst_executed --chip ga100
                - generic [ref=e839]:
                  - strong [ref=e840]: Ratios
                  - text: "have three sub-metrics:"
                  - table [ref=e841]:
                    - rowgroup [ref=e842]:
                      - row ".pct The value expressed as a percentage." [ref=e843]:
                        - cell ".pct" [ref=e844]
                        - cell "The value expressed as a percentage." [ref=e845]
                      - row ".ratio The value expressed as a ratio." [ref=e846]:
                        - cell ".ratio" [ref=e847]
                        - cell "The value expressed as a ratio." [ref=e848]
                      - row ".max_rate The ratio's maximum value." [ref=e849]:
                        - cell ".max_rate" [ref=e850]
                        - cell "The ratio's maximum value." [ref=e851]
                - paragraph [ref=e852]:
                  - text: "Example:"
