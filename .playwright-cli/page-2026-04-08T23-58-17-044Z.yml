                - paragraph [ref=e908]:
                  - text: In addition to PerfWorks metrics, NVIDIA Nsight Compute uses several other measurement providers that each generate their own metrics. These are explained in the
                  - link "Metrics Reference" [ref=e909] [cursor=pointer]:
                    - /url: index.html#metrics-reference
                  - text: .
              - generic [ref=e910]:
                - heading "Metrics Examples" [level=3] [ref=e911]
                - generic [ref=e913]: "## non-metric names -- *not* directly evaluable sm__inst_executed # counter smsp__average_warp_latency # ratio sm__throughput # throughput ## a counter's four first-level sub-metrics -- all evaluable sm__inst_executed.sum sm__inst_executed.avg sm__inst_executed.min sm__inst_executed.max ## all names below are metrics -- all evaluable l1tex__data_bank_conflicts_pipe_lsu.sum l1tex__data_bank_conflicts_pipe_lsu.sum.peak_sustained l1tex__data_bank_conflicts_pipe_lsu.sum.peak_sustained_active l1tex__data_bank_conflicts_pipe_lsu.sum.peak_sustained_active.per_second l1tex__data_bank_conflicts_pipe_lsu.sum.peak_sustained_elapsed l1tex__data_bank_conflicts_pipe_lsu.sum.peak_sustained_elapsed.per_second l1tex__data_bank_conflicts_pipe_lsu.sum.peak_sustained_frame l1tex__data_bank_conflicts_pipe_lsu.sum.peak_sustained_frame.per_second l1tex__data_bank_conflicts_pipe_lsu.sum.peak_sustained_region l1tex__data_bank_conflicts_pipe_lsu.sum.peak_sustained_region.per_second l1tex__data_bank_conflicts_pipe_lsu.sum.per_cycle_active l1tex__data_bank_conflicts_pipe_lsu.sum.per_cycle_elapsed l1tex__data_bank_conflicts_pipe_lsu.sum.per_cycle_in_frame l1tex__data_bank_conflicts_pipe_lsu.sum.per_cycle_in_region l1tex__data_bank_conflicts_pipe_lsu.sum.per_second l1tex__data_bank_conflicts_pipe_lsu.sum.pct_of_peak_sustained_active l1tex__data_bank_conflicts_pipe_lsu.sum.pct_of_peak_sustained_elapsed l1tex__data_bank_conflicts_pipe_lsu.sum.pct_of_peak_sustained_frame l1tex__data_bank_conflicts_pipe_lsu.sum.pct_of_peak_sustained_region ..."
              - generic [ref=e914]:
                - heading "Metrics Naming Conventions" [level=3] [ref=e915]
                - generic [ref=e916]:
                  - text: "Counters and metrics _generally_ obey the naming scheme:"
                  - list [ref=e917]:
                    - listitem [ref=e918]: "Unit-Level Counter : unit__(subunit?)_(pipestage?)_quantity_(qualifiers?)"
                    - listitem [ref=e919]: "Interface Counter : unit__(subunit?)_(pipestage?)_(interface)_quantity_(qualifiers?)"
                    - listitem [ref=e920]: "Unit Metric : (counter_name).(rollup_metric)"
                    - listitem [ref=e921]: "Sub-Metric : (counter_name).(rollup_metric).(submetric)"
                  - text: where
                  - list [ref=e922]:
                    - listitem [ref=e923]: "unit: A logical or physical unit of the GPU"
                    - listitem [ref=e924]: "subunit: The subunit within the unit where the counter was measured. Sometimes this is a pipeline mode instead."
                    - listitem [ref=e925]: "pipestage: The pipeline stage within the subunit where the counter was measured."
                    - listitem [ref=e926]:
                      - text: "quantity: What is being measured. Generally matches the"
                      - term [ref=e927]: dimensional units
                      - text: .
                    - listitem [ref=e928]: "qualifiers: Any additional predicates or filters applied to the counter. Often, an unqualified counter can be broken down into several qualified sub-components."
                    - listitem [ref=e929]: "interface: Of the form sender2receiver, where sender is the source-unit and receiver is the destination-unit."
                    - listitem [ref=e930]: "rollup_metric: One of sum, avg, min, max."
                    - listitem [ref=e931]:
                      - text: "submetric: refer to section"
                      - link "Metrics Entities" [ref=e932] [cursor=pointer]:
                        - /url: index.html#metrics-structure__metrics-entities
                  - text: Components are not always present. Most top-level counters have no qualifiers. Subunit and pipestage may be absent where irrelevant, or there may be many subunit specifiers for detailed counters.
              - generic [ref=e933]:
                - heading "Cycle Metrics" [level=3] [ref=e934]
                - generic [ref=e935]:
                  - text: "Counters using the term cycles in the name report the number of cycles in the unit's clock domain. Unit-level cycle metrics include:"
                  - list [ref=e936]:
                    - listitem [ref=e937]: "unit__cycles_elapsed : The number of cycles within a range. The cycles' DimUnits are specific to the unit's clock domain."
                    - listitem [ref=e938]: "unit__cycles_active : The number of cycles where the unit was processing data."
                    - listitem [ref=e939]: "unit__cycles_stalled : The number of cycles where the unit was unable to process new data because its output interface was blocked."
                    - listitem [ref=e940]: "unit__cycles_idle : The number of cycles where the unit was idle."
                  - text: "Interface-level cycle counters are often (not always) available in the following variations:"
                  - list [ref=e941]:
                    - listitem [ref=e942]: "unit__(interface)_active : Cycles where data was transferred from source-unit to destination-unit."
                    - listitem [ref=e943]: "unit__(interface)_stalled : Cycles where the source-unit had data, but the destination-unit was unable to accept data."
