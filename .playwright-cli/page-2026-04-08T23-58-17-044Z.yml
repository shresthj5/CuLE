          - generic [ref=e280]:
            - heading "2.3. Replay" [level=3] [ref=e281]:
              - link "2.3. Replay" [ref=e282] [cursor=pointer]:
                - /url: "#replay"
            - paragraph [ref=e284]:
              - text: Depending on which metrics are to be collected, kernels might need to be
              - term [ref=e285]: replayed
              - text: one or more times, since not all metrics can be collected in a single
              - term [ref=e286]: pass
              - text: . For example, the number of metrics originating from hardware (HW) performance counters that the GPU can collect at the same time is limited. In addition, patch-based software (SW) performance counters can have a high impact on kernel runtime and would skew results for HW counters.
            - generic [ref=e287]:
              - heading "2.3.1. Kernel Replay" [level=3] [ref=e288]:
                - link "2.3.1. Kernel Replay" [ref=e289] [cursor=pointer]:
                  - /url: "#kernel-replay"
              - generic [ref=e290]:
                - paragraph [ref=e291]:
                  - text: In
                  - term [ref=e292]: Kernel Replay
                  - text: ", all metrics requested for a specific kernel instance in NVIDIA Nsight Compute are grouped into one or more passes. For the first pass, all GPU memory that can be accessed by the kernel is saved. After the first pass, the subset of memory that is written by the kernel is determined. Before each pass (except the first one), this subset is restored in its original location to have the kernel access the same memory contents in each replay pass."
                - paragraph [ref=e293]: NVIDIA Nsight Compute attempts to use the fastest available storage location for this save-and-restore strategy. For example, if data is allocated in device memory, and there is still enough device memory available, it is stored there directly. If it runs out of device memory, the data is transferred to the CPU host memory. Likewise, if an allocation originates from CPU host memory, the tool first attempts to save it into the same memory location, if possible.
                - paragraph [ref=e294]:
                  - text: As explained in
                  - link "Overhead" [ref=e295] [cursor=pointer]:
                    - /url: index.html#overhead
                  - text: ", the time needed for this increases the more memory is accessed, especially written, by a kernel. If NVIDIA Nsight Compute determines that only a single replay pass is necessary to collect the requested metrics, no save-and-restore is performed at all to reduce overhead."
                - generic [ref=e296]:
                  - text: Regular Application Execution
                  - img [ref=e298]
                - generic [ref=e299]:
                  - text: Execution with Kernel Replay. All memory is saved, and memory written by the kernel is restored in-between replay passes.
                  - img [ref=e301]
            - generic [ref=e302]:
              - heading "2.3.2. Application Replay" [level=3] [ref=e303]:
                - link "2.3.2. Application Replay" [ref=e304] [cursor=pointer]:
                  - /url: "#application-replay"
              - generic [ref=e305]:
                - paragraph [ref=e306]:
                  - text: In
                  - term [ref=e307]: Application Replay
                  - text: ", all metrics requested for a specific kernel launch in NVIDIA Nsight Compute are grouped into one or more passes. In contrast to"
                  - link "Kernel Replay" [ref=e308] [cursor=pointer]:
                    - /url: index.html#kernel-replay
                  - text: ", the complete application is run multiple times, so that in each run one of those passes can be collected per kernel."
                - paragraph [ref=e309]: For correctly identifying and combining performance counters collected from multiple application replay passes of a single kernel launch into one result, the application needs to be deterministic with respect to its kernel activities and their assignment to GPUs, contexts, streams, and potentially NVTX ranges. Normally, this also implies that the application needs to be deterministic with respect to its overall execution.
                - paragraph [ref=e310]:
                  - text: Application replay has the benefit that memory accessed by the kernel does not need to be saved and restored via the tool, as each kernel launch executes only once during the lifetime of the application process. Besides avoiding memory save-and-restore overhead, application replay also allows to disable
                  - link "Cache Control" [ref=e311] [cursor=pointer]:
                    - /url: index.html#cache-control
                  - text: . This is especially useful if other GPU activities preceding a specific kernel launch are used by the application to set caches to some expected state.
                - paragraph [ref=e312]: In addition, application replay can support profiling kernels that have interdependencies to the host during execution. With kernel replay, this class of kernels typically hangs when being profiled, because the necessary responses from the host are missing in all but the first pass. In contrast, application replay ensures the correct behavior of the program execution in each pass.
                - paragraph [ref=e313]: In contrast to kernel replay, multiple passes collected via application replay imply that all host-side activities of the application are duplicated, too. If the application requires significant time for e.g. setup or file-system access, the overhead will increase accordingly.
                - generic [ref=e314]:
                  - text: Regular Application Execution
                  - img [ref=e316]
                - generic [ref=e317]:
                  - text: Execution with Application Replay. No memory is saved or restored, but the cost of running the application itself is duplicated.
                  - img [ref=e319]
                - paragraph [ref=e320]:
                  - text: Across application replay passes, NVIDIA Nsight Compute matches metric data for the individual, selected kernel launches. The matching strategy can be selected using the --app-replay-match option. For matching, only kernels within the same process and running on the same device are considered. By default, the
                  - term [ref=e321]: grid
                  - text: strategy is used, which matches launches according to their kernel name and grid size. When multiple launches have the same attributes (e.g. name and grid size), they are matched in execution order.
                - generic [ref=e322]:
                  - generic [ref=e323]:
                    - text: Kernel matching during application replay using the
                    - term [ref=e324]: grid
                    - text: strategy.
                  - img [ref=e326]
            - generic [ref=e327]:
              - heading "2.3.3. Range Replay" [level=3] [ref=e328]:
                - link "2.3.3. Range Replay" [ref=e329] [cursor=pointer]:
                  - /url: "#range-replay"
              - generic [ref=e330]:
                - paragraph [ref=e331]:
                  - text: In
                  - term [ref=e332]: Range Replay
                  - text: ", all requested metrics in NVIDIA Nsight Compute are grouped into one or more passes. In contrast to"
                  - link "Kernel Replay" [ref=e333] [cursor=pointer]:
                    - /url: index.html#kernel-replay
                  - text: and
                  - link "Application Replay" [ref=e334] [cursor=pointer]:
                    - /url: index.html#application-replay
                  - text: ","
                  - term [ref=e335]: Range Replay
                  - text: captures and replays complete ranges of CUDA API calls and kernel launches within the profiled application. Metrics are then not associated with individual kernels but with the entire range. This allows the tool to execute kernels without serialization and thereby supports profiling kernels that should be run concurrently for correctness or performance reasons.
                - generic [ref=e336]:
                  - text: Execution with Range Replay. An entire range of API calls and kernel launches is captured and replayed. Host and device memory is saved and restored as necessary.
                  - img [ref=e338]
              - generic [ref=e339]:
                - heading "2.3.3.1. Defining Ranges" [level=3] [ref=e340]:
                  - link "2.3.3.1. Defining Ranges" [ref=e341] [cursor=pointer]:
                    - /url: "#range-replay-define-range"
                - generic [ref=e342]:
                  - paragraph [ref=e343]: "Range replay requires you to specify the range for profiling in the application. A range is defined by a start and an end marker and includes all CUDA API calls and kernels launched between these markers from any CPU thread. The application is responsible for inserting appropriate synchronization between threads to ensure that the anticipated set of API calls is captured. Range markers can be set using one of the following options:"
                  - list [ref=e344]:
                    - listitem [ref=e345]:
                      - strong [ref=e346]: Profiler Start/Stop API
                      - paragraph [ref=e347]: "Set the start marker using cu(da)ProfilerStart and the end marker using cu(da)ProfilerStop. Note: The CUDA driver API variants of this API require to include cudaProfiler.h. The CUDA runtime variants require to include cuda_profiler_api.h."
                      - paragraph [ref=e348]: This is the default for NVIDIA Nsight Compute.
                    - listitem [ref=e349]:
                      - strong [ref=e350]: NVTX Ranges
                      - paragraph [ref=e351]:
                        - text: Define the range using an
                        - link "NVTX Include" [ref=e352] [cursor=pointer]:
                          - /url: ../NsightComputeCli/index.html#nvtx-filtering
                        - text: expression. The range capture starts with the first CUDA API call and ends at the last API call for which the expression is matched, respectively. If multiple expressions are specified, a range is defined as soon as any of them matches. Hence, multiple expressions can be used to conveniently capture and profile multiple ranges for the same application execution.
                      - paragraph [ref=e353]: The application must have been instrumented with the NVTX API for any expressions to match.
                      - paragraph [ref=e354]: This mode is enabled by passing --nvtx --nvtx-include <expression> [--nvtx-include <expression>] to the NVIDIA Nsight Compute CLI.
                  - generic [ref=e355]:
                    - text: "Ranges must fulfill several requirements:"
                    - list [ref=e356]:
                      - listitem [ref=e357]: It must be possible to synchronize all active CUDA contexts at the start of the range.
                      - listitem [ref=e358]:
                        - text: Ranges must not include unsupported CUDA API calls. See
                        - link "Supported APIs" [ref=e359] [cursor=pointer]:
                          - /url: index.html#range-replay-supported-apis
                        - text: for the list of currently supported APIs.
                    - text: "In addition, there are several recommendations that ranges should comply with to guarantee a correct capture and replay:"
                    - list [ref=e360]:
                      - listitem [ref=e361]: Set ranges as narrow as possible for capturing a specific set of CUDA kernel lanuches. The more API calls are included, the higher the potentially created overhead from capturing and replaying these API calls.
                      - listitem [ref=e362]:
                        - text: Avoid freeing host allocations written by device memory during the range. This includes both heap as well as stack allocations. NVIDIA Nsight Compute does not intercept creation or destruction of generic host (CPU)-based allocations. However, to guarantee correct program execution after any replay of the range, the tool attempts to restore host allocations that were written from device memory during the capture. If these host addresses are invalid or re-assigned, the program behavior is undefined and potentially unstable. In cases where avoiding freeing such allocations is not possible, you should limit profiling to one range using --launch-count 1, set the
                        - term [ref=e363]: disable-host-restore
                        - text: range replay option and optionally use --kill yes to terminate the process after this range.
                      - listitem [ref=e364]: When defining the range markers using cu(da)ProfilerStart/Stop, prefer the CUDA driver API calls cuProfilerStart/Stop. Internally, NVIDIA Nsight Compute only intercepts the CUDA driver API variants and the CUDA runtime API may not trigger these if no CUDA context is active on the calling thread.
