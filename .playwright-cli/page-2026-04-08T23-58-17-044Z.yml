          - generic [ref=e605]:
            - heading "2.5. Profile Series" [level=3] [ref=e606]:
              - link "2.5. Profile Series" [ref=e607] [cursor=pointer]:
                - /url: "#profile-series"
            - generic [ref=e608]:
              - paragraph [ref=e609]: The performance of a kernel is highly dependent on the used launch parameters. Small changes to the launch parameters can have a significant effect on the runtime behavior of the kernel. However, identifying the best parameter set for a kernel by manually testing a lot of combinations can be a tedious process.
              - paragraph [ref=e610]: To make this workflow faster and more convenient, Profile Series provide the ability to automatically profile a single kernel multiple times with changing parameters. The parameters to be modified and values to be tested can be independently enabled and configured. For each combination of selected parameter values a unique profile result is collected. And the modified parameter values are tracked in the description of the results of a series. By comparing the results of a profile series, the kernel’s behavior on the changing parameters can be seen and the most optimal parameter set can be identified quickly.
              - generic [ref=e611]:
                - text: Profile Series action.
                - img [ref=e613]
              - generic [ref=e614]:
                - text: Profile Series dialog.
                - img [ref=e616]
          - generic [ref=e617]:
            - heading "2.6. Overhead" [level=3] [ref=e618]:
              - link "2.6. Overhead" [ref=e619] [cursor=pointer]:
                - /url: "#overhead"
            - generic [ref=e620]:
              - paragraph [ref=e621]: "As with most measurements, collecting performance data using NVIDIA Nsight Compute CLI incurs some runtime overhead on the application. The overhead does depend on a number of different factors:"
              - list [ref=e622]:
                - listitem [ref=e623]:
                  - strong [ref=e624]: Number and type of collected metrics
                  - paragraph [ref=e625]: Depending on the selected metric, data is collected either through a hardware performance monitor on the GPU, through software patching of the kernel instructions or via a launch or device attribute. The overhead between these mechanisms varies greatly, with launch and device attributes being "statically" available and requiring no kernel runtime overhead.
                  - paragraph [ref=e626]:
                    - text: Furthermore, only a limited number of metrics can be collected in a single
                    - term [ref=e627]: pass
                    - text: of the kernel execution. If more metrics are requested, the kernel launch is
                    - term [ref=e628]: replayed
                    - text: multiple times, with its accessible memory being saved and restored between subsequent passes to guarantee deterministic execution. Therefore, collecting more metrics can significantly increase overhead by requiring more replay passes and increasing the total amount of memory that needs to be restored during replay.
                - listitem [ref=e629]:
                  - strong [ref=e630]: The collected section set
                  - paragraph [ref=e631]:
                    - text: Since each
                    - link "set" [ref=e632] [cursor=pointer]:
                      - /url: index.html#sets-and-sections
                    - text: specifies a group of section to be collected, choosing a less comprehensive set can reduce profiling overhead. See the --set command in the
                    - link "NVIDIA Nsight Compute CLI" [ref=e633] [cursor=pointer]:
                      - /url: ../NsightComputeCli/index.html#command-line-options-profile
                    - text: documentation.
                - listitem [ref=e634]:
                  - strong [ref=e635]: Number of collected sections
                  - paragraph [ref=e636]:
                    - text: Since each
                    - link "section" [ref=e637] [cursor=pointer]:
                      - /url: index.html#sets-and-sections
                    - text: specifies a set metrics to be collected, selecting fewer sections can reduce profiling overhead. See the --section command in the
                    - link "NVIDIA Nsight Compute CLI" [ref=e638] [cursor=pointer]:
                      - /url: ../NsightComputeCli/index.html#command-line-options-profile
                    - text: documentation.
                - listitem [ref=e639]:
                  - strong [ref=e640]: Number of profiled kernels
                  - paragraph [ref=e641]:
                    - text: By default, all selected metrics are collected for all launched kernels. To reduce the impact on the application, you can try to limit performance data collection to as few kernel functions and instances as makes sense for your analysis. See the filtering commands in the
                    - link "NVIDIA Nsight Compute CLI" [ref=e642] [cursor=pointer]:
                      - /url: ../NsightComputeCli/index.html#command-line-options-profile
                    - text: documentation.
                  - paragraph [ref=e643]: There is a relatively high one-time overhead for the first profiled kernel in each context to generate the metric configuration. This overhead does not occur for subsequent kernels in the same context, if the list of collected metrics remains unchanged.
                - listitem [ref=e644]:
                  - strong [ref=e645]: GPU Architecture
                  - paragraph [ref=e646]: For some metrics, the overhead can vary depending on the exact chip they are collected on, e.g. due to varying number of units on the chip. Similarly, the overhead for resetting the L2 cache in-between kernel replay passes depends on the size of that cache.
