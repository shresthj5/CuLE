                - heading "Quantities" [level=3] [ref=e1095]
                - table [ref=e1097]:
                  - rowgroup [ref=e1098]:
                    - row "instruction An assembly (SASS) instruction. Each executed instruction may generate zero or more requests." [ref=e1099]:
                      - cell "instruction" [ref=e1100]
                      - cell "An assembly (SASS) instruction. Each executed instruction may generate zero or more requests." [ref=e1101]
                    - row "request A command into a HW unit to perform some action, e.g. load data from some memory location. Each request accesses one or more sectors." [ref=e1102]:
                      - cell "request" [ref=e1103]
                      - cell "A command into a HW unit to perform some action, e.g. load data from some memory location. Each request accesses one or more sectors." [ref=e1104]
                    - row "sector Aligned 32 byte-chunk of memory in a cache line or device memory. An L1 or L2 cache line is four sectors, i.e. 128 bytes. Sector accesses are classified as hits if the tag is present and the sector-data is present within the cache line. Tag-misses and tag-hit-data-misses are all classified as misses." [ref=e1105]:
                      - cell "sector" [ref=e1106]
                      - cell "Aligned 32 byte-chunk of memory in a cache line or device memory. An L1 or L2 cache line is four sectors, i.e. 128 bytes. Sector accesses are classified as hits if the tag is present and the sector-data is present within the cache line. Tag-misses and tag-hit-data-misses are all classified as misses." [ref=e1107]
                    - row "tag Unique key to a cache line. A request may look up multiple tags, if the thread addresses do not all fall within a single cache line-aligned region. The L1 and L2 both have 128 byte cache lines. Tag accesses may be classified as hits or misses." [ref=e1108]:
                      - cell "tag" [ref=e1109]
                      - cell "Unique key to a cache line. A request may look up multiple tags, if the thread addresses do not all fall within a single cache line-aligned region. The L1 and L2 both have 128 byte cache lines. Tag accesses may be classified as hits or misses." [ref=e1110]
                    - row "wavefront Unique \"work package\" generated at the end of the processing stage for requests. All work items of a wavefront are processed in parallel, while work items of different wavefronts are serialized and processed on different cycles. At least one wavefront is generated for each request." [ref=e1111]:
                      - cell "wavefront" [ref=e1112]
                      - cell "Unique \"work package\" generated at the end of the processing stage for requests. All work items of a wavefront are processed in parallel, while work items of different wavefronts are serialized and processed on different cycles. At least one wavefront is generated for each request." [ref=e1113]
              - generic [ref=e1114]:
                - paragraph [ref=e1115]:
                  - text: "A simplified model for the processing in L1TEX for Volta and newer architectures can be described as follows: When an SM executes a global or local memory instruction for a warp, a single"
                  - term [ref=e1116]: request
                  - text: is sent to L1TEX. This request communicates the information for all participating threads of this warp (up to 32). For local and global memory, based on the access pattern and the participating threads, the request requires to access a number of cache lines, and
                  - term [ref=e1117]: sectors
                  - text: within these cache lines. The L1TEX unit has internally multiple processing stages operating in a pipeline.
                - paragraph [ref=e1118]:
                  - text: A
                  - term [ref=e1119]: wavefront
                  - text: is the maximum unit that can pass through that pipeline stage per cycle. If not all cache lines or sectors can be accessed in a single wavefront, multiple wavefronts are created and sent for processing one by one, i.e. in a serialized manner. Limitations of the work within a wavefront may include the need for a consistent memory space, a maximum number of cache lines that can be accessed, as well as various other reasons. Each wavefront then flows through the L1TEX pipeline and fetches the sectors handled in that wavefront. The given relationships of the three key values in this model are
                  - term [ref=e1120]: requests:sectors is 1:N, wavefronts:sectors 1:N, and requests:wavefronts is 1:N
                  - text: .
                - paragraph [ref=e1121]:
                  - text: A wavefront is described as a (work) package that can be processed at once, i.e. there is a notion of processing one wavefront per cycle in L1TEX. Wavefronts therefore represent the number of cycles required to process the requests, while the number of sectors per request is a property of the
                  - term [ref=e1122]: access pattern
                  - text: of the memory instruction for all participating threads. For example, it is possible to have a memory instruction that requires 4 sectors per request in 1 wavefront. However, you can also have a memory instruction having 4 sectors per request, but requiring 2 or more wavefronts.
