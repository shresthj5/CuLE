              - generic [ref=e532]:
                - paragraph [ref=e533]:
                  - text: In multiple replay modes, NVIDIA Nsight Compute can profile CUDA graphs as single workload entities, rather than profile individual kernel nodes. The behavior can be toggled in the respective
                  - link "command line" [ref=e534] [cursor=pointer]:
                    - /url: ../NsightComputeCli/index.html#command-line-options-profile
                  - text: or
                  - link "UI" [ref=e535] [cursor=pointer]:
                    - /url: ../NsightCompute/index.html#connection-activity-interactive
                  - text: options.
                - generic [ref=e536]:
                  - text: "The primary use cases for enabling this mode are:"
                  - list [ref=e537]:
                    - listitem [ref=e538]: Profile graphs that include mandatory concurrent kernel nodes.
                    - listitem [ref=e539]: Profile graphs that include device-sided graph launches.
                    - listitem [ref=e540]: Profile graph behavior more accurately across multiple kernel node launches, as caches are not purged in between nodes.
                - paragraph [ref=e541]: Note that when graph profiling is enabled, certain metrics such as instruction-level source metrics are not available. This then also applies to kernels profiled outside of graphs.
