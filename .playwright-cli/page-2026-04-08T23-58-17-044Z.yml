                  - text: Out-of-range metrics often occur when the profiler
                  - link "replays" [ref=e1136] [cursor=pointer]:
                    - /url: index.html#kernel-replay
                  - text: the kernel launch to collect metrics, and work distribution is significantly different across replay passes. A metric such as hit rate (hits / queries) can have significant error if hits and queries are collected on different passes and the kernel does not saturate the GPU to reach a steady state (generally > 20 µs). Similarly, it can show unexpected values when the workload is inherently variable, as e.g. in the case of spin loops.
                - paragraph [ref=e1137]: To mitigate the issue, when applicable try to increase the measured workload to allow the GPU to reach a steady state for each launch. Reducing the number of metrics collected at the same time can also improve precision by increasing the likelihood that counters contributing to one metric are collected in a single pass.
              - generic [ref=e1138]:
