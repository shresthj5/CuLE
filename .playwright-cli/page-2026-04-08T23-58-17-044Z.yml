                    - row "Total The aggregate for all access types in the same column." [ref=e2211]:
                      - cell "Total" [ref=e2212]
                      - cell "The aggregate for all access types in the same column." [ref=e2213]
              - generic [ref=e2214]:
                - heading "Metrics" [level=3] [ref=e2215]
                - paragraph [ref=e2216]: Metrics from this table can be collected on the command line using --set full, --section MemoryWorkloadAnalysis_Tables or --metrics group:memory__dram_table.
        - generic [ref=e2217]:
          - heading "11. FAQ" [level=2] [ref=e2218]:
            - link "11. FAQ" [ref=e2219] [cursor=pointer]:
              - /url: "#faq"
          - list [ref=e2221]:
            - listitem [ref=e2222]:
              - strong [ref=e2223]: n/a metric values
              - paragraph [ref=e2224]:
                - text: n/a means that the metric value is "not available". The most common reason is that the requested metric does not exist. This can either be the result of a typo, or a missing
                - link "suffix" [ref=e2225] [cursor=pointer]:
                  - /url: index.html#metrics-structure__metrics-examples
                - text: . Verify the metric name against the output of of the --query-metricsNVIDIA Nsight Compute CLI option.
              - paragraph [ref=e2226]: If the metric name was copied (e.g. from an old version of this documentation), make sure that it does not contain zero-width unicode characters.
              - paragraph [ref=e2227]: Finally, the metric might simply not exist for the targeted GPU architecture. For example, the IMMA pipeline metric sm__inst_executed_pipe_tensor_op_imma.avg.pct_of_peak_sustained_active is not available on GV100 chips.
            - listitem [ref=e2228]:
              - strong [ref=e2229]: Metric values outside the expected logical range
              - paragraph [ref=e2230]:
                - text: This includes e.g. percentages exceeding 100% or metrics reporting negative values. For further details, see
                - link "Range and Precision" [ref=e2231] [cursor=pointer]:
                  - /url: index.html#range-and-precision
                - text: .
            - listitem [ref=e2232]:
              - strong [ref=e2233]: ERR_NVGPUCTRPERM - The user does not have permission to access NVIDIA GPU Performance Counters on the target device.
              - paragraph [ref=e2234]:
                - text: By default, NVIDIA drivers require elevated permissions to access GPU performance counters. On mobile platforms, profile as root/using sudo. On other platforms, you can either start profiling as root/using sudo, or by enabling non-admin profiling. For further details, see
                - link "https://developer.nvidia.com/ERR_NVGPUCTRPERM" [ref=e2235] [cursor=pointer]:
                  - /url: https://developer.nvidia.com/ERR_NVGPUCTRPERM
                - text: .
              - paragraph [ref=e2236]: On Windows Subsystem for Linux (WSL), access to NVIDIA GPU Performance Counters must be enabled in the NVIDIA Control Panel of the Windows host.
            - listitem [ref=e2237]:
              - strong [ref=e2238]: Unsupported GPU
              - paragraph [ref=e2239]:
                - text: This indicates that the GPU, on which the current kernel is launched, is not supported. See the
                - link "Release Notes" [ref=e2240] [cursor=pointer]:
                  - /url: ../ReleaseNotes/index.html#gpu-support
                - text: for a list of devices supported by your version of NVIDIA Nsight Compute. It can also indicate that the current
                - term [ref=e2241]: GPU configuration
                - text: is not supported. For example, NVIDIA Nsight Compute might not be able to profile GPUs in SLI configuration.
            - listitem [ref=e2242]:
              - strong [ref=e2243]: Connection error detected communicating with target application.
              - paragraph [ref=e2244]: The inter-process connection to the profiled application unexpectedly dropped. This happens if the application is killed or signals an exception (e.g. segmentation fault).
            - listitem [ref=e2245]:
              - strong [ref=e2246]: Failed to connect. The target process may have exited.
              - generic [ref=e2247]:
                - text: This occurs if
                - list [ref=e2248]:
                  - listitem [ref=e2249]: the application does not call any CUDA API calls before it exits.
                  - listitem [ref=e2250]:
                    - text: the application terminates early because it was started from the wrong working directory, or with the wrong arguments. In this case, check the details in the
                    - term [ref=e2251]: Connection Dialog
                    - text: .
                  - listitem [ref=e2252]: the application crashes before calling any CUDA API calls.
                  - listitem [ref=e2253]: the application launches child processes which use the CUDA. In this case, launch with the --target-processes all option.
            - listitem [ref=e2254]:
              - strong [ref=e2255]: "The profiler returned an error code: (number)"
              - paragraph [ref=e2256]:
                - text: For the non-interactive
                - term [ref=e2257]: Profile
                - text: activity, the NVIDIA Nsight Compute CLI is started to generate the report. If either the application exited with a non-zero return code, or the NVIDIA Nsight Compute CLI encountered an error itself, the resulting return code will be shown in this message.
              - paragraph [ref=e2258]: For example, if the application hit a segmentation fault (SIGSEGV) on Linux, it will likely return error code 11. All non-zero return codes are considered errors, so the message is also shown if the application exits with return code 1 during regular execution.
              - paragraph [ref=e2259]:
                - text: To debug this issue, it can help to run the data collection directly from the command line using
                - generic [ref=e2260]: ncu
                - text: in order to observe the application's and the profiler's command line output, e.g. ==ERROR== The application returned an error code (11)
            - listitem [ref=e2261]:
              - strong [ref=e2262]: Failed to open/create lock file (path). Please check that this process has write permissions on this file.
              - paragraph [ref=e2263]:
                - text: NVIDIA Nsight Compute failed to create or open the file (path) with write permissions. This file is used for inter-process
                - link "serialization" [ref=e2264] [cursor=pointer]:
                  - /url: index.html#serialization
                - text: . NVIDIA Nsight Compute does not remove this file after profiling by design. The error occurs if the file was created by a profiling process with permissions that prevent the current process from writing to this file, or if the current user can't acquire this file for other reasons (e.g. certain Linux kernel security settings).
              - paragraph [ref=e2265]:
                - text: The file is in the current temporary directory, i.e. TMPDIR/nsight-compute-lock. On Windows,
                - term [ref=e2266]: TMPDIR
                - text: is the path returned by the Windows GetTempPath API function. On other platforms, it is the path supplied by the first environment variable in the list TMPDIR, TMP, TEMP, TEMPDIR. If none of these is found, it's /var/nvidia on QNX and /tmp otherwise.
              - paragraph [ref=e2267]: Older versions of NVIDIA Nsight Compute did not set write permissions for all users on this file by default. As a result, running the tool on the same system with a different user might cause this error. This has been resolved since version 2020.2.1.
              - generic [ref=e2268]:
                - text: "The following workarounds can be used to solve this problem:"
                - list [ref=e2269]:
                  - listitem [ref=e2270]: If it is otherwise ensured that no concurrent NVIDIA Nsight Compute instances are active on the same system, set TMPDIR to a different directory for which the current user has write permissions.
                  - listitem [ref=e2271]: Ask the user owning the file, or a system administrator, to remove it or add write permissions for all potential users.
                  - listitem [ref=e2272]:
                    - text: On Linux systems setting fs.protected_regular=1, root or other users may not be able to access this file, even though the owner can, if the sticky bit is set on the temporary directory. Either disable this setting using sudo sysctl fs.protected_regular=0, use a different temporary directory (see above), or enable access to hardware performance counters for non-root users and profile as the same user who owns the file (see
                    - link "https://developer.nvidia.com/ERR_NVGPUCTRPERM" [ref=e2273] [cursor=pointer]:
                      - /url: https://developer.nvidia.com/ERR_NVGPUCTRPERM
                    - text: on how to change this setting).
            - listitem [ref=e2274]:
              - strong [ref=e2275]: Profiling failed because a driver resource was unavailable.
              - paragraph [ref=e2276]: The error indicates that a required CUDA driver resource was unavailable during profiling. Most commonly, this means that NVIDIA Nsight Compute could not reserve the driver's performance monitor, which is necessary for collecting most metrics.
              - paragraph [ref=e2277]:
                - text: This can happen if another application has a concurrent reservation on this resource. Such applications can be e.g.
                - link "DCGM" [ref=e2278] [cursor=pointer]:
                  - /url: https://developer.nvidia.com/dcgm
                - text: ", a client of"
                - link "CUPTI's Profiling API" [ref=e2279] [cursor=pointer]:
                  - /url: https://developer.nvidia.com/cupti
                - text: ","
                - link "Nsight Graphics" [ref=e2280] [cursor=pointer]:
                  - /url: https://developer.nvidia.com/nsight-graphics
                - text: ", or another instance of NVIDIA Nsight Compute without access to the same file system (see"
                - link "serialization" [ref=e2281] [cursor=pointer]:
                  - /url: index.html#serialization
                - text: for how this is prevented within the same file system).
              - paragraph [ref=e2282]: If you expect the problem to be caused by DCGM, consider using dcgmi profile --pause to stop its monitoring while profiling with NVIDIA Nsight Compute.
            - listitem [ref=e2283]:
              - paragraph [ref=e2284]:
                - strong [ref=e2285]: Could not deploy stock * files to *
              - paragraph [ref=e2286]:
                - strong [ref=e2287]: Could not determine user home directory for section deployment.
              - paragraph [ref=e2288]: An error occurred while trying to deploy stock section or rule files. By default, NVIDIA Nsight Compute tries to deploy these to a versioned directory in the user's home directory (as identified by the HOME environment variable on Linux), e.g. /home/user/Documents/NVIDIA Nsight Compute/<version>/Sections.
              - paragraph [ref=e2289]: If the directory cannot be determined (e.g. because this environment variable is not pointing to a valid directory), or if there is an error while deploying the files (e.g. because the current process does not have write permissions on it), warning messages are shown and NVIDIA Nsight Compute falls back to using stock sections and rules from the installation directory.
              - paragraph [ref=e2290]:
                - text: If you are in an environment where you consistently don't have write access to the user's home directory, consider populating this directory upfront using
                - generic [ref=e2291]: ncu --section-folder-restore
                - text: ", or by making /home/user/Documents/NVIDIA Nsight Compute/<version> a symlink to a writable directory."
            - listitem [ref=e2292]:
              - paragraph [ref=e2293]:
                - strong [ref=e2294]: ProxyJump SSH option is not working
              - paragraph [ref=e2295]: NVIDIA Nsight Compute does not manage authentication or interactive prompts with the OpenSSH client launched when using the ProxyJump option. Therefore, to connect through an intermediate host for the first time, you will not be able to accept the intermediate host's key. A simple way to pinpoint the cause of failures in this case is to open a terminal and use the OpenSSH client to connect to the remote target. Once that connection succeeds, NVIDIA Nsight Compute should be able to connect to the target, too.
            - listitem [ref=e2296]:
              - paragraph [ref=e2297]:
                - strong [ref=e2298]: SSH connection fails without trying to connect
              - paragraph [ref=e2299]: If the connection fails without trying to connect, there may be a problem with the settings you entered into the connection dialog. Please make sure that the IP/Host Name, User Name and Port fields are correctly set.
            - listitem [ref=e2300]:
              - paragraph [ref=e2301]:
                - strong [ref=e2302]: SSH connections are still not working
              - paragraph [ref=e2303]: The problem might come from NVIDIA Nsight Compute's SSH client not finding a suitable host key algorithm to use which is supported by the remote server. You can force NVIDIA Nsight Compute to use a specific set of host key algorithms by setting the HostKeyAlgorithms option for the problematic host in your SSH configuration file. To list the supported host key algorithms for a remote target, you can use the ssh-keyscan utility which comes with the OpenSSH client.
            - listitem [ref=e2304]:
              - paragraph [ref=e2305]:
                - strong [ref=e2306]: Removing host keys from known hosts files
              - paragraph [ref=e2307]: When connecting to a target machine, NVIDIA Nsight Compute tries to verify the target's host key against the same local database as the OpenSSH client. If NVIDIA Nsight Compute find the host key is incorrect, it will inform you through a failure dialog. If you trust the key hash shown in the dialog, you can remove the previously saved key for that host by manually editing your known hosts database or using the ssh-keygen -R <host> command.
            - listitem [ref=e2308]:
              - paragraph [ref=e2309]:
                - strong [ref=e2310]: Qt initialization failed
              - paragraph [ref=e2311]:
                - strong [ref=e2312]: Failed to load Qt platform plugin
              - paragraph [ref=e2313]:
                - text: See
                - link "System Requirements" [ref=e2314] [cursor=pointer]:
                  - /url: ../ReleaseNotes/index.html#system-requirements
                - text: for Linux.
