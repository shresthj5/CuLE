          - generic [ref=e45]:
            - paragraph [ref=e46]: NVIDIA Ampere GPU Architecture Compatibility Guide for CUDA Applications
            - paragraph [ref=e47]: The guide to building CUDA applications for GPUs based on the NVIDIA Ampere GPU Architecture.
            - generic [ref=e48]:
              - heading "1. NVIDIA Ampere GPU Architecture Compatibility " [level=1] [ref=e49]:
                - text: 1. NVIDIA Ampere GPU Architecture Compatibility
                - link "" [ref=e50] [cursor=pointer]:
                  - /url: "#nvidia-ampere-gpu-architecture-compatibility"
              - generic [ref=e51]:
                - heading "1.1. About this Document " [level=2] [ref=e52]:
                  - text: 1.1. About this Document
                  - link "" [ref=e53] [cursor=pointer]:
                    - /url: "#about-this-document"
                - paragraph [ref=e54]:
                  - text: This application note, NVIDIA Ampere GPU Architecture Compatibility Guide for CUDA Applications, is intended to help developers ensure that their NVIDIA
                  - superscript [ref=e55]: ®
                  - text: CUDA
                  - superscript [ref=e56]: ®
                  - text: applications will run on the NVIDIA
                  - superscript [ref=e57]: ®
                  - text: Ampere Architecture based GPUs. This document provides guidance to developers who are familiar with programming in CUDA C++ and want to make sure that their software applications are compatible with the NVIDIA Ampere GPU architecture.
              - generic [ref=e58]:
                - heading "1.2. Application Compatibility on the NVIDIA Ampere GPU Architecture " [level=2] [ref=e59]:
                  - text: 1.2. Application Compatibility on the NVIDIA Ampere GPU Architecture
                  - link "" [ref=e60] [cursor=pointer]:
                    - /url: "#application-compatibility-on-the-nvidia-ampere-gpu-architecture"
                - paragraph [ref=e61]:
                  - text: A CUDA application binary (with one or more GPU kernels) can contain the compiled GPU code in two forms, binary
                  - emphasis [ref=e62]: cubin
                  - text: objects and forward-compatible
                  - emphasis [ref=e63]: PTX
                  - text: assembly for each kernel. Both cubin and PTX are generated for a certain target compute capability. A cubin generated for a certain compute capability is supported to run on any GPU with the same major revision and same or higher minor revision of compute capability. For example, a cubin generated for compute capability 7.0 is supported to run on a GPU with compute capability 7.5, however a cubin generated for compute capability 7.5 is
                  - emphasis [ref=e64]: not
                  - text: supported to run on a GPU with compute capability 7.0, and a cubin generated with compute capability 7.x is
                  - emphasis [ref=e65]: not
                  - text: supported to run on a GPU with compute capability 8.x.
                - paragraph [ref=e66]:
                  - text: Kernel can also be compiled to a PTX form. At the application load time, PTX is compiled to cubin and the cubin is used for kernel execution. Unlike cubin, PTX is forward-compatible. Meaning PTX is supported to run on any GPU with compute capability higher than the compute capability assumed for generation of that PTX. For example, PTX code generated for compute capability 7.x is supported to run on compute capability 7.x or any higher revision (major or minor), including compute capability 8.x. Therefore although it is optional,
                  - strong [ref=e67]: it is recommended that all applications should include PTX of the kernels to ensure forward-compatibility.
                  - text: To read more about cubin and PTX compatibilities see Compilation with NVCC from the Programming Guide.
                - paragraph [ref=e68]:
                  - text: When a CUDA application launches a kernel on a GPU, the CUDA Runtime determines the compute capability of the GPU in the system and uses this information to find the best matching cubin or PTX version of the kernel. If a cubin compatible with that GPU is present in the binary, the cubin is used as-is for execution. Otherwise, the CUDA Runtime first generates compatible cubin by JIT-compiling
                  - link "1" [ref=e69] [cursor=pointer]:
                    - /url: "#fn1"
                  - text: the PTX and then the cubin is used for the execution. If neither compatible cubin nor PTX is available, kernel launch results in a failure.
                - paragraph [ref=e70]:
                  - text: Application binaries that include PTX version of kernels, should work as-is on the NVIDIA Ampere architecture based GPUs. In such cases, rebuilding the application is not required. However application binaries which do not include PTX (only include cubins), need to be rebuilt to run on the NVIDIA Ampere architecture based GPUs. To know more about building compatible applications read
                  - link "Building Applications with the NVIDIA Ampere GPU Architecture Support" [ref=e71] [cursor=pointer]:
                    - /url: index.html#building-applications-with-ampere-support
                  - text: .
              - generic [ref=e72]:
                - heading "1.3. Verifying Ampere Compatibility for Existing Applications " [level=2] [ref=e73]:
                  - text: 1.3. Verifying Ampere Compatibility for Existing Applications
                  - link "" [ref=e74] [cursor=pointer]:
                    - /url: "#verifying-ampere-compatibility-for-existing-applications"
                - paragraph [ref=e75]: The first step towards making a CUDA application compatible with the NVIDIA Ampere GPU architecture is to check if the application binary already contains compatible GPU code (at least the PTX). The following sections explain how to accomplish this for an already built CUDA application.
                - generic [ref=e76]:
                  - heading "1.3.1. Applications Built Using CUDA Toolkit 10.2 or Earlier " [level=3] [ref=e77]:
                    - text: 1.3.1. Applications Built Using CUDA Toolkit 10.2 or Earlier
                    - link "" [ref=e78] [cursor=pointer]:
                      - /url: "#applications-built-using-cuda-toolkit-10-2-or-earlier"
                  - paragraph [ref=e79]: "CUDA applications built using CUDA Toolkit versions 2.1 through 10.2 are compatible with NVIDIA Ampere architecture based GPUs as long as they are built to include PTX versions of their kernels. This can be tested by forcing the PTX to JIT-compile at application load time with following the steps:"
                  - list [ref=e80]:
                    - listitem [ref=e81]:
                      - paragraph [ref=e82]:
                        - text: Download and install the latest driver from
                        - link "https://www.nvidia.com/drivers" [ref=e83] [cursor=pointer]:
                          - /url: https://www.nvidia.com/drivers
                        - text: .
                    - listitem [ref=e84]:
                      - paragraph [ref=e85]:
                        - text: Set the environment variable
                        - code [ref=e86]: CUDA_FORCE_PTX_JIT=1
                        - text: .
                    - listitem [ref=e87]:
                      - paragraph [ref=e88]: Launch the application.
                  - paragraph [ref=e89]:
                    - text: With
                    - code [ref=e90]: CUDA_FORCE_PTX_JIT=1
                    - text: ", GPU binary code embedded in an application binary is ignored. Instead PTX code for each kernel is JIT-compiled to produce GPU binary code. An application fails to execute if it does not include PTX. This means the application is not compatible with the NVIDIA Ampere GPU architecture and needs to be rebuilt for compatibility. On the other hand, if the application works properly with this environment variable set, then the application is compatible with the NVIDIA Ampere GPU architecture."
                  - generic [ref=e91]:
                    - paragraph [ref=e92]:  Note
                    - paragraph [ref=e93]:
                      - text: Be sure to unset the
                      - code [ref=e94]: CUDA_FORCE_PTX_JIT
                      - text: environment variable after testing is done.
                - generic [ref=e95]:
                  - heading "1.3.2. Applications Built Using CUDA Toolkit 11.0 " [level=3] [ref=e96]:
                    - text: 1.3.2. Applications Built Using CUDA Toolkit 11.0
                    - link "" [ref=e97] [cursor=pointer]:
                      - /url: "#applications-built-using-cuda-toolkit-11-0"
                  - paragraph [ref=e98]: CUDA applications built using CUDA Toolkit 11.0 are compatible with the NVIDIA Ampere GPU architecture as long as they are built to include kernels in native cubin (compute capability 8.0) or PTX form or both.
              - generic [ref=e99]:
                - heading "1.4. Building Applications with the NVIDIA Ampere GPU Architecture Support " [level=2] [ref=e100]:
                  - text: 1.4. Building Applications with the NVIDIA Ampere GPU Architecture Support
                  - link "" [ref=e101] [cursor=pointer]:
                    - /url: "#building-applications-with-the-nvidia-ampere-gpu-architecture-support"
                - paragraph [ref=e102]: "Depending on the version of the CUDA Toolkit used for building the application, it can be built to include PTX and/or native cubin for the NVIDIA Ampere GPU architecture. Although it is enough to just include PTX, including native cubin also has the following advantages:"
                - list [ref=e103]:
                  - listitem [ref=e104]:
                    - paragraph [ref=e105]: It saves the end user the time it takes to JIT-compile kernels that are available only as PTX. All kernels which do not have native cubins are JIT-compiled from PTX, including kernels from all the libraries linked to the application, even if those kernels are never launched by the application. Especially when using large libraries, this JIT compilation can take a significant amount of time. The CUDA driver caches the cubins generated as a result of the PTX JIT, so this is mostly a one-time cost for a user, but it is time best avoided whenever possible.
                  - listitem [ref=e106]:
                    - paragraph [ref=e107]: PTX JIT-compiled kernels often cannot take advantage of architectural features of newer GPUs, meaning that native-compiled cubins may be faster or of greater accuracy.
                - generic [ref=e108]:
                  - heading "1.4.1. Building Applications Using CUDA Toolkit 10.x or Earlier " [level=3] [ref=e109]:
                    - text: 1.4.1. Building Applications Using CUDA Toolkit 10.x or Earlier
                    - link "" [ref=e110] [cursor=pointer]:
                      - /url: "#building-applications-using-cuda-toolkit-10-x-or-earlier"
                  - paragraph [ref=e111]:
                    - text: The
                    - code [ref=e112]: nvcc
                    - text: compiler included with versions 10.x (10.0, 10.1 and 10.2) of the CUDA Toolkit can generate cubins native to the Volta and Turing architectures (compute capability 7.x). When using CUDA Toolkit 10.x, to ensure that
                    - code [ref=e113]: nvcc
                    - text: will generate cubin files for all recent GPU architectures as well as a PTX version for forward compatibility with future GPU architectures, specify the appropriate
                    - code [ref=e114]: "-gencode="
                    - text: parameters on the
                    - code [ref=e115]: nvcc
                    - text: command line as shown in the examples below.
                  - paragraph [ref=e116]:
                    - strong [ref=e117]: Windows
                  - generic [ref=e120]: nvcc.exe -ccbin "C:\vs2010\VC\bin" -Xcompiler "/EHsc /W3 /nologo /O2 /Zi /MT" -gencode=arch=compute_52,code=sm_52 -gencode=arch=compute_60,code=sm_60 -gencode=arch=compute_61,code=sm_61 -gencode=arch=compute_70,code=sm_70 -gencode=arch=compute_75,code=sm_75 -gencode=arch=compute_75,code=compute_75 --compile -o "Release\mykernel.cu.obj" "mykernel.cu"
                  - paragraph [ref=e121]:
                    - strong [ref=e122]: Mac/Linux
                  - generic [ref=e125]: /usr/local/cuda/bin/nvcc -gencode=arch=compute_52,code=sm_52 -gencode=arch=compute_60,code=sm_60 -gencode=arch=compute_61,code=sm_61 -gencode=arch=compute_70,code=sm_70 -gencode=arch=compute_75,code=sm_75 -gencode=arch=compute_75,code=compute_75 -O2 -o mykernel.o -c mykernel.cu
                  - paragraph [ref=e126]:
                    - text: Alternatively, the simplified
                    - code [ref=e127]: nvcc
                    - text: command-line option
                    - code [ref=e128]: "-arch=sm_XX"
                    - text: can be used. It is a shorthand equivalent to the following more explicit
                    - code [ref=e129]: "-gencode="
                    - text: command-line options used above.
                    - code [ref=e130]: "-arch=sm_XX"
                    - text: "expands to the following:"
                  - generic [ref=e133]: "-gencode=arch=compute_XX,code=sm_XX -gencode=arch=compute_XX,code=compute_XX"
                  - paragraph [ref=e134]:
                    - text: However, while the
                    - code [ref=e135]: "-arch=sm_XX"
                    - text: command-line option does result in inclusion of a PTX back-end target binary by default, it can only specify a single target cubin architecture at a time, and it is not possible to use multiple
                    - code [ref=e136]: "-arch="
                    - text: options on the same
                    - code [ref=e137]: nvcc
                    - text: command line, which is why the examples above use
                    - code [ref=e138]: "-gencode="
                    - text: explicitly.
                  - paragraph [ref=e139]:
                    - text: For CUDA toolkits prior to 10.0, one or more of the
                    - code [ref=e140]: "-gencode"
                    - text: options will need to be removed according to the architectures supported by the specific toolkit version (for example, CUDA toolkit 9.x supports architectures up to _60 and _61). The final
                    - code [ref=e141]: "-gencode"
                    - text: to generate PTX would also need to be update – for further information and examples see the documentation for the specific CUDA toolkit version.
                  - generic [ref=e142]:
                    - paragraph [ref=e143]:  Note
                    - paragraph [ref=e144]:
                      - code [ref=e145]: compute_XX
                      - text: refers to a PTX version and
                      - code [ref=e146]: sm_XX
                      - text: refers to a cubin version. The
                      - code [ref=e147]: arch=
                      - text: clause of the
                      - code [ref=e148]: "-gencode="
                      - text: command-line option to
                      - code [ref=e149]: nvcc
                      - text: specifies the front-end compilation target and must always be a PTX version. The
                      - code [ref=e150]: code=
                      - text: clause specifies the back-end compilation target and can either be cubin or PTX or both. Only the back-end target version(s) specified by the
                      - code [ref=e151]: code=
                      - text: clause will be retained in the resulting binary; at least one should be PTX to provide compatibility with future architectures.
                - generic [ref=e152]:
                  - heading "1.4.2. Building Applications Using CUDA Toolkit 11.0 " [level=3] [ref=e153]:
                    - text: 1.4.2. Building Applications Using CUDA Toolkit 11.0
                    - link "" [ref=e154] [cursor=pointer]:
                      - /url: "#building-applications-using-cuda-toolkit-11-0"
                  - paragraph [ref=e155]:
                    - text: With versions 11.0 of the CUDA Toolkit,
