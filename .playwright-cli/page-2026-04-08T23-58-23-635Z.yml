                - generic [ref=e180]:
                  - heading "1.4.3. Independent Thread Scheduling Compatibility " [level=3] [ref=e181]:
                    - text: 1.4.3. Independent Thread Scheduling Compatibility
                    - link "" [ref=e182] [cursor=pointer]:
                      - /url: "#independent-thread-scheduling-compatibility"
                  - paragraph [ref=e183]:
                    - text: NVIDIA GPUs since Volta architecture have
                    - emphasis [ref=e184]: Independent Thread Scheduling
                    - text: among threads in a warp. If the developer made assumptions about warp-synchronicity
                    - link "2" [ref=e185] [cursor=pointer]:
                      - /url: "#fn2"
                    - text: ", this feature can alter the set of threads participating in the executed code compared to previous architectures. Please see Compute Capability 7.0 in the Programming Guide for details and corrective actions. To aid migration to the NVIDIA Ampere GPU architecture, developers can opt-in to the Pascal scheduling model with the following combination of compiler options."
                  - generic [ref=e188]: nvcc -gencode=arch=compute_60,code=sm_80 ...
