        - article [ref=e90]:
          - generic [ref=e91]:
            - heading "CUDA Programming Guide" [level=1] [ref=e92]
            - paragraph [ref=e93]:
              - strong [ref=e94]: CUDA and the CUDA Programming Guide
            - paragraph [ref=e95]: CUDA is a parallel computing platform and programming model developed by NVIDIA that enables dramatic increases in computing performance by harnessing the power of the GPU. It allows developers to accelerate compute-intensive applications and is widely used in fields such as deep learning, scientific computing, and high-performance computing (HPC).
            - paragraph [ref=e96]: This CUDA Programming Guide is the official, comprehensive resource on the CUDA programming model and how to write code that executes on the GPU using the CUDA platform. This guide covers everything from the CUDA programming model and the CUDA platform to the details of language extensions and covers how to make use of specific hardware and software features. This guide provides a pathway for developers to learn CUDA if they are new, and also provides an essential resource for developers as they build applications using CUDA.
            - paragraph [ref=e97]:
              - strong [ref=e98]: Organization of This Guide
            - paragraph [ref=e99]:
              - text: Even for developers who primarily use libraries, frameworks, or DSLs, an understanding of the CUDA programming model and how GPUs execute code is valuable in knowing what is happening behind the layers of abstraction. This guide starts with a chapter on the
              - link "CUDA programming model" [ref=e100] [cursor=pointer]:
                - /url: 01-introduction/programming-model.html#programming-model
              - text: outside of any specific programming language which is applicable to anyone interested in understanding how CUDA works, even non-developers.
            - paragraph [ref=e101]: "The guide is broken down into five primary parts:"
            - list [ref=e102]:
              - listitem [ref=e103]:
                - paragraph [ref=e104]: "Part 1: Introduction and Programming Model Abstract"
                - list [ref=e105]:
                  - listitem [ref=e106]:
                    - paragraph [ref=e107]: A language agnostic overview of the CUDA programming model as well as a brief tour of the CUDA platform.
                  - listitem [ref=e108]:
                    - paragraph [ref=e109]: This section is meant to be read by anyone wanting to understand GPUs and the concepts of executing code on GPUs, even if they are not developers.
              - listitem [ref=e110]:
                - paragraph [ref=e111]: "Part 2: Programming GPUs in CUDA"
                - list [ref=e112]:
                  - listitem [ref=e113]:
                    - paragraph [ref=e114]: The basics of programming GPUs using CUDA C++.
                  - listitem [ref=e115]:
                    - paragraph [ref=e116]: This section is meant to be read by anyone wanting to get started in GPU programming.
                  - listitem [ref=e117]:
                    - paragraph [ref=e118]: This section is meant to be instructional, not complete, and teaches the most important and common parts of CUDA programming, including some common performance considerations.
              - listitem [ref=e119]:
                - paragraph [ref=e120]: "Part 3: Advanced CUDA"
                - list [ref=e121]:
                  - listitem [ref=e122]:
                    - paragraph [ref=e123]: Introduces some more advance features of CUDA that enable both fine-grained control and more opportunities to maximize performance, including the use of multiple GPUs in a single application.
                  - listitem [ref=e124]:
                    - paragraph [ref=e125]:
                      - text: This section concludes with a
                      - link "tour of the features covered in part 4" [ref=e126] [cursor=pointer]:
                        - /url: 03-advanced/feature-survey.html#tour-of-features
                      - text: with a brief introduction to the purpose and function of each, sorted by when and why a developer may find each feature useful.
              - listitem [ref=e127]:
                - paragraph [ref=e128]: "Part 4: CUDA Features"
                - list [ref=e129]:
                  - listitem [ref=e130]:
                    - paragraph [ref=e131]: This section contains complete coverage of specific CUDA features such as CUDA graphs, dynamic parallelism, interoperability with graphics APIs, and unified memory.
                  - listitem [ref=e132]:
                    - paragraph [ref=e133]: This section should be consulted when knowing the complete picture of a specific CUDA feature is needed. Where possible, care has been taken to introduce and motivate the features covered in this section in earlier sections.
              - listitem [ref=e134]:
                - paragraph [ref=e135]: "Part 5: Technical Appendices"
                - list [ref=e136]:
                  - listitem [ref=e137]:
                    - paragraph [ref=e138]: The technical appendices provide some reference documentation on CUDA’s C++ high-level language support, hardware-specific specifications, and other technical specifications.
                  - listitem [ref=e139]:
                    - paragraph [ref=e140]: This section is meant as technical reference for specific description of syntax, semantics, and technical behavior of elements of CUDA.
            - paragraph [ref=e141]: Parts 1-3 provide a guided learning experience for developers new to CUDA, though they also provide insight and updated information useful for CUDA developers of any experience level.
            - paragraph [ref=e142]: Parts 4 and 5 provide a wealth of information about specific features and detailed topics, and are intended to provide a curated, well-organized reference for developers needing to know more details as they write CUDA applications.
