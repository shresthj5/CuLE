                - paragraph [ref=e138]:
                  - text: Once installed you can import the native ALE interface as
                  - code [ref=e139]: ale_py
                - generic [ref=e142]: from ale_py import ALEInterface ale = ALEInterface()
              - generic [ref=e143]:
                - heading "Gymnasium API" [level=2] [ref=e144]
                - paragraph [ref=e145]:
                  - text: ALE supports the
                  - link "Gymnasium" [ref=e146] [cursor=pointer]:
                    - /url: https://github.com/farama-Foundation/gymnasium
                  - text: API such that all the setup required for interacting with the emulator is complete. See the environment page for all the available ROMs and the gymnasium
                  - link "getting started" [ref=e147] [cursor=pointer]:
                    - /url: https://gymnasium.farama.org/content/basic_usage/
                  - text: page for how to interact.
                - generic [ref=e150]: import gymnasium as gym import ale_py gym.register_envs(ale_py) env = gym.make('ALE/Breakout-v5') obs, info = env.reset() obs, reward, terminated, truncated, info = env.step(env.action_space.sample()) env.close()
              - generic [ref=e151]:
                - heading "C++ Interface" [level=2] [ref=e152]
                - paragraph [ref=e153]: "The C++ library requires:"
                - list [ref=e154]:
                  - listitem [ref=e155]:
                    - paragraph [ref=e156]: A C++17 compiler
                  - listitem [ref=e157]:
                    - paragraph [ref=e158]: CMake 3.14+
                  - listitem [ref=e159]:
                    - paragraph [ref=e160]: zlib
                  - listitem [ref=e161]:
                    - paragraph [ref=e162]: (Optional) SDL 2 for display/audio support
                - paragraph [ref=e163]:
                  - text: SDL support allows for displaying the console’s screen and enabling audio output. For example,
                  - emphasis [ref=e164]: without
                  - text: "SDL support you’ll still be able to train your agents, but you won’t be able to visualize the resulting policy. It might be preferable to disable SDL support when compiled on a cluster but enable SDL locally. Note: SDL support defaults to"
                  - strong [ref=e165]: "OFF"
                  - text: .
                - paragraph [ref=e166]:
                  - text: You can use any package manager to install these dependencies but we recommend using
                  - link "vcpkg" [ref=e167] [cursor=pointer]:
                    - /url: https://github.com/microsoft/vcpkg
                    - code [ref=e168]: vcpkg
                  - text: . Here’s a minimal example of installing these dependencies and building/installing the C++ library.
                - generic [ref=e171]: vcpkg install zlib sdl2 mkdir build && cd build cmake ../ -DCMAKE_BUILD_TYPE=Release cmake --build . --target install
                - paragraph [ref=e172]:
                  - text: These steps will work on any platform, just make sure to specify the environment variable
                  - code [ref=e173]: VCPKG_INSTALLATION_ROOT
                  - text: to point to your vcpkg installation so we can find the required dependencies. If you install any vcpkg dependencies using non-standard triplets you can specify the environment variable
                  - code [ref=e174]: VCPKG_TARGET_TRIPLET
                  - text: . For more info check out the
                  - link "vcpkg docs" [ref=e175] [cursor=pointer]:
                    - /url: https://vcpkg.readthedocs.io/en/latest/users/config-environment/
                  - text: on how to configure your environment.
                - paragraph [ref=e176]: Once the ALE is installed you can link against the library in your C++ project as follows
                - generic [ref=e179]: find_package(ale REQUIRED) target_link_libraries(YourTarget ale::ale-lib)
