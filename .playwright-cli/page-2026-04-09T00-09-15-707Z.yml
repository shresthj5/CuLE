                  - generic [ref=e431]:
                    - paragraph [ref=e432]: Warning 
                    - paragraph [ref=e433]:
                      - text: The PyTorch python API (as provided in libtorch_python) cannot be built with the flag
                      - code [ref=e434]: py_limited_api=True
                      - text: . When this flag is passed, it is the user’s responsibility in their library to not use APIs from libtorch_python (in particular pytorch/python bindings) and to only use APIs from libtorch (aten objects, operators and the dispatcher). For example, to give access to custom ops from python, the library should register the ops through the dispatcher.
                    - paragraph [ref=e435]:
                      - text: Contrary to CPython setuptools, who does not define -DPy_LIMITED_API as a compile flag when py_limited_api is specified as an option for the “bdist_wheel” command in
                      - code [ref=e436]: setup
