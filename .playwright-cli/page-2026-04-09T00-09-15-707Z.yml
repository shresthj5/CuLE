                    - button "Copy to clipboard" [ref=e441] [cursor=pointer]:
                      - img "Copy to clipboard" [ref=e442]
                  - paragraph [ref=e446]: "Compute capabilities:"
                  - paragraph [ref=e447]: By default the extension will be compiled to run on all archs of the cards visible during the building process of the extension, plus PTX. If down the road a new card is installed the extension may need to be recompiled. If a visible card has a compute capability (CC) that’s newer than the newest version for which your nvcc can build fully-compiled binaries, PyTorch will make nvcc fall back to building kernels with the newest version of PTX your nvcc does support (see below for details on PTX).
                  - paragraph [ref=e448]: "You can override the default behavior using TORCH_CUDA_ARCH_LIST to explicitly specify which CCs you want the extension to support:"
                  - paragraph [ref=e449]:
                    - code [ref=e450]: TORCH_CUDA_ARCH_LIST="6.1 8.6" python build_my_extension.py
                    - code [ref=e451]: TORCH_CUDA_ARCH_LIST="5.2 6.0 6.1 7.0 7.5 8.0 8.6+PTX" python build_my_extension.py
                  - paragraph [ref=e452]: The +PTX option causes extension kernel binaries to include PTX instructions for the specified CC. PTX is an intermediate representation that allows kernels to runtime-compile for any CC >= the specified CC (for example, 8.6+PTX generates PTX that can runtime-compile for any GPU with CC >= 8.6). This improves your binary’s forward compatibility. However, relying on older PTX to provide forward compat by runtime-compiling for newer CCs can modestly reduce performance on those newer CCs. If you know exact CC(s) of the GPUs you want to target, you’re always better off specifying them individually. For example, if you want your extension to run on 8.0 and 8.6, “8.0+PTX” would work functionally because it includes PTX that can runtime-compile for 8.6, but “8.0 8.6” would be better.
                  - paragraph [ref=e453]: Note that while it’s possible to include all supported archs, the more archs get included the slower the building process will be, as it will build a separate kernel image for each arch.
                  - paragraph [ref=e454]: Note that CUDA-11.5 nvcc will hit internal compiler error while parsing torch/extension.h on Windows. To workaround the issue, move python binding logic to pure C++ file.
                  - generic [ref=e455]:
                    - term [ref=e456]: "Example use:"
                    - definition [ref=e457]:
                      - paragraph [ref=e458]: "#include <ATen/ATen.h> at::Tensor SigmoidAlphaBlendForwardCuda(….)"
                    - term [ref=e459]: "Instead of:"
                    - definition [ref=e460]:
                      - paragraph [ref=e461]: "#include <torch/extension.h> torch::Tensor SigmoidAlphaBlendForwardCuda(…)"
                  - paragraph [ref=e462]:
                    - text: "Currently open issue for nvcc bug:"
                    - link "pytorch/pytorch#69460" [ref=e463] [cursor=pointer]:
                      - /url: https://github.com/pytorch/pytorch/issues/69460
                    - text: "Complete workaround code example:"
                    - link "facebookresearch/pytorch3d" [ref=e464] [cursor=pointer]:
                      - /url: https://github.com/facebookresearch/pytorch3d/commit/cb170ac024a949f1f9614ffe6af1c38d972f7d48
                  - paragraph [ref=e465]: "Relocatable device code linking:"
                  - paragraph [ref=e466]: If you want to reference device symbols across compilation units (across object files), the object files need to be built with relocatable device code (-rdc=true or -dc). An exception to this rule is “dynamic parallelism” (nested kernel launches) which is not used a lot anymore. Relocatable device code is less optimized so it needs to be used only on object files that need it. Using -dlto (Device Link Time Optimization) at the device code compilation step and dlink step helps reduce the protentional perf degradation of -rdc. Note that it needs to be used at both steps to be useful.
                  - paragraph [ref=e467]:
                    - text: "If you have rdc objects you need to have an extra -dlink (device linking) step before the CPU symbol linking step. There is also a case where -dlink is used without -rdc: when an extension is linked against a static lib containing rdc-compiled objects like the [NVSHMEM library]("
                    - link "https://developer.nvidia.com/nvshmem" [ref=e468] [cursor=pointer]:
                      - /url: https://developer.nvidia.com/nvshmem
                    - text: ).
                  - paragraph [ref=e469]: "Note: Ninja is required to build a CUDA Extension with RDC linking."
                  - paragraph [ref=e470]: Example
                  - generic [ref=e472]:
                    - generic [ref=e473]: ">>> CUDAExtension( ... name='cuda_extension', ... sources=['extension.cpp', 'extension_kernel.cu'], ... dlink=True, ... dlink_libraries=[\"dlink_lib\"], ... extra_compile_args={'cxx': ['-g'], ... 'nvcc': ['-O2', '-rdc=true']})"
