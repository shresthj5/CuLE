                  - generic [ref=e392]:
                    - paragraph [ref=e393]: Warning 
                    - paragraph [ref=e394]:
                      - text: The PyTorch python API (as provided in libtorch_python) cannot be built with the flag
                      - code [ref=e395]: py_limited_api=True
                      - text: . When this flag is passed, it is the user’s responsibility in their library to not use APIs from libtorch_python (in particular pytorch/python bindings) and to only use APIs from libtorch (aten objects, operators and the dispatcher). For example, to give access to custom ops from python, the library should register the ops through the dispatcher.
                    - paragraph [ref=e396]:
                      - text: Contrary to CPython setuptools, who does not define -DPy_LIMITED_API as a compile flag when py_limited_api is specified as an option for the “bdist_wheel” command in
                      - code [ref=e397]: setup
                      - text: ", PyTorch does! We will specify -DPy_LIMITED_API=min_supported_cpython to best enforce consistency, safety, and sanity in order to encourage best practices. To target a different version, set min_supported_cpython to the hexcode of the CPython version of choice."
                  - paragraph [ref=e398]: Example
                  - generic [ref=e400]:
                    - generic [ref=e401]: ">>> from setuptools import setup >>> from torch.utils.cpp_extension import BuildExtension, CppExtension >>> setup( ... name='extension', ... ext_modules=[ ... CppExtension( ... name='extension', ... sources=['extension.cpp'], ... extra_compile_args=['-g'], ... extra_link_args=['-Wl,--no-as-needed', '-lm']) ... ], ... cmdclass={ ... 'build_ext': BuildExtension ... })"
